<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTEi CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --ntei: #eb4d4b;
            --smeti: #C0C0C0; --hw-color: #e67e22; --sw-color: #3498db; --plat-color: #1dd1a1;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Dash Cards */
        .dash-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card span { font-family: 'Orbitron'; font-size: 1.2rem; display: block; color: var(--prof); }
        .stat-card p { font-size: 9px; margin: 0; text-transform: uppercase; color: #888; }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 10px; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.05); text-align: center; }
        
        #main-system { display: none; padding: 60px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h3 { margin: 0 0 15px 0; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; font-size: 13px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }

        #chat-box, #chat-nti-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 12px; max-width: 85%; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        .student-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #fff; }
        .student-table th { background: rgba(255,255,255,0.1); padding: 5px; text-align: left; }
        .student-table td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .hidden { display: none !important; }
        .chart-container { position: relative; height: 150px; width: 100%; }
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--ntei); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron">SISTEMA BLOQUEADO</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column" style="background: rgba(192,192,192,0.05)"><i class="fa fa-briefcase fa-3x" style="color:var(--smeti)"></i><h2>SMETi</h2><input type="number" id="sm-p" placeholder="Prontuário"><input type="password" id="sm-s" placeholder="Senha"><button class="btn" style="background:var(--smeti); color:black" onclick="app.login('sm','SMETi')">Gerenciar</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--ntei)"></i><h2>NTEi</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--ntei); color:white" onclick="app.login('n','NTEi')">Master</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            
            <div class="left-col">
                <div id="panel-smeti" class="panel hidden" style="border-top: 4px solid var(--smeti)">
                    <h3 style="color:var(--smeti)"><i class="fa fa-shield-halved"></i> PAINEL SMETi</h3>
                    <div class="chart-container"><canvas id="chartSmeti"></canvas></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-chart-line"></i> DASHBOARD</h3>
                    <div class="dash-row">
                        <div class="stat-card"><span id="count-chamados">0</span><p>Fila</p></div>
                        <div class="stat-card"><span id="count-res">0</span><p>Reservas</p></div>
                    </div>
                    <div class="chart-container"><canvas id="mainDashChart"></canvas></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Nova Reserva</h3>
                    <select id="res-eq"><option>Chromebooks</option><option>TV 01</option><option>Kit Multimídia</option></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Agendar</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3><i class="fa fa-tools"></i> Fila NTEi</h3>
                    <div id="lista-chamados-nti" style="max-height:300px; overflow-y:auto"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-headset"></i> Abrir Chamado</h3>
                    <select id="chamado-tipo" onchange="app.updateSub()">
                        <option value="Hardware">🛠️ Hardware</option>
                        <option value="Software">💻 Software</option>
                        <option value="Senhas">🔑 Reset de Senhas</option>
                    </select>
                    <select id="chamado-sub"></select>
                    <textarea id="chamado-desc" placeholder="Detalhes do problema..."></textarea>
                    <button class="btn" style="background:var(--ntei); color:white" onclick="app.abrirChamado()">Solicitar Suporte</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-users-cog"></i> Login dos Alunos</h3>
                    <div style="display:flex; gap:5px">
                        <input type="text" id="al-nome" placeholder="Aluno">
                        <input type="text" id="al-user" placeholder="Login">
                        <input type="text" id="al-pass" placeholder="Senha">
                    </div>
                    <button class="btn" style="background:var(--cad)" onclick="app.salvarAluno()">Salvar Dados Aluno</button>
                    <div style="max-height:150px; overflow-y:auto; margin-top:10px">
                        <table class="student-table"><thead><tr><th>Nome</th><th>User</th><th>Senha</th></tr></thead><tbody id="body-alunos"></tbody></table>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Mural</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-in" placeholder="Texto...">
                        <button class="btn" style="width:60px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>

                <div id="active-ticket-area" class="panel hidden" style="border: 2px solid var(--prof)">
                    <h3><i class="fa fa-headset"></i> Atendimento</h3>
                    <div id="chat-nti-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-nti-in" placeholder="Resposta...">
                        <button class="btn" style="width:60px; background:var(--prof)" onclick="app.sendChatNTEi()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                    <button class="btn" style="background:var(--cad); font-size:10px" onclick="app.finalizarChamado()">Encerrar Ticket</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-lightbulb"></i> Sugestões</h3>
                    <textarea id="sugestao-txt" placeholder="Sua ideia..."></textarea>
                    <button class="btn" style="background:var(--gestao)" onclick="app.enviarSugestao()">Enviar</button>
                </div>

                <button class="btn" style="background:#cc4444" onclick="location.reload()">Desconectar</button>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        currentTicket: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            if(cargo === 'SMETi' && p === "1010" && s === "smeti2026") {
                this.user = { nome: "Analista SMETi", cargo: 'SMETi' };
                return this.start();
            }
            if(cargo==='NTEi' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin Master', cargo:'NTEi'}; 
                return this.start(); 
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { 
                this.user = snap.val(); 
                this.start(); 
            } else { alert("Acesso Negado."); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: "pmspmudar123" }).then(() => alert("Criado! Senha: pmspmudar123"));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'SMETi' || this.user.cargo === 'NTEi') {
                document.getElementById('panel-smeti').classList.remove('hidden');
                this.initCharts();
            }
            this.updateSub();
            this.sync();
        },

        initCharts() {
            new Chart(document.getElementById('chartSmeti'), { type: 'bar', data: { labels: ['S1','S2','S3','S4'], datasets: [{ label: 'SMETi Performance', data: [70, 85, 80, 95], backgroundColor: '#C0C0C0' }] }, options: { maintainAspectRatio: false } });
            new Chart(document.getElementById('mainDashChart'), { type: 'line', data: { labels: ['Seg','Ter','Qua','Qui','Sex'], datasets: [{ label: 'Uso Rede', data: [40, 60, 55, 80, 90], borderColor: '#00adef', fill: true, backgroundColor: 'rgba(0,173,239,0.1)' }] }, options: { maintainAspectRatio: false } });
        },

        sync() {
            db.ref('lock').on('value', s => document.getElementById('lock-overlay').style.display = (s.val() && this.user.cargo !== 'NTEi') ? 'flex' : 'none');
            db.ref('chat').limitToLast(10).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => { let d = m.val(); box.innerHTML += `<div class="msg ${d.n === this.user.nome ? 'msg-out' : 'msg-in'}"><b>${d.n}:</b><br>${d.t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
            db.ref('chamados').on('value', snap => {
                const box = document.getElementById('lista-chamados-nti'); box.innerHTML = "";
                document.getElementById('count-chamados').innerText = snap.numChildren();
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto') {
                        box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:8px; margin-bottom:5px; border-radius:5px; font-size:11px">
                            <b>${d.u}</b> [${d.tipo}]: ${d.t} 
                            <button onclick="app.atender('${c.key}')" style="background:var(--prof); border:none; color:white; padding:2px 5px; cursor:pointer; float:right">Chat</button>
                        </div>`;
                    }
                });
            });
            db.ref('reservas').on('value', s => document.getElementById('count-res').innerText = s.numChildren());
            if(this.user.pront) this.carregarAlunos();
        },

        updateSub() {
            const t = document.getElementById('chamado-tipo').value, s = document.getElementById('chamado-sub');
            s.innerHTML = "";
            let opts = t==='Hardware' ? ['Chromebook', 'Impressora', 'PC'] : (t==='Software' ? ['Sisgem', 'Email'] : ['Matific', 'Elefante']);
            opts.forEach(o => s.innerHTML += `<option value="${o}">${o}</option>`);
        },

        abrirChamado() {
            db.ref('chamados').push({ u: this.user.nome, tipo: document.getElementById('chamado-tipo').value, sub: document.getElementById('chamado-sub').value, t: document.getElementById('chamado-desc').value, status: 'aberto' });
            document.getElementById('chamado-desc').value = "";
        },

        atender(id) {
            this.currentTicket = id;
            document.getElementById('active-ticket-area').classList.remove('hidden');
            db.ref('chat_nti/'+id).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => { let d = m.val(); box.innerHTML += `<div class="msg ${d.n === this.user.nome ? 'msg-out' : 'msg-in'}"><b>${d.n}:</b><br>${d.t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChat() { db.ref('chat').push({ n: this.user.nome, t: document.getElementById('chat-in').value }); document.getElementById('chat-in').value = ""; },
        sendChatNTEi() { db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: document.getElementById('chat-nti-in').value }); document.getElementById('chat-nti-in').value = ""; },
        finalizarChamado() { db.ref('chamados/'+this.currentTicket+'/status').set('resolvido'); document.getElementById('active-ticket-area').classList.add('hidden'); },
        
        reservar() { db.ref('reservas').push({ u: this.user.nome, eq: document.getElementById('res-eq').value, sl: document.getElementById('res-sl').value, dt: document.getElementById('res-dt').value }); alert("Reservado!"); },
        enviarSugestao() { db.ref('sugestoes').push({ u: this.user.nome, t: document.getElementById('sugestao-txt').value }); document.getElementById('sugestao-txt').value = ""; alert("Enviado!"); },

        salvarAluno() {
            const n = document.getElementById('al-nome').value, u = document.getElementById('al-user').value, p = document.getElementById('al-pass').value;
            db.ref('alunos/'+this.user.pront).push({ n, u, p });
            document.getElementById('al-nome').value=""; document.getElementById('al-user').value=""; document.getElementById('al-pass').value="";
        },

        carregarAlunos() {
            db.ref('alunos/'+this.user.pront).on('value', snap => {
                const b = document.getElementById('body-alunos'); b.innerHTML = "";
                snap.forEach(a => { let d = a.val(); b.innerHTML += `<tr><td>${d.n}</td><td>${d.u}</td><td>${d.p}</td></tr>`; });
            });
        }
    };
</script>
</body>
</html>
