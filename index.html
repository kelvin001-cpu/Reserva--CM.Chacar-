<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --dark-panel: rgba(15, 17, 23, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .hidden { display: none !important; }
        .grid-main { display: grid; grid-template-columns: 280px 1fr 300px; gap: 15px; padding: 15px; height: calc(100vh - 80px); }
        .panel { background: var(--dark-panel); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .top-bar { height: 60px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--prof); }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #1a1c23; color: white; font-size: 13px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; margin-top: 5px; }
        .chat-container { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; max-width: 90%; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--prof); }
        .ticket { background: #1a1c23; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--nti); font-size: 12px; }
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e272e 0%, #0a0b10 100%); }
    </style>
</head>
<body>

    <div id="login-area" class="login-screen">
        <div class="panel" style="width: 350px; text-align: center;">
            <h1 style="font-family:'Orbitron'; color:var(--prof)">CONECT NTI</h1>
            <input type="number" id="login-pront" placeholder="Prontuário">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.doLogin()">ACESSAR</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="top-bar">
            <div><b style="font-family:'Orbitron'; color:var(--prof)">PROGRAMA CONECT</b> <span id="user-display" style="margin-left:20px; font-size:12px; opacity:0.7"></span></div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer"><i class="fa fa-power-off"></i> Sair</button>
        </div>

        <div class="grid-main">
            <div class="panel">
                <h3 id="menu-title"><i class="fa fa-toolbox"></i> Opções</h3>
                <hr style="opacity:0.1">

                <div id="view-nti" class="hidden">
                    <p style="color:var(--nti); font-weight:bold">PAINEL DE CONTROLE NTI</p>
                    <div class="stat-card"><span>STATUS SERVER</span><h2>100%</h2></div>
                    <button class="btn" style="background:var(--nti); color:white" onclick="alert('Sistema Travado')">TRAVAR ACESSOS</button>
                    <button class="btn" style="background:#444; color:white">LOGS DE ERRO</button>
                </div>

                <div id="view-comum" class="hidden">
                    <p style="color:var(--prof); font-weight:bold">RESERVA E SUPORTE</p>
                    <select id="res-tipo">
                        <option>TV 01</option><option>CHROMEBOOKS</option><option>SALA INFO</option>
                    </select>
                    <input type="datetime-local" id="res-data">
                    <button class="btn" style="background:var(--cad); color:white">RESERVAR AGORA</button>
                    <hr style="opacity:0.1">
                    <textarea id="chamado-txt" placeholder="Relatar erro ao NTI..." rows="3"></textarea>
                    <button class="btn" style="background:var(--nti); color:white">ABRIR CHAMADO</button>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-calendar-alt"></i> Cronograma Geral</h3>
                <div id="cronograma-lista">
                    <div class="ticket">As reservas aparecerão aqui...</div>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Integrado</h3>
                <div id="chat-box" class="chat-container"></div>
                <input type="text" id="chat-input" placeholder="Enviar mensagem...">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const app = {
            user: null,

            doLogin() {
                const p = document.getElementById('login-pront').value;
                const s = document.getElementById('login-pass').value;

                // Teste rápido: Prontuário 46690 entra como NTI, qualquer outro como Professor
                if(p === '46690' && s === 'nti2026') {
                    this.user = { nome: 'Kelvin Master', cargo: 'NTI', pront: p };
                } else {
                    this.user = { nome: 'Usuário Teste', cargo: 'Professor', pront: p };
                }
                this.start();
            },

            start() {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = this.user.nome + " (" + this.user.cargo + ")";

                // LÓGICA DE SEPARAÇÃO DOS MENUS
                if(this.user.cargo === 'NTI') {
                    document.getElementById('view-nti').classList.remove('hidden'); // Mostra menu NTI
                    document.getElementById('view-comum').classList.add('hidden');    // Esconde menu Professor
                } else {
                    document.getElementById('view-comum').classList.remove('hidden'); // Mostra menu Professor
                    document.getElementById('view-nti').classList.add('hidden');    // Esconde menu NTI
                }
            }
        };
    </script>
</body>
</html>
