<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.75); /* Fundo mais visível */
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sector-column:hover { background: rgba(255,255,255,0.05); }

        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .chart-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; text-align: center; }
        .chart-label { font-size: 10px; color: var(--prof); font-weight: bold; margin-top: 5px; text-transform: uppercase;}

        .btn-baixa { background: var(--cad); color: black; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; font-family: 'Orbitron';}

        #relatorio-texto { background: rgba(0, 173, 239, 0.1); border-left: 4px solid var(--prof); padding: 10px; font-size: 12px; margin-top: 15px; border-radius: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="conect-banner" style="position: absolute; top: 0;"><h1>PROGRAMA CONECT</h1><p>NTI CHÁCARA - GESTÃO DE REDE</p></div>
        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID Master"><input type="password" id="n-s" placeholder="Chave"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <div id="user-info" style="font-family:'Orbitron'; font-size:12px; color:var(--prof); margin-bottom:15px"></div>
                
                <div id="nti-extras" class="hidden">
                    <h4 style="color:var(--nti)"><i class="fa fa-list-ul"></i> CRONOGRAMA</h4>
                    <div id="side-cron" style="height:150px; overflow-y:auto; font-size:10px; background:rgba(0,0,0,0.4); border-radius:8px; padding:5px"></div>
                </div>

                <h4><i class="fa fa-plus"></i> AGENDAR</h4>
                <select id="res-eq"><option>CHROMEBOOKS</option><option>SALA INFO</option><option>TV TOUCH</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                <button class="btn" style="background:#333; color:white; margin-top:20px" onclick="location.reload()">SAIR</button>
            </div>

            <div class="panel">
                <div id="view-normal">
                    <h3><i class="fa fa-calendar-alt"></i> CRONOGRAMA OFICIAL</h3>
                    <div id="lista-res" style="height:550px; overflow-y:auto"></div>
                </div>

                <div id="view-nti" class="hidden">
                    <h3><i class="fa fa-chart-pie"></i> ADMINISTRAÇÃO GRÁFICA</h3>
                    <div class="charts-grid">
                        <div class="chart-card"><canvas id="c1"></canvas><div class="chart-label">Chamados Técnicos</div></div>
                        <div class="chart-card"><canvas id="c2"></canvas><div class="chart-label">Saúde do Sistema</div></div>
                        <div class="chart-card"><canvas id="c3"></canvas><div class="chart-label">Ocupação Chromebooks</div></div>
                        <div class="chart-card"><canvas id="c4"></canvas><div class="chart-label">Picos de Acesso</div></div>
                        <div class="chart-card" style="grid-column: span 2;"><canvas id="c5"></canvas><div class="chart-label">Volume de Reservas Diárias</div></div>
                    </div>
                    <div id="relatorio-texto"><b>RELATÓRIO NTI:</b> <span id="rep-msg">Monitorando...</span></div>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-headset"></i> CHAMADOS</h3>
                <div id="lista-chamados" style="height:150px; overflow-y:auto; font-size:11px"></div>
                
                <h3 style="margin-top:20px"><i class="fa fa-comments"></i> CHAT</h3>
                <div id="chat-box" style="height:250px; overflow-y:auto; font-size:12px; display:flex; flex-direction:column"></div>
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input type="text" id="chat-in" placeholder="Texto..." style="margin:0">
                    <button onclick="app.sendChat()" style="width:40px; background:var(--prof); border:none; border-radius:8px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, charts: {},
        async login(pre, nti) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(nti && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; this.start(); return; }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Erro!");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-info').innerText = this.user.nome.toUpperCase() + " | " + this.user.cargo;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('view-nti').classList.remove('hidden');
                document.getElementById('view-normal').classList.add('hidden');
                document.getElementById('nti-extras').classList.remove('hidden');
                this.initCharts();
            }
            this.sync();
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'), side = document.getElementById('side-cron');
                box.innerHTML = ""; if(side) side.innerHTML = "";
                let count = 0;
                snap.forEach(r => {
                    count++; const d = r.val();
                    const html = `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center">
                        <span><b>${d.eq}</b> - ${d.sl}<br><small>${d.u}</small></span>
                        ${this.user.cargo==='NTI' ? `<button class="btn-baixa" onclick="app.del('reservas','${r.key}')">BAIXAR</button>` : ''}
                    </div>`;
                    box.innerHTML += html; if(side) side.innerHTML += html;
                });
                this.updateReport(count);
                if(this.charts.c5) { this.charts.c5.data.datasets[0].data[4] = count; this.charts.c5.update(); }
            });

            db.ref('chamados').on('value', snap => {
                const box = document.getElementById('lista-chamados'); box.innerHTML = "";
                snap.forEach(c => {
                    box.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; display:flex; justify-content:space-between">
                        <span>${c.val().u}: ${c.val().t}</span>
                        ${this.user.cargo==='NTI' ? `<button class="btn-baixa" onclick="app.del('chamados','${c.key}')">OK</button>` : ''}
                    </div>`;
                });
            });

            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => { box.innerHTML += `<div><b>${m.val().n}:</b> ${m.val().t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        },

        updateReport(n) {
            const r = document.getElementById('rep-msg'); if(!r) return;
            r.innerText = n > 5 ? "⚠️ CARGA ELEVADA: Sistema com alta rotatividade de equipamentos hoje." : "✅ NORMALIDADE: Administração gráfica estável no momento.";
        },

        initCharts() {
            const opt = { plugins: { legend: { display: false } } };
            this.charts.c1 = new Chart(document.getElementById('c1'), { type:'bar', data:{labels:['Abertos'], datasets:[{data:[5], backgroundColor:'#eb4d4b'}]}, options:opt });
            this.charts.c2 = new Chart(document.getElementById('c2'), { type:'doughnut', data:{labels:['Online','Off'], datasets:[{data:[95,5], backgroundColor:['#2ecc71','#333']}]}, options:opt });
            this.charts.c3 = new Chart(document.getElementById('c3'), { type:'line', data:{labels:['M','T','N'], datasets:[{data:[10,25,5], borderColor:'#00adef'}]}, options:opt });
            this.charts.c4 = new Chart(document.getElementById('c4'), { type:'bar', data:{labels:['Labs'], datasets:[{data:[15], backgroundColor:'#f1c40f'}]}, options:opt });
            this.charts.c5 = new Chart(document.getElementById('chart4'), { type:'line', data:{labels:['Seg','Ter','Qua','Qui','Hoje'], datasets:[{label:'Reservas', data:[8,12,6,10,0], borderColor:'#a55eea'}]}, options:opt });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },
        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) db.ref('chat').push({n: this.user.nome, t: t});
            document.getElementById('chat-in').value = "";
        },
        del(p, k) { if(confirm("Confirmar baixa?")) db.ref(p+'/'+k).remove(); }
    };
</script>
</body>
</html>
