<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI MOBILE | EMEF CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg: #0d0e12; --card: #161821; --border: rgba(255,255,255,0.1);
        }

        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; }

        /* DESIGN RESPONSIVO - COLUNAS */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px 20px; 
            transition: 0.5s; border: 1px solid var(--border); text-align: center; 
        }
        
        @media (max-width: 768px) {
            .sector-column { min-width: 100%; border-top: 4px solid; }
            .dashboard-grid { grid-template-columns: 1fr !important; }
        }

        .col-prof { color: var(--prof); border-top: 8px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 8px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 8px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 8px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 8px solid var(--nti); }

        /* INPUTS */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }

        /* DASHBOARD */
        #main-portal { display: none; padding: 15px; }
        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        /* CHAT */
        .chat-area { height: 250px; overflow-y: auto; background: #050505; padding: 10px; border-radius: 8px; font-size: 13px; }
        .msg-box { margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #1a1a1a; }

        /* TRAVA */
        #lock-screen { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center; 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <i class="fa fa-hand fa-5x" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family:'Orbitron'">SISTEMA BLOQUEADO</h1>
        <p>Acesso suspenso pelo NTI para manutenção.</p>
    </div>

    <div class="login-container" id="login-ui">
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha">
            <button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2>
            <input type="number" id="n-p" placeholder="ID NTI"><input type="password" id="n-s" placeholder="Senha Master">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button>
        </div>
        </div>

    <div id="main-portal">
        <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span id="user-info" style="font-size:12px; color:var(--prof)"></span>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:white; border-radius:5px; padding:5px">SAIR</button>
        </header>

        <div class="dashboard-grid">
            <div class="col">
                <div class="card">
                    <h3>RESERVAR</h3>
                    <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV</option></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">RESERVAR</button>
                </div>

                <div id="nti-tools" class="card hidden" style="border-color:var(--nti)">
                    <h3 style="color:var(--nti)">CONTROLE NTI</h3>
                    <div style="display:flex; gap:5px; margin-bottom:10px">
                        <button class="btn" style="background:var(--nti); color:white" onclick="app.setLock(true)">BLOQUEAR</button>
                        <button class="btn" style="background:var(--cad); color:white" onclick="app.setLock(false)">LIBERAR</button>
                    </div>
                    <input type="number" id="reset-p" placeholder="Prontuário para Reset">
                    <button class="btn" style="background:var(--gestao)" onclick="app.resetSenha()">RESETAR SENHA</button>
                    <button class="btn" style="background:#555; color:white; margin-top:5px" onclick="app.deletarUsuario()">EXCLUIR USUÁRIO</button>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h3>CRONOGRAMA</h3>
                    <div id="lista-res" style="max-height:300px; overflow-y:auto"></div>
                </div>
                <div class="card">
                    <canvas id="graficoUso"></canvas>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h3>CHAT GERAL</h3>
                    <div id="chat-msgs" class="chat-area"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-txt" placeholder="Mensagem..." style="margin:0">
                        <button onclick="app.enviarChat()" style="background:var(--prof); border:none; width:50px; border-radius:5px"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="card">
                    <h3>ONLINE</h3>
                    <div id="lista-online" style="font-size:12px"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI', pront: '46690'};
                return this.iniciar();
            }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) {
                this.user = snap.val();
                this.iniciar();
            } else { alert("Acesso Negado!"); }
        },

        iniciar() {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('main-portal').style.display = 'block';
            document.getElementById('user-info').innerText = `${this.user.nome} (${this.user.cargo})`;
            if(this.user.cargo === 'NTI') document.getElementById('nti-tools').classList.remove('hidden');

            this.conectar();
            this.initGrafico();
        },

        conectar() {
            // Monitor de Trava Global
            db.ref('config/lock').on('value', snap => {
                if(snap.val() === true && this.user.cargo !== 'NTI') {
                    document.getElementById('lock-screen').style.display = 'flex';
                } else { document.getElementById('lock-screen').style.display = 'none'; }
            });

            // Chat
            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    box.innerHTML += `<div class="msg-box"><b style="color:var(--prof)">${d.n} (${d.c}):</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Cronograma
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    list.innerHTML += `<div style="background:#222; padding:10px; border-radius:5px; margin-bottom:5px; font-size:12px">
                        <b>${d.eq}</b> - Sala ${d.sl}<br>${new Date(d.dt).toLocaleString()}<br><i>Por: ${d.u}</i>
                        ${this.user.cargo !== 'Professor' ? `<i class="fa fa-trash" style="float:right; color:var(--nti)" onclick="db.ref('reservas/${r.key}').remove()"></i>` : ''}
                    </div>`;
                });
            });

            // Online
            const onRef = db.ref('online/'+this.user.pront);
            onRef.set({n: this.user.nome}); onRef.onDisconnect().remove();
            db.ref('online').on('value', snap => {
                const box = document.getElementById('lista-online'); box.innerHTML = "";
                snap.forEach(u => { box.innerHTML += `<div>● ${u.val().n}</div>`; });
            });
        },

        enviarChat() {
            const t = document.getElementById('chat-txt').value;
            if(t) db.ref('chat').push({n: this.user.nome, c: this.user.cargo, t: t});
            document.getElementById('chat-txt').value = "";
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },

        // NTI MASTER TOOLS
        setLock(val) { db.ref('config/lock').set(val); },

        async resetSenha() {
            const p = document.getElementById('reset-p').value;
            const u = await db.ref('usuarios/'+p).once('value');
            if(u.exists()){
                const cargo = u.val().cargo;
                const nova = cargo === 'Gestão' ? 'gestao2026' : 'pmspmudar123';
                db.ref('usuarios/'+p).update({pass: nova});
                alert("Senha resetada para: " + nova);
            }
        },

        deletarUsuario() {
            const p = document.getElementById('reset-p').value;
            if(confirm("Deseja apagar este usuário?")) db.ref('usuarios/'+p).remove();
        },

        initGrafico() {
            new Chart(document.getElementById('graficoUso'), {
                type: 'bar', data: { labels: ['SALA INFO', 'CHROME', 'TV'], datasets: [{ label: 'Reservas', data: [5, 12, 3], backgroundColor: '#00adef' }] }
            });
        }
    };
</script>
</body>
</html>
