<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* --- TELA DE LOGIN (PADRÃO 5 COLUNAS) --- */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; 
        }
        .sector-column:hover { flex: 1.3; background: rgba(255,255,255,0.05); }
        .col-prof { border-top: 5px solid var(--prof); }
        .col-gestao { border-top: 5px solid var(--gestao); }
        .col-secre { border-top: 5px solid var(--secre); }
        .col-cad { border-top: 5px solid var(--cad); }
        .col-nti { border-top: 5px solid var(--nti); }

        /* --- DASHBOARD GERAL --- */
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .panel { background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        /* Dashboard NTI - 6 Blocos */
        .nti-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .nti-card { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid var(--nti); height: 260px; position: relative; }
        .nti-card h4 { margin: 0 0 10px 0; font-family: 'Orbitron'; font-size: 10px; color: var(--nti); border-bottom: 1px solid rgba(235,77,75,0.2); padding-bottom: 5px; }

        /* Elementos UI */
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }
        .scroll { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        .hidden { display: none !important; }

        /* Status Online */
        .online-item { font-size: 12px; padding: 5px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Patrimônio"><select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.cadastrar()">Criar</button></div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel</button></div>
    </div>

    <div id="main-system">
        
        <div id="user-view" class="hidden">
            <div style="display:grid; grid-template-columns: 350px 1fr; gap:20px">
                <div class="panel">
                    <h3><i class="fa fa-plus-circle"></i> Ações</h3>
                    <label>Reservar Equipamento:</label>
                    <select id="res-eq"><option>CARRINHO CHROMEBOOKS</option><option>TV 01</option><option>TV 02</option><option>SALA DE INFORMÁTICA</option></select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar Reserva</button>
                    <hr style="opacity:0.1; margin:20px 0">
                    <label>Abrir Chamado NTI:</label>
                    <select id="cham-grav"><option value="baixa">BAIXA (Dúvida)</option><option value="media">MÉDIA (Verificação)</option><option value="alta">URGENTE (Presencial)</option></select>
                    <input type="text" id="cham-txt" placeholder="Descreva o problema...">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Enviar ao NTI</button>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-calendar-alt"></i> Cronograma Virtual</h3>
                    <div id="cron-list" class="scroll"></div>
                    <h3 style="margin-top:20px"><i class="fa fa-comments"></i> Chat Geral</h3>
                    <div id="chat-geral" class="scroll" style="height:150px"></div>
                    <div style="display:flex; gap:5px"><input type="text" id="msg-g" placeholder="Mensagem..."><button onclick="app.sendChat('chat_geral')" class="btn" style="width:60px; margin:0">OK</button></div>
                </div>
            </div>
        </div>

        <div id="nti-view" class="hidden">
            <h2 style="font-family:'Orbitron'; color:var(--nti); margin:0">NTI COMMAND CENTER</h2>
            <div class="nti-grid">
                <div class="nti-card"><h4>1. USUÁRIOS ATIVOS</h4><div id="online-list" class="scroll" style="height:180px"></div></div>
                <div class="nti-card"><h4>2. STATUS DO SITE</h4><canvas id="chartSist"></canvas></div>
                <div class="nti-card"><h4>3. DEMANDA RESERVAS</h4><canvas id="chartRes"></canvas></div>
                <div class="nti-card"><h4>4. CHAMADOS ATIVOS</h4><div id="nti-chamados" class="scroll" style="height:180px"></div></div>
                <div class="nti-card"><h4>5. ACESSOS HOJE</h4><canvas id="chartAcesso"></canvas></div>
                <div class="nti-card"><h4>6. AGENDA GOOGLE</h4><iframe src="SUA_URL_AQUI" style="width:100%; height:180px; border:0; filter:invert(0.9)"></iframe></div>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 350px; gap:20px; margin-top:20px">
                <div class="panel">
                    <h3>Gestão de Baixas (Reservas Ativas)</h3>
                    <div id="nti-baixas-res" class="scroll"></div>
                </div>
                <div class="panel">
                    <h3>Suporte & Reset</h3>
                    <input type="number" id="reset-p" placeholder="Patrimônio p/ Reset">
                    <button class="btn" style="background:#444; color:white" onclick="app.adminReset()">Resetar Senha</button>
                    <h4 style="margin-top:20px">Chat Suporte NTI</h4>
                    <div id="chat-suporte" class="scroll" style="height:120px"></div>
                    <div style="display:flex; gap:5px"><input type="text" id="msg-s"><button onclick="app.sendChat('chat_suporte')" class="btn" style="width:60px; margin:0">OK</button></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; 
                return this.start(); 
            }
            db.ref('usuarios/'+p).once('value', snap => {
                if(snap.exists() && String(snap.val().pass) === s) {
                    this.user = snap.val();
                    this.start();
                } else { alert("Acesso Negado!"); }
            });
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            
            // Registrar Online
            const onlineRef = db.ref('online/'+this.user.pront);
            onlineRef.set({nome: this.user.nome, cargo: this.user.cargo});
            onlineRef.onDisconnect().remove();

            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-view').classList.remove('hidden');
                this.initCharts();
            } else {
                document.getElementById('user-view').classList.remove('hidden');
            }
            this.sync();
        },

        sync() {
            // Cronograma (Visão Professor)
            db.ref('reservas').on('value', snap => {
                const cl = document.getElementById('cron-list'); if(cl) cl.innerHTML = "";
                const bl = document.getElementById('nti-baixas-res'); if(bl) bl.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    const html = `<div style="padding:8px; border-bottom:1px solid #333"><b>${d.eq}</b> - ${d.u} (${new Date(d.dt).toLocaleString()})</div>`;
                    if(cl) cl.innerHTML += html;
                    if(bl) bl.innerHTML += `<div style="padding:8px; border-bottom:1px solid #333">${html} <button onclick="app.baixa('reservas','${r.key}')" style="background:green; color:white; border:none; padding:2px 10px; border-radius:4px; float:right">DAR BAIXA</button></div>`;
                });
            });

            // Chamados (Visão NTI)
            db.ref('chamados').on('value', snap => {
                const list = document.getElementById('nti-chamados'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div style="padding:5px; border-left:4px solid ${d.grav==='alta'?'red':'orange'}; margin-bottom:5px; background:rgba(255,255,255,0.05)">
                        <b>${d.u}:</b> ${d.t} <button onclick="app.baixa('chamados','${c.key}')" style="background:red; color:white; border:none; font-size:9px">FECHAR</button>
                    </div>`;
                });
            });

            // Usuários Ativos (Visão NTI)
            db.ref('online').on('value', snap => {
                const list = document.getElementById('online-list'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(u => {
                    list.innerHTML += `<div class="online-item"><div class="dot"></div> ${u.val().nome} (${u.val().cargo})</div>`;
                });
            });

            this.loadChat('chat_geral', 'chat-geral');
            this.loadChat('chat_suporte', 'chat-suporte');
        },

        initCharts() {
            new Chart(document.getElementById('chartSist'), { type: 'line', data: { labels: ['1h','2h','3h'], datasets: [{ label: 'Estabilidade %', data: [100, 98, 100], borderColor: '#eb4d4b' }] }, options: { maintainAspectRatio: false } });
            new Chart(document.getElementById('chartRes'), { type: 'bar', data: { labels: ['Chrome','TV','Info'], datasets: [{ label: 'Uso', data: [5, 2, 8], backgroundColor: '#00adef' }] }, options: { maintainAspectRatio: false } });
            new Chart(document.getElementById('chartAcesso'), { type: 'doughnut', data: { labels: ['Prof','Gest'], datasets: [{ data: [70, 30], backgroundColor: ['#a55eea','#f1c40f'] }] }, options: { maintainAspectRatio: false } });
        },

        loadChat(ref, id) {
            db.ref(ref).limitToLast(15).on('value', snap => {
                const box = document.getElementById(id); if(!box) return;
                box.innerHTML = "";
                snap.forEach(m => { box.innerHTML += `<div><b>${m.val().nome}:</b> ${m.val().texto}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChat(ref) {
            const inp = document.getElementById(ref === 'chat_geral' ? 'msg-g' : 'msg-s');
            if(inp.value) db.ref(ref).push({ nome: this.user.nome, texto: inp.value });
            inp.value = "";
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, dt = document.getElementById('res-dt').value;
            if(dt) db.ref('reservas').push({ eq, dt, u: this.user.nome });
        },

        abrirChamado() {
            const t = document.getElementById('cham-txt').value, g = document.getElementById('cham-grav').value;
            if(t) db.ref('chamados').push({ u: this.user.nome, t, grav: g });
            document.getElementById('cham-txt').value = "";
        },

        baixa(path, id) { if(confirm("Concluir item?")) db.ref(path+'/'+id).remove(); },

        adminReset() {
            const p = document.getElementById('reset-p').value;
            if(p) db.ref('usuarios/'+p).update({ pass: 'pmspmudar123' }).then(() => alert("Resetado!"));
        },

        cadastrar() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            let s = c === 'Professor' ? 'pmspmudar123' : 'pmspgestores2026';
            if(n && p) db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s}).then(()=>alert("Cadastrado!"));
        }
    };
</script>
</body>
</html>
