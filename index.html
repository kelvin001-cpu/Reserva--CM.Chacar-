<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | MULTI-PAINEL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #9b59b6; --nti: #e74c3c;
            --glass: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }

        /* LOGIN */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-card { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--prof); width: 320px; text-align: center; }

        /* HEADER */
        header {
            height: 60px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
        }

        /* LAYOUT EM COLUNAS SEPARADAS */
        .container-setores {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Colunas: Prof, Gestão, Secre, Cadastro */
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 140px);
            box-sizing: border-box;
        }

        .setor-card {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setor-header {
            padding: 15px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* CORES DOS SETORES */
        .head-prof { background: var(--prof); color: white; }
        .head-gestao { background: var(--gestao); color: black; }
        .head-secre { background: var(--secre); color: white; }
        .head-cad { background: #2ecc71; color: white; }

        .setor-body { flex: 1; padding: 15px; overflow-y: auto; }

        /* FOOTER / PORTAL NTI */
        .footer-nti {
            height: 60px; margin: 10px 15px;
            background: var(--nti);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 800; letter-spacing: 2px;
            transition: 0.3s;
        }
        .footer-nti:hover { filter: brightness(1.2); transform: scale(1.01); }

        /* ESTILOS INTERNOS */
        .item-list { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 12px; border-left: 4px solid transparent; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 5px; border: 1px solid var(--border); background: #000; color: white; }
        .btn-setor { width: 100%; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: 600; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="color:var(--prof)">NTI CHÁCARA</h2>
        <input type="number" id="l-pront" placeholder="Prontuário">
        <input type="password" id="l-pass" placeholder="Senha">
        <button class="btn-setor" style="background:var(--prof); color:white" onclick="app.login()">ACESSAR SISTEMA</button>
    </div>
</div>

<header id="main-header" class="hidden">
    <div style="font-weight:bold"><i class="fa fa-school"></i> EMEF CHÁCARA</div>
    <div id="u-nome" style="font-size: 13px; opacity:0.8"></div>
    <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; cursor:pointer">Sair</button>
</header>

<div id="main-ui" class="hidden">
    <div class="container-setores">
        
        <section class="setor-card" style="border-color: var(--prof)">
            <div class="setor-header head-prof"><i class="fa fa-chalkboard-user"></i> Professores</div>
            <div class="setor-body">
                <p style="font-size:11px; margin-bottom:15px">Reservar Equipamentos:</p>
                <div id="equip-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px"></div>
            </div>
        </section>

        <section class="setor-card" style="border-color: var(--gestao)">
            <div class="setor-header head-gestao"><i class="fa fa-users-gear"></i> Gestão</div>
            <div class="setor-body">
                <p style="font-size:11px">Equipamentos em Uso:</p>
                <div id="uso-list"></div>
            </div>
        </section>

        <section class="setor-card" style="border-color: var(--secre)">
            <div class="setor-header head-secre"><i class="fa fa-file-contract"></i> Secretaria</div>
            <div class="setor-body">
                <input type="text" placeholder="Assunto do Aviso">
                <textarea rows="3" placeholder="Mensagem para o mural..."></textarea>
                <button class="btn-setor" style="background:var(--secre); color:white">Publicar Aviso</button>
            </div>
        </section>

        <section class="setor-card" style="border-color: #2ecc71">
            <div class="setor-header head-cad"><i class="fa fa-user-plus"></i> Cadastro</div>
            <div class="setor-body">
                <input type="text" id="c-nome" placeholder="Nome do Professor">
                <input type="number" id="c-pront" placeholder="Prontuário">
                <select id="c-cargo"><option>Professor</option><option>Secretaria</option><option>Gestão</option></select>
                <button class="btn-setor" style="background:#2ecc71; color:white" onclick="app.confirmarCad()">CADASTRAR</button>
            </div>
        </section>

    </div>

    <div class="footer-nti" onclick="app.openNTI()">
        <i class="fa fa-shield-halved"></i> &nbsp; PORTAL NTI MASTER
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login() {
            const p = document.getElementById('l-pront').value, s = document.getElementById('l-pass').value;
            if(p === '46690' && s === 'nti2026') { this.user = {nome: 'Kelvin Master', cargo: 'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('u-nome').innerText = "Logado como: " + this.user.nome;
            this.sync();
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-grid');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { 
                    const d = r.val(); u[d.item] = d; 
                    l.innerHTML += `<div class="item-list" style="border-color:var(--nti)"><b>${d.item}</b><br>${d.user} (${d.local})</div>`; 
                });
                this.itens.forEach(i => {
                    const o = u[i];
                    g.innerHTML += `<button onclick="${o?'':'app.reservar(\''+i+'\')'}" style="background:${o?'rgba(255,255,255,0.1)':'var(--prof)'}; border:none; color:white; padding:10px; border-radius:8px; font-size:10px; cursor:pointer;">
                        ${i}<br><b>${o?'EM USO':'LIVRE'}</b>
                    </button>`;
                });
            });
        },

        async reservar(i) { const loc = prompt("Local:"); if(loc) await db.ref('reservas').push({item:i, user:this.user.nome, local:loc}); },
        
        openNTI() {
            const prob = prompt("Descreva o problema para o NTI:");
            if(prob) alert("Chamado enviado para o Portal NTI!");
        },

        async confirmarCad() {
            const p = document.getElementById('c-pront').value;
            await db.ref('usuarios/'+p).set({nome: document.getElementById('c-nome').value, pront: p, cargo: document.getElementById('c-cargo').value, pass: 'pmsp2026'});
            alert("Professor cadastrado!");
        }
    };
</script>
</body>
</html>
