<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00adef; --accent: #00ff9d; --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.9); --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* LOGIN CENTRALIZADO */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-card { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--border); width: 350px; text-align: center; }

        /* --- MENUS SEPARADOS (ESTILO DASHBOARD MODERNO) --- */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 40px; background: transparent;
        }

        /* Bloco 1: Perfil do Usuário */
        .user-menu-block {
            background: var(--glass); padding: 10px 20px; border-radius: 50px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 15px;
        }

        /* Bloco 2: Navegação Central (Botoes Separados) */
        .nav-center-block {
            display: flex; gap: 20px; /* Distância entre os botões */
        }

        /* Bloco 3: Botão Sair Isolado */
        .exit-block { margin-left: 20px; }

        /* ESTILO DOS BOTÕES INDEPENDENTES */
        .menu-btn {
            background: var(--glass); color: white; border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; gap: 10px; transition: 0.3s; font-size: 13px;
        }
        .menu-btn:hover, .menu-btn.active {
            background: var(--primary); border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 173, 239, 0.3);
        }
        .menu-btn-admin { border-color: var(--accent); color: var(--accent); }
        .menu-btn-admin:hover { background: var(--accent); color: black; }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; padding: 20px 40px 40px 40px; overflow-y: auto; }
        .view { display: none; } 
        .view.active { display: block; animation: slideUp 0.4s ease; }

        .card-container { background: var(--glass); border-radius: 30px; border: 1px solid var(--border); padding: 40px; }

        .grid-equip { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .equip-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; }

        .hidden { display: none !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">NTI LOGIN</h2>
        <input type="number" id="l-pront" placeholder="Prontuário">
        <input type="password" id="l-pass" placeholder="Senha">
        <select id="l-tipo">
            <option value="Professor">Professor</option>
            <option value="Secretaria">Secretaria</option>
            <option value="Gestão">Gestão</option>
            <option value="TI">NTI Master</option>
        </select>
        <button class="menu-btn" style="width:100%; justify-content:center; margin-top:15px; background:var(--primary)" onclick="app.login()">ENTRAR</button>
    </div>
</div>

<header id="main-header" class="hidden">
    <div class="user-menu-block">
        <i class="fa fa-circle-user fa-2x" style="color: var(--primary)"></i>
        <div>
            <div id="u-nome" style="font-weight: 700; font-size: 14px;"></div>
            <div id="u-cargo" style="font-size: 10px; color: var(--primary); text-transform: uppercase;"></div>
        </div>
    </div>

    <div class="nav-center-block">
        <button class="menu-btn active" onclick="app.view('v-reserva', this)"><i class="fa fa-laptop"></i> RESERVAS</button>
        <button class="menu-btn" onclick="app.view('v-chamado', this)"><i class="fa fa-headset"></i> SUPORTE</button>
        <button class="menu-btn" onclick="app.view('v-cadastro', this)"><i class="fa fa-user-plus"></i> CADASTRAR</button>
        <div id="ti-area" class="hidden">
            <button class="menu-btn menu-btn-admin" onclick="app.view('v-admin', this)"><i class="fa fa-shield-halved"></i> PAINEL TI</button>
        </div>
    </div>

    <div class="exit-block">
        <button class="menu-btn" style="border-color: var(--danger); color: var(--danger)" onclick="location.reload()"><i class="fa fa-power-off"></i> SAIR</button>
    </div>
</header>

<main id="main-content" class="hidden">
    
    <div id="v-reserva" class="view active">
        <div class="card-container">
            <h2 style="margin-top:0"><i class="fa fa-box-open" style="color:var(--primary)"></i> Equipamentos Disponíveis</h2>
            <div class="grid-equip" id="equip-list"></div>
            
            <h2 style="margin-top:40px"><i class="fa fa-list-check" style="color:var(--primary)"></i> Painel de Controle de Uso</h2>
            <table style="width:100%; border-collapse: collapse; margin-top:20px">
                <tbody id="uso-list"></tbody>
            </table>
        </div>
    </div>

    <div id="v-chamado" class="view">
        <div class="card-container" style="max-width: 600px; margin: auto;">
            <h2 style="color: var(--danger)">Abrir Chamado</h2>
            <input type="text" id="ch-local" placeholder="Qual a sala/local?">
            <textarea id="ch-problema" rows="5" placeholder="Descreva o problema detalhadamente..."></textarea>
            <button class="menu-btn" style="background:var(--danger); width:100%; justify-content:center" onclick="app.enviarChamado()">ENVIAR AO NTI</button>
        </div>
    </div>

    <div id="v-cadastro" class="view">
        <div class="card-container" style="max-width: 600px; margin: auto; border-color: var(--primary)">
            <h2 style="color: var(--primary)">Novo Acesso</h2>
            <input type="text" id="c-nome" placeholder="Nome do Funcionário">
            <input type="number" id="c-pront" placeholder="Número do Prontuário">
            <select id="c-cargo">
                <option>Professor</option>
                <option>Secretaria</option>
                <option>Gestão</option>
            </select>
            <button class="menu-btn" style="background:var(--primary); width:100%; justify-content:center; margin-top:10px" onclick="app.confirmarCad()">CADASTRAR USUÁRIO</button>
        </div>
    </div>

</main>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login() {
            const p = document.getElementById('l-pront').value, s = document.getElementById('l-pass').value, t = document.getElementById('l-tipo').value;
            if(t==='TI' && p==='46690' && s==='nti2026') { this.user = {nome:'Kelvin Master', cargo:'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('u-nome').innerText = this.user.nome;
            document.getElementById('u-cargo').innerText = this.user.cargo;
            if(this.user.cargo === 'TI') document.getElementById('ti-area').classList.remove('hidden');
            this.sync();
        },

        view(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-list');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { 
                    const d = r.val(); u[d.item] = d; 
                    l.innerHTML += `<tr style="border-bottom: 1px solid var(--border)">
                        <td style="padding:15px"><b>${d.item}</b></td>
                        <td>${d.user}</td>
                        <td>${d.local}</td>
                        <td><button class="menu-btn" style="padding:5px 15px; background:var(--danger)" onclick="db.ref('reservas/${r.key}').remove()">FINALIZAR</button></td>
                    </tr>`; 
                });
                this.itens.forEach(i => {
                    const ocupado = u[i];
                    g.innerHTML += `<div class="equip-card">
                        <i class="fa ${i.includes('TV')?'fa-tv':'fa-laptop'} fa-2x" style="color:${ocupado?'var(--danger)':'var(--accent)'}"></i>
                        <h4 style="margin:10px 0">${i}</h4>
                        <span style="color:${ocupado?'var(--danger)':'var(--accent)'}; font-size:12px">${ocupado?'EM USO':'LIVRE'}</span>
                        ${!ocupado?`<button class="menu-btn" style="width:100%; margin-top:10px; font-size:11px; justify-content:center" onclick="app.reservar('${i}')">RESERVAR</button>`:''}
                    </div>`;
                });
            });
        },

        async reservar(i) { const loc = prompt("Local:"); if(loc) await db.ref('reservas').push({item:i, user:this.user.nome, local:loc}); },
        async enviarChamado() { 
            await db.ref('chamados').push({autor:this.user.nome, local:document.getElementById('ch-local').value, problema:document.getElementById('ch-problema').value});
            alert("Enviado!"); this.view('v-reserva', document.querySelector('.menu-btn'));
        },
        async confirmarCad() {
            const p = document.getElementById('c-pront').value;
            await db.ref('usuarios/'+p).set({nome: document.getElementById('c-nome').value, pront: p, cargo: document.getElementById('c-cargo').value, pass: 'pmsp2026'});
            alert("Cadastrado!");
        }
    };
</script>
</body>
</html>
