<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS TOTALMENTE FIEL ÀS SUAS IMAGENS */
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 280px 1fr 320px; gap: 20px; }
        .panel { background: #1c2128; border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        h3 { font-size: 13px; color: #fff; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        
        /* Gráficos e Inputs */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; background: #0d1117; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; margin: 5px 0; }
        .btn-blue { background: #00adef; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }

        /* Mapeamento Cinema */
        .cinema-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .seat { font-size: 9px; padding: 4px; border: 1px solid #555; text-align: center; border-radius: 3px; cursor: pointer; }
        .seat.ok { background: #2ecc71; color: black; }
        .seat.manutencao { background: #e74c3c; color: white; }

        /* Logs NTI */
        #nti-logs { height: 100px; overflow-y: auto; background: black; color: #0f0; font-family: monospace; font-size: 10px; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="col">
        <div class="panel">
            <h3><i class="fa fa-calendar"></i> Nova Reserva</h3>
            <select id="res-eq" onchange="app.mapear(this.value)">
                <option value="TV 01">TV 01</option>
                <option value="Chromebooks">Chromebooks</option>
                <option value="Sala Info">Sala de Informática</option>
            </select>
            <input type="text" id="res-sala" placeholder="Número da Sala">
            <input type="datetime-local" id="res-data">
            <div id="grid-cinema" class="cinema-grid"></div>
            <button class="btn-blue" onclick="app.reservar()">CONFIRMAR AGENDAMENTO</button>
        </div>

        <div class="panel">
            <h3><i class="fa fa-headset"></i> Suporte Técnico</h3>
            <select><option>Prioridade: Baixa</option></select>
            <input type="text" placeholder="Qual o problema?">
            <button class="btn-red">SOLICITAR TÉCNICO</button>
            <h4 style="font-size: 10px; color: #00adef; margin-top: 10px;">Chat Direto NTI</h4>
            <div id="chat-nti" style="height: 60px; background: #000;"></div>
        </div>
    </div>

    <div class="col">
        <div class="panel">
            <h3><i class="fa fa-microchip"></i> Telemetria de Sistema</h3>
            <div class="charts-grid">
                <canvas id="c1"></canvas><canvas id="c2"></canvas>
                <canvas id="c3"></canvas><canvas id="c4"></canvas>
            </div>
        </div>
        <div class="panel">
            <h3><i class="fa fa-list"></i> Cronograma de Uso</h3>
            <div id="lista-reservas"></div>
        </div>
    </div>

    <div class="col">
        <div class="panel">
            <h3><i class="fa fa-comments"></i> Mural de Avisos</h3>
            <div id="mural" style="height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
            <input type="text" id="msg-mural" placeholder="Escreva no mural...">
        </div>

        <div class="panel" style="border-color: #e74c3c;">
            <h3 style="color: #e74c3c;"><i class="fa fa-shield-halved"></i> NTI MASTER DASHBOARD</h3>
            <div id="nti-logs">Monitorando IPs...</div>
            <input type="text" id="busca-user" placeholder="Pesquisar Prontuário..." onkeyup="app.buscar(this.value)">
            <button class="btn-red" style="margin-top:5px" onclick="app.virus()">SCAN REMOTO</button>
            <button class="btn-blue" style="margin-top:5px; background: #2ecc71;" onclick="app.travar(false)">LIBERAR SISTEMA</button>
        </div>
        
        <button class="btn-red" style="width: 100%;" onclick="location.reload()">DESCONECTAR</button>
    </div>
</div>

<script>
    // Lógica de Integração sem mudar o design
    const app = {
        patsDell: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],
        
        mapear(val) {
            const grid = document.getElementById('grid-cinema');
            grid.innerHTML = "";
            if(val === "Sala Info") {
                this.patsDell.forEach(p => {
                    grid.innerHTML += `<div class="seat ok" onclick="app.toggle('${p}')">${p.split('.')[1]}</div>`;
                });
            }
        },

        async reservar() {
            // Lógica de Trava de Conflito aqui
            alert("Verificando disponibilidade no banco de dados...");
        },

        log(msg) {
            const l = document.getElementById('nti-logs');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    };

    // Inicialização dos Gráficos exatamente como nas fotos
    const ctxConf = { type: 'line', data: { labels: ['08h','12h','16h','20h'], datasets: [{label: 'Acessos', data: [10,40,20,5], borderColor: '#00adef'}] }};
    new Chart(document.getElementById('c1'), ctxConf);
    new Chart(document.getElementById('c2'), {type: 'bar', data: {labels:['Tickets'], datasets:[{data:[5], backgroundColor:'#e74c3c'}]}});
</script>
</body>
</html>
