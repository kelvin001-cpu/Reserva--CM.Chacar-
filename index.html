<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Notificação */
        #notification-container { position: fixed; bottom: 20px; right: 20px; z-index: 10001; }
        .toast { background: var(--prof); color: white; padding: 15px 25px; border-radius: 8px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.5s, fadeOut 0.5s 3.5s; border-left: 5px solid white; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(10px); }
        .sector-column { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-right: 1px solid rgba(255,255,255,0.05); }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { background: rgba(22, 27, 34, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-family: 'Orbitron'; color: var(--prof); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.5); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        #chat-box, #chat-nti-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; width: fit-content; max-width: 80%; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        .res-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="lock-overlay">
        <h1 style="font-family: Orbitron; color: var(--nti)">SISTEMA TRAVADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <p>NTI CHÁCARA - CONSTRUINDO VENCEDORES</p>
        </div>

        <div class="sector-column">
            <i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i>
            <h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof)" onclick="app.login('p','Professor')">Acessar</button>
        </div>

        <div class="sector-column">
            <i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i>
            <h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário">
            <input type="password" id="g-s" placeholder="Senha (vazio p/ vips)">
            <button class="btn" style="background:var(--gestao); color:black" onclick="app.login('g','Gestão')">Acessar</button>
        </div>

        <div class="sector-column">
            <i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i>
            <h2>SECRETARIA</h2>
            <input type="number" id="s-p" placeholder="Prontuário">
            <input type="password" id="s-s" placeholder="Senha (vazio p/ vips)">
            <button class="btn" style="background:var(--secre)" onclick="app.login('s','Secretaria')">Acessar</button>
        </div>

        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)">
            <h2>NOVO CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-c">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <button class="btn" style="background:var(--cad)" onclick="app.cadastrar()">Criar Conta</button>
        </div>

        <div class="sector-column">
            <i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i>
            <h2>NTI</h2>
            <input type="number" id="n-p" placeholder="ID">
            <input type="password" id="n-s" placeholder="Senha">
            <button class="btn" style="background:var(--nti)" onclick="app.login('n','NTI')">Master</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3>Reserva</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Confirmar</button>
                </div>

                <div class="panel">
                    <h3>Suporte NTI</h3>
                    <input type="text" id="chamado-desc" placeholder="Descreva o problema...">
                    <button class="btn" style="background:var(--nti)" onclick="app.abrirChamado()">Abrir Chamado</button>
                    <div id="active-ticket-area" class="hidden">
                        <div id="chat-nti-box"></div>
                        <div style="display:flex; gap:5px">
                            <input type="text" id="chat-nti-in" placeholder="Falar com NTI...">
                            <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChatNTI()">></button>
                        </div>
                        <button class="btn" style="background:var(--cad); margin-top:10px" onclick="app.finalizarChamado()">Finalizar</button>
                    </div>
                </div>
            </div>

            <div class="center-col">
                <div id="nti-charts-area" class="panel hidden">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                        <canvas id="chartUsers" height="150"></canvas>
                        <canvas id="chartEquip" height="150"></canvas>
                    </div>
                </div>
                <div class="panel">
                    <h3>Cronograma</h3>
                    <div id="lista-res"></div>
                </div>
                <div class="panel">
                    <h3>Equipamentos</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3>Mural de Avisos</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px">
                        <input type="text" id="chat-in" placeholder="Mensagem...">
                        <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()">></button>
                    </div>
                </div>
                <button class="btn" style="background:#444" onclick="location.reload()">Sair / Logout</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        currentTicket: null,
        vipsGestao: ["44244", "35102", "39966", "46690"],
        vipsSecre: ["46684", "4236", "46690"],
        initialLoad: true, // Para não notificar mensagens antigas ao entrar

        // Sistema de Notificação
        notify(msg, color = "var(--prof)") {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = color;
            toast.innerHTML = `<i class="fa fa-bell"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
            
            // Som opcional (beep discreto)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gain); gain.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s')?.value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin (NTI)', cargo:'NTI', pront:'46690'}; 
                return this.start(); 
            }
            if(cargo === 'Gestão' && this.vipsGestao.includes(p)) {
                this.user={nome:'Gestor VIP', cargo:'Gestão', pront:p};
                return this.start();
            }
            if(cargo === 'Secretaria' && this.vipsSecre.includes(p)) {
                this.user={nome:'Secretaria VIP', cargo:'Secretaria', pront:p};
                return this.start();
            }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists()) {
                const dados = snap.val();
                if(String(dados.pass) === String(s)) { this.user = dados; this.start(); }
                else { alert("Senha incorreta."); }
            } else { alert("Não encontrado."); }
        },

        start() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI' || this.user.cargo === 'Gestão') {
                document.getElementById('nti-charts-area')?.classList.remove('hidden');
                this.initCharts();
            }
            this.syncData();
            this.carregarEquipamentos();
            this.notify(`Bem-vindo, ${this.user.nome}!`);
            setTimeout(() => this.initialLoad = false, 2000);
        },

        syncData() {
            db.ref('lock').on('value', s => { 
                document.getElementById('lock-overlay').style.display = (s.val() && this.user.cargo !== 'NTI') ? 'flex' : 'none';
            });

            // Mural com Notificação
            db.ref('chat').limitToLast(1).on('child_added', snap => {
                const d = snap.val();
                if(!this.initialLoad && d.n !== this.user.nome) {
                    this.notify(`Mural: ${d.n} enviou uma mensagem`);
                }
            });

            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    box.innerHTML += `<div class="msg ${d.n === this.user.nome ? 'msg-out' : 'msg-in'}"><b>${d.n}:</b> ${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    let d = r.val();
                    box.innerHTML += `<div class="res-item"><span><b>${d.eq}</b> - ${d.u}</span><button class="btn" style="width:30px; background:red" onclick="app.baixarReserva('${r.key}')">X</button></div>`;
                });
            });

            db.ref('chamados').on('value', snap => {
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto' && (d.pront === this.user.pront || this.user.cargo === 'NTI')) {
                        this.currentTicket = c.key;
                        document.getElementById('active-ticket-area').classList.remove('hidden');
                        this.syncChatNTI();
                    }
                });
            });
        },

        syncChatNTI() {
            db.ref('chat_nti/'+this.currentTicket).limitToLast(1).on('child_added', snap => {
                if(!this.initialLoad && snap.val().n !== this.user.nome) {
                    this.notify(`Suporte: Nova mensagem do NTI`, "var(--nti)");
                }
            });

            db.ref('chat_nti/'+this.currentTicket).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => {
                    box.innerHTML += `<div class="msg ${m.val().n === this.user.nome ? 'msg-out' : 'msg-in'}">${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            sel.innerHTML = ""; lista.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let id = 'eq-' + e.replace(/\s/g, '');
                    let html = `<b>${e}</b><br><span class="status-badge" style="background:${d.status==='ativo'?'#2ecc71':'#eb4d4b'}">${d.status}</span>`;
                    if(this.user.cargo === 'NTI') html += `<br><button class="btn" style="padding:2px; font-size:9px; background:#555" onclick="app.toggleManutencao('${e}', '${d.status}')">Trocar</button>`;
                    let el = document.getElementById(id);
                    if(el) el.innerHTML = html;
                    else {
                        let div = document.createElement('div'); div.id = id;
                        div.style = "padding:10px; border:1px solid #444; border-radius:8px; background:rgba(255,255,255,0.03)";
                        div.innerHTML = html; lista.appendChild(div);
                    }
                });
            });
        },

        toggleManutencao(id, st) { db.ref('equipamentos/'+id).set({ status: st === 'ativo' ? 'manutencao' : 'ativo' }); },
        baixarReserva(id) { if(confirm("Liberar recurso?")) db.ref('reservas/'+id).remove(); },
        abrirChamado() { db.ref('chamados').push({ u: this.user.nome, pront: this.user.pront, t: document.getElementById('chamado-desc').value, status: 'aberto' }); this.notify("Chamado aberto!"); },
        sendChatNTI() { 
            const val = document.getElementById('chat-nti-in').value;
            if(!val) return;
            db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: val }); 
            document.getElementById('chat-nti-in').value=""; 
        },
        finalizarChamado() { db.ref('chamados/'+this.currentTicket+'/status').set('resolvido'); document.getElementById('active-ticket-area').classList.add('hidden'); this.notify("Atendimento encerrado."); },
        reservar() { db.ref('reservas').push({ eq: document.getElementById('res-eq').value, sl: document.getElementById('res-sl').value, dt: document.getElementById('res-dt').value, u: this.user.nome }); this.notify("Reserva feita!"); },
        sendChat() { 
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            db.ref('chat').push({ n: this.user.nome, t: val }); 
            document.getElementById('chat-in').value=""; 
        },
        initCharts() {
            const ctx1 = document.getElementById('chartUsers').getContext('2d');
            new Chart(ctx1, { type: 'line', data: { labels: ['Manhã','Tarde','Noite'], datasets: [{ label: 'Uso', data: [12, 19, 8], borderColor: '#00adef' }] } });
        }
    };
</script>
</body>
</html>
