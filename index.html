<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v3.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --nti: #eb4d4b; --success: #2ecc71;
            --dark-panel: rgba(15, 17, 23, 0.98);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow-x: hidden;
        }

        .hidden { display: none !important; }
        
        /* Layout Principal */
        .top-bar { height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--prof); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .grid-main { display: grid; grid-template-columns: 300px 1fr 320px; gap: 15px; padding: 15px; height: calc(100vh - 90px); }
        .panel { background: var(--dark-panel); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 18px; overflow-y: auto; }

        /* Elementos de UI */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1c23; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Estilos de Cartões */
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; border-bottom: 3px solid var(--prof); }
        .ticket { background: #1a1c23; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--prof); font-size: 13px; position: relative; }
        
        /* Cores por Setor */
        .theme-nti { border-bottom-color: var(--nti) !important; }
        .theme-prof { border-bottom-color: var(--prof) !important; }
        .theme-gestao { border-bottom-color: var(--gestao) !important; }

        /* Login */
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e272e 0%, #0a0b10 100%); }
    </style>
</head>
<body>

    <div id="login-area" class="login-screen">
        <div class="panel" style="width: 380px; text-align: center; border-top: 5px solid var(--prof);">
            <i class="fa fa-microchip" style="font-size: 50px; color: var(--prof); margin-bottom: 15px;"></i>
            <h1 style="font-family:'Orbitron'; margin:0">CONECT v3</h1>
            <p style="opacity:0.5; font-size:12px; margin-bottom:20px">SISTEMA INTEGRADO NTI CHÁCARA</p>
            
            <input type="number" id="login-pront" placeholder="Seu Prontuário">
            <input type="password" id="login-pass" placeholder="Sua Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.doLogin()">AUTENTICAR</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="top-bar" id="app-header">
            <div><b style="font-family:'Orbitron';" id="header-logo">CONECT</b> <span id="user-display" style="margin-left:20px; font-size:13px; border-left: 1px solid #444; padding-left: 15px;"></span></div>
            <button onclick="location.reload()" style="background:rgba(255,0,0,0.2); border:1px solid var(--nti); color:white; padding:5px 15px; border-radius:5px; cursor:pointer">SAIR</button>
        </div>

        <div class="grid-main">
            <div class="panel" id="side-menu">
                <h3 id="role-title">Carregando...</h3>
                <hr style="opacity:0.1; margin: 15px 0">
                
                <div id="menu-content"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-microchip"></i> Status do Campus</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px">
                    <div class="stat-card"><span>Equips. em Uso</span><h2 id="dash-uso">0</h2></div>
                    <div class="stat-card"><span>Chamados NTI</span><h2 id="dash-reparos">0</h2></div>
                </div>
                
                <h4>Próximas Reservas</h4>
                <div id="cronograma-lista"></div>
                
                <h4 style="margin-top:20px">Saúde da Rede</h4>
                <canvas id="chartSaude" height="120"></canvas>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Comunicação</h3>
                <div id="chat-box" style="height:300px; background:rgba(0,0,0,0.2); border-radius:10px; padding:10px; overflow-y:auto; margin-bottom:10px; font-size:12px"></div>
                
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Escreva aqui...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:5px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>

                <hr style="opacity:0.1; margin:20px 0">
                <h3>Meus Chamados</h3>
                <div id="meus-tickets"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async doLogin() {
            const p = document.getElementById('login-pront').value;
            const s = document.getElementById('login-pass').value;

            if(p === '46690' && s === 'nti2026') {
                this.user = { nome: 'Kelvin Master', cargo: 'NTI', pront: p };
            } else {
                const snap = await db.ref('usuarios/' + p).once('value');
                if(snap.exists() && snap.val().pass === s) {
                    this.user = snap.val();
                } else { return alert("Acesso Negado!"); }
            }
            this.start();
        },

        start() {
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${this.user.nome} [${this.user.cargo}]`;
            
            this.renderMenu();
            this.initCharts();
            this.sync();
        },

        renderMenu() {
            const menu = document.getElementById('menu-content');
            const title = document.getElementById('role-title');
            const header = document.getElementById('app-header');

            if(this.user.cargo === 'NTI') {
                title.innerHTML = `<i class="fa fa-terminal"></i> PAINEL NTI`;
                header.style.borderBottomColor = 'var(--nti)';
                menu.innerHTML = `
                    <div class="stat-card theme-nti"><span>SERVER STATUS</span><h2>ACTIVE</h2></div>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.lockSys()">LOCK SYSTEM</button>
                    <button class="btn" style="background:#333; color:white; margin-top:10px">DATABASE RESET</button>
                    <button class="btn" style="background:#333; color:white; margin-top:10px">CONFIG. REDE</button>
                `;
            } else if(this.user.cargo === 'Professor') {
                title.innerHTML = `<i class="fa fa-graduation-cap"></i> PROFESSOR`;
                menu.innerHTML = `
                    <h4>Nova Reserva</h4>
                    <select id="res-eq"><option>TV 01</option><option>CHROMEBOOKS</option><option>SALA INFO</option></select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reserva()">RESERVAR AGORA</button>
                    <hr style="opacity:0.1">
                    <h4>Suporte NTI</h4>
                    <textarea id="sup-txt" placeholder="Relatar problema técnico..."></textarea>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.ticket()">ABRIR CHAMADO</button>
                `;
            } else if(this.user.cargo === 'Gestão') {
                title.innerHTML = `<i class="fa fa-user-tie"></i> GESTÃO`;
                header.style.borderBottomColor = 'var(--gestao)';
                menu.innerHTML = `
                    <h4>Relatórios</h4>
                    <button class="btn" style="background:var(--gestao)">VER USO MENSAL</button>
                    <button class="btn" style="background:#333; color:white; margin-top:10px">DESEMPENHO NTI</button>
                    <hr style="opacity:0.1">
                    <h4>Mensagem Global</h4>
                    <textarea placeholder="Aviso para todos os setores..."></textarea>
                    <button class="btn" style="background:var(--prof); color:white">ENVIAR AVISO</button>
                `;
            }
        },

        sync() {
            // Sincroniza Reservas
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('cronograma-lista');
                list.innerHTML = "";
                let count = 0;
                snap.forEach(r => {
                    const d = r.val(); count++;
                    list.innerHTML += `
                        <div class="ticket">
                            <b>${d.eq}</b> - ${d.u} 
                            <span style="float:right; font-size:10px">${new Date(d.dt).toLocaleDateString()}</span>
                        </div>`;
                });
                document.getElementById('dash-uso').innerText = count;
            });

            // Sincroniza Chat
            db.ref('chats/geral').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    box.innerHTML += `<div style="margin-bottom:8px"><b>${d.n}:</b> ${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Sincroniza Chamados
            db.ref('chamados').on('value', snap => {
                const list = document.getElementById('meus-tickets');
                list.innerHTML = "";
                let c = 0;
                snap.forEach(t => {
                    const d = t.val(); c++;
                    if(this.user.cargo === 'NTI' || d.pront === this.user.pront) {
                        list.innerHTML += `<div class="ticket" style="border-left-color:var(--nti)">${d.desc}</div>`;
                    }
                });
                document.getElementById('dash-reparos').innerText = c;
            });
        },

        reserva() {
            const eq = document.getElementById('res-eq').value, dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Selecione a data");
            db.ref('reservas').push({ eq, dt, u: this.user.nome, pront: this.user.pront });
            alert("Reservado!");
        },

        ticket() {
            const desc = document.getElementById('sup-txt').value;
            if(!desc) return;
            db.ref('chamados').push({ desc, u: this.user.nome, pront: this.user.pront });
            document.getElementById('sup-txt').value = "";
            alert("NTI notificado!");
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(!t) return;
            db.ref('chats/geral').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        initCharts() {
            const ctx = document.getElementById('chartSaude').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: ['Seg','Ter','Qua','Qui','Sex'], datasets: [{ label: 'Estabilidade %', data: [98, 99, 95, 100, 97], borderColor: '#2ecc71', tension: 0.3 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
            });
        }
    };
</script>
</body>
</html>
