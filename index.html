<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; 
            --gestao: #f1c40f; 
            --secre: #a55eea; 
            --cad: #2ecc71; 
            --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.8);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* LOGIN 5 COLUNAS COLORIDAS */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        
        /* EFEITO DE HOVER VOLTOU */
        .sector-column:hover { flex: 1.5; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); }

        .col-prof { color: var(--prof); border-top: 10px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 10px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 10px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 10px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 10px solid var(--nti); }

        /* TELA DE TROCA DE SENHA */
        #setup-password { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: #161b22; padding: 30px; border-radius: 15px; border: 2px solid var(--gestao); width: 350px; text-align: center; box-shadow: 0 0 20px var(--gestao); }

        /* DASHBOARD */
        #main-system { display: none; padding: 20px; padding-top: 70px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }

        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof">
            <i class="fa fa-chalkboard-user fa-4x"></i><h2>PROFESSOR</h2>
            <input type="text" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao">
            <i class="fa fa-user-shield fa-4x"></i><h2>GESTÃO</h2>
            <input type="text" id="g-p" placeholder="Prontuário">
            <input type="password" id="g-s" placeholder="Senha">
            <button class="btn" style="background:var(--gestao); color:black" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre">
            <i class="fa fa-building-columns fa-4x"></i><h2>SECRETARIA</h2>
            <input type="text" id="s-p" placeholder="Prontuário">
            <input type="password" id="s-s" placeholder="Senha">
            <button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad">
            <i class="fa fa-user-plus fa-4x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome">
            <input type="text" id="c-p" placeholder="Prontuário">
            <select id="c-c">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button>
        </div>
        <div class="sector-column col-nti">
            <i class="fa fa-terminal fa-4x"></i><h2>NTI</h2>
            <input type="text" id="n-p" placeholder="ID NTI">
            <input type="password" id="n-s" placeholder="Senha Master">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Acesso Master</button>
        </div>
    </div>

    <div id="setup-password">
        <div class="modal">
            <i class="fa fa-key fa-3x" style="color:var(--gestao); margin-bottom: 15px;"></i>
            <h3>SEGURANÇA</h3>
            <p>Você usou uma senha padrão. Crie uma senha pessoal agora:</p>
            <input type="password" id="new-pass" placeholder="Nova Senha">
            <input type="password" id="new-pass-confirm" placeholder="Confirme a Senha">
            <button class="btn" style="background:var(--cad); color:white; margin-top:10px" onclick="app.updatePassword()">Definir Senha</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <h2 id="welcome" style="font-family: 'Orbitron'; color: var(--prof);">Olá</h2>
                <div id="nti-panel" class="hidden" style="border-top: 1px solid #444; padding-top: 15px; margin-top: 15px;">
                    <h4 style="color:var(--nti)"><i class="fa fa-tools"></i> ADMINISTRAÇÃO NTI</h4>
                    <input type="text" id="res-p" placeholder="Prontuário p/ Reset">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.resetSenha()">Resetar para Padrão</button>
                </div>
                <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair do Sistema</button>
            </div>
            
            <div class="panel">
                <h3><i class="fa fa-calendar-check"></i> Reservas e Cronograma</h3>
                <div id="lista-res" style="color: #ccc;">Nenhuma reserva hoje.</div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comment-dots"></i> Chat Interno</h3>
                <div id="chat-box" style="height: 150px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 10px;"></div>
                <input type="text" placeholder="Diga algo...">
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        tempPront: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value.trim();
            const s = document.getElementById(pre+'-s').value.trim();

            if(cargo === 'NTI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI', pront: '46690'};
                return this.start();
            }

            const snap = await db.ref('usuarios/' + p).once('value');
            if(snap.exists()) {
                const d = snap.val();
                if(String(d.pass) === String(s)) {
                    this.user = d;
                    this.tempPront = p;

                    const padroes = ['pmspmudar123', 'gestao2026', 'secretaria2026'];
                    if(padroes.includes(s)) {
                        document.getElementById('setup-password').style.display = 'flex';
                    } else {
                        this.start();
                    }
                } else { alert("Senha incorreta!"); }
            } else { alert("Usuário não encontrado!"); }
        },

        async updatePassword() {
            const n1 = document.getElementById('new-pass').value.trim();
            const n2 = document.getElementById('new-pass-confirm').value.trim();
            if(n1.length < 4) return alert("Mínimo 4 caracteres.");
            if(n1 !== n2) return alert("Senhas não batem.");

            await db.ref('usuarios/' + this.tempPront).update({ pass: n1 });
            alert("Senha pessoal ativa!");
            document.getElementById('setup-password').style.display = 'none';
            this.start();
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('welcome').innerText = "Olá, " + this.user.nome;
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            let s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
            db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("Cadastro realizado!");
        },

        async resetSenha() {
            const p = document.getElementById('res-p').value;
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists()){
                const c = snap.val().cargo;
                let s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
                db.ref('usuarios/'+p).update({pass: s});
                alert("Resetado com sucesso!");
            }
        }
    };
</script>
</body>
</html>
