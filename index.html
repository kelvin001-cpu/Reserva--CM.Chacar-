<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | PAINEL TOTAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00adef; --accent: #00ff9d; --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.9); --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }

        /* LOGIN */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-card { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--primary); width: 320px; text-align: center; }

        /* HEADER */
        header {
            height: 60px; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border);
        }

        /* GRID DO PAINEL ABERTO */
        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr 350px; /* Cadastro | Reservas | Suporte */
            grid-template-rows: 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 80px);
            box-sizing: border-box;
        }

        /* ESTILO DOS BLOCOS (MENUS SEPARADOS E ABERTOS) */
        .menu-block {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .block-title {
            font-size: 16px; font-weight: 700; margin-bottom: 15px; 
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }

        /* LISTAS E GRIDS INTERNOS */
        .scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        
        .equip-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .available { border-color: var(--accent); }
        .busy { border-color: var(--danger); opacity: 0.7; }

        input, select, textarea { 
            width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box;
        }

        .btn {
            padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%;
            transition: 0.3s;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="color:var(--primary)">NTI SISTEMA</h2>
        <input type="number" id="l-pront" placeholder="Prontuário">
        <input type="password" id="l-pass" placeholder="Senha">
        <button class="btn btn-blue" onclick="app.login()">ENTRAR NO PAINEL</button>
    </div>
</div>

<header id="main-header" class="hidden">
    <div style="display:flex; align-items:center; gap:10px">
        <i class="fa fa-user-circle color:var(--primary)"></i>
        <span id="u-nome" style="font-weight:600"></span>
    </div>
    <button class="btn-red" style="padding: 5px 15px; border-radius:5px" onclick="location.reload()">SAIR</button>
</header>

<div id="dashboard" class="dashboard hidden">
    
    <section class="menu-block" style="border-top: 4px solid var(--primary)">
        <div class="block-title"><i class="fa fa-user-plus" style="color:var(--primary)"></i> CADASTRO RÁPIDO</div>
        <div class="scroll-area">
            <input type="text" id="c-nome" placeholder="Nome Completo">
            <input type="number" id="c-pront" placeholder="Prontuário">
            <select id="c-cargo">
                <option>Professor</option>
                <option>Secretaria</option>
                <option>Gestão</option>
            </select>
            <button class="btn btn-blue" onclick="app.confirmarCad()">CADASTRAR USUÁRIO</button>
            <hr style="opacity:0.1; margin: 20px 0">
            <div id="ti-area" class="hidden">
                <p style="color:var(--accent); font-size:12px">CONTROLE MASTER (TI)</p>
                <button class="btn btn-red" onclick="app.postAviso()">BLOQUEAR SISTEMA</button>
            </div>
        </div>
    </section>

    <section class="menu-block" style="border-top: 4px solid var(--accent)">
        <div class="block-title"><i class="fa fa-laptop" style="color:var(--accent)"></i> EQUIPAMENTOS E USO</div>
        <div class="scroll-area">
            <div id="equip-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <h4 style="margin: 20px 0 10px 0">Lista de Retiradas</h4>
            <div id="uso-list"></div>
        </div>
    </section>

    <section class="menu-block" style="border-top: 4px solid var(--danger)">
        <div class="block-title"><i class="fa fa-headset" style="color:var(--danger)"></i> SUPORTE TÉCNICO</div>
        <div class="scroll-area">
            <input type="text" id="ch-local" placeholder="Localização (Ex: Sala 05)">
            <textarea id="ch-problema" rows="4" placeholder="O que está acontecendo?"></textarea>
            <button class="btn btn-red" onclick="app.enviarChamado()">ABRIR CHAMADO</button>
        </div>
    </section>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login() {
            const p = document.getElementById('l-pront').value, s = document.getElementById('l-pass').value;
            if(p === '46690' && s === 'nti2026') { this.user = {nome: 'Kelvin Master', cargo: 'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) { this.user = snap.val(); this.start(); }
            else alert("Dados inválidos!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('u-nome').innerText = this.user.nome;
            if(this.user.cargo === 'TI') document.getElementById('ti-area').classList.remove('hidden');
            this.sync();
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-list');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { 
                    const d = r.val(); u[d.item] = d; 
                    l.innerHTML += `<div class="equip-item busy">
                        <span style="font-size:11px"><b>${d.item}</b> - ${d.user}</span>
                        <button onclick="db.ref('reservas/${r.key}').remove()" style="background:none; border:none; color:var(--danger); cursor:pointer">X</button>
                    </div>`; 
                });
                this.itens.forEach(i => {
                    const o = u[i];
                    g.innerHTML += `<div class="equip-item ${o?'busy':'available'}" style="flex-direction:column; text-align:center">
                        <b style="font-size:12px">${i}</b>
                        ${!o ? `<button class="btn btn-blue" style="font-size:9px; padding:3px; margin-top:5px" onclick="app.reservar('${i}')">RESERVAR</button>` : '<span style="font-size:9px">EM USO</span>'}
                    </div>`;
                });
            });
        },
        async reservar(i) { const loc = prompt("Local:"); if(loc) await db.ref('reservas').push({item:i, user:this.user.nome, local:loc}); },
        async enviarChamado() { 
            await db.ref('chamados').push({autor:this.user.nome, local:document.getElementById('ch-local').value, problema:document.getElementById('ch-problema').value});
            alert("Chamado Aberto!");
        },
        async confirmarCad() {
            const p = document.getElementById('c-pront').value;
            await db.ref('usuarios/'+p).set({nome: document.getElementById('c-nome').value, pront: p, cargo: document.getElementById('c-cargo').value, pass: 'pmsp2026'});
            alert("Cadastrado com sucesso!");
        }
    };
</script>
</body>
</html>
