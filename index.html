<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Novas Classes para o Mapeamento */
        .grid-sala { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 15px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; }
        .pc-seat { 
            padding: 8px; font-size: 10px; text-align: center; border-radius: 5px; cursor: pointer;
            border: 1px solid #444; transition: 0.3s;
        }
        .pc-ativo { background: rgba(46, 204, 113, 0.3); border-color: var(--cad); }
        .pc-manutencao { background: rgba(235, 77, 75, 0.4); border-color: var(--nti); }
        
        .profile-reminder { background: #f1c40f; color: #000; padding: 5px; font-size: 12px; font-weight: bold; text-align: center; border-radius: 5px; margin-bottom: 10px; animation: pulse 2s infinite; }
        
        /* Layout Geral similar ao anterior mas otimizado */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 15px; border-right: 1px solid rgba(255,255,255,0.05); }
        
        #main-system { display: none; padding: 80px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 380px 1fr 350px; gap: 20px; max-width: 1800px; margin: 0 auto; }
        
        .panel { background: rgba(22, 27, 34, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: white; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="alert-ribbon" style="display:none; background: var(--nti); position: fixed; width:100%; z-index:1000; text-align:center; padding: 10px;">⚠️ SISTEMA MONITORADO PELO NTI</div>

    <div class="login-container" id="login-screen">
        <div class="sector-column">
            <h2 style="font-family: Orbitron; color: var(--prof)">LOGIN COLABORADOR</h2>
            <input type="number" id="l-p" placeholder="Prontuário/ID">
            <input type="password" id="l-s" placeholder="Senha">
            <button class="btn" style="background: var(--prof)" onclick="app.login()">Entrar no Sistema</button>
        </div>
        
        <div class="sector-column" style="background: rgba(255,255,255,0.02)">
            <h2 style="font-family: Orbitron; color: var(--cad)">NOVO CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <input type="password" id="c-s" placeholder="Definir Senha de Acesso">
            <select id="c-u">
                <option value="Unidade Atual">Atua apenas nesta unidade</option>
                <option value="Multi-Unidade">Atua em mais de um colégio</option>
            </select>
            <select id="c-c">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <button class="btn" style="background: var(--cad)" onclick="app.cadastrar()">Criar Conta @edu</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <div id="profile-area" style="text-align: center;">
                        <div class="profile-reminder">📸 COLOQUE SUA FOTO DE PERFIL PARA IDENTIFICAÇÃO</div>
                        <img id="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border: 2px solid var(--prof)">
                        <h4 id="user-display-name">Carregando...</h4>
                        <small id="user-email" style="color: #888"></small>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-check"></i> Reservar</h3>
                    <select id="res-eq" onchange="app.checkMapeamento(this.value)">
                        <option value="TV 01">TV 01</option>
                        <option value="TV 02">TV 02</option>
                        <option value="Chromebooks">Kit Chromebooks</option>
                        <option value="Sala Info">Sala de Informática (Dell)</option>
                    </select>
                    <input type="datetime-local" id="res-dt">
                    <input type="text" id="res-sl" placeholder="Sala/Turma">
                    <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Validar e Agendar</button>
                </div>

                <div id="mapa-sala-area" class="panel" style="display:none">
                    <h4 style="font-family: Orbitron; font-size: 12px">Mapeamento de Cadeira - Estação Dell</h4>
                    <div class="grid-sala" id="grid-computadores"></div>
                </div>
            </div>

            <div class="center-col">
                <div id="nti-monitor" class="panel" style="display:none; border-color: var(--nti)">
                    <h3 style="color:var(--nti)">🛰️ NTI HUB - MONITORAMENTO EM TEMPO REAL</h3>
                    <div id="logs-navegacao" style="height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; background: #000; padding: 10px;"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                        <button class="btn" style="background:#444; font-size: 10px" onclick="app.diagRemoto()">Diagnosticar Rede</button>
                        <button class="btn" style="background:var(--nti); font-size: 10px" onclick="app.limparVirus()">Deep Scan (Virus)</button>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-clock"></i> Cronograma Geral</h3>
                    <div id="lista-reservas" style="max-height: 500px; overflow-y: auto;"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <canvas id="chartStatus"></canvas>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-info-circle"></i> Chromebooks Status</h3>
                    <div id="lista-chromebooks" style="display:grid; grid-template-columns: 1fr 1fr; font-size: 10px; gap: 5px;"></div>
                </div>
                <button class="btn" style="background: #cc4444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        userIP: "0.0.0.0",

        async init() {
            // Captura de IP para o NTI
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                this.userIP = data.ip;
            } catch(e) { console.log("Erro IP"); }
        },

        cadastrar() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, 
                  s = document.getElementById('c-s').value, c = document.getElementById('c-c').value;
            
            if(!n || !p || !s) return alert("Preencha todos os campos e defina uma senha.");

            const email = `${n.split(' ')[0].toLowerCase()}.${p}@edu.santanadeparnaiba.sp.gov.br`;
            
            db.ref('usuarios/'+p).set({
                nome: n, pront: p, pass: s, cargo: c, email: email, foto: "", ip: this.userIP, atuacao: document.getElementById('c-u').value
            }).then(() => alert("Conta criada com sucesso!\nSeu e-mail: " + email));
        },

        async login() {
            const p = document.getElementById('l-p').value, s = document.getElementById('l-s').value;
            const snap = await db.ref('usuarios/'+p).once('value');
            
            if(snap.exists() && snap.val().pass === s) {
                this.user = snap.val();
                this.start();
            } else if (p === "46690" && s === "nti2026") { // Master
                this.user = {nome: "Admin NTI", cargo: "NTI", pront: "46690"};
                this.start();
            } else {
                alert("Acesso Negado.");
            }
        },

        start() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-display-name').innerText = this.user.nome;
            document.getElementById('user-email').innerText = this.user.email || "";
            
            if(this.user.cargo === 'NTI' || this.user.cargo === 'Gestão') {
                document.getElementById('nti-monitor').style.display = 'block';
                this.syncLogs();
            }

            this.logNavegacao("Fez login no sistema");
            this.carregarReservas();
            this.carregarChromebooks();
            this.gerarMapaInfo();
        },

        logNavegacao(acao) {
            db.ref('logs_navegacao').push({
                u: this.user.nome, pront: this.user.pront, acao: acao, ip: this.userIP, time: new Date().toLocaleString()
            });
        },

        syncLogs() {
            db.ref('logs_navegacao').limitToLast(15).on('value', snap => {
                const box = document.getElementById('logs-navegacao'); box.innerHTML = "";
                snap.forEach(l => {
                    const d = l.val();
                    box.innerHTML += `<div>[${d.time}] ${d.u} (${d.ip}): ${d.acao}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        async reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            
            if(!dt) return alert("Selecione data e hora.");

            // Checagem de Conflito
            const snap = await db.ref('reservas').once('value');
            let conflito = false;
            snap.forEach(r => {
                const res = r.val();
                if(res.eq === eq && res.dt === dt) conflito = true;
            });

            if(conflito) {
                alert("❌ CONFLITO: Este equipamento já está reservado para este horário!");
                this.logNavegacao(`Tentativa de reserva duplicada: ${eq}`);
            } else {
                db.ref('reservas').push({
                    eq, dt, sl: document.getElementById('res-sl').value, u: this.user.nome
                });
                alert("✅ Agendado com sucesso!");
                this.logNavegacao(`Reservou ${eq} para ${dt}`);
            }
        },

        carregarReservas() {
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-reservas'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div class="panel" style="background:rgba(255,255,255,0.05); border-left: 5px solid var(--prof)">
                        <b>${d.eq}</b> - Sala ${d.sl}<br><small>${d.dt} | Por: ${d.u}</small>
                    </div>`;
                });
            });
        },

        gerarMapaInfo() {
            const grid = document.getElementById('grid-computadores');
            const pcs = [
                {n:1, p:"231.413"}, {n:2, p:"231.453"}, {n:3, p:"231.443"}, {n:4, p:"231.454"},
                {n:5, p:"231.414"}, {n:6, p:"231.403"}, {n:7, p:"231.383"}, {n:8, p:"231.274"},
                {n:9, p:"231.275"}, {n:10, p:"231.442"}, {n:11, p:"231.551"}, {n:12, p:"231.418"},
                {n:13, p:"231.390"}, {n:14, p:"231.514"}, {n:15, p:"231.515"}, {n:16, p:"231.457"},
                {n:17, p:"231.365"}, {n:18, p:"231.484"}, {n:19, p:"231.408"}, {n:20, p:"231.372"},
                {n:21, p:"231.424"}, {n:22, p:"231.438"}, {n:23, p:"231.348"}, {n:24, p:"231.363"},
                {n:25, p:"231.344"}, {n:26, p:"231.437"}, {n:27, p:"231.464"}, {n:28, p:"231.347"},
                {n:29, p:"231.521"}, {n:30, p:"231.459"}, {n:31, p:"231.427"}, {n:32, p:"231.364"}, {n:33, p:"231.470"}
            ];

            pcs.forEach(pc => {
                const div = document.createElement('div');
                div.className = "pc-seat pc-ativo";
                div.innerHTML = `PC ${pc.n}<br><small>${pc.p}</small>`;
                div.onclick = () => { if(this.user.cargo === 'NTI') div.classList.toggle('pc-manutencao'); };
                grid.appendChild(div);
            });
        },

        carregarChromebooks() {
            const pats = ["259.954","259.972","259.953","259.973","259.971","259.965","259.966","259.952","259.951","259.950"]; // etc
            const box = document.getElementById('lista-chromebooks');
            pats.forEach(p => {
                box.innerHTML += `<div style="padding:3px; border-bottom:1px solid #333">💻 ${p} <span style="color:var(--cad)">OK</span></div>`;
            });
        },

        checkMapeamento(val) {
            document.getElementById('mapa-sala-area').style.display = val === 'Sala Info' ? 'block' : 'none';
            this.logNavegacao(`Visualizou mapeamento de: ${val}`);
        },

        diagRemoto() { alert("Escaneando dispositivos na rede do colégio..."); this.logNavegacao("Executou diagnóstico de rede remoto"); },
        limparVirus() { alert("Comando 'Remoção de Vírus' enviado aos Chromebooks via terminal."); this.logNavegacao("Executou limpeza de vírus em massa"); }
    };

    app.init();
</script>
</body>
</html>
