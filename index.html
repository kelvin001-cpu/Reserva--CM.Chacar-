<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00adef; --accent: #00ff9d; --danger: #ff4757;
            --bg-card: rgba(10, 15, 25, 0.95); --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #050505 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; overflow: hidden;
        }

        /* TELA DE LOGIN */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 30px; border: 2px solid var(--primary); width: 320px; text-align: center; }

        /* ESTRUTURA DE BLOCOS SEPARADOS */
        #ui-wrapper { 
            display: grid; 
            grid-template-columns: 280px 1fr; /* Coluna do Menu e Coluna do Conteúdo */
            grid-template-rows: 80px 1fr;
            gap: 25px; /* ESPAÇO REAL ENTRE OS MENUS */
            padding: 25px;
            height: 100vh;
            box-sizing: border-box;
        }

        /* BLOCO 1: PERFIL (TOP LEFT) */
        .block-user {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--primary);
            border-radius: 20px;
            display: flex; align-items: center; gap: 15px; padding: 0 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* BLOCO 2: NAVEGAÇÃO (TOP RIGHT) */
        .block-nav {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around; padding: 0 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* BLOCO 3: BOTÕES DE ACESSO (SIDEBAR) */
        .block-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* BLOCO 4: CONTEÚDO (CENTER) */
        .block-main {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 30px;
            overflow-y: auto;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* BOTÕES ESTILIZADOS COMO WIDGETS */
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white; padding: 15px; border-radius: 15px;
            cursor: pointer; text-align: left; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; font-weight: 600;
        }
        .nav-btn i { color: var(--primary); font-size: 18px; }
        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0, 173, 239, 0.4);
        }
        .nav-btn.active i { color: white; }

        /* TABELAS E CARDS */
        .card-equip { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 20px; text-align: center;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid var(--border-color); background: #000; color: white; 
        }

        .hidden { display: none !important; }
        .btn-exit { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-box">
        <h2 style="color:var(--primary)">NTI SISTEMA</h2>
        <input type="number" id="l-pront" placeholder="Prontuário">
        <input type="password" id="l-pass" placeholder="Senha">
        <select id="l-tipo">
            <option>Professor</option><option>Secretaria</option><option>Gestão</option><option value="TI">NTI Master</option>
        </select>
        <button class="nav-btn" style="width:100%; justify-content:center; margin-top:15px; background:var(--primary)" onclick="app.login()">ACESSAR</button>
    </div>
</div>

<div id="ui-wrapper" class="hidden">
    <div class="block-user">
        <i class="fa fa-user-gear fa-2x" style="color:var(--primary)"></i>
        <div>
            <div id="u-nome" style="font-weight: 700; font-size: 14px;"></div>
            <div id="u-cargo" style="font-size: 10px; color: var(--primary); text-transform: uppercase;"></div>
        </div>
    </div>

    <div class="block-nav">
        <span style="font-weight: 800; letter-spacing: 2px; color: var(--primary)">DASHBOARD NTI</span>
        <button class="btn-exit" onclick="location.reload()">SAIR DO SISTEMA</button>
    </div>

    <div class="block-sidebar">
        <p style="font-size: 10px; opacity: 0.5; margin-left: 10px;">MENU PRINCIPAL</p>
        <button class="nav-btn active" onclick="app.view('v-reserva', this)"><i class="fa fa-laptop-code"></i> Reservas</button>
        <button class="nav-btn" onclick="app.view('v-chamado', this)"><i class="fa fa-headset"></i> Suporte</button>
        
        <p style="font-size: 10px; opacity: 0.5; margin-left: 10px; margin-top: 20px;">ADMINISTRAÇÃO</p>
        <button class="nav-btn" onclick="app.view('v-cadastro', this)"><i class="fa fa-user-plus"></i> Novo Usuário</button>
        
        <div id="ti-area" class="hidden">
            <button class="nav-btn" style="border-color: var(--accent);" onclick="app.view('v-admin', this)"><i class="fa fa-shield-halved" style="color:var(--accent)"></i> Painel NTI</button>
        </div>
    </div>

    <div class="block-main">
        <div id="v-reserva" class="view active">
            <h2 style="margin-top:0">Controle de Equipamentos</h2>
            <div class="grid" id="equip-list"></div>
            <h3 style="margin-top:40px">Atividade de Uso</h3>
            <div id="uso-list"></div>
        </div>

        <div id="v-chamado" class="view">
            <div style="max-width: 500px;">
                <h2 style="color:var(--danger)">Novo Chamado</h2>
                <input type="text" id="ch-local" placeholder="Sala / Setor">
                <textarea id="ch-problema" rows="5" placeholder="Descrição do problema"></textarea>
                <button class="nav-btn" style="background:var(--danger); width:100%; justify-content:center" onclick="app.enviarChamado()">ABRIR SOLICITAÇÃO</button>
            </div>
        </div>

        <div id="v-cadastro" class="view">
            <div style="max-width: 500px;">
                <h2 style="color:var(--primary)">Cadastrar Funcionário</h2>
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="number" id="c-pront" placeholder="Prontuário">
                <select id="c-cargo">
                    <option>Professor</option><option>Secretaria</option><option>Gestão</option>
                </select>
                <button class="nav-btn" style="background:var(--primary); width:100%; justify-content:center" onclick="app.confirmarCad()">SALVAR CADASTRO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login() {
            const p = document.getElementById('l-pront').value, s = document.getElementById('l-pass').value, t = document.getElementById('l-tipo').value;
            if(t==='TI' && p==='46690' && s==='nti2026') { this.user = {nome:'Kelvin Master', cargo:'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) { this.user = snap.val(); this.start(); }
            else alert("Dados inválidos!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('ui-wrapper').classList.remove('hidden');
            document.getElementById('u-nome').innerText = this.user.nome;
            document.getElementById('u-cargo').innerText = this.user.cargo;
            if(this.user.cargo === 'TI') document.getElementById('ti-area').classList.remove('hidden');
            this.sync();
        },

        view(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-list');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { 
                    const d = r.val(); u[d.item] = d; 
                    l.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid var(--danger)">
                        <b>${d.item}</b> - Retirado por: ${d.user} | Local: ${d.local} 
                        <button onclick="db.ref('reservas/${r.key}').remove()" style="float:right; background:none; border:none; color:var(--danger); cursor:pointer"><i class="fa fa-trash"></i></button>
                    </div>`; 
                });
                this.itens.forEach(i => {
                    const o = u[i];
                    g.innerHTML += `<div class="card-equip">
                        <i class="fa ${i.includes('TV')?'fa-tv':'fa-laptop'} fa-2x" style="color:${o?'var(--danger)':'var(--accent)'}"></i>
                        <p><b>${i}</b></p>
                        <button class="nav-btn" style="width:100%; font-size:10px; padding:8px; background:${o?'transparent':'var(--primary)'}" onclick="${o?'':'app.reservar(\''+i+'\')'}">${o?'OCUPADO':'RESERVAR'}</button>
                    </div>`;
                });
            });
        },
        async reservar(i) { const loc = prompt("Local:"); if(loc) await db.ref('reservas').push({item:i, user:this.user.nome, local:loc}); },
        async enviarChamado() { 
            await db.ref('chamados').push({autor:this.user.nome, local:document.getElementById('ch-local').value, problema:document.getElementById('ch-problema').value});
            alert("Chamado Aberto!"); this.view('v-reserva', document.querySelector('.nav-btn'));
        },
        async confirmarCad() {
            const p = document.getElementById('c-pront').value;
            await db.ref('usuarios/'+p).set({nome: document.getElementById('c-nome').value, pront: p, cargo: document.getElementById('c-cargo').value, pass: 'pmsp2026'});
            alert("Cadastrado!");
        }
    };
</script>
</body>
</html>
