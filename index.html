<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* --- FRASE CONECT GIGANTE --- */
        .slogan-container {
            width: 100%; text-align: center; padding: 60px 0 20px 0;
            animation: fadeInDown 1.5s;
        }
        .slogan-main { 
            font-family: 'Orbitron'; font-size: 5rem; color: var(--prof); 
            text-shadow: 0 0 25px rgba(0,173,239,0.7); margin-bottom: 10px; font-weight: 700;
        }
        .slogan-sub { font-size: 1.5rem; font-weight: 300; letter-spacing: 4px; color: #ccc; font-style: italic; }

        #alert-ribbon { background: var(--nti); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .sector-column:hover { background: rgba(255,255,255,0.03); transform: scale(1.02); }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; animation: fadeIn 1s; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; transition: 0.3s;
        }
        
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; 
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box;
        }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; }

        #chat-box, #chat-nti-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        .res-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--prof); }
        
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .fade-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO: <span id="alert-text">Carregando...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron">SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>

        <div class="sector-column fade-up delay-1"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column fade-up delay-2"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column fade-up delay-3"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column fade-up delay-4" style="background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome Completo"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button></div>
        <div class="sector-column fade-up delay-4"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Nova Reserva</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Número da Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar Agendamento</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-headset"></i> Suporte Técnico</h3>
                    <select id="chamado-grau"><option value="Baixa">Prioridade: Baixa</option><option value="Média">Prioridade: Média</option><option value="Alta">Prioridade: Alta</option></select>
                    <input type="text" id="chamado-desc" placeholder="Qual o problema?">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Solicitar Técnico</button>
                    
                    <div id="active-ticket-area" class="hidden" style="margin-top:20px; border-top:1px solid #444; padding-top:15px">
                        <h4 style="color:var(--prof)">Chat Suporte</h4>
                        <div id="chat-nti-box"></div>
                        <div style="display:flex; gap:5px; margin-top:10px">
                            <input type="text" id="chat-nti-in" placeholder="Mensagem...">
                            <button class="btn" style="width:60px; background:var(--prof)" onclick="app.sendChatNTI()"><i class="fa fa-paper-plane"></i></button>
                        </div>
                        <button class="btn" style="background:var(--cad); margin-top:10px" onclick="app.finalizarChamado()">Encerrar e Avaliar</button>
                    </div>
                </div>

                <div id="nti-master-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)"><i class="fa fa-shield-halved"></i> GESTÃO NTI</h3>
                    <label>Chamados em Aberto:</label>
                    <div id="lista-chamados-nti" style="margin: 10px 0; max-height:150px; overflow-y:auto"></div>
                    <hr style="opacity:0.1">
                    <input type="text" id="input-aviso" placeholder="Aviso Global">
                    <button class="btn" style="background:var(--nti)" onclick="app.enviarAviso()">Publicar Aviso</button>
                    <div style="display:flex; gap:10px; margin-top:10px">
                        <button class="btn" style="background:red" onclick="app.setLock(true)">TRAVAR</button>
                        <button class="btn" style="background:green" onclick="app.setLock(false)">LIBERAR</button>
                    </div>
                </div>
            </div>

            <div class="center-col">
                <div id="nti-charts-area" class="panel hidden">
                    <h3><i class="fa fa-microchip"></i> Telemetria</h3>
                    <div class="charts-grid">
                        <div style="background:rgba(0,0,0,0.3); padding:5px"><canvas id="chartUsers"></canvas></div>
                        <div style="background:rgba(0,0,0,0.3); padding:5px"><canvas id="chartChamados"></canvas></div>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-list-ul"></i> Cronograma de Uso</h3>
                    <div id="lista-res" style="max-height:400px; overflow-y:auto"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-box-open"></i> Status Equipamentos</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Mural de Avisos</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-in" placeholder="Mensagem...">
                        <button class="btn" style="width:60px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-star"></i> Avaliações</h3>
                    <div id="lista-avaliacoes" style="font-size:12px"></div>
                </div>
                <button class="btn" style="background:#cc4444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, currentTicket: null, charts: {},

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin (NTI)', cargo:'NTI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); } else { alert("Erro de Acesso!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return;
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Conta criada!"));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-master-panel').classList.remove('hidden');
                document.getElementById('nti-charts-area').classList.remove('hidden');
                this.initCharts();
            }
            this.syncData();
            this.carregarEquipamentos();
        },

        syncData() {
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display='flex'; else document.getElementById('lock-overlay').style.display='none'; });
            db.ref('aviso_global').on('value', s => {
                const rb = document.getElementById('alert-ribbon');
                if(s.val()) { rb.style.display = 'block'; document.getElementById('alert-text').innerText = s.val(); } else rb.style.display = 'none';
            });
            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    box.innerHTML += `<div class="res-item"><div><strong>${r.val().eq}</strong><br><small>${r.val().u}</small></div><button class="btn" style="width:70px; font-size:10px; background:var(--nti)" onclick="app.baixarReserva('${r.key}')">Baixa</button></div>`;
                });
            });

            // GESTÃO DE CHAMADOS NTI
            db.ref('chamados').on('value', snap => {
                let abertos = 0;
                const listaNTI = document.getElementById('lista-chamados-nti');
                if(listaNTI) listaNTI.innerHTML = "";
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto') {
                        abertos++;
                        if(this.user.cargo === 'NTI') {
                            listaNTI.innerHTML += `<div class="res-item" style="border-left-color:var(--nti); font-size:11px"><div>${d.u}<br>${d.t}</div><button class="btn" style="width:50px; font-size:9px; background:var(--prof)" onclick="app.atenderChamado('${c.key}')">Ver</button></div>`;
                        }
                        if(d.pront === this.user.pront || (this.user.cargo === 'NTI' && this.currentTicket === c.key)) {
                            this.currentTicket = c.key;
                            this.abrirInterfaceChamado();
                        }
                    }
                });
                if(this.charts.chamados) this.updateChart('chamados', [abertos]);
            });
        },

        atenderChamado(id) { this.currentTicket = id; this.abrirInterfaceChamado(); },

        abrirInterfaceChamado() {
            document.getElementById('active-ticket-area').classList.remove('hidden');
            db.ref('chat_nti/'+this.currentTicket).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChatNTI() {
            const t = document.getElementById('chat-nti-in').value; if(!t) return;
            db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: t });
            document.getElementById('chat-nti-in').value = "";
        },

        finalizarChamado() {
            let n = prompt("Avaliação (1-5):");
            db.ref('avaliacoes').push({ nota: n, autor: this.user.nome });
            db.ref('chamados/'+this.currentTicket+'/status').set('resolvido');
            document.getElementById('active-ticket-area').classList.add('hidden');
            this.currentTicket = null;
        },

        abrirChamado() {
            const t = document.getElementById('chamado-desc').value; if(!t) return;
            db.ref('chamados').push({ u: this.user.nome, pront: this.user.pront, t: t, status: 'aberto' });
            document.getElementById('chamado-desc').value = "";
        },

        carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            sel.innerHTML = ""; lista.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let id = 'card-'+e.replace(/\s/g, '');
                    let content = `<strong>${e}</strong><br><small>${d.status}</small>`;
                    if(document.getElementById(id)) document.getElementById(id).innerHTML = content;
                    else {
                        let div = document.createElement('div'); div.id = id; div.style="padding:10px; background:rgba(255,255,255,0.05); border-radius:8px";
                        div.innerHTML = content; lista.appendChild(div);
                    }
                });
            });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(!sl || !dt) return alert("Preencha!");
            db.ref('reservas').push({ eq, sl, dt, u: this.user.nome });
        },

        baixarReserva(id) { if(confirm("Concluir?")) db.ref('reservas/'+id).remove(); },
        sendChat() {
            const t = document.getElementById('chat-in').value; if(!t) return;
            db.ref('chat').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },
        enviarAviso() { db.ref('aviso_global').set(document.getElementById('input-aviso').value); },
        setLock(v) { db.ref('lock').set(v); },

        initCharts() {
            this.charts.users = new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h','20h'], datasets: [{ label: 'Uso', data: [5, 10, 8, 4], borderColor: '#00adef' }] }, options: { plugins: { legend: false } } });
            this.charts.chamados = new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Abertos'], datasets: [{ data: [0], backgroundColor: '#eb4d4b' }] }, options: { plugins: { legend: false } } });
        },
        updateChart(id, data) { if(this.charts[id]) { this.charts[id].data.datasets[0].data = data; this.charts[id].update(); } }
    };
</script>
</body>
</html>
