<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal NTI - Dashboard Master</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --nti: #eb4d4b; --success: #2ecc71;
            --glass: rgba(10, 12, 18, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* --- ESTILO DOS CARDS (MANTER O QUE VOCÊ TEM) --- */
        .panel { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        /* --- NOVO DASHBOARD DE MONITORAMENTO --- */
        .monitor-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; text-align: center;
            border-bottom: 3px solid var(--prof);
        }
        .stat-box h4 { margin: 0; font-size: 10px; text-transform: uppercase; color: #888; }
        .stat-box div { font-family: 'Orbitron'; font-size: 20px; color: var(--prof); }

        /* --- GRÁFICOS MELHORADOS --- */
        .chart-container { height: 200px; position: relative; }

        /* --- LOGS DE USUÁRIOS --- */
        #user-logs {
            height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 8px; font-size: 11px; font-family: monospace;
        }
        .log-item { border-bottom: 1px solid #222; padding: 3px 0; color: #aaa; }
        .log-item b { color: var(--success); }

        .hidden { display: none !important; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="login-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <div class="panel" style="width: 300px; text-align: center;">
            <h2 style="font-family: 'Orbitron'; color: var(--prof);">NTI ACCESS</h2>
            <input type="number" id="l-p" placeholder="Prontuário" style="width:90%; padding:10px; margin:10px 0;">
            <input type="password" id="l-s" placeholder="Senha" style="width:90%; padding:10px; margin:10px 0;">
            <button class="btn" style="background: var(--prof); color:white;" onclick="app.login()">ENTRAR</button>
        </div>
    </div>

    <div id="main-system" class="hidden" style="padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-family: 'Orbitron'; margin: 0; font-size: 1.5rem;">NTI <span style="color:var(--prof)">DASHBOARD</span></h1>
            <div id="status-tag" style="background: var(--success); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;">SISTEMA ONLINE</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 20px;">
            
            <div>
                <div class="monitor-grid">
                    <div class="stat-box"><h4>Usuários</h4><div id="st-user">0</div></div>
                    <div class="stat-box"><h4>Reservas</h4><div id="st-res">0</div></div>
                    <div class="stat-box"><h4>Chamados</h4><div id="st-cham">0</div></div>
                    <div class="stat-box"><h4>Uptime</h4><div>99.9%</div></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-chart-line"></i> Demanda de Equipamentos</h3>
                    <div class="chart-container">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-history"></i> Atividade dos Usuários (Live)</h3>
                    <div id="user-logs"></div>
                </div>
            </div>

            <div>
                <div class="panel">
                    <h3><i class="fa fa-user-circle"></i> Perfil NTI</h3>
                    <div id="user-info" style="margin-bottom: 15px;"></div>
                    <button class="btn" style="background:#444; color:white;" onclick="location.reload()">SAIR DO PORTAL</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-broadcast-tower"></i> Alerta Global</h3>
                    <input type="text" id="aviso-txt" placeholder="Enviar aviso para todos..." style="width:90%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid #333;">
                    <button class="btn" style="background:var(--nti); color:white;" onclick="app.postAviso()">PUBLICAR AGORA</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-database"></i> Status do Banco</h3>
                    <div style="font-size: 12px; color: #888;">
                        Conexão: <span style="color:var(--success)">Estável</span><br>
                        Região: South America-East 1<br>
                        Versão: 3.5.2-Conect
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        login() {
            const p = document.getElementById('l-p').value;
            const s = document.getElementById('l-s').value;
            if(p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI'};
                this.start();
            } else { alert("Acesso Negado!"); }
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').classList.remove('hidden');
            document.getElementById('user-info').innerHTML = `<b>Operador:</b> ${this.user.nome}`;
            this.initChart();
            this.sync();
        },

        initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Chrome', 'Sala Info', 'TV Touch', 'Kits'],
                    datasets: [{
                        label: 'Reservas Hoje',
                        data: [12, 19, 3, 5],
                        backgroundColor: '#00adef'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } } } }
            });
        },

        sync() {
            // Contadores reais
            db.ref('usuarios').on('value', s => document.getElementById('st-user').innerText = s.numChildren());
            db.ref('reservas').on('value', s => document.getElementById('st-res').innerText = s.numChildren());
            db.ref('chamados').on('value', s => document.getElementById('st-cham').innerText = s.numChildren());

            // Logs de Atividade
            db.ref('logs_monitoramento').limitToLast(10).on('child_added', s => {
                const d = s.val();
                const logBox = document.getElementById('user-logs');
                logBox.innerHTML = `<div class="log-item"><b>${d.u}</b> realizou ação: ${d.m}</div>` + logBox.innerHTML;
            });
        },

        postAviso() {
            const txt = document.getElementById('aviso-txt').value;
            if(txt) {
                db.ref('aviso').set(txt);
                db.ref('logs_monitoramento').push({u: 'NTI', m: 'Postou novo Alerta Global'});
                alert("Aviso enviado!");
            }
        }
    };
</script>
</body>
</html>
