<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECT NTI - FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg: rgba(10, 11, 16, 0.98);
        }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh; background: #0a0b10; }
        
        /* LOGIN COLUMNS */
        .login-screen { display: flex; width: 100%; height: 100vh; position: fixed; z-index: 999; background: var(--bg); }
        .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; border-right: 1px solid #222; transition: 0.3s; }
        .col:hover { background: rgba(255,255,255,0.03); }
        
        h2 { font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px; }
        input, select { width: 90%; padding: 12px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        .btn { width: 90%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        
        .info-box { background: rgba(46, 204, 113, 0.1); border: 1px dashed var(--cad); padding: 10px; font-size: 11px; width: 85%; margin: 10px 0; border-radius: 5px; }
        
        /* MAIN INTERFACE */
        #main { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .c-box { background: #000; padding: 5px; border-radius: 8px; height: 120px; }
        .chat-container { height: 180px; overflow-y: auto; background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .m { padding: 6px 10px; border-radius: 10px; font-size: 11px; max-width: 85%; }
        .m-me { background: #005c4b; align-self: flex-end; }
        .m-other { background: #333; align-self: flex-start; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-screen" id="view-login">
        <div class="col" style="border-top: 5px solid var(--prof)">
            <i class="fa fa-graduation-cap fa-2x" style="color:var(--prof)"></i><h2>PROFESSOR</h2>
            <input type="number" id="l-p-u" placeholder="Prontuário">
            <input type="password" id="l-p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof);color:white" onclick="core.login('l-p', 'Professor')">Entrar</button>
        </div>
        <div class="col" style="border-top: 5px solid var(--gestao)">
            <i class="fa fa-user-tie fa-2x" style="color:var(--gestao)"></i><h2>GESTÃO</h2>
            <input type="number" id="l-g-u" placeholder="Prontuário">
            <input type="password" id="l-g-s" placeholder="Senha">
            <button class="btn" style="background:var(--gestao)" onclick="core.login('l-g', 'Gestão')">Entrar</button>
        </div>
        <div class="col" style="border-top: 5px solid var(--secre)">
            <i class="fa fa-building fa-2x" style="color:var(--secre)"></i><h2>SECRETARIA</h2>
            <input type="number" id="l-s-u" placeholder="Prontuário">
            <input type="password" id="l-s-s" placeholder="Senha">
            <button class="btn" style="background:var(--secre);color:white" onclick="core.login('l-s', 'Secretaria')">Entrar</button>
        </div>
        <div class="col" style="border-top: 5px solid var(--cad)">
            <i class="fa fa-user-plus fa-2x" style="color:var(--cad)"></i><h2>NOVO ACESSO</h2>
            <input type="text" id="reg-n" placeholder="Nome Completo">
            <input type="number" id="reg-p" placeholder="Novo Prontuário">
            <select id="reg-c" onchange="core.updatePassInfo()">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <div class="info-box">Senha Padrão: <b id="pass-label" style="color:var(--cad)">pmspmudar123</b></div>
            <button class="btn" style="background:var(--cad);color:white" onclick="core.register()">Criar Agora</button>
        </div>
        <div class="col" style="border-top: 5px solid var(--nti)">
            <i class="fa fa-terminal fa-2x" style="color:var(--nti)"></i><h2>NTI MASTER</h2>
            <input type="number" id="l-n-u" placeholder="ID NTI">
            <input type="password" id="l-n-s" placeholder="Senha">
            <button class="btn" style="background:var(--nti);color:white" onclick="core.login('l-n', 'NTI')">Acessar Painel</button>
        </div>
    </div>

    <div id="main">
        <div class="grid">
            <div class="card">
                <h3 id="u-name">Usuário</h3>
                <p id="u-cargo" style="font-size:12px; opacity:0.5"></p>
                <hr style="border:0; border-top:1px solid #333">
                
                <div id="user-tools">
                    <h4>Reservas</h4>
                    <select id="res-eq"><option>CHROMEBOOKS</option><option>KIT MULTIMÍDIA</option><option>TV 01</option></select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="core.reservar()">Salvar Reserva</button>
                </div>

                <div id="nti-tools" class="hidden">
                    <h4 style="color:var(--nti)">Admin NTI</h4>
                    <input type="number" id="reset-p" placeholder="Prontuário p/ Reset">
                    <button class="btn" style="background:#444; color:white" onclick="core.reset()">Resetar p/ Padrão</button>
                </div>
                <button class="btn" style="background:transparent; border:1px solid #444; color:#666; margin-top:30px" onclick="location.reload()">Sair do Sistema</button>
            </div>

            <div class="card">
                <h3><i class="fa fa-chart-line"></i> Monitoramento de Rede e Uso</h3>
                <div class="chart-grid">
                    <div class="c-box"><canvas id="c1"></canvas></div>
                    <div class="c-box"><canvas id="c2"></canvas></div>
                    <div class="c-box"><canvas id="c3"></canvas></div>
                    <div class="c-box"><canvas id="c4"></canvas></div>
                </div>
                <h4>Cronograma de Hoje</h4>
                <div id="cron" style="font-size:11px"></div>
            </div>

            <div class="card">
                <h4>Chat Geral</h4>
                <div id="chat-g" class="chat-container"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-g" placeholder="Mensagem...">
                    <button class="btn" style="width:50px; margin:0; background:var(--prof)" onclick="core.send('chat_geral', 'msg-g')"><i class="fa fa-paper-plane"></i></button>
                </div>

                <h4 style="margin-top:20px">Suporte NTI</h4>
                <div id="chat-p" class="chat-container"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-p" placeholder="Falar com NTI...">
                    <button class="btn" style="width:50px; margin:0; background:var(--nti)" onclick="core.sendPrivado()"><i class="fa fa-headset"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const core = {
        user: null, currentChat: 'geral',

        updatePassInfo() {
            const c = document.getElementById('reg-c').value;
            const label = document.getElementById('pass-label');
            if(c === 'Gestão') label.innerText = "pmspgestores2026";
            else if(c === 'Secretaria') label.innerText = "secretaria2026";
            else label.innerText = "pmspmudar123";
        },

        async register() {
            const n = document.getElementById('reg-n').value;
            const p = document.getElementById('reg-p').value;
            const c = document.getElementById('reg-c').value;
            let s = "pmspmudar123";
            if(c === 'Gestão') s = "pmspgestores2026";
            if(c === 'Secretaria') s = "secretaria2026";

            if(!n || !p) return alert("Preencha tudo!");
            
            await db.ref('usuarios/' + p).set({ nome: n, pront: p, cargo: c, pass: s });
            alert("Sucesso! Prontuário: " + p + " | Senha: " + s);
        },

        async login(prefix, cargo) {
            const u = document.getElementById(prefix + '-u').value;
            const s = document.getElementById(prefix + '-s').value;

            // Login NTI Master Direto
            if(cargo === 'NTI' && u === '46690' && s === 'nti2026') {
                this.user = { nome: 'Kelvin', cargo: 'NTI', pront: '46690' };
                return this.init();
            }

            const snap = await db.ref('usuarios/' + u).once('value');
            if(snap.exists()) {
                const data = snap.val();
                if(data.pass.toString() === s.toString()) {
                    this.user = data;
                    this.init();
                } else { alert("Senha incorreta!"); }
            } else { alert("Usuário não encontrado!"); }
        },

        init() {
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('u-name').innerText = "Olá, " + this.user.nome;
            document.getElementById('u-cargo').innerText = this.user.cargo;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-tools').classList.remove('hidden');
                document.getElementById('user-tools').classList.add('hidden');
            }
            this.sync();
            this.charts();
        },

        sync() {
            // Chat Geral
            db.ref('chat_geral').limitToLast(15).on('value', s => {
                const box = document.getElementById('chat-g'); box.innerHTML = "";
                s.forEach(m => {
                    const cls = m.val().u === this.user.nome ? 'm-me' : 'm-other';
                    box.innerHTML += `<div class="m ${cls}"><b>${m.val().u}:</b> ${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            // Reservas
            db.ref('reservas').on('value', s => {
                const c = document.getElementById('cron'); c.innerHTML = "";
                s.forEach(r => c.innerHTML += `<div style="padding:4px;border-bottom:1px solid #222">${r.val().dt} - ${r.val().eq} (${r.val().u})</div>`);
            });
        },

        send(path, inputId) {
            const t = document.getElementById(inputId).value;
            if(!t) return;
            db.ref(path).push({ u: this.user.nome, t: t });
            document.getElementById(inputId).value = "";
        },

        sendPrivado() {
            const t = document.getElementById('msg-p').value;
            if(!t) return;
            db.ref('chat_nti').push({ u: this.user.nome, t: t });
            document.getElementById('msg-p').value = "";
        },

        reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Escolha a data!");
            db.ref('reservas').push({ u: this.user.nome, eq: eq, dt: dt.replace('T',' ') });
        },

        reset() {
            const p = document.getElementById('reset-p').value;
            db.ref('usuarios/' + p).update({ pass: 'pmspmudar123' }).then(() => alert("Senha Resetada!"));
        },

        charts() {
            const ctx = (id) => document.getElementById(id).getContext('2d');
            const cfg = (color) => ({ type:'line', data:{labels:['','','',''], datasets:[{data:[Math.random()*10,20,10,40], borderColor:color, borderWidth:2}]}, options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}} });
            new Chart(ctx('c1'), cfg('#00adef'));
            new Chart(ctx('c2'), cfg('#eb4d4b'));
            new Chart(ctx('c3'), cfg('#f1c40f'));
            new Chart(ctx('c4'), cfg('#2ecc71'));
        }
    };
</script>
</body>
</html>
