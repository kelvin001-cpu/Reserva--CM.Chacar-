<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --glass: rgba(10, 11, 16, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Banner Original */
        .conect-banner { width: 100%; text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        /* Login Container (Igual ao que você gosta) */
        .login-container { display: flex; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); position: fixed; z-index: 1000; }
        .sector-column { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sector-column:hover { background: rgba(255,255,255,0.05); flex: 1.2; }

        /* Layout de 3 Colunas Principais */
        #main-system { display: none; padding: 20px; box-sizing: border-box; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); height: fit-content; }

        /* Estilo NTI de 5 Colunas (O seu favorito) */
        .nti-sub-grid { display: flex; gap: 10px; margin-top: 15px; height: 400px; }
        .nti-col { flex: 1; background: rgba(0,0,0,0.5); border-top: 3px solid var(--nti); border-radius: 8px; padding: 10px; font-size: 11px; overflow-y: auto; }
        .nti-col h4 { font-family: 'Orbitron'; color: var(--nti); font-size: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(235,77,75,0.2); }

        /* Chat Estilo Profissional */
        #chat-box, #chat-privado { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px; border-radius: 8px; font-size: 12px; max-width: 85%; }
        .msg-in { background: #333; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        /* Botões e Inputs */
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: white; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; }

        /* Tabs do NTI */
        .nti-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px; background: #222; border: 1px solid var(--nti); color: white; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 9px; }
        .tab-btn.active { background: var(--nti); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="login-container" id="login-screen">
    <div class="sector-column" style="border-top: 5px solid var(--prof)">
        <i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2>
        <input type="number" id="p-p" placeholder="Prontuário">
        <input type="password" id="p-s" placeholder="Senha">
        <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button>
    </div>
    <div class="sector-column" style="border-top: 5px solid var(--nti)">
        <i class="fa fa-terminal fa-3x"></i><h2>NTI</h2>
        <input type="number" id="n-p" placeholder="ID">
        <input type="password" id="n-s" placeholder="Senha">
        <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel Master</button>
    </div>
</div>

<div id="main-system">
    <div class="conect-banner"><h1>PROGRAMA CONECT</h1></div>

    <div class="grid-layout">
        <div class="panel">
            <h3 id="u-name">---</h3>
            <div id="user-tools">
                <h4>Reservas</h4>
                <select id="res-eq"><option>CHROMEBOOKS</option><option>SALA INFO</option><option>TV TOUCH</option></select>
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Reservar Agora</button>
                <hr style="opacity:0.1; margin:15px 0">
                <h4>Chamado NTI</h4>
                <select id="ch-prio"><option value="low">Baixa (Dúvida)</option><option value="med">Média (Reparo)</option><option value="high">ALTA (Parado)</option></select>
                <input type="text" id="ch-desc" placeholder="O que aconteceu?">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Chamado</button>
            </div>
            
            <div id="nti-tools" class="hidden">
                <h4 style="color:var(--nti)">Master Admin</h4>
                <input type="number" id="reset-id" placeholder="ID para Reset">
                <button class="btn" style="background:#444" onclick="app.resetPass()">Resetar Senha</button>
                <button class="btn" style="background:red; margin-top:5px" onclick="app.setLock(true)">TRAVAR SISTEMA</button>
            </div>
        </div>

        <div id="center-panel">
            <div id="nti-header" class="nti-tabs hidden">
                <button class="tab-btn active" onclick="app.showTab('cols')">COLUNAS LIVE</button>
                <button class="tab-btn" onclick="app.showTab('dash')">DASHBOARD PRO</button>
            </div>

            <div id="tab-cols" class="nti-sub-grid">
                <div class="nti-col"><h4>1. ONLINE</h4><div id="list-on"></div></div>
                <div class="nti-col"><h4>2. TRÁFEGO</h4><canvas id="miniChart"></canvas></div>
                <div class="nti-col"><h4>3. TERMINAL</h4><div id="term-logs" style="font-family:monospace; color:#0f0"></div></div>
                <div class="nti-col"><h4>4. DATABASE</h4><div id="db-status" style="color:var(--cad)">FIREBASE: OK<br>PING: 12ms</div></div>
                <div class="nti-col"><h4>5. EQUIP.</h4><div id="equip-status">CHROME: 40/40<br>SALA: ONLINE</div></div>
            </div>

            <div id="tab-dash" class="panel hidden" style="height:400px">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; height:100%">
                    <canvas id="proChart1"></canvas>
                    <canvas id="proChart2"></canvas>
                </div>
            </div>
        </div>

        <div class="panel">
            <h4>Chamados Ativos</h4>
            <div id="list-ch" style="font-size:10px; margin-bottom:10px; max-height:100px; overflow-y:auto"></div>
            
            <h4 id="chat-title">Chat Geral</h4>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px">
                <input type="text" id="chat-in" placeholder="Mensagem...">
                <button onclick="app.sendChat()" class="btn" style="width:45px; background:var(--prof)"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        activeChat: 'geral',

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === s) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado.");
        },

        start() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('u-name').innerText = "👤 " + this.user.nome;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-header').classList.remove('hidden');
                document.getElementById('nti-tools').classList.remove('hidden');
                this.initNtiTools();
            }
            this.sync();
        },

        showTab(t) {
            document.getElementById('tab-cols').classList.add('hidden');
            document.getElementById('tab-dash').classList.add('hidden');
            document.getElementById('tab-'+t).classList.remove('hidden');
        },

        sync() {
            // Presença
            db.ref('online/'+this.user.pront).set({nome: this.user.nome});
            db.ref('online/'+this.user.pront).onDisconnect().remove();
            db.ref('online').on('value', s => {
                const list = document.getElementById('list-on'); if(list) { list.innerHTML = ""; s.forEach(u => list.innerHTML += `● ${u.val().nome}<br>`); }
            });

            // Chat Geral
            db.ref('chat_geral').limitToLast(15).on('value', s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                s.forEach(m => {
                    const side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Chamados
            db.ref('chamados').on('value', s => {
                const list = document.getElementById('list-ch'); list.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div style="padding:4px; border-bottom:1px solid #333; cursor:pointer" onclick="app.openPrivateChat('${c.key}')">
                        ${d.u}: ${d.t} [${d.prio}]
                    </div>`;
                });
            });
        },

        openPrivateChat(id) {
            this.activeChat = id;
            document.getElementById('chat-title').innerText = "Privado: " + id;
            // Lógica para trocar o listener do chat-box para chats_privados/id
        },

        abrirChamado() {
            const t = document.getElementById('ch-desc').value;
            const p = document.getElementById('ch-prio').value;
            if(t) db.ref('chamados').push({u: this.user.nome, t: t, prio: p, status: 'aberto'});
        },

        initNtiTools() {
            setInterval(() => {
                const logs = document.getElementById('term-logs');
                const line = ["> UPDATING...", "> DB_LISTEN", "> PING_8ms", "> CACHE_OK"];
                if(logs) { logs.innerHTML += line[Math.floor(Math.random()*4)] + "<br>"; if(logs.innerText.length > 250) logs.innerHTML = ""; }
            }, 3000);
            
            // Gráficos Pro
            new Chart(document.getElementById('miniChart'), { type: 'line', data: { labels: ['','','',''], datasets: [{ data: [10, 50, 30, 90], borderColor: '#eb4d4b', borderWidth: 1 }] }, options: { plugins: { legend: false } } });
        }
    };
</script>
</body>
</html>
