<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b; --bg: rgba(10, 11, 16, 0.95); }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed; background-size: cover; }
        .login-container { display: flex; width: 100%; min-height: 100vh; background: var(--bg); backdrop-filter: blur(10px); }
        .sector-column { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        #main-system { display: none; padding: 80px 20px; background: var(--bg); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        .panel { background: rgba(22, 27, 34, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.5); color: white; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        
        /* Mapeamento Cinema */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px; margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .seat { aspect-ratio: 1; background: #2ecc71; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .seat.selected { background: var(--prof); transform: scale(1.1); border: 2px solid white; }
        .seat.off { background: #555; cursor: not-allowed; }

        #alert-ribbon { background: var(--nti); padding: 12px; text-align: center; position: fixed; top: 0; width: 100%; z-index: 1000; display: none; font-weight: bold; }
        #force-password-change { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO NTI: <span id="alert-text"></span></div>

    <div id="force-password-change">
        <div class="panel" style="width: 350px; text-align: center; border: 2px solid var(--nti)">
            <h2 style="color: var(--nti)">ALTERAR SENHA</h2>
            <p>Sua senha é padrão. Crie uma nova:</p>
            <input type="password" id="new-secure-pass" placeholder="Nova Senha">
            <button class="btn" style="background: var(--cad)" onclick="app.updatePass()">SALVAR</button>
        </div>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column"><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof)" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column"><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column"><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti)" onclick="app.login('n','NTI')">Master</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-alt"></i> RESERVA</h3>
                    <select id="res-eq" onchange="app.renderMap()"></select>
                    <div id="manut-info" style="color: var(--nti); font-size: 12px; margin: 5px 0;"></div>
                    <input type="text" id="res-sl" placeholder="Nº da Sala">
                    <input type="datetime-local" id="res-dt">
                    <div id="map-container"></div>
                    <button id="btn-reserva" class="btn" style="background:var(--prof)" onclick="app.reservar()">Confirmar</button>
                </div>
                
                <div id="nti-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)">NTI MASTER</h3>
                    <input type="text" id="aviso-input" placeholder="Banner de Aviso">
                    <button class="btn" style="background:var(--nti)" onclick="app.setAviso()">Postar Aviso</button>
                    <hr>
                    <h4>Buscar Histórico (IP/Prontuário)</h4>
                    <input type="text" id="search-input" placeholder="Digite o prontuário..." oninput="app.searchLogs()">
                    <div id="log-results" style="max-height: 150px; overflow-y: auto; font-size: 11px;"></div>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3>Status dos Equipamentos</h3>
                    <div id="equip-cards" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                </div>
                <div class="panel">
                    <h3>Cronograma</h3>
                    <div id="lista-res"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3>Mural</h3>
                    <div id="chat-box" style="height: 300px; overflow-y: auto;"></div>
                    <div style="display: flex; gap: 5px; margin-top: 10px;">
                        <input type="text" id="chat-in" placeholder="Mensagem...">
                        <button class="btn" style="width: 50px; background: var(--prof)" onclick="app.sendMural()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <button class="btn" style="background: #444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        selectedSeat: null,
        equipStatuses: {},

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') {
                this.user = {nome: 'NTI Master', cargo: 'NTI', pront: '46690'};
                return this.start();
            }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) {
                this.user = snap.val();
                if(['pmspmudar123', 'pmspgestores2026'].includes(s)) {
                    document.getElementById('force-password-change').style.display = 'flex';
                } else { this.start(); }
            } else alert("Erro de login");
        },

        updatePass() {
            const nv = document.getElementById('new-secure-pass').value;
            if(nv.length < 6) return alert("Mínimo 6 caracteres");
            db.ref('usuarios/'+this.user.pront+'/pass').set(nv).then(() => location.reload());
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
            
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                db.ref('logs').push({u: this.user.pront, n: this.user.nome, ip: d.ip, time: Date.now()});
            });

            this.sync();
        },

        sync() {
            // Status dos Equipamentos (O que você viu no print)
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq'); sel.innerHTML = "";
            
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equip_status/'+e).on('value', snap => {
                    const status = snap.val() || {state: 'ATIVO', motivo: ''};
                    this.equipStatuses[e] = status;
                    this.renderEquipCards();
                    if(document.getElementById('res-eq').value === e) this.renderMap();
                });
            });

            // Mural
            db.ref('mural').limitToLast(15).on('value', s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                s.forEach(m => { box.innerHTML += `<div><b>${m.val().u}:</b> ${m.val().t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });

            // Banner e Trava
            db.ref('config/aviso').on('value', s => {
                document.getElementById('alert-ribbon').style.display = s.val() ? 'block' : 'none';
                document.getElementById('alert-text').innerText = s.val();
            });

            // Lista Reservas
            db.ref('reservas').on('value', s => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                s.forEach(r => {
                    box.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333">${r.val().dt.split('T')[1]} - ${r.val().eq} (${r.val().seat}) - ${r.val().u}</div>`;
                });
            });
        },

        renderEquipCards() {
            const container = document.getElementById('equip-cards'); container.innerHTML = "";
            for(let e in this.equipStatuses) {
                const s = this.equipStatuses[e];
                container.innerHTML += `
                    <div class="panel" style="padding:10px; margin:0">
                        <b>${e}</b><br>
                        <span style="color:${s.state === 'ATIVO' ? '#2ecc71' : '#eb4d4b'}">${s.state}</span>
                        ${this.user.cargo === 'NTI' ? `<br><button class="btn" style="padding:4px; font-size:10px; background:#555; width:auto" onclick="app.toggleEquip('${e}')">ALTERAR</button>` : ''}
                    </div>`;
            }
        },

        toggleEquip(e) {
            const novoEstado = confirm(`Deseja colocar ${e} em MANUTENÇÃO?`) ? 'MANUTENÇÃO' : 'ATIVO';
            let motivo = "";
            if(novoEstado === 'MANUTENÇÃO') motivo = prompt("Motivo da manutenção:");
            db.ref('equip_status/'+e).set({state: novoEstado, motivo: motivo || ''});
        },

        renderMap() {
            const eq = document.getElementById('res-eq').value;
            const info = this.equipStatuses[eq];
            const container = document.getElementById('map-container');
            const btn = document.getElementById('btn-reserva');
            const manutTxt = document.getElementById('manut-info');
            
            container.innerHTML = "";
            this.selectedSeat = null;

            if(info && info.state === 'MANUTENÇÃO') {
                manutTxt.innerText = "🛑 EM MANUTENÇÃO: " + info.motivo;
                btn.disabled = true;
                btn.style.opacity = "0.3";
                return;
            } else {
                manutTxt.innerText = "";
                btn.disabled = false;
                btn.style.opacity = "1";
            }

            if(['Sala Info', 'Chromebooks'].includes(eq)) {
                const total = eq === 'Sala Info' ? 33 : 39;
                container.innerHTML = `<div class="map-grid"></div>`;
                const grid = container.querySelector('.map-grid');
                for(let i=1; i<=total; i++) {
                    const seat = document.createElement('div');
                    seat.className = 'seat'; seat.innerText = i;
                    seat.onclick = () => {
                        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                        seat.classList.add('selected');
                        this.selectedSeat = i;
                    };
                    grid.appendChild(seat);
                }
            }
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(!dt || !sl) return alert("Preencha tudo");
            db.ref('reservas').push({eq, sl, dt, seat: this.selectedSeat || 'Geral', u: this.user.nome});
            alert("Sucesso!");
        },

        searchLogs() {
            const q = document.getElementById('search-input').value;
            if(!q) return;
            db.ref('logs').on('value', s => {
                const res = document.getElementById('log-results'); res.innerHTML = "";
                s.forEach(l => {
                    const d = l.val();
                    if(d.u.includes(q) || d.ip.includes(q)) {
                        res.innerHTML += `<div>${new Date(d.time).toLocaleDateString()} - ${d.n} (${d.ip})</div>`;
                    }
                });
            });
        },

        setAviso() { db.ref('config/aviso').set(document.getElementById('aviso-input').value); },
        sendMural() { const t = document.getElementById('chat-in').value; if(t) db.ref('mural').push({u: this.user.nome, t}); document.getElementById('chat-in').value=""; }
    };
</script>
</body>
</html>
