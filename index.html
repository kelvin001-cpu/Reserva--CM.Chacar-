<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* MANTENDO 100% DO SEU DESIGN ORIGINAL */
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }
        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Estilos Novos para o Mapa de Cadeiras e Modais */
        .cinema-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 15px 0; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; }
        .seat { aspect-ratio: 1; font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .seat.disponivel { background: var(--cad); color: #000; }
        .seat.reservado { background: var(--prof); color: #fff; }
        .seat.manutencao { background: var(--nti); color: #fff; cursor: not-allowed; }
        
        #modal-perfil { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 99999; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Resto dos seus estilos originais... */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .panel { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        #main-system { display: none; padding: 40px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
    </style>
</head>
<body>

    <div id="modal-perfil">
        <div class="panel animate__animated animate__zoomIn" style="width: 350px; text-align: center;">
            <h3 style="color: var(--prof)">FOTO OBRIGATÓRIA</h3>
            <p style="font-size: 13px;">Detectamos que você não possui foto de perfil. Envie agora para identificação.</p>
            <div id="preview-foto" style="width:100px; height:100px; border-radius:50%; background:#333; margin: 15px auto;"></div>
            <input type="file" id="up-foto" hidden onchange="app.preview(this)">
            <button class="btn" style="background:var(--gestao)" onclick="document.getElementById('up-foto').click()">Escolher Foto</button>
            <button class="btn" style="background:var(--cad); margin-top:10px" onclick="app.salvarFoto()">Salvar Perfil</button>
        </div>
    </div>

    <div class="login-container" id="login-screen">
        <div style="width:100%; text-align:center; padding: 20px;">
            <h1 style="font-family: Orbitron; color: var(--prof);">PROGRAMA CONECT</h1>
            <p>Construindo uma Geração de Vencedores</p>
        </div>
        <div class="sector-column"><h2>PROFESSOR</h2><input type="number" id="p-p"><input type="password" id="p-s"><button class="btn" style="background:var(--prof)" onclick="app.login('p')">Acessar</button></div>
        <div class="sector-column" style="background:rgba(46,204,113,0.05)">
            <h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome">
            <input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-uni"><option value="unica">Apenas nesta unidade</option><option value="multipla">Em mais de uma unidade</option></select>
            <button class="btn" style="background:var(--cad)" onclick="app.confirmarCad()">Criar Conta</button>
        </div>
        <div class="sector-column"><h2>NTI</h2><input type="number" id="n-p"><input type="password" id="n-s"><button class="btn" style="background:var(--nti)" onclick="app.login('n')">Master</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Nova Reserva</h3>
                    <select id="res-eq" onchange="app.toggleMapa(this.value)">
                        <option value="Chromebook">Chromebook</option>
                        <option value="Sala Info">Sala de Informática (DELL)</option>
                    </select>
                    
                    <div id="area-mapa" style="display:none">
                        <p style="font-size:11px; color:var(--prof)">Selecione a Cadeira:</p>
                        <div id="mapa-cadeiras" class="cinema-grid"></div>
                    </div>

                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Confirmar</button>
                </div>
                
                <div id="panel-hist" class="panel hidden">
                    <h3><i class="fa fa-history"></i> Histórico de Usuários</h3>
                    <input type="number" id="search-hist" placeholder="Buscar Prontuário">
                    <button class="btn" style="background:var(--nti)" onclick="app.buscarHistorico()">Pesquisar</button>
                    <div id="hist-list" style="max-height: 200px; overflow-y:auto; font-size:11px; margin-top:10px"></div>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3><i class="fa fa-chart-line"></i> Telemetria NTI</h3>
                    <canvas id="chartNav" height="150"></canvas>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-list"></i> Cronograma</h3>
                    <div id="lista-res"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-user"></i> Meu Perfil</h3>
                    <div id="user-info" style="text-align:center">
                        <img id="user-img" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--prof)">
                        <p id="user-mail" style="font-size:10px; color:#aaa;"></p>
                    </div>
                </div>
                <button class="btn" style="background:#555" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    // Configurações do Firebase
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        cadeiraSelecionada: null,

        // ITEM 1: Histórico de Navegação
        log(acao) {
            db.ref('historico_navegacao').push({
                prontuario: this.user.pront,
                nome: this.user.nome,
                acao: acao,
                data: new Date().toLocaleString(),
                ip: "Registrado"
            });
        },

        // ITEM 2: Prevenção de Conflito
        async reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            const chave = `${eq}_${dt}_${this.cadeiraSelecionada || 'GERAL'}`;

            // Checar se já existe
            const snap = await db.ref('reservas').orderByChild('chave').equalTo(chave).once('value');
            if(snap.exists()){
                const dono = Object.values(snap.val())[0].u;
                return alert(`Equipamento já reservado por ${dono} neste horário!`);
            }

            db.ref('reservas').push({
                eq, dt, u: this.user.nome, pront: this.user.pront, 
                cadeira: this.cadeiraSelecionada || "N/A",
                chave: chave
            });
            this.log(`Reserva criada: ${eq}`);
            alert("Reserva confirmada!");
        },

        // ITEM 3: Email Automático
        gerarEmail(nome, pront) {
            let primNome = nome.split(' ')[0].toLowerCase();
            return `${primNome}.${pront}@edu.santanadeparnaiba.sp.gov.br`;
        },

        // ITEM 6: Mapeamento Dell (33 unidades)
        renderizarMapa() {
            const grid = document.getElementById('mapa-cadeiras');
            grid.innerHTML = "";
            for(let i=1; i<=33; i++) {
                const seat = document.createElement('div');
                seat.className = "seat disponivel";
                seat.innerText = i;
                seat.onclick = () => {
                    document.querySelectorAll('.seat').forEach(s => s.style.border="none");
                    seat.style.border = "2px solid white";
                    this.cadeiraSelecionada = i;
                };
                grid.appendChild(seat);
            }
        },

        login(pre) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            
            db.ref('usuarios/'+p).once('value', snap => {
                if(snap.exists() && snap.val().pass == s) {
                    this.user = snap.val();
                    this.user.email = this.gerarEmail(this.user.nome, p);
                    this.start();
                } else { alert("Acesso Negado!"); }
            });
        },

        start() {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('main-system').style.display='block';
            
            // Checar Foto Obrigatória (ITEM 4)
            if(!this.user.foto) {
                document.getElementById('modal-perfil').style.display='flex';
            }

            // Interface do Usuário
            document.getElementById('user-img').src = this.user.foto || 'https://via.placeholder.com/60';
            document.getElementById('user-mail').innerText = this.user.email;

            if(this.user.cargo === 'NTI') {
                document.getElementById('panel-hist').classList.remove('hidden');
                this.initCharts();
            }
            
            this.log("Entrou no sistema");
            this.renderizarMapa();
        },

        toggleMapa(val) {
            document.getElementById('area-mapa').style.display = (val === "Sala Info") ? "block" : "none";
        }
    };
</script>
</body>
</html>
