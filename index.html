<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v2.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* TELA DE LOGIN EM COLUNAS (O ESTILO QUE VOCÊ CURTE) */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 40px; transition: 0.5s; 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        
        .sector-column:hover { flex: 1.5; background: rgba(255,255,255,0.03); }
        
        .sector-column i { font-size: 50px; margin-bottom: 20px; }
        .sector-column h2 { font-family: 'Orbitron'; margin-bottom: 20px; letter-spacing: 2px; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; font-family: inherit;
        }

        .btn { 
            padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase;
        }

        /* PAINEL INTERNO (SISTEMA APÓS LOGIN) */
        #main-system { padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 2px solid var(--prof); margin-bottom: 20px;
        }

        .grid-layout { display: grid; grid-template-columns: 320px 1fr 350px; gap: 20px; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* COMPONENTES NOVOS */
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border-bottom: 3px solid var(--prof); text-align: center; }
        .stat-card h2 { font-family: 'Orbitron'; font-size: 1.8rem; margin: 5px 0; }

        .chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin: 10px 0; }
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.4; }
        .msg-nti { background: rgba(235, 77, 75, 0.2); border-left: 4px solid var(--nti); }
        .msg-user { background: rgba(0, 173, 239, 0.1); border-left: 4px solid var(--prof); }

        .ticket { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--nti); position: relative; }
        .sev-critica { animation: pulse 2s infinite; border-left-color: #ff0000; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="sector-column" style="border-top: 5px solid var(--prof);">
            <i class="fa fa-graduation-cap" style="color:var(--prof)"></i>
            <h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>

        <div class="sector-column" style="border-top: 5px solid var(--gestao);">
            <i class="fa fa-user-tie" style="color:var(--gestao)"></i>
            <h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário">
            <input type="password" id="g-s" placeholder="Senha">
            <button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>

        <div class="sector-column" style="border-top: 5px solid var(--secre);">
            <i class="fa fa-building-columns" style="color:var(--secre)"></i>
            <h2>SECRETARIA</h2>
            <input type="number" id="s-p" placeholder="Prontuário">
            <input type="password" id="s-s" placeholder="Senha">
            <button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>

        <div class="sector-column" style="border-top: 5px solid var(--nti);">
            <i class="fa fa-terminal" style="color:var(--nti)"></i>
            <h2>NTI MASTER</h2>
            <input type="number" id="n-p" placeholder="ID NTI">
            <input type="password" id="n-s" placeholder="Senha">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Acesso Master</button>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <div class="top-nav">
            <div><b style="font-family:'Orbitron'; color:var(--prof)">CONECT v2.5</b> | <span id="user-info"></span></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #555; color:white; padding:5px 15px; border-radius:5px; cursor:pointer">SAIR</button>
        </div>

        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-bars"></i> Menu</h3>
                
                <div id="area-nti" class="hidden">
                    <h4 style="color:var(--nti)">Controle Master</h4>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.toggleLock()">BLOQUEIO GLOBAL</button>
                    <hr style="opacity:0.1">
                </div>

                <h4>Reservar</h4>
                <select id="res-equip">
                    <option>TV 01</option><option>TV 02</option>
                    <option>CHROMEBOOKS</option><option>SALA INFO</option>
                </select>
                <input type="datetime-local" id="res-data">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar Reserva</button>

                <h4 style="margin-top:20px">Chamado NTI</h4>
                <select id="cha-grav">
                    <option value="baixa">Baixa</option>
                    <option value="media">Média</option>
                    <option value="critica">CRÍTICA (URGENTE)</option>
                </select>
                <textarea id="cha-txt" placeholder="Descreva o problema..." rows="3"></textarea>
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Enviar Suporte</button>
            </div>

            <div class="panel">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px">
                    <div class="stat-card"><span>EQUIP. EM USO</span><h2 id="num-uso">0</h2></div>
                    <div class="stat-card" style="border-color:var(--nti)"><span>CHAMADOS</span><h2 id="num-cha">0</h2></div>
                </div>

                <h3><i class="fa fa-chart-line"></i> Fluxo de Uso</h3>
                <canvas id="meuGrafico" height="120"></canvas>

                <h3 style="margin-top:20px"><i class="fa fa-clock"></i> Cronograma</h3>
                <div id="lista-cronograma"></div>
            </div>

            <div class="panel">
                <div style="display:flex; gap:5px; margin-bottom:10px">
                    <button class="btn" id="btn-geral" style="font-size:10px; background:var(--prof); color:white" onclick="app.setChat('geral')">GERAL</button>
                    <button class="btn" id="btn-nti" style="font-size:10px; background:#333; color:white" onclick="app.setChat('nti')">SUPORTE NTI</button>
                </div>
                <div id="chat-box" class="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-input" placeholder="Mensagem...">
                    <button onclick="app.enviarMsg()" style="width:50px; background:var(--prof); border:none; border-radius:8px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>

                <h3 style="margin-top:20px"><i class="fa fa-ticket"></i> Chamados Ativos</h3>
                <div id="lista-chamados"></div>
            </div>
        </div>
    </div>

    <div id="modal-feedback" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center">
        <div class="panel" style="width:300px; text-align:center">
            <h4>Avalie o suporte NTI</h4>
            <div style="font-size:30px; color:var(--gestao); margin:20px 0; cursor:pointer">
                <i class="fa fa-star" onclick="app.votar()"></i><i class="fa fa-star" onclick="app.votar()"></i><i class="fa fa-star" onclick="app.votar()"></i><i class="fa fa-star" onclick="app.votar()"></i><i class="fa fa-star" onclick="app.votar()"></i>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        currentChat: 'geral',

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            if(cargo === 'NTI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin Master', cargo: 'NTI', pront: p};
            } else {
                const snap = await db.ref('usuarios/'+p).once('value');
                if(snap.exists() && snap.val().pass === s) {
                    this.user = snap.val();
                } else { return alert("Dados incorretos!"); }
            }
            this.iniciar();
        },

        iniciar() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').classList.remove('hidden');
            document.getElementById('user-info').innerText = this.user.nome + " (" + this.user.cargo + ")";
            
            if(this.user.cargo === 'NTI') document.getElementById('area-nti').classList.remove('hidden');
            
            this.initGrafico();
            this.observarDados();
        },

        initGrafico() {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: ['08h','10h','12h','14h','16h','18h'], datasets: [{ label: 'Uso', data: [3, 10, 15, 8, 20, 4], borderColor: '#00adef', fill: true, backgroundColor: 'rgba(0,173,239,0.1)' }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
            });
        },

        observarDados() {
            // Sincronizar Reservas
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-cronograma');
                list.innerHTML = ""; let i = 0;
                snap.forEach(r => {
                    const d = r.val(); i++;
                    list.innerHTML += `<div class="ticket" style="border-left-color:var(--prof)"><b>${d.equip}</b><br><small>${d.user} - ${new Date(d.data).toLocaleString()}</small></div>`;
                });
                document.getElementById('num-uso').innerText = i;
            });

            // Sincronizar Chamados
            db.ref('chamados').on('value', snap => {
                const list = document.getElementById('lista-chamados');
                list.innerHTML = ""; let i = 0;
                snap.forEach(c => {
                    const d = c.val(); i++;
                    const critico = d.grav === 'critica' ? 'sev-critica' : '';
                    list.innerHTML += `<div class="ticket ${critico}"><b>[${d.grav.toUpperCase()}]</b> ${d.txt}<br><small>Por: ${d.user}</small></div>`;
                });
                document.getElementById('num-cha').innerText = i;
            });

            // Sincronizar Chat
            db.ref('chats/'+this.currentChat).limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const cls = d.cargo === 'NTI' ? 'msg-nti' : 'msg-user';
                    box.innerHTML += `<div class="msg ${cls}"><b>${d.nome}:</b><br>${d.txt}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        reservar() {
            const equip = document.getElementById('res-equip').value;
            const data = document.getElementById('res-data').value;
            if(!data) return alert("Escolha a data!");
            db.ref('reservas').push({ equip, data, user: this.user.nome });
        },

        abrirChamado() {
            const grav = document.getElementById('cha-grav').value;
            const txt = document.getElementById('cha-txt').value;
            if(!txt) return;
            db.ref('chamados').push({ grav, txt, user: this.user.nome });
            this.setChat('nti');
        },

        setChat(t) {
            this.currentChat = t;
            document.getElementById('btn-geral').style.background = t === 'geral' ? 'var(--prof)' : '#333';
            document.getElementById('btn-nti').style.background = t === 'nti' ? 'var(--nti)' : '#333';
            this.observarDados();
        },

        enviarMsg() {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            db.ref('chats/'+this.currentChat).push({ nome: this.user.nome, cargo: this.user.cargo, txt: txt });
            document.getElementById('chat-input').value = "";
        },

        votar() {
            alert("Obrigado!");
            document.getElementById('modal-feedback').classList.add('hidden');
        }
    };
</script>
</body>
</html>
