<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conect NTI - Versão Pro 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS PRESERVANDO O DESIGN DAS IMAGENS */
        :root { --blue: #00adef; --red: #ff4d4d; --green: #2ecc71; --yellow: #f1c40f; --bg: #0d1117; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .dashboard { display: grid; grid-template-columns: 300px 1fr 350px; gap: 15px; padding: 20px; }
        .panel { background: #161b22; border-radius: 12px; padding: 15px; border: 1px solid #30363d; position: relative; }
        .panel h3 { font-size: 14px; text-transform: uppercase; margin-bottom: 15px; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* Mapeamento Cinema */
        .grid-cinema { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
        .seat { font-size: 9px; padding: 5px; border: 1px solid #444; text-align: center; border-radius: 4px; cursor: pointer; }
        .seat.ativo { background: var(--green); color: black; }
        .seat.manutencao { background: var(--red); color: white; }
        
        /* Gráficos Estilo Imagem */
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; }

        /* Inputs Estilo Imagem */
        input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .btn-confirm { background: var(--blue); color: black; font-weight: bold; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }

        /* Monitoramento NTI */
        #nti-monitor { height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; background: black; padding: 10px; border: 1px solid var(--red); color: #0f0; }
    </style>
</head>
<body>

<div id="app">
    <div class="dashboard">
        
        <div class="side-col">
            <div class="panel">
                <h3><i class="fa fa-calendar"></i> Nova Reserva</h3>
                <select id="eq-select" onchange="app.gerarMapeamento()">
                    <option value="TV 01">TV 01</option>
                    <option value="TV 02">TV 02</option>
                    <option value="Chromebooks">Chromebooks (39 Unids)</option>
                    <option value="Sala Info">Sala Info (DELL)</option>
                </select>
                <input type="text" id="sala-num" placeholder="Número da Sala">
                <input type="datetime-local" id="data-res">
                
                <div id="area-mapeamento" class="grid-cinema"></div>
                
                <button class="btn-confirm" onclick="app.confirmarReserva()" id="btn-res">CONFIRMAR AGENDAMENTO</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-headset"></i> Suporte Técnico</h3>
                <select id="prioridade"><option>Baixa</option><option>Alta</option></select>
                <input type="text" id="problema" placeholder="Qual o problema?">
                <button class="btn-red" onclick="app.solicitarSuporte()">SOLICITAR TÉCNICO</button>
                <div id="chat-nti" style="margin-top:10px; height: 100px; background: #000; font-size: 11px;">Chat Direto NTI...</div>
            </div>
        </div>

        <div class="main-col">
            <div class="panel">
                <h3><i class="fa fa-microchip"></i> Telemetria de Sistema NTI/Gestão</h3>
                <div class="charts-container">
                    <div class="chart-box"><canvas id="chartAcessos"></canvas></div>
                    <div class="chart-box"><canvas id="chartChamados"></canvas></div>
                    <div class="chart-box"><canvas id="chartUso"></canvas></div>
                    <div class="chart-box"><canvas id="chartSaude"></canvas></div>
                </div>
            </div>

            <div class="panel" style="margin-top:15px">
                <h3><i class="fa fa-list"></i> Cronograma de Uso</h3>
                <div id="lista-reservas"></div>
            </div>
        </div>

        <div class="side-col">
            <div class="panel">
                <h3><i class="fa fa-comments"></i> Mural de Avisos</h3>
                <div id="mural-box" style="height: 250px; overflow-y: auto;"></div>
                <input type="text" id="msg-mural" placeholder="Escreva no mural...">
            </div>

            <div id="master-panel" class="panel" style="border-color: var(--red); margin-top: 15px;">
                <h3 style="color: var(--red);">NTI MASTER DASHBOARD</h3>
                <div id="nti-monitor">Aguardando logs de IP...</div>
                <input type="text" id="search-user" placeholder="Pesquisar Prontuário..." onkeyup="app.buscarHistorico(this.value)">
                <div class="grid-cinema">
                    <button class="btn-red" style="font-size: 10px;" onclick="app.comandoRemoto('TRAVAR')">TRAVAR</button>
                    <button class="btn-confirm" style="font-size: 10px; background: var(--green);" onclick="app.comandoRemoto('LIBERAR')">LIBERAR</button>
                </div>
                <button class="btn-red" style="margin-top:5px; background: #555;" onclick="app.diagnostico()">SCAN & REMOÇÃO VÍRUS</button>
                
                <button class="btn-red" style="margin-top:15px;" onclick="app.desconectar()">DESCONECTAR</button>
            </div>
        </div>

    </div>
</div>

<script>
    // Configuração Firebase (Preencha com seus dados atuais)
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: { nome: "Kelvin", pront: "46690", cargo: "NTI", ip: "" },
        
        // Dados dos Patrimônios conforme sua lista
        patsDell: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],
        patsChrome: ["259.954","259.972","259.953","259.973","259.971","259.965","259.966","259.952","259.951","259.950","259.968","259.949","259.967","259.962","259.961","259.948","259.957","259.967","259.958","259.943","259.941","259.947","259.946","259.944","259.945","259.959","259.960","259.956","259.955","259.942","259.939","259.940","259.982","259.983","259.984","260.053","259.996","260.013","260.012"],

        init() {
            this.pegarIP();
            this.initGraficos();
            this.syncMural();
            this.syncReservas();
            this.monitorarNavegacao("Entrou no Dashboard");
        },

        async pegarIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                this.user.ip = data.ip;
                this.logNTI(`IP Detectado: ${data.ip}`);
            } catch (e) { this.user.ip = "192.168.0.1"; }
        },

        logNTI(msg) {
            const monitor = document.getElementById('nti-monitor');
            monitor.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            monitor.scrollTop = monitor.scrollHeight;
        },

        monitorarNavegacao(acao) {
            db.ref('monitoramento/' + this.user.pront).push({
                acao: acao,
                ip: this.user.ip,
                data: new Date().toLocaleString()
            });
        },

        gerarMapeamento() {
            const tipo = document.getElementById('eq-select').value;
            const container = document.getElementById('area-mapeamento');
            container.innerHTML = "";
            
            let lista = [];
            if(tipo === "Sala Info") lista = this.patsDell;
            else if(tipo === "Chromebooks") lista = this.patsChrome;
            
            lista.forEach((pat, index) => {
                const div = document.createElement('div');
                div.className = "seat ativo";
                div.innerText = index + 1;
                div.title = "Patrimônio: " + pat;
                div.onclick = () => {
                    if(this.user.cargo === "NTI") {
                        div.classList.toggle('manutencao');
                        this.logNTI(`Equipamento ${pat} status alterado.`);
                    }
                };
                container.appendChild(div);
            });
        },

        async confirmarReserva() {
            const eq = document.getElementById('eq-select').value;
            const data = document.getElementById('data-res').value;
            
            // Verificação de Conflito
            const snapshot = await db.ref('reservas').once('value');
            let conflito = false;
            snapshot.forEach(child => {
                if(child.val().data === data && child.val().equip === eq) conflito = true;
            });

            if(conflito) {
                alert("⚠️ CONFLITO: Este equipamento já está reservado para este horário!");
                return;
            }

            db.ref('reservas').push({
                user: this.user.nome,
                equip: eq,
                data: data,
                sala: document.getElementById('sala-num').value
            });
            this.monitorarNavegacao(`Reservou ${eq}`);
        },

        diagnostico() {
            this.logNTI("Iniciando Scan Remoto...");
            setTimeout(() => this.logNTI("Verificando Rootkits..."), 1000);
            setTimeout(() => this.logNTI("Limpando cache de sistema..."), 3000);
            setTimeout(() => alert("Diagnóstico concluído no dispositivo: " + this.user.ip), 4000);
        },

        initGraficos() {
            const ctx1 = document.getElementById('chartAcessos').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: { labels: ['08h', '12h', '16h', '20h'], datasets: [{ label: 'Acessos', data: [12, 45, 30, 10], borderColor: '#00adef', tension: 0.4 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
            // Adicionar os outros 3 gráficos conforme a imagem (Barra, Pizza, Rosca)
            const ctx2 = document.getElementById('chartChamados').getContext('2d');
            new Chart(ctx2, { type: 'bar', data: { labels: ['Tickets'], datasets: [{ data: [5], backgroundColor: '#ff4d4d' }] } });
        },

        syncMural() {
            db.ref('mural').on('value', snap => {
                const box = document.getElementById('mural-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    box.innerHTML += `<div style="background:#21262d; padding:8px; margin-bottom:5px; border-radius:5px">
                        <small>${m.val().autor}:</small><br>${m.val().texto}</div>`;
                });
            });
        }
    };

    app.init();
</script>
</body>
</html>
