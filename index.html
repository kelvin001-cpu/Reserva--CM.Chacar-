<style>
    /* Grid de Cinema para Cadeira/Equipamento */
    .cinema-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
    .seat { 
        padding: 5px; font-size: 10px; text-align: center; border-radius: 4px; 
        cursor: pointer; border: 1px solid #333; 
    }
    .seat.disponivel { background: #2ecc71; color: #000; }
    .seat.manutencao { background: #e74c3c; color: #fff; }
    .seat.selecionado { border: 2px solid #00adef; transform: scale(1.1); }

    /* Log de Navegação NTI */
    .nti-monitor { font-family: 'Courier New', monospace; font-size: 11px; background: #000; color: #0f0; padding: 10px; height: 120px; overflow-y: auto; border: 1px solid #333; }
</style>

<div id="mapeamento-visual" class="panel" style="display:none">
    <h3><i class="fa fa-desktop"></i> Selecione a Unidade</h3>
    <div id="grid-equipamentos" class="cinema-container"></div>
</div>

<div class="panel" style="border-color: var(--nti)">
    <h3 style="color:var(--nti)"><i class="fa fa-eye"></i> MONITORAMENTO REAL-TIME</h3>
    <input type="text" id="search-monitor" placeholder="Pesquisar Prontuário..." onkeyup="app.filtrarLogs(this.value)">
    <div class="nti-monitor" id="log-navegacao">
        > Aguardando tráfego...
    </div>
    <button class="btn" style="background: #555" onclick="app.acessoRemoto()">DIAGNÓSTICO REMOTO (VEYON WEB)</button>
</div>

<script>
    // DADOS TÉCNICOS INTEGRADOS
    const databaseDell = [
        {id: 1, pat: "231.413", marca: "DELL"}, {id: 2, pat: "231.453", marca: "DELL"},
        // ... (Adicionar os 33 itens conforme sua lista)
    ];

    const databaseChrome = Array.from({length: 39}, (_, i) => ({id: i+1, pat: `259.${939 + i}`, marca: "CHROMEBOOK"}));

    // FUNÇÕES DE MONITORAMENTO E TRAVA
    app.registrarLog = function(acao) {
        const logEntry = {
            user: this.user.pront,
            nome: this.user.nome,
            ip: "192.168.1." + Math.floor(Math.random() * 254), // Simulação de captura de IP
            atividade: acao,
            timestamp: Date.now()
        };
        db.ref('logs_navegacao').push(logEntry);
    };

    // Sobrescrevendo a função de reserva para incluir o mapeamento
    const originalMapear = app.carregarEquipamentos;
    app.carregarEquipamentos = function() {
        originalMapear.apply(this);
        document.getElementById('res-eq').addEventListener('change', (e) => {
            const painel = document.getElementById('mapeamento-visual');
            const grid = document.getElementById('grid-equipamentos');
            grid.innerHTML = "";
            
            if(e.target.value === "Sala Info" || e.target.value === "Chromebooks") {
                painel.style.display = "block";
                const lista = e.target.value === "Sala Info" ? databaseDell : databaseChrome;
                
                lista.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "seat disponivel";
                    div.innerText = item.pat.split('.')[1] || item.pat;
                    div.onclick = () => {
                        this.user.patSelected = item.pat;
                        this.registrarLog(`Selecionou equipamento ${item.pat}`);
                    };
                    grid.appendChild(div);
                });
            } else {
                painel.style.display = "none";
            }
        });
    };

    // Bloqueio de Senha Padrão
    app.verificarSeguranca = function() {
        if(this.user.pass === "pmspmudar123" || !this.user.foto) {
            alert("⚠️ ALERTA: É obrigatório trocar a senha e carregar foto de perfil para identificação.");
            // Forçar abertura de modal de perfil aqui
        }
    };
</script>
