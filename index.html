<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 15px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.6rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        /* LOGIN */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; position: relative; }
        .sector-column { flex: 1; min-width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .sector-column:hover { background: rgba(255,255,255,0.05); }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }

        /* DASHBOARD GRID */
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .panel h3 { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--prof); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }

        /* LISTAS E COMPONENTES */
        #chat-box, #lista-res, #lista-chamados, #nti-side-cron { overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); }
        #lista-res { height: 500px; } /* Maior para visão geral */
        #chat-box { height: 280px; }
        #lista-chamados { height: 180px; }
        #nti-side-cron { height: 200px; font-size: 10px; }

        .item-row { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--prof); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-baixa { background: var(--cad); color: black; border: none; padding: 5px 10px; border-radius: 5px; font-size: 9px; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; }
        
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; max-width: 85%; line-height: 1.4; }
        .msg-out { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-in { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }

        #password-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="password-modal">
        <div class="panel" style="width: 300px; text-align: center;">
            <h3><i class="fa fa-shield-alt"></i> SEGURANÇA</h3>
            <p style="font-size: 11px; opacity: 0.7;">Redefina sua senha padrão.</p>
            <input type="password" id="new-p" placeholder="Nova senha">
            <button class="btn" style="background:var(--cad)" onclick="app.updatePassword()">ATUALIZAR</button>
        </div>
    </div>

    <div class="login-container" id="login-screen">
        <div class="conect-banner" style="position: absolute; top: 0;"><h1>PROGRAMA CONECT</h1><p>CHÁCARA - GESTÃO NTI</p></div>
        <div class="sector-column" style="color:var(--prof)"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p')">Acessar</button></div>
        <div class="sector-column" style="color:var(--gestao)"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g')">Acessar</button></div>
        <div class="sector-column" style="color:var(--secre)"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s')">Acessar</button></div>
        <div class="sector-column" style="color:var(--nti)"><i class="fa fa-microchip fa-3x"></i><h2>NTI CORE</h2><input type="number" id="n-p" placeholder="ID Master"><input type="password" id="n-s" placeholder="Chave NTI"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            
            <div class="panel">
                <div id="user-tag" style="font-weight: bold; color:var(--prof); margin-bottom:15px; font-family:'Orbitron'; font-size:0.7rem"></div>
                
                <div id="user-tools">
                    <h3><i class="fa fa-tools"></i> SUPORTE</h3>
                    <input type="text" id="ch-t" placeholder="Problema técnico?">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.postChamado()">ABRIR CHAMADO</button>
                </div>

                <div id="nti-tools" class="hidden">
                    <h3 style="color:var(--nti)"><i class="fa fa-terminal"></i> NTI COMMAND</h3>
                    <input type="text" id="nti-av" placeholder="Aviso global...">
                    <button class="btn" style="background:var(--nti); color:white; margin-bottom:10px" onclick="app.setAviso()">PUBLICAR</button>
                    <button class="btn" style="background:red; color:white" onclick="db.ref('lock').set(true)">BLOQUEAR</button>
                    <button class="btn" style="background:green; color:white; margin-top:5px" onclick="db.ref('lock').set(false)">LIBERAR</button>
                    
                    <h3 style="margin-top:20px; color:var(--prof)"><i class="fa fa-history"></i> LOG RESERVAS</h3>
                    <div id="nti-side-cron"></div>
                </div>

                <h3 style="margin-top:20px"><i class="fa fa-plus"></i> AGENDAR</h3>
                <select id="rs-e"><option>CHROMEBOOKS</option><option>SALA INFO</option><option>TV TOUCH</option><option>LAB MÓVEL</option></select>
                <input type="text" id="rs-s" placeholder="Turma / Sala">
                <input type="datetime-local" id="rs-d">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.postReserva()">RESERVAR</button>
                <button class="btn" style="background:#222; color:white; margin-top:20px" onclick="location.reload()">LOGOUT</button>
            </div>

            <div class="panel">
                <div id="view-normal">
                    <h3><i class="fa fa-calendar-alt"></i> CRONOGRAMA OFICIAL DE RECURSOS</h3>
                    <div id="lista-res"></div>
                </div>

                <div id="view-nti" class="hidden">
                    <h3><i class="fa fa-project-diagram"></i> TELEMETRIA NTI MASTER</h3>
                    <div class="charts-container">
                        <div class="chart-card"><canvas id="c1"></canvas></div>
                        <div class="chart-card"><canvas id="c2"></canvas></div>
                        <div class="chart-card"><canvas id="c3"></canvas></div>
                        <div class="chart-card"><canvas id="c4"></canvas></div>
                        <div class="chart-card" style="grid-column: span 2;"><canvas id="c5"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-headset"></i> FILA TÉCNICA (CHAMADOS)</h3>
                <div id="lista-chamados"></div>
                
                <h3 style="margin-top:20px"><i class="fa fa-comments"></i> CHAT DA REDE</h3>
                <div id="chat-box" style="display:flex; flex-direction:column"></div>
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input type="text" id="msg-in" placeholder="Mensagem..." style="margin:0">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:8px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, userKey: null, charts: {},
        async login(pre, isNti) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(isNti==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; this.start(); return; }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val(); this.userKey = p;
                if(['pmspmudar123', 'secretaria2026', 'pmspgestores2026'].includes(s)) document.getElementById('password-modal').style.display='flex';
                else this.start();
            } else alert("Acesso Negado.");
        },

        updatePassword() {
            const nv = document.getElementById('new-p').value;
            if(nv.length > 3) db.ref('usuarios/'+this.userKey+'/pass').set(nv).then(()=> { document.getElementById('password-modal').style.display='none'; this.start(); });
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-tag').innerText = "ONLINE: " + this.user.nome.toUpperCase();
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-tools').classList.remove('hidden');
                document.getElementById('view-nti').classList.remove('hidden');
                document.getElementById('user-tools').classList.add('hidden');
                document.getElementById('view-normal').classList.add('hidden');
                this.initCharts();
            }
            this.sync();
        },

        sync() {
            // Reservas
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); 
                const side = document.getElementById('nti-side-cron');
                box.innerHTML = ""; if(side) side.innerHTML = "";
                let count = 0;
                snap.forEach(r => {
                    count++; const d = r.val();
                    const html = `<div class="item-row">
                        <span><b>${d.eq}</b> - ${d.sl}<br><small>${d.u} | ${new Date(d.dt).toLocaleString()}</small></span>
                        ${this.user.cargo==='NTI' ? `<button class="btn-baixa" onclick="app.del('reservas','${r.key}')">BAIXA</button>` : ''}
                    </div>`;
                    box.innerHTML += html;
                    if(side) side.innerHTML += html;
                });
                if(this.charts.c5) { this.charts.c5.data.datasets[0].data[4] = count; this.charts.c5.update(); }
            });

            // Chamados
            db.ref('chamados').on('value', snap => {
                const box = document.getElementById('lista-chamados'); box.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    box.innerHTML += `<div class="item-row" style="border-left-color:var(--nti)">
                        <span><b>${d.u}:</b> ${d.t}</span>
                        ${this.user.cargo==='NTI' ? `<button class="btn-baixa" onclick="app.del('chamados','${c.key}')">OK</button>` : ''}
                    </div>`;
                });
            });

            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val(); const side = d.n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b> ${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        initCharts() {
            const cfg = (title) => ({ plugins: { legend: { display: false }, title: { display: true, text: title, color: '#ccc' } }, scales: { y: { beginAtZero: true } } });
            this.charts.c1 = new Chart(document.getElementById('c1'), { type:'line', data:{ labels:['S','T','Q','Q','S'], datasets:[{data:[4,8,12,6,10], borderColor: '#00adef'}]}, options: cfg('Trafego de Dados') });
            this.charts.c2 = new Chart(document.getElementById('c2'), { type:'doughnut', data:{ labels:['Ativo','Off'], datasets:[{data:[85,15], backgroundColor:['#2ecc71','#333']}]}, options: cfg('Status Servidor') });
            this.charts.c3 = new Chart(document.getElementById('c3'), { type:'bar', data:{ labels:['Chrome','Labs','TV'], datasets:[{data:[45,20,35], backgroundColor:'#f1c40f'}]}, options: cfg('Uso por Categoria') });
            this.charts.c4 = new Chart(document.getElementById('c4'), { type:'line', data:{ labels:['08h','12h','16h','20h'], datasets:[{data:[5,15,25,10], borderColor:'#a55eea'}]}, options: cfg('Pico de Acesso') });
            this.charts.c5 = new Chart(document.getElementById('c5'), { type:'bar', data:{ labels:['Seg','Ter','Qua','Qui','Hoje'], datasets:[{data:[10,14,8,12,0], backgroundColor: '#eb4d4b'}]}, options: cfg('Volume de Reservas Diárias (Tempo Real)') });
        },

        postReserva() {
            const eq = document.getElementById('rs-e').value, sl = document.getElementById('rs-s').value, dt = document.getElementById('rs-d').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },
        postChamado() {
            const t = document.getElementById('ch-t').value;
            if(t) db.ref('chamados').push({u: this.user.nome, t: t});
            document.getElementById('ch-t').value = "";
        },
        sendChat() {
            const t = document.getElementById('msg-in').value;
            if(t) db.ref('chat').push({n: this.user.nome, t: t});
            document.getElementById('msg-in').value = "";
        },
        del(path, key) { db.ref(path+'/'+key).remove(); },
        setAviso() { db.ref('aviso').set(document.getElementById('nti-av').value); }
    };
</script>
</body>
</html>
