<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* DESIGN ORIGINAL PRESERVADO */
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; animation: fadeInDown 1.5s; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); margin-bottom: 5px; }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .sector-column:hover { background: rgba(255,255,255,0.03); transform: scale(1.02); }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; animation: fadeIn 1s; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; transition: 0.3s;
        }

        /* NOVO: Estilo Mapeamento Cinema */
        .cinema-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
        .seat { font-size: 8px; padding: 5px; border-radius: 3px; border: 1px solid #555; text-align: center; cursor: pointer; }
        .seat.disponivel { color: var(--cad); border-color: var(--cad); }
        .seat.manutencao { background: rgba(235, 77, 75, 0.2); color: var(--nti); border-color: var(--nti); }

        /* Estilos originais de Inputs e Botões */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; }
        .hidden { display: none !important; }
        .fade-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>

        <div class="sector-column fade-up delay-1"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column fade-up delay-2"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column fade-up delay-3"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        
        <div class="sector-column fade-up delay-4" style="background: rgba(46, 204, 113, 0.05)">
            <h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário/Patrimônio">
            <select id="c-atua">
                <option value="Unidade Atual">Atua nesta unidade</option>
                <option value="Multiplas">Trabalha em mais de um colégio</option>
            </select>
            <input type="password" id="c-s" placeholder="Crie sua Senha">
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta @edu</button>
        </div>

        <div class="sector-column fade-up delay-4"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <center>
                        <div id="user-photo" style="width:80px; height:80px; border-radius:50%; background:#222; border:2px solid var(--prof); display:flex; align-items:center; justify-content:center; cursor:pointer">
                            <i class="fa fa-user fa-2x"></i>
                        </div>
                        <h4 id="display-nome">---</h4>
                        <small id="display-email"></small>
                        <p style="font-size:9px; color:var(--gestao)">⚠️ Foto obrigatória para identificação!</p>
                    </center>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Nova Reserva</h3>
                    <select id="res-eq" onchange="app.showMapa(this.value)">
                        <option value="TV 01">TV 01</option>
                        <option value="TV 02">TV 02</option>
                        <option value="Chromebooks">Chromebooks</option>
                        <option value="Sala de Informática">Sala de Informática (Dell)</option>
                    </select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Agendar</button>
                    
                    <div id="mapa-container" class="hidden">
                        <h4 style="font-size:10px; margin-top:15px">MAPEAMENTO DE ESTAÇÕES</h4>
                        <div class="cinema-grid" id="grid-mapeamento"></div>
                    </div>
                </div>

                <div id="nti-monitor-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)">LOG DE NAVEGAÇÃO IP</h3>
                    <div id="logs-navegacao" style="height:150px; overflow-y:auto; font-family:monospace; font-size:10px; color:#0f0"></div>
                    <button class="btn" style="background:var(--nti); font-size:10px" onclick="app.removerVirus()">Diagnóstico e Limpeza Remota</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3>Cronograma de Uso</h3>
                    <div id="lista-res"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3>Estatísticas</h3>
                    <canvas id="chartGeral"></canvas>
                </div>
                <button class="btn" style="background:#cc4444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, userIP: "0.0.0.0",
        // Listas de Patrimônios (Conforme enviado)
        dellPats: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],
        chromePats: ["259.954","259.972","259.953","259.973","259.971","259.965","259.966","259.952","259.951","259.950","259.968","259.949","259.967","259.962","259.961","259.948","259.957","259.967","259.958","259.943","259.941","259.947","259.946","259.944","259.945","259.959","259.960","259.956","259.955","259.942","259.939","259.940","259.982","259.983","259.984","260.053","259.996","260.013","260.012"],

        async getIP() { try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); this.userIP = d.ip; } catch(e){} },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, s = document.getElementById('c-s').value, a = document.getElementById('c-atua').value;
            if(!n || !p || !s) return alert("Preencha todos os campos!");
            const email = n.split(' ')[0].toLowerCase() + "." + p + "@edu.santanadeparnaiba.sp.gov.br";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, pass: s, email, atua: a, cargo: 'Professor' })
            .then(() => alert("Conta criada com sucesso! E-mail: " + email));
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user = {nome: 'Kelvin Admin', cargo: 'NTI', email: 'nti@edu...'}; return this.start(); }
            
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado!");
        },

        async start() {
            await this.getIP();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('display-nome').innerText = this.user.nome;
            document.getElementById('display-email').innerText = this.user.email;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-monitor-panel').classList.remove('hidden');
                this.syncLogs();
            }
            this.syncData();
            this.logAtividade("Login no Sistema");
        },

        logAtividade(acao) { db.ref('logs_monitoramento').push({ u: this.user.nome, acao, ip: this.userIP, time: new Date().toLocaleString() }); },

        syncLogs() {
            db.ref('logs_monitoramento').limitToLast(15).on('value', s => {
                const box = document.getElementById('logs-navegacao'); box.innerHTML = "";
                s.forEach(l => { box.innerHTML += `<div>> [${l.val().ip}] ${l.val().u}: ${l.val().acao}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        },

        async reservar() {
            const eq = document.getElementById('res-eq').value, dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Escolha data e hora!");

            // TRAVA DE DUPLICIDADE
            const snap = await db.ref('reservas').once('value');
            let ocupado = false;
            snap.forEach(r => { if(r.val().eq === eq && r.val().dt === dt) ocupado = true; });

            if(ocupado) {
                alert("CONFLITO: Este equipamento já está reservado para este horário!");
                this.logAtividade("Tentativa de reserva duplicada em " + eq);
            } else {
                db.ref('reservas').push({ eq, dt, u: this.user.nome });
                this.logAtividade("Reservou " + eq);
            }
        },

        showMapa(v) {
            const container = document.getElementById('mapa-container');
            const grid = document.getElementById('grid-mapeamento');
            grid.innerHTML = "";
            
            if(v === 'Sala de Informática' || v === 'Chromebooks') {
                container.classList.remove('hidden');
                const list = v === 'Sala de Informática' ? this.dellPats : this.chromePats;
                list.forEach((p, i) => {
                    grid.innerHTML += `<div class="seat disponivel" onclick="app.toggleStatus('${p}')">PC ${i+1}<br>${p}</div>`;
                });
            } else { container.classList.add('hidden'); }
        },

        syncData() {
            db.ref('reservas').on('value', s => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                s.forEach(r => {
                    list.innerHTML += `<div class="panel" style="background:rgba(255,255,255,0.05)"><b>${r.val().eq}</b> - Prof. ${r.val().u}<br><small>${new Date(r.val().dt).toLocaleString()}</small></div>`;
                });
            });
        },

        removerVirus() { 
            alert("Diagnóstico iniciado no IP: " + this.userIP); 
            this.logAtividade("Executou Limpeza de Vírus Remota"); 
        }
    };
</script>
</body>
</html>
