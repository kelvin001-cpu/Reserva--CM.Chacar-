<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI CHÁCARA - COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --nti: #eb4d4b; --success: #2ecc71; --warn: #f1c40f;
            --glass: rgba(15, 18, 25, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center fixed;
            background-size: cover;
        }

        /* --- LOGIN & SENHA --- */
        #password-reset-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100000; align-items:center; justify-content:center; }
        
        /* --- LAYOUT --- */
        #main-system { display: none; padding: 15px; }
        .grid-master { display: grid; grid-template-columns: 280px 1fr 320px; gap: 15px; height: 95vh; }

        .panel { 
            background: var(--glass); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 15px; overflow: hidden;
        }

        /* --- COMPONENTES --- */
        .scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--prof); }
        
        /* STATUS MEMBROS */
        .member-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 5px var(--success); }

        /* CHATS */
        .chat-container { height: 200px; background: rgba(0,0,0,0.4); border-radius: 8px; margin-bottom: 10px; padding: 10px; font-size: 12px; }
        .msg { margin-bottom: 8px; padding: 5px 10px; border-radius: 8px; max-width: 90%; }
        .msg-nti { background: rgba(235, 77, 75, 0.2); border: 1px solid var(--nti); }

        /* BOTÕES */
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; margin-top: 5px; }
        .btn-nti { background: var(--nti); color: white; }
        .btn-prof { background: var(--prof); color: white; }

        input, select { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        
        .hidden { display: none; }
        .grav-baixa { border-left: 4px solid var(--success); }
        .grav-media { border-left: 4px solid var(--warn); }
        .grav-alta { border-left: 4px solid var(--nti); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="password-reset-overlay">
        <div class="panel" style="width: 350px;">
            <h2 style="color:var(--warn)">🔐 SEGURANÇA</h2>
            <p style="font-size: 12px;">Detectamos o primeiro acesso. Crie uma senha pessoal para continuar.</p>
            <input type="password" id="new-pass" placeholder="Nova Senha">
            <input type="password" id="new-pass-confirm" placeholder="Confirme a Senha">
            <button class="btn btn-prof" onclick="app.forceResetPassword()">DEFINIR SENHA</button>
        </div>
    </div>

    <div id="login-screen" style="display:flex; justify-content:center; align-items:center; height:100vh; background:var(--glass)">
       <div class="panel" style="width:300px">
           <h1 style="font-family:'Orbitron'; color:var(--prof); text-align:center">NTI PORTAL</h1>
           <input type="number" id="login-p" placeholder="Prontuário">
           <input type="password" id="login-s" placeholder="Senha">
           <button class="btn btn-prof" onclick="app.login()">ACESSAR SISTEMA</button>
           <p style="font-size:10px; opacity:0.5; text-align:center">Novo? Use a senha padrão do seu cargo.</p>
       </div>
    </div>

    <div id="main-system">
        <div class="grid-master">
            
            <div class="panel">
                <h3><i class="fa fa-users"></i> Ativos Agora</h3>
                <div class="scroll-area" id="members-list">
                    </div>
                
                <hr style="opacity:0.1; margin: 15px 0">
                
                <h3><i class="fa fa-key"></i> Resetar Prontuário</h3>
                <input type="number" id="reset-p" placeholder="Prontuário p/ Reset">
                <button class="btn" style="background:#555; color:white" onclick="app.adminReset()">RESETAR PARA PADRÃO</button>
                
                <div id="status-display" style="margin-top:20px">
                    <canvas id="chartStatus" height="150"></canvas>
                </div>
            </div>

            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h2 style="font-family:'Orbitron'; margin:0">CENTRAL <span id="user-name" style="color:var(--prof)">...</span></h2>
                    <button class="btn" style="width:100px; background:rgba(255,0,0,0.3)" onclick="location.reload()">SAIR</button>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px">
                    <div class="stat-card">
                        <h4>Reservar Equipamento</h4>
                        <select id="res-eq">
                            <option>CARRINHO CHROMEBOOKS</option>
                            <option>TV 01</option>
                            <option>TV 02</option>
                            <option>SALA DE INFORMÁTICA</option>
                        </select>
                        <input type="datetime-local" id="res-dt">
                        <button class="btn btn-prof" onclick="app.reservar()">RESERVAR AGORA</button>
                    </div>
                    <div class="stat-card" style="border-left-color:var(--nti)">
                        <h4>Chamado NTI</h4>
                        <select id="cham-grav">
                            <option value="baixa">BAIXA (Chat)</option>
                            <option value="media">MÉDIA (Verificação)</option>
                            <option value="alta">URGENTE (Presencial)</option>
                        </select>
                        <input type="text" id="cham-txt" placeholder="Descreva o problema...">
                        <button class="btn btn-nti" onclick="app.abrirChamado()">SOLICITAR SUPORTE</button>
                    </div>
                </div>

                <h3><i class="fa fa-calendar-alt"></i> Cronograma em Tempo Real</h3>
                <div class="scroll-area" id="cronograma-list">
                    </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-headset"></i> Atendimentos NTI</h3>
                <div class="scroll-area" id="atendimentos-lista" style="font-size:11px">
                    </div>

                <h3 style="color:var(--nti); margin-top:15px"><i class="fa fa-comments"></i> Chat Suporte</h3>
                <div class="chat-container scroll-area" id="chat-suporte"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-sup" placeholder="Falar com NTI...">
                    <button onclick="app.sendChat('suporte')" class="btn-nti" style="width:50px; border-radius:5px">OK</button>
                </div>

                <h3 style="margin-top:15px"><i class="fa fa-globe"></i> Chat Geral</h3>
                <div class="chat-container scroll-area" id="chat-geral"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-geral" placeholder="Mensagem...">
                    <button onclick="app.sendChat('geral')" class="btn-prof" style="width:50px; border-radius:5px">OK</button>
                </div>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login() {
            const p = document.getElementById('login-p').value;
            const s = document.getElementById('login-s').value;

            if(p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin Master', cargo: 'NTI', pront: '46690'};
                return this.start();
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) {
                this.user = snap.val();
                
                // VERIFICA SE É SENHA PADRÃO PARA FORÇAR TROCA
                const padroes = ["pmspmudar123", "secretaria2026", "pmspgestores2026"];
                if(padroes.includes(s)) {
                    document.getElementById('password-reset-overlay').style.display = 'flex';
                } else {
                    this.start();
                }
            } else { alert("Acesso inválido!"); }
        },

        forceResetPassword() {
            const n1 = document.getElementById('new-pass').value;
            const n2 = document.getElementById('new-pass-confirm').value;
            if(n1.length < 6) return alert("Senha muito curta!");
            if(n1 !== n2) return alert("Senhas não conferem!");

            db.ref('usuarios/'+this.user.pront).update({ pass: n1 }).then(() => {
                alert("Senha atualizada! Faça login novamente.");
                location.reload();
            });
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-name').innerText = this.user.nome;
            
            // Registrar presença
            db.ref('presenca/'+this.user.pront).set({nome: this.user.nome, status: 'online'});
            db.ref('presenca/'+this.user.pront).onDisconnect().remove();

            this.sync();
        },

        sync() {
            // Membros Ativos
            db.ref('presenca').on('value', snap => {
                const list = document.getElementById('members-list'); list.innerHTML = "";
                snap.forEach(m => {
                    list.innerHTML += `<div class="member-item"><div class="status-dot"></div> ${m.val().nome}</div>`;
                });
            });

            // Cronograma & Baixa de Equipamento
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('cronograma-list'); list.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    list.innerHTML += `
                        <div class="stat-card">
                            <b>${d.eq}</b> - ${new Date(d.dt).toLocaleString()}<br>
                            <small>Por: ${d.u}</small>
                            ${this.user.cargo === 'NTI' ? `<button onclick="app.darBaixa('reservas','${r.key}')" style="font-size:10px; padding:2px; background:green; border:none; color:white; cursor:pointer">LIBERAR EQUIP.</button>` : ''}
                        </div>`;
                });
            });

            // Atendimentos NTI
            db.ref('chamados').on('value', snap => {
                const list = document.getElementById('atendimentos-lista'); list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `
                        <div class="stat-card grav-${d.grav}">
                            <b>${d.u}</b> [${d.grav.toUpperCase()}]<br>${d.t}
                            <button onclick="app.darBaixa('chamados','${c.key}')" class="btn" style="padding:2px; font-size:10px">ENCERRAR</button>
                        </div>`;
                });
            });

            // Chats (Geral e Suporte)
            this.loadChat('chat', 'chat-geral');
            this.loadChat('chat_suporte', 'chat-suporte');
        },

        loadChat(ref, elementId) {
            db.ref(ref).limitToLast(20).on('value', snap => {
                const box = document.getElementById(elementId); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    box.innerHTML += `<div class="msg ${d.cargo === 'NTI' ? 'msg-nti' : ''}"><b>${d.nome}:</b> ${d.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChat(tipo) {
            const input = document.getElementById(tipo === 'geral' ? 'msg-geral' : 'msg-sup');
            const ref = tipo === 'geral' ? 'chat' : 'chat_suporte';
            if(!input.value) return;
            db.ref(ref).push({ nome: this.user.nome, text: input.value, cargo: this.user.cargo });
            input.value = "";
        },

        reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Escolha data/hora!");
            db.ref('reservas').push({ eq, dt, u: this.user.nome });
        },

        abrirChamado() {
            const t = document.getElementById('cham-txt').value;
            const grav = document.getElementById('cham-grav').value;
            if(!t) return;
            db.ref('chamados').push({ u: this.user.nome, t, grav });
            db.ref('chat_suporte').push({ nome: 'SISTEMA', text: `NOVO CHAMADO: ${this.user.nome} abriu chamado ${grav.toUpperCase()}`, cargo: 'NTI' });
            document.getElementById('cham-txt').value = "";
        },

        darBaixa(rota, id) {
            if(confirm("Confirmar conclusão e liberar sistema?")) {
                db.ref(rota+'/'+id).remove();
            }
        },

        adminReset() {
            const p = document.getElementById('reset-p').value;
            if(!p) return;
            db.ref('usuarios/'+p).update({ pass: 'pmspmudar123' });
            alert("Senha resetada para: pmspmudar123");
        }
    };
</script>
</body>
</html>
