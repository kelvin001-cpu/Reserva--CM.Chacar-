<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00adef; --accent: #00ff9d; --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.9); --border: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* LOGIN CENTRALIZADO */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-card { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--border); width: 350px; text-align: center; }

        /* --- MENUS TOTALMENTE SEPARADOS (ILHAS) --- */
        .menu-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 40px;
            pointer-events: none; /* Deixa o fundo livre */
            position: relative;
            z-index: 10;
        }

        .menu-container > div, .menu-container > button, .nav-island button {
            pointer-events: auto; /* Reativa o clique apenas nos blocos */
        }

        /* Ilha 1: Perfil */
        .profile-island {
            background: var(--glass);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Ilha 2: Navegação Centralizada e Separada */
        .nav-island {
            display: flex;
            gap: 15px;
        }
        .nav-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            min-width: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item i { font-size: 20px; color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-5px);
        }
        .nav-item:hover i, .nav-item.active i { color: white; }

        /* Ilha 3: Sair */
        .exit-island {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .exit-island:hover { background: var(--danger); color: white; }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; padding: 0 40px 40px 40px; overflow-y: auto; }
        .view { display: none; max-width: 1100px; margin: 0 auto; } 
        .view.active { display: block; animation: zoomIn 0.3s ease; }

        .card-panel { 
            background: var(--glass); 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .grid-equip { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
        .equip-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; }

        .hidden { display: none !important; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="color: var(--primary)">NTI MASTER</h2>
        <input type="number" id="l-pront" placeholder="Prontuário">
        <input type="password" id="l-pass" placeholder="Senha">
        <select id="l-tipo">
            <option value="Professor">Professor</option>
            <option value="Secretaria">Secretaria</option>
            <option value="Gestão">Gestão</option>
            <option value="TI">NTI Master</option>
        </select>
        <button class="nav-item" style="width:100%; background:var(--primary); flex-direction: row; justify-content: center;" onclick="app.login()">ENTRAR</button>
    </div>
</div>

<div id="ui-wrapper" class="hidden">
    <div class="menu-container">
        <div class="profile-island">
            <i class="fa fa-user-astronaut fa-2x" style="color: var(--primary)"></i>
            <div>
                <div id="u-nome" style="font-weight: 700; font-size: 14px; line-height: 1;"></div>
                <div id="u-cargo" style="font-size: 10px; color: var(--primary); text-transform: uppercase; font-weight: bold;"></div>
            </div>
        </div>

        <div class="nav-island">
            <div class="nav-item active" onclick="app.view('v-reserva', this)">
                <i class="fa fa-laptop-house"></i>
                <span>Reservas</span>
            </div>
            <div class="nav-item" onclick="app.view('v-chamado', this)">
                <i class="fa fa-screwdriver-wrench"></i>
                <span>Suporte</span>
            </div>
            <div class="nav-item" onclick="app.view('v-cadastro', this)">
                <i class="fa fa-user-plus"></i>
                <span>Cadastrar</span>
            </div>
            <div id="ti-area" class="hidden">
                <div class="nav-item" style="border-color: var(--accent);" onclick="app.view('v-admin', this)">
                    <i class="fa fa-microchip" style="color: var(--accent);"></i>
                    <span style="color: var(--accent);">TI Master</span>
                </div>
            </div>
        </div>

        <button class="exit-island" onclick="location.reload()">
            <i class="fa fa-power-off fa-lg"></i>
        </button>
    </div>

    <main id="main-content">
        <div id="v-reserva" class="view active">
            <div class="card-panel">
                <h2 style="margin-top:0">Equipamentos</h2>
                <div class="grid-equip" id="equip-list"></div>
                <h2 style="margin-top:40px">Atividade Recente</h2>
                <div id="uso-list"></div>
            </div>
        </div>

        <div id="v-chamado" class="view">
            <div class="card-panel" style="max-width: 550px; margin: auto;">
                <h2 style="color: var(--danger)">Abrir Chamado</h2>
                <input type="text" id="ch-local" placeholder="Onde você está?">
                <textarea id="ch-problema" rows="5" placeholder="Descreva o problema..."></textarea>
                <button class="nav-item" style="width:100%; background:var(--danger); flex-direction: row; justify-content: center;" onclick="app.enviarChamado()">ENVIAR CHAMADO</button>
            </div>
        </div>

        <div id="v-cadastro" class="view">
            <div class="card-panel" style="max-width: 550px; margin: auto;">
                <h2 style="color: var(--primary)">Novo Usuário</h2>
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="number" id="c-pront" placeholder="Prontuário">
                <select id="c-cargo">
                    <option>Professor</option>
                    <option>Secretaria</option>
                    <option>Gestão</option>
                </select>
                <button class="nav-item" style="width:100%; background:var(--primary); flex-direction: row; justify-content: center; margin-top: 10px;" onclick="app.confirmarCad()">CADASTRAR</button>
            </div>
        </div>
    </main>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login() {
            const p = document.getElementById('l-pront').value, s = document.getElementById('l-pass').value, t = document.getElementById('l-tipo').value;
            if(t==='TI' && p==='46690' && s==='nti2026') { this.user = {nome:'Kelvin Master', cargo:'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s) { this.user = snap.val(); this.start(); }
            else alert("Acesso inválido!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('ui-wrapper').classList.remove('hidden');
            document.getElementById('u-nome').innerText = this.user.nome;
            document.getElementById('u-cargo').innerText = this.user.cargo;
            if(this.user.cargo === 'TI') document.getElementById('ti-area').classList.remove('hidden');
            this.sync();
        },

        view(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-list');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { 
                    const d = r.val(); u[d.item] = d; 
                    l.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${d.item}</b> - ${d.user} (${d.local})</span>
                        <button class="exit-island" style="padding:5px 10px" onclick="db.ref('reservas/${r.key}').remove()">X</button>
                    </div>`; 
                });
                this.itens.forEach(i => {
                    const ocupado = u[i];
                    g.innerHTML += `<div class="equip-card">
                        <i class="fa ${i.includes('TV')?'fa-tv':'fa-laptop'} fa-2x" style="color:${ocupado?'var(--danger)':'var(--accent)'}"></i>
                        <h4 style="margin:10px 0">${i}</h4>
                        <button class="nav-item" style="width:100%; font-size:10px; flex-direction:row; justify-content:center; padding:8px; background:${ocupado?'transparent':'rgba(0,173,239,0.2)'}; border-color:${ocupado? 'var(--danger)':'var(--primary)'}" onclick="${ocupado?'':'app.reservar(\''+i+'\')'}">${ocupado?'EM USO':'RESERVAR'}</button>
                    </div>`;
                });
            });
        },

        async reservar(i) { const loc = prompt("Local:"); if(loc) await db.ref('reservas').push({item:i, user:this.user.nome, local:loc}); },
        async enviarChamado() { 
            await db.ref('chamados').push({autor:this.user.nome, local:document.getElementById('ch-local').value, problema:document.getElementById('ch-problema').value});
            alert("Chamado Aberto!"); this.view('v-reserva', document.querySelector('.nav-item'));
        },
        async confirmarCad() {
            const p = document.getElementById('c-pront').value;
            await db.ref('usuarios/'+p).set({nome: document.getElementById('c-nome').value, pront: p, cargo: document.getElementById('c-cargo').value, pass: 'pmsp2026'});
            alert("Sucesso!");
        }
    };
</script>
</body>
</html>
