<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | EMEF CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* LOGIN 5 COLUNAS */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .sector-column:hover { background: rgba(255,255,255,0.05); }

        .col-prof { color: var(--prof); border-top: 8px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 8px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 8px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 8px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 8px solid var(--nti); }

        /* TELAS */
        #main-system, #pass-change-screen { display: none; padding: 40px; background: var(--bg-overlay); min-height: 100vh; }
        .panel { background: rgba(22, 27, 34, 0.9); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; margin: auto; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-user-graduate fa-3x"></i><h2>PROFESSOR</h2>
            <input type="text" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao"><i class="fa fa-user-shield fa-3x"></i><h2>GESTÃO</h2>
            <input type="text" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre"><i class="fa fa-file-invoice fa-3x"></i><h2>SECRETARIA</h2>
            <input type="text" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome"><input type="text" id="c-p" placeholder="Prontuário">
            <select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button>
        </div>
        <div class="sector-column col-nti"><i class="fa fa-code fa-3x"></i><h2>NTI</h2>
            <input type="text" id="n-p" placeholder="ID NTI"><input type="password" id="n-s" placeholder="Senha Master"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button>
        </div>
    </div>

    <div id="pass-change-screen">
        <div class="panel">
            <h2 style="color:var(--gestao)"><i class="fa fa-key"></i> Primeira Acesso</h2>
            <p>Você está usando uma senha padrão. Por favor, crie uma senha pessoal para continuar.</p>
            <input type="password" id="new-pass" placeholder="Nova Senha">
            <input type="password" id="confirm-new-pass" placeholder="Confirme a Senha">
            <button class="btn" style="background:var(--cad); color:white" onclick="app.saveNewPass()">Salvar e Entrar</button>
        </div>
    </div>

    <div id="main-system">
        <div class="panel" style="max-width: 800px;">
            <h1 id="user-name">Carregando...</h1>
            <p id="user-cargo"></p>
            <hr>
            <div id="nti-panel" class="hidden">
                <h3 style="color:var(--nti)">Painel NTI Master</h3>
                <input type="text" id="res-p" placeholder="Prontuário do Usuário">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.resetParaPadrao()">Resetar para Senha Padrão</button>
            </div>
            <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair do Sistema</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        tempPront: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value.trim();
            const s = document.getElementById(pre+'-s').value.trim();

            if(cargo === 'NTI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI', pront: '46690'};
                return this.startSystem();
            }

            const snap = await db.ref('usuarios/' + p).once('value');
            if(snap.exists()){
                const d = snap.val();
                if(String(d.pass) === String(s)) {
                    this.user = d;
                    this.tempPront = p;
                    // Verifica se é senha padrão
                    const padrões = ['pmspmudar123', 'gestao2026', 'secretaria2026'];
                    if(padrões.includes(s)) {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('pass-change-screen').style.display = 'block';
                    } else {
                        this.startSystem();
                    }
                } else { alert("Senha incorreta!"); }
            } else { alert("Prontuário não cadastrado!"); }
        },

        async saveNewPass() {
            const n1 = document.getElementById('new-pass').value;
            const n2 = document.getElementById('confirm-new-pass').value;
            if(n1.length < 4) return alert("A senha deve ter pelo menos 4 caracteres.");
            if(n1 !== n2) return alert("As senhas não coincidem.");

            await db.ref('usuarios/' + this.tempPront).update({pass: n1});
            alert("Senha alterada com sucesso!");
            this.user.pass = n1;
            this.startSystem();
        },

        startSystem() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('pass-change-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-name').innerText = "Olá, " + this.user.nome;
            document.getElementById('user-cargo').innerText = "Cargo: " + this.user.cargo;
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value.trim();
            const p = document.getElementById('c-p').value.trim();
            const c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha nome e prontuário!");

            let s = 'pmspmudar123';
            if(c === 'Gestão') s = 'gestao2026';
            if(c === 'Secretaria') s = 'secretaria2026';

            db.ref('usuarios/' + p).set({nome: n, pront: p, cargo: c, pass: s})
            .then(() => alert("Usuário " + n + " criado!\nSenha inicial: " + s));
        },

        async resetParaPadrao() {
            const p = document.getElementById('res-p').value.trim();
            const snap = await db.ref('usuarios/' + p).once('value');
            if(snap.exists()){
                const c = snap.val().cargo;
                let s = 'pmspmudar123';
                if(c === 'Gestão') s = 'gestao2026';
                if(c === 'Secretaria') s = 'secretaria2026';
                await db.ref('usuarios/' + p).update({pass: s});
                alert("O usuário voltou para a senha padrão: " + s);
            } else { alert("Usuário não encontrado."); }
        }
    };
</script>
</body>
</html>
