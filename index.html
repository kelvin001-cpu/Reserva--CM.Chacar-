<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; animation: fadeInDown 1.5s; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); margin-bottom: 5px; }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        #alert-ribbon { background: var(--nti); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; }

        /* ESTILO PROFISSIONAL DE CHAMADOS */
        .ticket-card { background: rgba(0,0,0,0.3); border-left: 4px solid var(--nti); padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 12px; }
        .status-pill { padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; float: right; }
        .st-pendente { background: #7f8c8d; }
        .st-andamento { background: var(--prof); }
        .st-urgente { background: var(--nti); box-shadow: 0 0 10px var(--nti); }

        #chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO: <span id="alert-text">Sincronizando...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron">SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>
        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="ID"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="ID"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="ID"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="ID"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ROOT"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div id="panel-chamado-cliente" class="panel">
                    <h3><i class="fa fa-headset"></i> Suporte NTI</h3>
                    <select id="ch-prio"><option value="Baixa">Prioridade: Baixa</option><option value="Média">Prioridade: Média</option><option value="Alta">Urgente / Parada Total</option></select>
                    <input type="text" id="ch-local" placeholder="Sua Sala / Setor">
                    <input type="text" id="ch-patrimonio" placeholder="Nº Patrimônio ou IP">
                    <input type="text" id="ch-desc" placeholder="Descreva o problema...">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Chamado</button>
                </div>

                <div id="panel-chamado-nti" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3><i class="fa fa-list-check"></i> Fila de Atendimento</h3>
                    <div id="lista-chamados-nti" style="max-height: 400px; overflow-y: auto;"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Reservar</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Agendar</button>
                </div>
            </div>

            <div class="center-col">
                <div id="nti-master-panel" class="panel hidden">
                    <h3><i class="fa fa-shield"></i> Master Control</h3>
                    <button class="btn" style="background:red" onclick="app.setLock(true)">TRAVAR TUDO</button>
                    <button class="btn" style="background:green" onclick="app.setLock(false)">LIBERAR</button>
                    <input type="text" id="input-aviso" placeholder="Aviso global..." style="margin-top:10px">
                    <button class="btn" style="background:#555" onclick="app.enviarAviso()">Atualizar Banner</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-box-open"></i> Status Equipamentos</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-clock"></i> Cronograma</h3>
                    <div id="lista-res"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Mural</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-in" placeholder="Mensagem...">
                        <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <button class="btn" style="background:#444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Admin', cargo:'NTI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Erro!");
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Criado!"));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-master-panel').classList.remove('hidden');
                document.getElementById('panel-chamado-nti').classList.remove('hidden');
                document.getElementById('panel-chamado-cliente').classList.add('hidden');
            }
            this.sync();
        },

        sync() {
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display='flex'; });
            db.ref('aviso_global').on('value', s => { document.getElementById('alert-ribbon').style.display = s.val() ? 'block' : 'none'; document.getElementById('alert-text').innerText = s.val(); });
            
            // SINCRONIZAR CHAMADOS (PROFISSIONAL)
            db.ref('chamados').on('value', snap => {
                const list = document.getElementById('lista-chamados-nti');
                list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    if(d.status !== 'resolvido') {
                        const prioClass = d.grau === 'Alta' ? 'st-urgente' : 'st-pendente';
                        list.innerHTML += `
                            <div class="ticket-card" style="border-left-color:${d.grau==='Alta'?'red':'#f1c40f'}">
                                <span class="status-pill ${d.status==='em atendimento'?'st-andamento':'st-pendente'}">${d.status}</span>
                                <b>${d.u}</b> [Sala: ${d.sl}]<br>
                                <small>Equip: ${d.pat || 'Não inf.'}</small><br>
                                <span>${d.t}</span><br>
                                <div style="margin-top:5px">
                                    <button class="btn" style="padding:4px; font-size:10px; width:48%; background:var(--prof)" onclick="app.statusChamado('${c.key}','em atendimento')">Assumir</button>
                                    <button class="btn" style="padding:4px; font-size:10px; width:48%; background:var(--cad)" onclick="app.statusChamado('${c.key}','resolvido')">Resolver</button>
                                </div>
                            </div>`;
                    }
                });
            });

            // Mural
            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => { box.innerHTML += `<div class="msg ${m.val().n === this.user.nome ? 'msg-out' : 'msg-in'}"><b>${m.val().n}:</b><br>${m.val().t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });

            // Cronograma
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                snap.forEach(r => { list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; font-size:12px"><b>${r.val().eq}</b> - ${r.val().u} (Sala ${r.val().sl})</div>`; });
            });

            // Status Equipamentos
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq'); sel.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let el = document.getElementById('card-'+e.replace(/\s/g,''));
                    if(!el) {
                        el = document.createElement('div'); el.id = 'card-'+e.replace(/\s/g,'');
                        el.style = "padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; font-size:12px; text-align:center";
                        document.getElementById('lista-equipamentos').appendChild(el);
                    }
                    el.innerHTML = `<b>${e}</b><br><span style="color:${d.status==='ativo'?var('--cad'):var('--nti')}">${d.status.toUpperCase()}</span>`;
                });
            });
        },

        abrirChamado() {
            const t = document.getElementById('ch-desc').value, sl = document.getElementById('ch-local').value, pat = document.getElementById('ch-patrimonio').value;
            if(!t || !sl) return alert("Preencha!");
            db.ref('chamados').push({ u: this.user.nome, t, sl, pat, grau: document.getElementById('ch-prio').value, status: 'pendente' });
            alert("Chamado enviado ao NTI!");
            document.getElementById('ch-desc').value = "";
        },

        statusChamado(id, st) { db.ref('chamados/'+id+'/status').set(st); },
        reservar() { db.ref('reservas').push({ eq: document.getElementById('res-eq').value, sl: document.getElementById('res-sl').value, dt: document.getElementById('res-dt').value, u: this.user.nome }); },
        sendChat() { const t = document.getElementById('chat-in').value; if(t) db.ref('chat').push({ n: this.user.nome, t }); document.getElementById('chat-in').value = ""; },
        setLock(v) { db.ref('lock').set(v); },
        enviarAviso() { db.ref('aviso_global').set(document.getElementById('input-aviso').value); }
    };
</script>
</body>
</html>
