<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA V3</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden; transition: 0.5s;
        }

        /* Efeito de Vidro Flutuante */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; }
        .toast { background: rgba(0,0,0,0.9); border-right: 5px solid var(--prof); padding: 15px; margin-bottom: 10px; border-radius: 5px; animation: fadeInRight 0.5s; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #alert-ribbon { background: linear-gradient(90deg, var(--nti), #ff7675); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        
        #main-system { display: none; padding: 100px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .panel:hover { border-color: var(--prof); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; }
        input:focus { border-color: var(--prof); }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { filter: brightness(1.3); transform: translateY(-2px); }

        #chat-box { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg { padding: 10px; border-radius: 10px; font-size: 12px; max-width: 80%; position: relative; }
        .msg-in { background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg-out { background: rgba(0, 173, 239, 0.3); align-self: flex-end; border: 1px solid var(--prof); }

        /* Status Online */
        .online-counter { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--cad); font-size: 12px; z-index: 10001; }
        .dot { height: 8px; width: 8px; background-color: var(--cad); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse-green 2s infinite; }

        @keyframes pulse-green { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body onmousemove="app.parallax(event)">

    <div class="online-counter"><span class="dot"></span> <span id="count-val">1</span> Usuário(s) Online</div>
    <div id="toast-container"></div>
    <div id="alert-ribbon">⚠️ <span id="alert-text">Sincronizando...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-user-shield fa-5x animate__animated animate__pulse animate__infinite" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron; letter-spacing: 5px;">SISTEMA BLOQUEADO</h1>
        <p>O NTI está realizando atualizações de segurança.</p>
    </div>

    <div class="login-container" id="login-screen">
        <div style="width:100%; text-align:center; padding: 50px 0;">
            <h1 class="animate__animated animate__fadeInDown" style="font-family:'Orbitron'; font-size:3rem; color:var(--prof); margin:0">CONECT <span style="color:white">CHÁCARA</span></h1>
            <p style="letter-spacing:3px; opacity:0.6">CONSTRUINDO UMA GERAÇÃO DE VENCEDORES</p>
        </div>
        <div class="sector-column animate__animated animate__fadeInLeft">
            <i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i>
            <h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar Painel</button>
        </div>
        <div class="sector-column animate__animated animate__fadeInRight">
            <i class="fa fa-user-ninja fa-3x" style="color:var(--nti)"></i>
            <h2>NTI MASTER</h2>
            <input type="number" id="n-p" placeholder="ID NTI">
            <input type="password" id="n-s" placeholder="Senha Master">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Entrar no Core</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            
            <div class="left-col">
                <div class="panel glass">
                    <h3><i class="fa fa-clock"></i> AGENDAR USO</h3>
                    <label style="font-size:10px; opacity:0.7">EQUIPAMENTO:</label>
                    <select id="res-eq"></select>
                    <label style="font-size:10px; opacity:0.7">SALA / LOCAL:</label>
                    <input type="text" id="res-sl" placeholder="Ex: Sala 05">
                    <label style="font-size:10px; opacity:0.7">DATA E HORA:</label>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar Reserva</button>
                </div>

                <div class="panel glass" id="nti-master-panel" style="display:none; border: 1px solid var(--nti)">
                    <h3 style="color:var(--nti)"><i class="fa fa-skull"></i> ADMIN CORE</h3>
                    <button class="btn" style="background:#555; margin-bottom:10px" onclick="app.setLock(true)">TRAVAR SISTEMA</button>
                    <button class="btn" style="background:var(--cad); margin-bottom:10px" onclick="app.setLock(false)">DESTRAVAR</button>
                    <button class="btn" style="background:var(--nti); margin-bottom:10px" onclick="app.limparMural()">LIMPAR MURAL</button>
                    <input type="text" id="input-aviso" placeholder="Mensagem do Banner">
                    <button class="btn" style="background:white; color:black" onclick="app.enviarAviso()">Atualizar Banner</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel glass" style="min-height: 200px;">
                    <h3><i class="fa fa-server"></i> STATUS DOS RECURSOS</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:15px"></div>
                </div>

                <div class="panel glass">
                    <h3><i class="fa fa-list"></i> CRONOGRAMA ATIVO</h3>
                    <div id="lista-res" style="max-height:400px; overflow-y:auto"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel glass">
                    <h3><i class="fa fa-hashtag"></i> MURAL DA CHÁCARA</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:15px">
                        <input type="text" id="chat-in" placeholder="Sua mensagem...">
                        <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <button class="btn" style="background:rgba(255,255,255,0.1); font-size:11px" onclick="app.logout()">DESCONECTAR USUÁRIO</button>
            </div>

        </div>
    </div>

<script>
    // Configuração Firebase (Mesmo Banco)
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: JSON.parse(localStorage.getItem('conect_user_v3')) || null,

        init() {
            if(this.user) this.start();
            this.syncOnline();
            this.listenGlobal();
        },

        parallax(e) {
            let x = (e.clientX / window.innerWidth) * 15;
            let y = (e.clientY / window.innerHeight) * 15;
            document.body.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user = {nome:'Kelvin (NTI)', cargo:'NTI', pront:'46690'};
            } else {
                const snap = await db.ref('usuarios/'+p).once('value');
                if(snap.exists() && String(snap.val().pass) === String(s)) {
                    this.user = snap.val();
                } else { return this.notify("Acesso negado!", "var(--nti)"); }
            }
            
            localStorage.setItem('conect_user_v3', JSON.stringify(this.user));
            this.start();
        },

        logout() { localStorage.removeItem('conect_user_v3'); location.reload(); },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') document.getElementById('nti-master-panel').style.display = 'block';
            
            this.syncData();
            this.carregarEquipamentos();
            this.notify("Sistema Pronto. Olá, " + this.user.nome);
        },

        syncOnline() {
            const onlineRef = db.ref('online_users').push();
            onlineRef.onDisconnect().remove();
            onlineRef.set(true);
            db.ref('online_users').on('value', s => {
                document.getElementById('count-val').innerText = s.numChildren();
            });
        },

        listenGlobal() {
            db.ref('lock').on('value', s => { 
                if(s.val() && (!this.user || this.user.cargo !== 'NTI')) {
                    document.getElementById('lock-overlay').style.display='flex'; 
                } else { document.getElementById('lock-overlay').style.display='none'; }
            });
        },

        syncData() {
            db.ref('aviso_global').on('value', s => {
                const rib = document.getElementById('alert-ribbon');
                if(s.val()) { rib.style.display = 'block'; document.getElementById('alert-text').innerText = s.val(); }
                else rib.style.display = 'none';
            });

            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    let side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side} animate__animated animate__fadeInUp"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                snap.forEach(r => {
                    let d = r.val();
                    list.innerHTML += `<div style="padding:12px; margin-bottom:10px; background:rgba(255,255,255,0.05); border-radius:10px; border-left:4px solid var(--prof)">
                        <div style="display:flex; justify-content:space-between">
                            <b>${d.eq}</b> <span>${d.sl}</span>
                        </div>
                        <small style="opacity:0.6">${d.u} • ${new Date(d.dt).toLocaleString('pt-BR')}</small>
                        ${this.user.cargo === 'NTI' ? `<i class="fa fa-trash" style="float:right; cursor:pointer" onclick="app.apagarReserva('${r.key}')"></i>` : ''}
                    </div>`;
                });
            });
        },

        carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Projetor', 'Sala Info', 'Chromebooks'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            sel.innerHTML = ""; lista.innerHTML = "";
            
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e.replace(/\s/g, '')).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let id = 'card-'+e.replace(/\s/g, '');
                    let isOK = d.status === 'ativo';
                    let html = `<div id="${id}" style="padding:15px; border-radius:10px; background:rgba(0,0,0,0.3); border:1px solid ${isOK ? '#2ecc71' : '#eb4d4b'}; text-align:center">
                        <i class="fa ${isOK ? 'fa-check-circle' : 'fa-tools'}" style="color:${isOK ? '#2ecc71' : '#eb4d4b'}"></i><br>
                        <b style="font-size:12px">${e}</b><br>
                        <span style="font-size:9px; color:${isOK ? '#2ecc71' : '#eb4d4b'}">${d.status.toUpperCase()}</span>
                        ${this.user.cargo === 'NTI' ? `<button class="btn" style="margin-top:8px; font-size:8px; height:20px; padding:0" onclick="app.toggleEquip('${e}')">MODIFICAR</button>` : ''}
                    </div>`;
                    let exist = document.getElementById(id);
                    if(exist) exist.outerHTML = html; else lista.innerHTML += html;
                });
            });
        },

        notify(txt, color = "var(--prof)") {
            const toast = document.createElement('div');
            toast.className = 'toast animate__animated animate__fadeInRight';
            toast.style.borderRightColor = color;
            toast.innerHTML = txt;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => { toast.classList.replace('animate__fadeInRight', 'animate__fadeOutRight'); setTimeout(()=>toast.remove(), 500); }, 3500);
        },

        reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            if(!dt) return this.notify("Escolha uma data!", "var(--nti)");
            
            db.ref('reservas').push({ eq: eq, sl: document.getElementById('res-sl').value, dt: dt, u: this.user.nome });
            this.notify("Reserva Salva com Sucesso!");
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(!t.trim()) return;
            db.ref('chat').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        // FUNÇÕES EXCLUSIVAS NTI
        toggleEquip(name) {
            const id = name.replace(/\s/g, '');
            db.ref('equipamentos/'+id).once('value', s => {
                let curr = s.val() ? s.val().status : 'ativo';
                db.ref('equipamentos/'+id).set({ status: curr === 'ativo' ? 'manutencao' : 'ativo' });
            });
        },
        limparMural() { if(confirm("Limpar todo o chat?")) db.ref('chat').remove(); },
        apagarReserva(key) { db.ref('reservas/'+key).remove(); },
        setLock(v) { db.ref('lock').set(v); },
        enviarAviso() { db.ref('aviso_global').set(document.getElementById('input-aviso').value); }
    };

    app.init();
</script>
</body>
</html>
