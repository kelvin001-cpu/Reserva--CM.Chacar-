<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* --- TELA DE LOGIN ORIGINAL (MANTIDA IGUAL) --- */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(10px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        /* --- DASHBOARD (LAYOUT DA SUA FOTO) --- */
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 350px; gap: 20px; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.8); border: 1px solid rgba(0, 173, 239, 0.3); 
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }

        h3 { font-family: 'Orbitron'; font-size: 0.9rem; color: #00adef; border-bottom: 1px solid #333; padding-bottom: 8px; }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }

        /* --- OVERLAYS DE SEGURANÇA --- */
        #lock-screen, #pass-change-screen { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 99999; flex-direction: column; align-items: center; justify-content: center; 
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="font-family: Orbitron; color: var(--nti)">ACESSO BLOQUEADO</h1>
        <p>Aguarde a autorização do NTI (Kelvin) para liberar seu perfil.</p>
        <button class="btn" style="width:200px; background:#333" onclick="location.reload()">VOLTAR</button>
    </div>

    <div id="pass-change-screen">
        <h2 style="font-family: Orbitron; color: var(--gestao)">NOVA SENHA OBRIGATÓRIA</h2>
        <input type="password" id="new-p-val" placeholder="Crie sua senha pessoal" style="width:300px">
        <button class="btn" style="width:300px; background:var(--cad)" onclick="app.salvarNovaSenha()">DEFINIR SENHA</button>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome Completo"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Solicitar Cadastro</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel"><h3>Nova Reserva</h3><select id="res-eq"></select><input type="text" placeholder="Sala"><button class="btn" style="background:var(--prof)">RESERVAR</button></div>
                
                <div id="nti-monitor" class="panel" style="display:none; border-color: var(--nti)">
                    <h3>PAINEL DE CONTROLE NTI</h3>
                    <div id="user-list-admin" style="max-height: 200px; overflow-y:auto; font-size: 11px;"></div>
                    <hr>
                    <input type="number" id="adm-target" placeholder="Prontuário">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
                        <button class="btn" style="background:var(--cad)" onclick="app.adminAcao('autorizar')">AUTORIZAR</button>
                        <button class="btn" style="background:var(--nti)" onclick="app.adminAcao('bloquear')">BLOQUEAR/EXCLUIR</button>
                    </div>
                </div>
            </div>

            <div class="center-col">
                <div class="panel"><h3>Telemetria de Sistema</h3><canvas id="mainChart"></canvas></div>
                <div class="panel"><h3>Cronograma de Uso</h3><div id="lista-res"></div></div>
            </div>

            <div class="right-col">
                <div class="panel"><h3>Mural de Avisos</h3><div id="chat-box" style="height:150px; overflow-y:auto"></div><input type="text" id="chat-in"><button class="btn" style="background:var(--prof)" onclick="app.sendChat()">ENVIAR</button></div>
                <div class="panel"><h3>Feedback de Suporte</h3><div id="feedback-list"></div></div>
                <button class="btn" style="background:#eb4d4b" onclick="location.reload()">SAIR</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin', cargo:'NTI', pront:'46690', aprovado:true}; 
                return this.start(); 
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                const u = snap.val();
                if(!u.aprovado) return document.getElementById('lock-screen').style.display='flex';
                this.user = u;
                // Se a senha for a padrão, obriga a trocar
                if(u.pass === 'pmspmudar123') document.getElementById('pass-change-screen').style.display='flex';
                else this.start();
            } else { alert("Dados incorretos!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            db.ref('usuarios/'+p).set({ nome:n, pront:p, cargo:c, pass:'pmspmudar123', aprovado:false, online: false });
            alert("Cadastro enviado! Kelvin precisa te autorizar.");
        },

        salvarNovaSenha() {
            const nv = document.getElementById('new-p-val').value;
            if(nv.length < 4) return alert("Senha muito curta!");
            db.ref('usuarios/'+this.user.pront+'/pass').set(nv).then(()=> location.reload());
        },

        start() {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('pass-change-screen').style.display='none';
            document.getElementById('main-system').style.display='block';

            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-monitor').style.display='block';
                this.iniciarMonitoramento();
            }

            // Marca como Online
            db.ref('usuarios/'+this.user.pront+'/online').set(true);
            db.ref('usuarios/'+this.user.pront+'/online').onDisconnect().set(false);

            this.sync();
        },

        iniciarMonitoramento() {
            db.ref('usuarios').on('value', snap => {
                const box = document.getElementById('user-list-admin');
                box.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val();
                    box.innerHTML += `<div><span class="status-dot" style="background:${d.online?'#2ecc71':'#555'}"></span><b>${d.nome}</b> (${d.pront}) - ${d.aprovado?'OK':'PENDENTE'}</div>`;
                });
            });
        },

        adminAcao(tipo) {
            const p = document.getElementById('adm-target').value;
            if(!p) return;
            if(tipo === 'autorizar') db.ref('usuarios/'+p+'/aprovado').set(true);
            if(tipo === 'bloquear') db.ref('usuarios/'+p).remove(); // Remove e bloqueia
            alert("Feito!");
        },

        sync() {
            db.ref('chat').limitToLast(10).on('value', s => {
                const b = document.getElementById('chat-box'); b.innerHTML = "";
                s.forEach(m => { b.innerHTML += `<div><b>${m.val().n}:</b> ${m.val().t}</div>`; });
            });
        },
        sendChat() { db.ref('chat').push({ n:this.user.nome, t: document.getElementById('chat-in').value }); document.getElementById('chat-in').value=""; }
    };
</script>
</body>
</html>
