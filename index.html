<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v2.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.96);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* TELA DE LOGIN EM COLUNAS SEPARADAS */
        .login-container { display: flex; width: 100%; height: 100vh; background: var(--bg-overlay); }
        
        .sector-column { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 30px; transition: 0.5s; 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        
        .sector-column:hover { background: rgba(255,255,255,0.03); flex: 1.2; }
        .sector-column i { font-size: 45px; margin-bottom: 15px; }
        .sector-column h2 { font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px; }

        input { 
            width: 80%; padding: 10px; margin: 5px 0; border-radius: 5px; 
            border: 1px solid #333; background: rgba(0,0,0,0.5); color: white;
        }

        .btn { 
            padding: 10px; border: none; border-radius: 5px; cursor: pointer; 
            font-weight: bold; width: 85%; margin-top: 10px; text-transform: uppercase;
        }

        /* PAINEL INTERNO RESTRITO */
        #main-system { padding: 20px; background: var(--bg-overlay); height: 100vh; box-sizing: border-box; }
        
        .top-bar { display: flex; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid #333; margin-bottom: 15px; }

        .grid-layout { display: grid; grid-template-columns: 300px 1fr 320px; gap: 15px; height: 80vh; }
        
        .panel { 
            background: rgba(20, 22, 28, 0.8); padding: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); overflow-y: auto;
        }

        .ticket { background: #161b22; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--prof); font-size: 12px; }
        .chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="sector-column" style="border-top: 4px solid var(--prof);">
            <i class="fa fa-graduation-cap" style="color:var(--prof)"></i>
            <h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button>
        </div>

        <div class="sector-column" style="border-top: 4px solid var(--gestao);">
            <i class="fa fa-user-tie" style="color:var(--gestao)"></i>
            <h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário">
            <input type="password" id="g-s" placeholder="Senha">
            <button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button>
        </div>

        <div class="sector-column" style="border-top: 4px solid var(--secre);">
            <i class="fa fa-building-columns" style="color:var(--secre)"></i>
            <h2>SECRETARIA</h2>
            <input type="number" id="s-p" placeholder="Prontuário">
            <input type="password" id="s-s" placeholder="Senha">
            <button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button>
        </div>

        <div class="sector-column" style="border-top: 4px solid var(--nti);">
            <i class="fa fa-microchip" style="color:var(--nti)"></i>
            <h2>NTI MASTER</h2>
            <input type="number" id="n-p" placeholder="ID">
            <input type="password" id="n-s" placeholder="Senha">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <div class="top-bar">
            <div><b id="display-cargo" style="font-family:'Orbitron'"></b> | <span id="display-nome"></span></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:white; cursor:pointer; border-radius:4px">Sair</button>
        </div>

        <div class="grid-layout">
            <div class="panel">
                <div id="func-professor" class="hidden">
                    <h3 style="color:var(--prof)">Reservar Equipamento</h3>
                    <select id="res-eq"><option>TV 01</option><option>ChromeBooks</option></select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                    
                    <h3 style="margin-top:30px; color:var(--nti)">Solicitar Reparo</h3>
                    <textarea id="cha-desc" placeholder="Descreva o problema..." rows="3" style="width:90%; background:black; color:white; border:1px solid #333; padding:5px"></textarea>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Enviar ao NTI</button>
                </div>

                <div id="func-nti" class="hidden">
                    <h3 style="color:var(--nti)">Ferramentas Master</h3>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.setLock(true)">Bloquear Sistema</button>
                    <button class="btn" style="background:#2ecc71; color:white" onclick="app.setLock(false)">Liberar Sistema</button>
                    <hr style="opacity:0.1; margin:20px 0">
                    <p style="font-size:11px">Status do Servidor: <br><b>Estável 100%</b></p>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-eye"></i> Monitoramento</h3>
                <canvas id="meuGrafico" height="100"></canvas>
                <div id="lista-atividades" style="margin-top:20px"></div>
            </div>

            <div class="panel">
                <div style="display:flex; gap:5px; margin-bottom:10px">
                    <button class="btn" style="font-size:10px; background:#333; color:white" onclick="app.setChat('geral')">GERAL</button>
                    <button class="btn" id="btn-chat-nti" style="font-size:10px; background:var(--nti); color:white" onclick="app.setChat('nti')">NTI</button>
                </div>
                <div id="chat-box" class="chat-box"></div>
                <input type="text" id="chat-in" placeholder="Mensagem..." style="width:70%; background:black; color:white; border:1px solid #333; padding:8px">
                <button onclick="app.sendChat()" style="width:20%; padding:8px; background:var(--prof); border:none; color:white; cursor:pointer">Ir</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        chat: 'geral',

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            // Lógica Master NTI
            if(cargo === 'NTI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin Master', cargo: 'NTI', pront: '46690'};
            } else {
                const snap = await db.ref('usuarios/'+p).once('value');
                if(snap.exists() && snap.val().pass === s) {
                    this.user = snap.val();
                } else { return alert("Acesso negado."); }
            }
            this.start();
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').classList.remove('hidden');
            document.getElementById('display-cargo').innerText = this.user.cargo;
            document.getElementById('display-nome').innerText = this.user.nome;

            // AQUI ESTÁ O QUE VOCÊ PEDIU: FUNÇÕES SEPARADAS POR CARGO
            if(this.user.cargo === 'NTI') {
                document.getElementById('func-nti').classList.remove('hidden');
            } else if(this.user.cargo === 'Professor' || this.user.cargo === 'Secretaria') {
                document.getElementById('func-professor').classList.remove('hidden');
            }

            this.initGrafico();
            this.sync();
        },

        sync() {
            // Sincroniza Cronograma e Atividade
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-atividades');
                list.innerHTML = "<h4>Cronograma de Uso</h4>";
                snap.forEach(r => {
                    const d = r.val();
                    list.innerHTML += `<div class="ticket"><b>${d.eq}</b> - ${d.u}<br><small>${new Date(d.dt).toLocaleString()}</small></div>`;
                });
            });

            // Sincroniza Chat
            db.ref('chats/'+this.chat).limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    box.innerHTML += `<div style="font-size:11px; margin-bottom:5px"><b>${d.n}:</b> ${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Selecione a data!");
            db.ref('reservas').push({ eq, dt, u: this.user.nome });
        },

        abrirChamado() {
            const desc = document.getElementById('cha-desc').value;
            if(!desc) return;
            db.ref('chamados').push({ desc, u: this.user.nome, status: 'aberto' });
            alert("Enviado ao NTI!");
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(!t) return;
            db.ref('chats/'+this.chat).push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        setChat(c) { this.chat = c; this.sync(); },
        setLock(v) { db.ref('lock').set(v); },

        initGrafico() {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: ['08h','12h','18h'], datasets: [{ label: 'Uso', data: [5, 12, 8], borderColor: '#00adef' }] },
                options: { plugins: { legend: { display: false } } }
            });
        }
    };
</script>
</body>
</html>
