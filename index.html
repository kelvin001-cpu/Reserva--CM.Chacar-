<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CONECT NTI - V4 ATUALIZADO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0a0b10; color: white; }
        
        /* TELA DE MANUTENÇÃO (BLOQUEIO) */
        #lock-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        
        /* MURAL DE ANÚNCIOS */
        #mural { display: none; background: #eb4d4b; padding: 15px; text-align: center; font-weight: bold; border-bottom: 3px solid white; }

        .login-screen { display: flex; width: 100%; height: 100vh; position: fixed; z-index: 999; background: #0a0b10; }
        .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border: 1px solid #222; }
        input, select { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; background: #000; color: #fff; border: 1px solid #444; }
        .btn { width: 85%; padding: 12px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; margin-top: 5px; }
        
        #main { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .chat-box { height: 150px; overflow-y: auto; background: #000; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .msg { font-size: 12px; margin-bottom: 5px; padding: 5px; border-radius: 5px; background: #222; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <i class="fa fa-exclamation-triangle fa-4x" style="color:var(--nti)"></i>
        <h1>SISTEMA BLOQUEADO PARA MANUTENÇÃO</h1>
        <p>O NTI está trabalhando no momento.</p>
    </div>

    <div class="login-screen" id="view-login">
        <div class="col" style="border-top:5px solid var(--prof)"><h2>PROFESSOR</h2><input id="l-p-u" placeholder="Prontuário"><input type="password" id="l-p-s" placeholder="Senha"><button class="btn" style="background:var(--prof)" onclick="core.login('l-p')">Entrar</button></div>
        <div class="col" style="border-top:5px solid var(--gestao)"><h2>GESTÃO</h2><input id="l-g-u" placeholder="Prontuário"><input type="password" id="l-g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="core.login('l-g')">Entrar</button></div>
        <div class="col" style="border-top:5px solid var(--secre)"><h2>SECRETARIA</h2><input id="l-s-u" placeholder="Prontuário"><input type="password" id="l-s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="core.login('l-s')">Entrar</button></div>
        
        <div class="col" style="border-top:5px solid var(--cad)">
            <h2>CADASTRO</h2>
            <input id="reg-n" placeholder="Nome">
            <input id="reg-p" placeholder="Prontuário">
            <select id="reg-c" onchange="core.updateHint()">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <p id="hint" style="font-size:11px; color:var(--cad)">Senha: pmspmudar123</p>
            <button class="btn" style="background:var(--cad)" onclick="core.register()">Criar Conta</button>
        </div>

        <div class="col" style="border-top:5px solid var(--nti)"><h2>NTI</h2><input id="l-n-u" placeholder="ID"><input type="password" id="l-n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="core.login('l-n')">Painel</button></div>
    </div>

    <div id="main">
        <div id="mural"></div>
        <div class="grid">
            <div class="card">
                <h3 id="u-name">Usuário</h3>
                <div id="nti-panel" style="display:none">
                    <h4 style="color:var(--nti)">CONTROLE MASTER</h4>
                    <button class="btn" style="background:orange" onclick="core.setLock(true)">Bloquear Site</button>
                    <button class="btn" style="background:green" onclick="core.setLock(false)">Desbloquear</button>
                    <hr>
                    <input id="ann-text" placeholder="Aviso do mural...">
                    <button class="btn" style="background:var(--prof)" onclick="core.setAnn()">Postar no Mural</button>
                </div>
                <button class="btn" style="background:#333; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="card">
                <h3>Monitoramento</h3>
                <canvas id="chart1" height="150"></canvas>
                <h4>Reservas Ativas</h4>
                <div id="res-list"></div>
            </div>

            <div class="card">
                <h4>Chat Geral</h4>
                <div id="chat-g" class="chat-box"></div>
                <input id="in-g" placeholder="Texto..."><button onclick="core.send('chat_geral', 'in-g')">Enviar</button>
                
                <h4 style="margin-top:20px">Suporte NTI</h4>
                <div id="chat-p" class="chat-box"></div>
                <input id="in-p" placeholder="Falar com Kelvin..."><button onclick="core.send('chat_p', 'in-p')">Enviar</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const core = {
        user: null,

        updateHint() {
            const c = document.getElementById('reg-c').value;
            const h = document.getElementById('hint');
            if(c==='Gestão') h.innerText = "Senha: pmspgestores2026";
            else if(c==='Secretaria') h.innerText = "Senha: pmspsecretaria2026";
            else h.innerText = "Senha: pmspmudar123";
        },

        async register() {
            const n = document.getElementById('reg-n').value, p = document.getElementById('reg-p').value, c = document.getElementById('reg-c').value;
            let s = "pmspmudar123";
            if(c==='Gestão') s = "pmspgestores2026";
            if(c==='Secretaria') s = "pmspsecretaria2026";
            if(n && p) {
                await db.ref('usuarios/'+p).set({nome:n, cargo:c, pass:s, pront:p});
                alert("Cadastrado! Senha: " + s);
            }
        },

        async login(pre) {
            const u = document.getElementById(pre+'-u').value, s = document.getElementById(pre+'-s').value;
            if(u==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; return this.start(); }
            
            const snap = await db.ref('usuarios/'+u).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val();
                this.start();
            } else { alert("Erro no Login!"); }
        },

        start() {
            document.getElementById('view-login').style.display='none';
            document.getElementById('main').style.display='block';
            document.getElementById('u-name').innerText = this.user.nome;
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').style.display='block';
            this.sync();
        },

        sync() {
            db.ref('config/lock').on('value', s => {
                document.getElementById('lock-screen').style.display = (s.val() && this.user.cargo !== 'NTI') ? 'flex' : 'none';
            });
            db.ref('config/ann').on('value', s => {
                const m = document.getElementById('mural');
                if(s.val()) { m.innerText = s.val(); m.style.display='block'; } else { m.style.display='none'; }
            });
            this.listen('chat_geral', 'chat-g');
            this.listen('chat_p', 'chat-p');
        },

        listen(path, id) {
            db.ref(path).limitToLast(10).on('value', s => {
                const box = document.getElementById(id); box.innerHTML = "";
                s.forEach(d => { box.innerHTML += `<div class="msg"><b>${d.val().u}:</b> ${d.val().t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        },

        send(path, id) {
            const t = document.getElementById(id).value;
            if(t) { db.ref(path).push({u:this.user.nome, t:t}); document.getElementById(id).value=""; }
        },

        setLock(v) { db.ref('config/lock').set(v); },
        setAnn() { db.ref('config/ann').set(document.getElementById('ann-text').value); }
    };
</script>
</body>
</html>
