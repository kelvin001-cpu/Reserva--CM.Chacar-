<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Listas de Acesso Restrito (Hardcoded para segurança inicial)
    const autorizadosGestao = ['44244', '35102', '46690'];
    const autorizadosSecretaria = ['46684', '4236', '46690'];

    const app = {
        user: null,
        currentTicket: null,
        charts: {},

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            // Validação de Segurança por Setor
            if(cargo === 'Gestão' && !autorizadosGestao.includes(p)) {
                return alert("Acesso Negado: Prontuário não autorizado para GESTÃO.");
            }
            if(cargo === 'Secretaria' && !autorizadosSecretaria.includes(p)) {
                return alert("Acesso Negado: Prontuário não autorizado para SECRETARIA.");
            }

            // Master Login NTI
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin (Admin)', cargo:'NTI', pront:'46690'}; 
                return this.start(); 
            }
            
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val();
                this.start();
                this.logAtividade(`Login realizado`);
            } else { alert("Erro: Credenciais inválidas."); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo.");
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Cadastrado com sucesso!"));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-master-panel').classList.remove('hidden');
                document.getElementById('nti-charts-area').classList.remove('hidden');
                this.carregarGerenciamentoUsuarios(); // Nova função
                this.initCharts();
            } else if (this.user.cargo === 'Gestão') {
                document.getElementById('nti-charts-area').classList.remove('hidden');
                this.initCharts();
            }
            
            this.syncData();
            this.carregarEquipamentos();
        },

        // --- NOVO: Gerenciamento de Usuários (Painel NTI) ---
        carregarGerenciamentoUsuarios() {
            const panel = document.getElementById('nti-master-panel');
            const userMgmtHtml = `
                <h4 style="margin-top:20px; color:var(--cad)">Controle de Funcionários</h4>
                <div id="user-list-admin" style="max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; font-size:12px"></div>
            `;
            panel.insertAdjacentHTML('beforeend', userMgmtHtml);

            db.ref('usuarios').on('value', snap => {
                const box = document.getElementById('user-list-admin'); box.innerHTML = "";
                snap.forEach(u => {
                    let d = u.val();
                    box.innerHTML += `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #333; padding:3px">
                            <span>${d.nome} (${d.cargo})</span>
                            <button onclick="app.removerUsuario('${u.key}')" style="background:none; border:none; color:red; cursor:pointer"><i class="fa fa-trash"></i></button>
                        </div>`;
                });
            });
        },

        removerUsuario(pront) {
            if(confirm(`Remover prontuário ${pront} do sistema?`)) db.ref('usuarios/'+pront).remove();
        },

        syncData() {
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display='flex'; else document.getElementById('lock-overlay').style.display='none'; });
            
            db.ref('aviso_global').on('value', s => {
                const ribbon = document.getElementById('alert-ribbon');
                if(s.val()) { ribbon.style.display = 'block'; document.getElementById('alert-text').innerText = s.val(); }
                else { ribbon.style.display = 'none'; }
            });

            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    let side = d.n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    let d = r.val();
                    let dataFormat = new Date(d.dt).toLocaleString('pt-BR');
                    box.innerHTML += `
                        <div class="res-item">
                            <div>
                                <strong style="color:var(--prof)">${d.eq}</strong><br>
                                <small><i class="fa fa-user"></i> ${d.u} | <i class="fa fa-door-open"></i> Sala: ${d.sl}</small><br>
                                <small><i class="fa fa-clock"></i> ${dataFormat}</small>
                            </div>
                            <button class="status-badge bg-manutencao" style="border:none; cursor:pointer" onclick="app.baixarReserva('${r.key}')">Liberar</button>
                        </div>`;
                });
            });

            db.ref('chamados').on('value', snap => {
                let abertos = 0;
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto') {
                        abertos++;
                        if(d.pront === this.user.pront || this.user.cargo === 'NTI') {
                            this.currentTicket = c.key;
                            this.abrirInterfaceChamado(d);
                        }
                    }
                });
                if(this.charts.chamados) this.updateChart('chamados', [abertos]);
            });
        },

        abrirInterfaceChamado(dados) {
            document.getElementById('active-ticket-area').classList.remove('hidden');
            // AGORA O BOTÃO APARECE PARA AMBOS (USUÁRIO E NTI)
            document.getElementById('btn-finalizar').classList.remove('hidden');
            
            db.ref('chat_nti/'+this.currentTicket).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    let side = d.n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        finalizarChamado() {
            let nota = prompt("Avalie o suporte de 1 a 5:", "5");
            let coment = prompt("Deixe seu feedback:");
            db.ref('avaliacoes').push({ nota, txt: coment, autor: this.user.nome, data: Date.now() });
            db.ref('chamados/'+this.currentTicket+'/status').set('resolvido');
            document.getElementById('active-ticket-area').classList.add('hidden');
            this.currentTicket = null;
            alert("Atendimento encerrado. Obrigado!");
        },

        // Métodos de apoio originais mantidos...
        enviarAviso() { const txt = document.getElementById('input-aviso').value; db.ref('aviso_global').set(txt); document.getElementById('input-aviso').value = ""; },
        baixarReserva(id) { if(confirm("Liberar equipamento?")) db.ref('reservas/'+id).remove(); },
        abrirChamado() {
            const desc = document.getElementById('chamado-desc').value;
            const grau = document.getElementById('chamado-grau').value;
            if(!desc) return;
            const newKey = db.ref('chamados').push().key;
            db.ref('chamados/'+newKey).set({ u: this.user.nome, pront: this.user.pront, t: desc, grau: grau, status: 'aberto', data: Date.now() });
            document.getElementById('chamado-desc').value = "";
        },
        sendChatNTI() { const t = document.getElementById('chat-nti-in').value; if(!t) return; db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: t }); document.getElementById('chat-nti-in').value = ""; },
        carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            sel.innerHTML = ""; lista.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let cardId = 'card-'+e.replace(/\s/g, '');
                    let exist = document.getElementById(cardId);
                    let content = `<strong>${e}</strong> <br><span class="status-badge ${d.status === 'ativo' ? 'bg-ativo' : 'bg-manutencao'}">${d.status.toUpperCase()}</span>
                        ${this.user.cargo === 'NTI' ? `<button onclick="app.toggleManutencao('${e}', '${d.status}')" style="display:block; margin-top:5px; font-size:10px">Alterar Status</button>` : ''}`;
                    if(exist) exist.innerHTML = content; 
                    else {
                        let div = document.createElement('div'); div.id = cardId; div.className = "fade-up";
                        div.style = "padding:12px; border:1px solid #444; border-radius:8px; background:rgba(0,0,0,0.2)";
                        div.innerHTML = content; lista.appendChild(div);
                    }
                });
            });
        },
        toggleManutencao(id, status) { db.ref('equipamentos/'+id+'/status').set(status === 'ativo' ? 'manutencao' : 'ativo'); },
        resetSenha() { let p = document.getElementById('reset-pront').value; if(p) db.ref('usuarios/'+p+'/pass').set('pmspmudar123'); alert("Senha resetada!"); },
        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(!sl || !dt) return alert("Preencha tudo!");
            db.ref('reservas').push({ eq, sl, dt, u: this.user.nome });
        },
        sendChat() { const t = document.getElementById('chat-in').value; if(!t) return; db.ref('chat').push({ n: this.user.nome, t: t }); document.getElementById('chat-in').value = ""; },
        setLock(v) { db.ref('lock').set(v); },
        logAtividade(acao) { db.ref('logs').push({ u: this.user.nome, acao: acao, time: Date.now() }); },
        initCharts() {
            const cfg = { plugins: { legend: { display: false } } };
            this.charts.users = new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h','20h'], datasets: [{ label: 'Acessos', data: [12, 45, 30, 10], borderColor: '#00adef' }] }, options: { plugins: { title: { display: true, text: 'Acessos', color: '#fff' } } } });
            this.charts.chamados = new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Tickets'], datasets: [{ data: [0], backgroundColor: '#eb4d4b' }] }, options: { plugins: { title: { display: true, text: 'Abertos', color: '#fff' } } } });
            this.charts.equip = new Chart(document.getElementById('chartEquip'), { type: 'doughnut', data: { labels: ['Uso', 'Livre'], datasets: [{ data: [40, 60], backgroundColor: ['#f1c40f', '#2ecc71'] }] } });
            this.charts.manut = new Chart(document.getElementById('chartManutencao'), { type: 'pie', data: { labels: ['OK', 'Reparo'], datasets: [{ data: [90, 10], backgroundColor: ['#2ecc71', '#eb4d4b'] }] } });
        },
        updateChart(id, data) { if(this.charts[id]) { this.charts[id].data.datasets[0].data = data; this.charts[id].update(); } }
    };
</script>
