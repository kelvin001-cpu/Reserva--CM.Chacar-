<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --glass: rgba(15, 20, 30, 0.7); /* Vidro escuro */
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* --- MENUS SUPERIORES (NEW) --- */
        .navbar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { color: #ccc; text-decoration: none; font-size: 13px; font-weight: 500; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--prof); }

        /* --- LOGO E ANIMAÇÃO --- */
        .conect-banner {
            width: 100%; text-align: center; padding: 40px 0;
            animation: fadeInDown 1s ease-out;
        }
        .conect-banner h1 { 
            font-family: 'Orbitron'; margin: 0; font-size: 3.5rem; font-weight: 700;
            color: var(--prof); text-shadow: 0 0 25px rgba(0, 173, 239, 0.6); letter-spacing: 8px;
        }
        .conect-banner p { margin: 5px 0; font-size: 1.2rem; letter-spacing: 3px; font-weight: 300; text-transform: uppercase; }

        /* --- LOGIN GLASS --- */
        .login-container { display: flex; width: 100%; height: calc(100vh - 60px); flex-wrap: wrap; align-content: center; }
        .sector-column { 
            flex: 1; min-width: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; transition: 0.5s; border-right: 1px solid var(--border); 
            background: rgba(0,0,0,0.2); backdrop-filter: blur(4px);
        }
        .sector-column:hover { background: rgba(0,173,239,0.1); backdrop-filter: blur(10px); flex: 1.2; }
        
        /* --- PAINÉIS COM EFEITO VIDRO --- */
        #main-system { display: none; padding: 20px; animation: fadeInUp 0.8s ease; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { 
            background: var(--glass); 
            backdrop-filter: blur(15px); /* Aqui faz o papel de parede aparecer suave */
            padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }
        .panel:hover { transform: translateY(-5px); border-color: rgba(0, 173, 239, 0.3); }

        /* --- INPUTS --- */
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none;
        }
        input:focus { border-color: var(--prof); background: rgba(255,255,255,0.1); }
        .btn { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        /* --- ANIMAÇÕES KEYFRAMES --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CHAT ESTILIZADO --- */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--prof); border-radius: 10px; }
        .msg { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: translateX(0); } }

    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-family: 'Orbitron'; color: var(--prof); font-weight: bold;">NTI PORTAL</div>
        <div class="nav-links">
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="#" class="nav-item">Cronograma</a>
            <a href="#" class="nav-item">Equipamentos</a>
            <a href="#" class="nav-item">Suporte</a>
        </div>
        <div id="clock" style="font-size: 12px; opacity: 0.7;">00:00:00</div>
    </nav>

    <div class="login-container" id="login-screen">
        <div class="conect-banner">
            <h1>PROGRAMA CONECT</h1>
            <p>Construindo uma geração de vencedores</p>
        </div>

        <div class="sector-column" style="border-top: 4px solid var(--prof);"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2 style="color:var(--prof)">PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column" style="border-top: 4px solid var(--gestao);"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2 style="color:var(--gestao)">GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column" style="border-top: 4px solid var(--secre);"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2 style="color:var(--secre)">SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column" style="border-top: 4px solid var(--cad);"><i class="fa fa-user-plus fa-3x" style="color:var(--cad)"></i><h2 style="color:var(--cad)">CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column" style="border-top: 4px solid var(--nti);"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2 style="color:var(--nti)">NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner" style="padding: 20px 0;">
            <h1>PROGRAMA CONECT</h1>
            <p id="sub-tag" style="font-size: 0.9rem;">Painel de Controle Unificado</p>
        </div>

        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-tools" style="color:var(--prof)"></i> Operações</h3>
                <div id="user-info" style="font-size:12px; color:var(--prof); margin-bottom:15px"></div>
                <input type="text" id="chamado-desc" placeholder="Descreva o problema...">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Enviar ao NTI</button>
                <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0">
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV TOUCH</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Reservar Agora</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-chart-line" style="color:var(--cad)"></i> Monitoramento Real-Time</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; height: 300px;">
                    <div style="background:rgba(0,0,0,0.2); border-radius:10px; padding:10px;"><canvas id="chartStatus"></canvas></div>
                    <div style="background:rgba(0,0,0,0.2); border-radius:10px; padding:10px;"><canvas id="chartEquip"></canvas></div>
                </div>
                <h4 style="margin-top:20px"><i class="fa fa-list"></i> Próximas Reservas</h4>
                <div id="lista-res" style="max-height: 150px; overflow-y:auto"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments" style="color:var(--secre)"></i> Comunicação</h3>
                <div id="chat-box" style="height:350px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px; margin-bottom:10px; display:flex; flex-direction:column; gap:8px"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:10px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    // Relógio
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }, 1000);

    // [O restante do seu script Firebase original permanece igual aqui]
    // Apenas adicionei a chamada para esconder a tela de login com animação
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        login: async function(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') {
                this.user = {nome:'Kelvin', cargo:'NTI'};
                this.start();
            } else {
                const snap = await db.ref('usuarios/'+p).once('value');
                if(snap.exists() && String(snap.val().pass) === String(s)) {
                    this.user = snap.val();
                    this.start();
                } else { alert("Erro de login!"); }
            }
        },
        start: function() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-info').innerText = this.user.nome + " | " + this.user.cargo;
            this.initCharts();
            // Resto da sua sincronização sync()
        },
        initCharts: function() {
            Chart.defaults.color = '#fff';
            new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut', data: { datasets: [{data:[100], backgroundColor:['#2ecc71'], borderWidth:0}] },
                options: { plugins: { title: {display:true, text:'SISTEMA ONLINE'} } }
            });
            new Chart(document.getElementById('chartEquip'), {
                type: 'bar', data: { labels:['Uso'], datasets: [{data:[45], backgroundColor:['#00adef']}] },
                options: { plugins: { title: {display:true, text:'CARGA REDE'} } }
            });
        }
    };
</script>
</body>
</html>
