<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --dark-panel: rgba(15, 17, 23, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .hidden { display: none !important; }
        .grid-main { display: grid; grid-template-columns: 280px 1fr 300px; gap: 15px; padding: 15px; height: calc(100vh - 80px); }
        .panel { background: var(--dark-panel); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); padding: 15px; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .top-bar { height: 60px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--prof); }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #1a1c23; color: white; font-size: 13px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; margin-top: 5px; }
        .chat-container { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; max-width: 90%; }
        .msg-nti { border-left: 3px solid var(--nti); background: rgba(235, 77, 75, 0.1); }
        .msg-user { border-left: 3px solid var(--prof); background: rgba(0, 173, 239, 0.1); }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--prof); }
        .stat-card h2 { margin: 5px 0; font-family: 'Orbitron'; font-size: 1.2rem; }
        .ticket { background: #1a1c23; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--nti); font-size: 12px; }
        .severity-critica { border-left-color: #ff0000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e272e 0%, #0a0b10 100%); }
    </style>
</head>
<body>

    <div id="login-area" class="login-screen">
        <div class="panel" style="width: 350px; text-align: center;">
            <h1 style="font-family:'Orbitron'; color:var(--prof)">CONECT NTI</h1>
            <input type="number" id="login-pront" placeholder="Prontuário">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.doLogin()">ACESSAR SISTEMA</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="top-bar">
            <div><b style="font-family:'Orbitron'; color:var(--prof)">PROGRAMA CONECT</b> <span id="user-display" style="margin-left:20px; font-size:12px; opacity:0.7"></span></div>
            <div id="global-status" style="font-size: 12px;"><i class="fa fa-circle" style="color:#2ecc71"></i> Servidor Online</div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer"><i class="fa fa-power-off"></i> Sair</button>
        </div>

        <div class="grid-main">
            <div class="panel">
                <h3 id="menu-title"><i class="fa fa-toolbox"></i> Menu Principal</h3>
                
                <div id="view-nti" class="hidden">
                    <div class="stat-card"><span>SISTEMA</span><h2 id="dash-uptime">99.9%</h2></div>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.toggleLock()">TRAVAR SISTEMA</button>
                    <button class="btn" style="background:#444; color:white" onclick="app.showResetPass()">RESETAR SENHA</button>
                    <hr>
                    <h4>Monitoramento Real-Time</h4>
                    <canvas id="chartNTIUsers"></canvas>
                </div>

                <div id="view-comum" class="hidden">
                    <h4>Reservar Equipamento</h4>
                    <select id="res-tipo">
                        <option>TV 01</option><option>TV 02</option>
                        <option>KIT MULTIMÍDIA</option><option>CARRINHO CHROMEBOOK</option>
                        <option>SALA INFORMÁTICA</option>
                    </select>
                    <input type="datetime-local" id="res-data">
                    <button class="btn" style="background:var(--cad); color:white" onclick="app.fazerReserva()">RESERVAR AGORA</button>
                    <hr>
                    <h4>Suporte Técnico</h4>
                    <select id="chamado-gravidade"><option value="baixa">Baixa</option><option value="media">Média</option><option value="critica">CRÍTICA</option></select>
                    <textarea id="chamado-txt" placeholder="Descreva o problema..." rows="3"></textarea>
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">ABRIR CHAMADO</button>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-calendar-alt"></i> Cronograma</h3>
                <div id="cronograma-lista"></div>
                <h4 style="margin-top:20px">Saúde dos Equipamentos</h4>
                <canvas id="chartEquipSaude" height="100"></canvas>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat</h3>
                <div id="chat-box" class="chat-container"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-input" placeholder="Mensagem...">
                    <button class="btn" style="width:50px; margin:0" onclick="app.sendMessage()"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const app = {
            user: null,

            async doLogin() {
                const p = document.getElementById('login-pront').value;
                const s = document.getElementById('login-pass').value;

                if(p === '46690' && s === 'nti2026') {
                    this.user = { nome: 'Kelvin Master', cargo: 'NTI', pront: p };
                } else {
                    const snap = await db.ref('usuarios/' + p).once('value');
                    if(snap.exists() && snap.val().pass === s) {
                        this.user = snap.val();
                    } else { return alert("Acesso Inválido!"); }
                }
                this.startSystem();
            },

            startSystem() {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = `${this.user.nome} | ${this.user.cargo}`;
                
                // SEPARAÇÃO DE MENUS AQUI
                if(this.user.cargo === 'NTI') {
                    document.getElementById('view-nti').classList.remove('hidden');
                } else {
                    document.getElementById('view-comum').classList.remove('hidden');
                }

                this.initCharts();
                this.listenData();
            },

            initCharts() {
                // Gráfico NTI (só renderiza se existir o canvas na tela do NTI)
                const c1 = document.getElementById('chartNTIUsers');
                if(c1) {
                    new Chart(c1.getContext('2d'), { type: 'line', data: { labels: ['08h','12h','18h'], datasets: [{ label: 'Acessos', data: [5, 19, 10], borderColor: '#00adef' }] } });
                }

                const ctx2 = document.getElementById('chartEquipSaude').getContext('2d');
                new Chart(ctx2, { type: 'bar', data: { labels: ['TVs', 'Chrome'], datasets: [{ label: 'Saúde %', data: [90, 75], backgroundColor: '#2ecc71' }] } });
            },

            listenData() {
                db.ref('reservas').on('value', snap => {
                    const container = document.getElementById('cronograma-lista');
                    container.innerHTML = "";
                    snap.forEach(res => {
                        const d = res.val();
                        container.innerHTML += `<div class="ticket"><b>${d.equip}</b> - Prof. ${d.user}</div>`;
                    });
                });

                db.ref('chats/geral').limitToLast(20).on('value', snap => {
                    const box = document.getElementById('chat-box');
                    box.innerHTML = "";
                    snap.forEach(m => {
                        const msg = m.val();
                        box.innerHTML += `<div class="msg"><b>${msg.nome}:</b> ${msg.texto}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                });
            },

            fazerReserva() {
                const equip = document.getElementById('res-tipo').value;
                const data = document.getElementById('res-data').value;
                if(!data) return alert("Selecione data");
                db.ref('reservas').push({ equip, data, user: this.user.nome });
            },

            sendMessage() {
                const txt = document.getElementById('chat-input').value;
                if(!txt) return;
                db.ref('chats/geral').push({ nome: this.user.nome, texto: txt });
                document.getElementById('chat-input').value = "";
            }
        };
    </script>
</body>
</html>
