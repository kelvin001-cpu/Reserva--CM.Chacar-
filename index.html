<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI - Cronograma Conect</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #00adef; --danger: #eb4d4b; --success: #2ecc71;
            --glass: rgba(15, 20, 25, 0.85);
        }

        body, html {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow: hidden; height: 100vh;
        }

        /* --- ANIMAÇÃO DE ENTRADA --- */
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes glow { from { text-shadow: 0 0 5px var(--accent); } to { text-shadow: 0 0 20px var(--accent); } }

        /* --- NAV BAR ANIMADA --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent); animation: slideInDown 0.8s ease;
        }
        .nav-brand { font-family: 'Orbitron'; font-weight: bold; font-size: 20px; color: var(--accent); animation: glow 2s infinite alternate; }
        
        /* --- CONTAINER PRINCIPAL --- */
        .main-container {
            display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px;
            height: calc(100vh - 100px); box-sizing: border-box;
        }

        /* --- PAINÉIS --- */
        .panel {
            background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; display: flex; flex-direction: column; overflow: hidden;
            animation: slideUp 0.6s ease forwards;
        }

        /* --- CRONOGRAMA VIRTUAL (TABELA) --- */
        .cronograma-wrapper { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        .reserva-card {
            background: rgba(255,255,255,0.05); margin-bottom: 12px; padding: 15px;
            border-radius: 12px; border-left: 5px solid var(--accent);
            transition: 0.3s; position: relative;
        }
        .reserva-card:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
        .reserva-card .time { font-family: 'Orbitron'; color: var(--accent); font-size: 14px; }
        .reserva-card .info { font-size: 15px; font-weight: 600; margin: 5px 0; }
        .reserva-card .user { font-size: 12px; opacity: 0.7; }

        /* --- BOTÕES E INPUTS --- */
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #444; background: rgba(0,0,0,0.5); color: white;
        }
        .btn {
            padding: 14px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(0,173,239,0.3);
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-danger { background: var(--danger); box-shadow: 0 4px 15px rgba(235,77,75,0.3); }

        /* --- LOGIN MODAL --- */
        #login-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: #111; padding: 40px; border-radius: 20px; width: 350px;
            border: 1px solid var(--accent); text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; color:var(--accent)">CONECT</h1>
            <p style="font-size: 12px; margin-bottom: 20px;">Painel de Acesso NTI</p>
            <input type="number" id="l-p" placeholder="Prontuário">
            <input type="password" id="l-s" placeholder="Senha">
            <button class="btn" style="width:100%" onclick="app.login()">Entrar no Sistema</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">PROGRAMA CONECT</div>
        <div id="user-tag" style="font-size: 14px;"></div>
        <div id="clock" style="font-family:'Orbitron'; color:var(--accent)">00:00:00</div>
    </nav>

    <div class="main-container">
        <div class="panel">
            <h3 style="margin-top:0"><i class="fa fa-plus-circle"></i> Agendar</h3>
            <label style="font-size: 12px;">Equipamento / Recurso</label>
            <select id="res-eq">
                <option>CHROMEBOOKS</option>
                <option>SALA DE INFORMÁTICA</option>
                <option>TV TOUCH</option>
                <option>KIT MULTIMÍDIA</option>
            </select>

            <label style="font-size: 12px;">Sala / Destino</label>
            <input type="text" id="res-sl" placeholder="Ex: Sala 05">

            <label style="font-size: 12px;">Data e Hora</label>
            <input type="datetime-local" id="res-dt">

            <button class="btn" onclick="app.reservar()">Confirmar Reserva</button>
            
            <hr style="border:0; border-top:1px solid #333; margin: 25px 0;">
            
            <h3><i class="fa fa-headset"></i> Suporte NTI</h3>
            <input type="text" id="ch-desc" placeholder="Qual o problema?">
            <button class="btn btn-danger" onclick="app.abrirChamado()">Abrir Chamado</button>
        </div>

        <div class="panel">
            <h3 style="margin-top:0"><i class="fa fa-calendar-alt"></i> Cronograma Virtual de Reservas</h3>
            <div class="cronograma-wrapper" id="cronograma-list">
                </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        login() {
            const p = document.getElementById('l-p').value;
            const s = document.getElementById('l-s').value;
            
            // Login Rápido Kelvin
            if(p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI'};
                this.start();
            } else {
                db.ref('usuarios/'+p).once('value', snap => {
                    if(snap.exists() && String(snap.val().pass) === s) {
                        this.user = snap.val();
                        this.start();
                    } else { alert("Usuário ou senha inválidos."); }
                });
            }
        },

        start() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('user-tag').innerHTML = `<i class="fa fa-user"></i> ${this.user.nome} (${this.user.cargo})`;
            this.sync();
            this.initClock();
        },

        initClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);
        },

        sync() {
            // Escuta Reservas e monta o Cronograma
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('cronograma-list');
                list.innerHTML = "";
                
                const items = [];
                snap.forEach(r => { items.push({key: r.key, ...r.val()}); });
                
                // Ordenar por data
                items.sort((a,b) => new Date(a.dt) - new Date(b.dt));

                items.forEach(d => {
                    const dataFormat = new Date(d.dt).toLocaleString('pt-BR');
                    list.innerHTML += `
                        <div class="reserva-card">
                            <div class="time"><i class="fa fa-clock"></i> ${dataFormat}</div>
                            <div class="info">${d.eq} — ${d.sl}</div>
                            <div class="user"><i class="fa fa-user-edit"></i> Reservado por: ${d.u}</div>
                            ${this.user.cargo === 'NTI' ? `<button onclick="app.deletar('${d.key}')" style="position:absolute; right:15px; top:15px; background:none; border:none; color:red; cursor:pointer"><i class="fa fa-trash"></i></button>` : ''}
                        </div>
                    `;
                });
            });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value;
            const sl = document.getElementById('res-sl').value;
            const dt = document.getElementById('res-dt').value;
            if(!sl || !dt) return alert("Preencha Sala e Data!");

            db.ref('reservas').push({
                eq, sl, dt, u: this.user.nome
            }).then(() => {
                alert("Reserva confirmada no cronograma!");
                document.getElementById('res-sl').value = "";
            });
        },

        abrirChamado() {
            const desc = document.getElementById('ch-desc').value;
            if(!desc) return;
            db.ref('chamados').push({u: this.user.nome, t: desc, status: 'Aberto'});
            alert("Chamado enviado ao NTI!");
            document.getElementById('ch-desc').value = "";
        },

        deletar(key) {
            if(confirm("Deseja remover esta reserva do cronograma?")) {
                db.ref('reservas/'+key).remove();
            }
        }
    };
</script>
</body>
</html>
