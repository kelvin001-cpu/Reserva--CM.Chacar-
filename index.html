<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect PRO - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Novas Classes */
        .pc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 15px; }
        .pc-item { padding: 10px; border-radius: 5px; text-align: center; font-size: 10px; cursor: pointer; border: 1px solid #444; }
        .pc-ativo { background: rgba(46, 204, 113, 0.3); border-color: var(--cad); }
        .pc-manutencao { background: rgba(235, 77, 75, 0.3); border-color: var(--nti); }
        
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--prof); object-fit: cover; }
        .user-nav-log { font-size: 11px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; margin-bottom: 3px; }

        /* Estilos Base Mantidos */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
        .panel { background: rgba(22, 27, 34, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; text-transform: uppercase; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; background: #111; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pwd-reset-overlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 style="font-family:Orbitron; color:var(--gestao)">PRIMEIRO ACESSO DETECTADO</h2>
        <p>Para sua segurança, crie uma nova senha pessoal:</p>
        <input type="password" id="new-pwd" placeholder="Nova Senha" style="width:300px">
        <button class="btn" style="background:var(--cad); width:300px" onclick="app.forceChangePassword()">Salvar Nova Senha</button>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column">
            <h1 style="font-family:Orbitron; color:var(--prof)">CONECT PRO</h1>
            <p>NTI CHÁCARA DAS PAULOAS</p>
            <input type="number" id="l-p" placeholder="Prontuário">
            <input type="password" id="l-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login()">Entrar no Sistema</button>
            <hr style="width:80%; margin:20px 0; opacity:0.2">
            <h3>Novo Cadastro</h3>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <input type="text" id="c-f" placeholder="Link da Foto de Perfil">
            <select id="c-u"><option value="Unica">Atua apenas nesta Unidade</option><option value="Multi">Atua em mais de uma Unidade</option></select>
            <select id="c-c">
                <option value="Professor">Professor</option>
                <option value="Gestão">Gestão</option>
                <option value="Secretaria">Secretaria</option>
            </select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.registrar()">Criar Minha Conta</button>
        </div>
    </div>

    <div id="main-system">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px">
            <div style="display:flex; align-items:center; gap:15px">
                <img id="user-img" class="profile-pic" src="">
                <div>
                    <h2 id="user-welcome" style="margin:0"></h2>
                    <small id="user-email" style="color:var(--prof)"></small>
                </div>
            </div>
            <button class="btn" style="width:150px; background:red" onclick="location.reload()">Sair</button>
        </div>

        <div class="grid-layout">
            <div class="col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-check"></i> Reservar Recurso</h3>
                    <select id="res-tipo" onchange="app.checkDisponibilidade()">
                        <option value="TV 01">TV 01</option>
                        <option value="TV 02">TV 02</option>
                        <option value="Kit Multimídia">Kit Multimídia</option>
                        <option value="Laboratório">Sala de Informática (Geral)</option>
                    </select>
                    <input type="datetime-local" id="res-data" onchange="app.checkDisponibilidade()">
                    <div id="res-status-msg" style="font-size:12px; margin:5px 0"></div>
                    <button id="btn-reservar" class="btn" style="background:var(--prof)" onclick="app.efetuarReserva()">Confirmar Agendamento</button>
                </div>

                <div id="nti-monitor" class="panel hidden">
                    <h3 style="color:var(--nti)">CONSOLE NTI: LIVE FEED</h3>
                    <div id="live-logs" style="height:200px; overflow-y:auto; background:#000; padding:10px; font-family:monospace; font-size:10px"></div>
                </div>
            </div>

            <div class="col">
                <div class="panel">
                    <h3><i class="fa fa-desktop"></i> Mapa de Assentos - Informática</h3>
                    <div class="pc-grid" id="mapa-pcs"></div>
                </div>
                
                <div class="panel">
                    <h3><i class="fa fa-laptop"></i> Carrinho de Chromebooks</h3>
                    <div class="pc-grid" id="mapa-chromes"></div>
                </div>
            </div>

            <div class="col">
                <div class="panel" id="admin-search" class="hidden">
                    <h3><i class="fa fa-search"></i> Investigação NTI</h3>
                    <input type="number" id="search-pront" placeholder="Pesquisar Prontuário">
                    <button class="btn" style="background:var(--nti)" onclick="app.investigarUsuario()">Rastrear Atividades</button>
                    <div id="search-result" style="margin-top:10px; font-size:11px"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-headset"></i> Chamado Técnico</h3>
                    <textarea id="chamado-txt" placeholder="Descreva o problema..." style="width:100%; height:80px; background:#111; color:#fff; border-radius:5px"></textarea>
                    <button class="btn" style="background:var(--nti)" onclick="app.enviarChamado()">Abrir Ticket</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        myIP: "0.0.0.0",

        async init() {
            // Captura IP para o NTI
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                this.myIP = data.ip;
            } catch(e) { this.myIP = "IP Protegido"; }
        },

        login() {
            const p = document.getElementById('l-p').value;
            const s = document.getElementById('l-s').value;
            
            db.ref('usuarios/'+p).once('value', snap => {
                if(snap.exists() && String(snap.val().pass) === s) {
                    this.user = snap.val();
                    if(this.user.pass === 'pmspmudar123' || this.user.pass === 'secretaria2026' || this.user.pass === 'pmspgestores2026') {
                        document.getElementById('pwd-reset-overlay').classList.remove('hidden');
                    } else {
                        this.start();
                    }
                } else { alert("Acesso Inválido!"); }
            });
        },

        registrar() {
            const n = document.getElementById('c-n').value;
            const p = document.getElementById('c-p').value;
            const c = document.getElementById('c-c').value;
            const f = document.getElementById('c-f').value || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const u = document.getElementById('c-u').value;

            if(!n || !p) return alert("Preencha Nome e Prontuário!");

            let passPadrao = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            
            db.ref('usuarios/'+p).set({
                nome: n, pront: p, cargo: c, foto: f, unidade: u,
                pass: passPadrao,
                email: n.toLowerCase().split(' ')[0] + '.' + p + '@edu.santanadeparnaiba.sp.gov.br',
                ip: this.myIP
            }).then(() => alert("Cadastrado! Use a senha padrão do seu cargo para o primeiro acesso."));
        },

        forceChangePassword() {
            const newP = document.getElementById('new-pwd').value;
            if(newP.length < 6) return alert("Senha muito curta!");
            db.ref('usuarios/'+this.user.pront+'/pass').set(newP).then(() => {
                alert("Senha atualizada! Faça login novamente.");
                location.reload();
            });
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-welcome').innerText = "Olá, " + this.user.nome;
            document.getElementById('user-email').innerText = this.user.email;
            document.getElementById('user-img').src = this.user.foto;

            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-monitor').classList.remove('hidden');
                document.getElementById('admin-search').classList.remove('hidden');
            }

            this.renderMapas();
            this.trackNavegacao("Entrou no Painel Principal");
            this.syncLogs();
        },

        trackNavegacao(acao) {
            db.ref('logs_navegacao').push({
                u: this.user.nome,
                p: this.user.pront,
                acao: acao,
                ip: this.myIP,
                time: new Date().toLocaleString()
            });
        },

        renderMapas() {
            // PCs da Sala de Info (Conforme sua lista)
            const mapa = document.getElementById('mapa-pcs');
            mapa.innerHTML = "";
            for(let i=1; i<=33; i++) {
                db.ref('hardware/pc_'+i).on('value', snap => {
                    const status = snap.val() ? snap.val().status : 'ativo';
                    const div = document.createElement('div');
                    div.className = `pc-item ${status === 'ativo' ? 'pc-ativo' : 'pc-manutencao'}`;
                    div.innerHTML = `PC ${i}<br><i class="fa fa-desktop"></i>`;
                    if(this.user.cargo === 'NTI') {
                        div.onclick = () => this.toggleHardware('pc_'+i, status);
                    }
                    mapa.appendChild(div);
                });
            }

            // Chromebooks
            const chromes = document.getElementById('mapa-chromes');
            chromes.innerHTML = "";
            for(let i=1; i<=39; i++) {
                db.ref('hardware/chrome_'+i).on('value', snap => {
                    const status = snap.val() ? snap.val().status : 'ativo';
                    const div = document.createElement('div');
                    div.className = `pc-item ${status === 'ativo' ? 'pc-ativo' : 'pc-manutencao'}`;
                    div.innerHTML = `CHB ${i}<br><i class="fa fa-laptop"></i>`;
                    if(this.user.cargo === 'NTI') div.onclick = () => this.toggleHardware('chrome_'+i, status);
                    chromes.appendChild(div);
                });
            }
        },

        toggleHardware(id, current) {
            const novo = current === 'ativo' ? 'manutencao' : 'ativo';
            db.ref('hardware/'+id+'/status').set(novo);
            this.trackNavegacao(`Alterou status do hardware ${id} para ${novo}`);
        },

        checkDisponibilidade() {
            const data = document.getElementById('res-data').value;
            const item = document.getElementById('res-tipo').value;
            if(!data) return;

            db.ref('reservas').orderByChild('data').equalTo(data).once('value', snap => {
                let ocupado = false;
                snap.forEach(r => { if(r.val().item === item) ocupado = true; });
                
                const msg = document.getElementById('res-status-msg');
                const btn = document.getElementById('btn-reservar');
                if(ocupado) {
                    msg.innerHTML = "❌ INDISPONÍVEL: Este recurso já está reservado neste horário.";
                    msg.style.color = "red";
                    btn.disabled = true;
                    btn.style.opacity = "0.5";
                } else {
                    msg.innerHTML = "✅ DISPONÍVEL: Horário livre para agendamento.";
                    msg.style.color = "var(--cad)";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }
            });
        },

        efetuarReserva() {
            const data = document.getElementById('res-data').value;
            const item = document.getElementById('res-tipo').value;
            db.ref('reservas').push({
                u: this.user.nome,
                p: this.user.pront,
                item: item,
                data: data
            }).then(() => {
                alert("Reserva confirmada!");
                this.trackNavegacao(`Reservou ${item} para ${data}`);
            });
        },

        syncLogs() {
            if(this.user.cargo !== 'NTI') return;
            db.ref('logs_navegacao').limitToLast(15).on('value', snap => {
                const box = document.getElementById('live-logs');
                box.innerHTML = "";
                snap.forEach(l => {
                    const d = l.val();
                    box.innerHTML += `<div class="user-nav-log">[${d.time}] ${d.u} (${d.ip}): ${d.acao}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        investigarUsuario() {
            const p = document.getElementById('search-pront').value;
            db.ref('logs_navegacao').orderByChild('p').equalTo(p).once('value', snap => {
                const res = document.getElementById('search-result');
                res.innerHTML = "<strong>Histórico Encontrado:</strong><br>";
                snap.forEach(l => {
                    res.innerHTML += `> ${l.val().time}: ${l.val().acao} (IP: ${l.val().ip})<br>`;
                });
            });
        }
    };

    app.init();
</script>
</body>
</html>
