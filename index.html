<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | EMEF CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.75);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* LOGIN 5 COLUNAS */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .sector-column:hover { flex: 1.4; background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); }

        /* TELA DE TROCA DE SENHA */
        #setup-password { display: none; position: fixed; inset: 0; background: var(--bg-overlay); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: rgba(22, 27, 34, 0.95); padding: 30px; border-radius: 15px; border: 1px solid var(--gestao); width: 350px; text-align: center; }

        #main-system { display: none; padding: 20px; padding-top: 70px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }

        .panel { background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-chalkboard-user fa-3x"></i><h2>PROFESSOR</h2>
            <input type="text" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao"><i class="fa fa-user-shield fa-3x"></i><h2>GESTÃO</h2>
            <input type="text" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2>
            <input type="text" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome"><input type="text" id="c-p" placeholder="Prontuário">
            <select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button>
        </div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2>
            <input type="text" id="n-p" placeholder="ID NTI"><input type="password" id="n-s" placeholder="Senha Master"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel NTI</button>
        </div>
    </div>

    <div id="setup-password">
        <div class="modal">
            <h3 style="color:var(--gestao)">Senha Padrão Detectada</h3>
            <p style="font-size: 13px;">Para sua segurança, crie uma senha pessoal agora:</p>
            <input type="password" id="new-pass" placeholder="Nova Senha">
            <input type="password" id="new-pass-confirm" placeholder="Confirme a Senha">
            <button class="btn" style="background:var(--cad); color:white; margin-top:10px" onclick="app.updatePassword()">Salvar e Acessar</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <h3 id="welcome">Olá</h3>
                <div id="nti-panel" class="hidden">
                    <h4 style="color:var(--nti)">Admin Master</h4>
                    <input type="text" id="res-p" placeholder="Prontuário">
                    <button class="btn" style="background:var(--gestao)" onclick="app.resetSenha()">Resetar p/ Padrão</button>
                </div>
                <button class="btn" style="background:#444; color:white; margin-top:10px" onclick="location.reload()">Sair</button>
            </div>
            </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        tempPront: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value.trim();
            const s = document.getElementById(pre+'-s').value.trim();

            if(cargo === 'NTI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin', cargo: 'NTI', pront: '46690'};
                return this.start();
            }

            const snap = await db.ref('usuarios/' + p).once('value');
            if(snap.exists()) {
                const d = snap.val();
                if(String(d.pass) === String(s)) {
                    this.user = d;
                    this.tempPront = p;

                    // Lista de senhas padrão
                    const padroes = ['pmspmudar123', 'gestao2026', 'secretaria2026'];
                    if(padroes.includes(s)) {
                        document.getElementById('setup-password').style.display = 'flex';
                    } else {
                        this.start();
                    }
                } else { alert("Senha incorreta!"); }
            } else { alert("Usuário não encontrado!"); }
        },

        async updatePassword() {
            const n1 = document.getElementById('new-pass').value.trim();
            const n2 = document.getElementById('new-pass-confirm').value.trim();
            
            if(n1.length < 4) return alert("A senha deve ter pelo menos 4 caracteres.");
            if(n1 !== n2) return alert("As senhas não coincidem.");

            await db.ref('usuarios/' + this.tempPront).update({ pass: n1 });
            alert("Senha pessoal definida!");
            document.getElementById('setup-password').style.display = 'none';
            this.start();
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('welcome').innerText = "Olá, " + this.user.nome;
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            let s = 'pmspmudar123';
            if(c === 'Gestão') s = 'gestao2026';
            if(c === 'Secretaria') s = 'secretaria2026';
            db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("Criado! Quando ele entrar com '" + s + "', o sistema pedirá uma senha pessoal.");
        },

        async resetSenha() {
            const p = document.getElementById('res-p').value;
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists()){
                const c = snap.val().cargo;
                let s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
                db.ref('usuarios/'+p).update({pass: s});
                alert("Resetado para a padrão: " + s);
            }
        }
    };
</script>
</body>
</html>
