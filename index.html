<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: #0b0e14;
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white;
            background: #080a0f; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 25px 0; background: #0b0e14; border-bottom: 2px solid #1a1f26; }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 2.8rem; color: #40a9ff; letter-spacing: 4px; }
        .conect-banner p { margin: 5px 0; font-size: 1rem; color: #fff; opacity: 0.8; text-transform: uppercase; }

        .grid-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 15px; padding: 15px; }
        .panel { background: #11151c; border-radius: 10px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* ESTILO DOS GRÁFICOS IGUAL À IMAGEM */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-card { background: #161b22; padding: 15px; border-radius: 8px; height: 230px; position: relative; }
        
        h3 { font-size: 14px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: #eee; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #080a0f; color: white; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }

        #chat-box { height: 300px; overflow-y: auto; background: #080a0f; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h1 style="font-family:'Orbitron'; color:var(--nti)">SISTEMA BLOQUEADO</h1>
        <p>Manutenção em andamento pelo NTI.</p>
    </div>

    <div id="main-system">
        <div class="conect-banner">
            <h1>PROGRAMA CONECT</h1>
            <p>NTI CHÁCARA - DASHBOARD</p>
        </div>

        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-cog"></i> Controle</h3>
                <div id="nti-admin">
                    <button class="btn" style="background:var(--nti); margin-bottom:10px" onclick="app.setLock(true)">Bloquear Site</button>
                    <button class="btn" style="background:var(--cad); color:black" onclick="app.setLock(false)">Desbloquear</button>
                    <hr style="border:0; border-top:1px solid #333; margin:15px 0">
                    <p style="font-size:12px">Resetar Usuário:</p>
                    <input type="number" id="reset-p" placeholder="Prontuário">
                    <button class="btn" style="background:var(--prof)" onclick="app.resetSenha()">Resetar Senha</button>
                </div>
                <button class="btn" style="background:#333; margin-top:30px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-chart-line"></i> Monitoramento em Tempo Real</h3>
                <div class="charts-grid">
                    <div class="chart-card"><canvas id="chartStatus"></canvas></div>
                    <div class="chart-card"><canvas id="chartEquip"></canvas></div>
                    <div class="chart-card"><canvas id="chartUsers"></canvas></div>
                    <div class="chart-card"><canvas id="chartChamados"></canvas></div>
                </div>
                <div style="background:#080a0f; padding:10px; margin-top:15px; border-radius:5px; font-size:12px; color:var(--prof)">
                    <b>SISTEMA:</b> Operação estável.
                </div>
                <h3 style="margin-top:15px">Agenda de Reservas</h3>
                <div id="lista-res"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Comunicação</h3>
                <div id="chat-box"></div>
                <h3>Chamados NTI</h3>
                <div id="lista-chamados" style="font-size:11px"></div>
            </div>
        </div>
    </div>

<script>
    const app = {
        initCharts() {
            Chart.defaults.color = '#888';
            Chart.defaults.font.family = 'Poppins';

            // 1. STATUS DO SERVIDOR (Doughnut Verde)
            new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Online', 'Manutenção'],
                    datasets: [{
                        data: [100, 0],
                        backgroundColor: ['#2ecc71', '#e74c3c'],
                        borderWidth: 0,
                        cutout: '70%'
                    }]
                },
                options: {
                    plugins: { 
                        title: { display: true, text: 'STATUS DO SERVIDOR', color: '#fff' },
                        legend: { position: 'bottom', labels: { boxWidth: 12 } }
                    }
                }
            });

            // 2. OCUPAÇÃO DE EQUIPAMENTOS (Barras Azuis)
            new Chart(document.getElementById('chartEquip'), {
                type: 'bar',
                data: {
                    labels: ['INFO', 'CHROME', 'TV'],
                    datasets: [{
                        label: 'Uso %',
                        data: [40, 80, 30],
                        backgroundColor: '#40a9ff'
                    }]
                },
                options: {
                    plugins: { title: { display: true, text: 'OCUPAÇÃO DE EQUIPAMENTOS', color: '#fff' }, legend: {display: false} },
                    scales: { y: { beginAtZero: true, max: 100, grid: { color: '#222' } }, x: { grid: { display: false } } }
                }
            });

            // 3. TRÁFEGO DA REDE (Linha Roxa Curvada)
            new Chart(document.getElementById('chartUsers'), {
                type: 'line',
                data: {
                    labels: ['08h', '10h', '12h', '14h', '16h'],
                    datasets: [{
                        label: 'Acessos',
                        data: [5, 12, 25, 18, 10],
                        borderColor: '#a55eea',
                        backgroundColor: 'rgba(165, 94, 234, 0.2)',
                        fill: true,
                        tension: 0.4 // Curvatura igual da foto
                    }]
                },
                options: {
                    plugins: { title: { display: true, text: 'TRÁFEGO DA REDE', color: '#fff' }, legend: {display: false} },
                    scales: { y: { grid: { color: '#222' } }, x: { grid: { display: false } } }
                }
            });

            // 4. CATEGORIA DE CHAMADOS (Polar Area Colorido)
            new Chart(document.getElementById('chartChamados'), {
                type: 'polarArea',
                data: {
                    labels: ['Hardware', 'Software', 'Rede'],
                    datasets: [{
                        data: [1.2, 1.8, 0.8],
                        backgroundColor: [
                            'rgba(241, 196, 15, 0.8)', // Amarelo
                            'rgba(46, 204, 113, 0.8)', // Verde
                            'rgba(231, 76, 60, 0.8)'   // Vermelho
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: { 
                        title: { display: true, text: 'CATEGORIA DE CHAMADOS', color: '#fff' },
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } }
                    },
                    scales: { r: { ticks: { display: false }, grid: { color: '#333' } } }
                }
            });
        },
        
        setLock(val) { /* Lógica Firebase para bloquear site */ alert("Site " + (val ? "Bloqueado" : "Liberado")); },
        resetSenha() { const p = document.getElementById('reset-p').value; alert("Senha do prontuário " + p + " resetada!"); }
    };

    // Iniciar tudo
    window.onload = () => {
        document.getElementById('main-system').style.display = 'block';
        app.initCharts();
    };
</script>
</body>
</html>
