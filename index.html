<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner {
            width: 100%; text-align: center; padding: 40px 0;
            background: linear-gradient(180deg, rgba(0,173,239,0.4) 0%, transparent 100%);
        }
        .conect-banner h1 { 
            font-family: 'Orbitron'; margin: 0; font-size: 3.5rem; font-weight: 700;
            color: var(--prof); text-shadow: 0 0 20px rgba(0, 173, 239, 0.8); letter-spacing: 5px;
        }
        .conect-banner p { margin: 10px 0 0 0; font-size: 1.2rem; letter-spacing: 3px; color: #fff; }

        @media (max-width: 768px) { .conect-banner h1 { font-size: 2rem; } .grid-layout { grid-template-columns: 1fr !important; } }

        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }

        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; }
        .msg-in { align-self: flex-start; background: #333; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        /* GRÁFICOS PROFISSIONAIS */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .chart-card { background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); height: 220px; position: relative; }
        canvas { width: 100% !important; height: 100% !important; }

        .btn-baixa { background: var(--cad); color: black; border: none; padding: 3px 7px; border-radius: 4px; font-size: 9px; cursor: pointer; font-weight: bold; }
        #nti-report { background: rgba(0, 173, 239, 0.1); border-left: 3px solid var(--prof); padding: 10px; font-size: 12px; margin-top: 10px; border-radius: 4px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="conect-banner" style="position: absolute; top: 0;">
            <h1>PROGRAMA CONECT</h1>
            <p>Construindo uma geração de vencedores</p>
        </div>
        <div style="display:flex; width:100%; height:100vh; align-items:center">
             <button class="btn" style="background:var(--nti); margin: auto; width: 200px;" onclick="app.login('n','NTI')">Entrar como NTI (Kelvin)</button>
        </div>
    </div>

    <div id="main-system">
        <div class="conect-banner">
            <h1>PROGRAMA CONECT</h1>
            <p>NTI CHÁCARA - DASHBOARD</p>
        </div>

        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-tools"></i> Controle</h3>
                <div id="user-info" style="margin-bottom:15px; font-size:12px; color:var(--prof)"></div>
                <h4>Abrir Chamado</h4>
                <input type="text" id="chamado-desc" placeholder="Descreva o problema...">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Enviar</button>
                <hr style="opacity:0.1">
                <h4>Equipamento</h4>
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV TOUCH</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Reservar</button>
                <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-chart-line"></i> Monitoramento em Tempo Real</h3>
                <div class="charts-grid">
                    <div class="chart-card"><canvas id="chartStatus"></canvas></div>
                    <div class="chart-card"><canvas id="chartEquip"></canvas></div>
                    <div class="chart-card"><canvas id="chartUsers"></canvas></div>
                    <div class="chart-card"><canvas id="chartChamados"></canvas></div>
                </div>
                <div id="nti-report" class="hidden"><b>SISTEMA:</b> <span id="report-text">Analisando dados...</span></div>
                <h4 style="margin-top:20px">Agenda de Reservas</h4>
                <div id="lista-res" style="max-height: 200px; overflow-y:auto"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Comunicação</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:8px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>
                <h4 style="margin-top:20px">Chamados NTI</h4>
                <div id="lista-chamados" style="height:150px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; font-size:11px"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        charts: {},

        async login(pre, cargo) {
            // Simplificado para teste, use seu sistema de prontuário aqui
            this.user = {nome: 'Kelvin', cargo: 'NTI'};
            this.start();
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-info').innerText = `Logado como: ${this.user.nome}`;
            if(this.user.cargo === 'NTI') document.getElementById('nti-report').classList.remove('hidden');
            this.initCharts();
            this.sync();
        },

        initCharts() {
            Chart.defaults.color = '#ffffffaa';
            Chart.defaults.font.family = 'Poppins';

            const options = (title) => ({
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                    title: { display: true, text: title, color: '#fff', font: { size: 14, weight: 'bold' } }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                }
            });

            // Status do Sistema
            this.charts.status = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: { labels: ['Online', 'Manutenção'], datasets: [{ data: [100, 0], backgroundColor: [ '#2ecc71', '#eb4d4b'], borderWidth: 0 }] },
                options: options('STATUS DO SERVIDOR')
            });

            // Uso de Equipamentos
            this.charts.equip = new Chart(document.getElementById('chartEquip'), {
                type: 'bar',
                data: { labels: ['INFO', 'CHROME', 'TV'], datasets: [{ label: 'Uso %', data: [40, 85, 30], backgroundColor: '#00adef' }] },
                options: options('OCUPAÇÃO DE EQUIPAMENTOS')
            });

            // Tráfego de Usuários
            this.charts.users = new Chart(document.getElementById('chartUsers'), {
                type: 'line',
                data: { labels: ['08h', '10h', '12h', '14h', '16h'], datasets: [{ label: 'Acessos', data: [5, 12, 25, 18, 10], borderColor: '#a55eea', tension: 0.4, fill: true, backgroundColor: 'rgba(165, 94, 234, 0.1)' }] },
                options: options('TRÁFEGO DA REDE')
            });

            // Chamados
            this.charts.chamados = new Chart(document.getElementById('chartChamados'), {
                type: 'polarArea',
                data: { labels: ['Hardware', 'Software', 'Rede'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#f1c40f', '#2ecc71', '#eb4d4b'] }] },
                options: options('CATEGORIA DE CHAMADOS')
            });
        },

        sync() {
            db.ref('chamados').on('value', snap => {
                const box = document.getElementById('lista-chamados'); box.innerHTML = "";
                let hardware = 0, software = 0;
                snap.forEach(c => {
                    const d = c.val();
                    hardware++; // Lógica simples para o gráfico
                    box.innerHTML += `<div style="border-bottom:1px solid #333; padding:5px; display:flex; justify-content:space-between">
                        <span>${d.u}: ${d.t}</span>
                        <button class="btn-baixa" onclick="app.darBaixa('${c.key}')">OK</button>
                    </div>`;
                });
                this.charts.chamados.data.datasets[0].data = [hardware, 2, 1];
                this.charts.chamados.update();
            });

            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                let count = 0;
                snap.forEach(r => {
                    count++; const d = r.val();
                    box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:5px; font-size:12px">
                        <b>${d.eq}</b> na ${d.sl} - <small>${new Date(d.dt).toLocaleString()}</small>
                    </div>`;
                });
                document.getElementById('report-text').innerText = count > 3 ? "Demanda alta de equipamentos." : "Operação estável.";
            });

            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        darBaixa(key) { if(confirm("Resolver chamado?")) db.ref('chamados/'+key).remove(); },
        abrirChamado() { const t = document.getElementById('chamado-desc').value; if(t) db.ref('chamados').push({u: this.user.nome, t: t}); document.getElementById('chamado-desc').value = ""; },
        reservar() { const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value; if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome}); },
        sendChat() { const t = document.getElementById('chat-in').value; if(t) db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in').value = ""; }
    };
</script>
</body>
</html>
