<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | EMEF CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg: #05070a; --panel: #0d1117; --border: rgba(255,255,255,0.08);
        }

        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #e6edf3; overflow-x: hidden; }

        /* TELA DE BLOQUEIO GLOBAL (CONTROLE NTI) */
        #maintenance-screen {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        /* LOGIN SEPARADO (ESTILO COLUNAS MELHORADO) */
        .login-grid { display: flex; height: 100vh; width: 100%; }
        .login-col { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-right: 1px solid var(--border); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; cursor: pointer;
        }
        .login-col:hover { flex: 2; background: rgba(255,255,255,0.02); }
        .login-col h2 { font-family: 'Orbitron'; font-size: 14px; margin: 15px 0; letter-spacing: 1px; }
        .form-box { width: 80%; max-width: 200px; opacity: 0; pointer-events: none; transition: 0.3s; }
        .login-col:hover .form-box { opacity: 1; pointer-events: auto; }

        /* DASHBOARD PRINCIPAL */
        #dashboard { display: none; padding-top: 70px; }
        nav { 
            position: fixed; top: 0; width: 100%; height: 60px; background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 1000;
        }

        .main-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; padding: 20px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }

        /* LISTAS E ITENS */
        .reserva-item { 
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; margin-bottom: 10px;
            border-left: 4px solid var(--prof); display: flex; justify-content: space-between; align-items: center;
        }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .btn { 
            border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; 
            transition: 0.2s; font-family: 'Poppins'; width: 100%; margin-top: 5px;
        }
        .btn-blue { background: var(--prof); color: white; }
        .btn-red { background: var(--nti); color: white; }

        input, select, textarea { 
            width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border); 
            background: #161b22; color: white; box-sizing: border-box;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="maintenance-screen">
        <i class="fa fa-screwdriver-wrench fa-4x" style="color:var(--nti)"></i>
        <h1 style="font-family: 'Orbitron'">SISTEMA BLOQUEADO</h1>
        <p>O Portal NTI está realizando atualizações de segurança.<br>Tente novamente em breve.</p>
    </div>

    <div class="login-grid" id="login-ui">
        <div class="login-col" style="color:var(--prof)">
            <i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSORES</h2>
            <div class="form-box">
                <input type="number" id="p-p" placeholder="Prontuário">
                <input type="password" id="p-s" placeholder="Senha">
                <button class="btn btn-blue" onclick="app.login('p', 'Professor')">Acessar</button>
            </div>
        </div>
        <div class="login-col" style="color:var(--gestao)">
            <i class="fa fa-shield-user fa-3x"></i><h2>GESTÃO</h2>
            <div class="form-box">
                <input type="number" id="g-p" placeholder="Prontuário">
                <input type="password" id="g-s" placeholder="Senha">
                <button class="btn" style="background:var(--gestao)" onclick="app.login('g', 'Gestão')">Acessar</button>
            </div>
        </div>
        <div class="login-col" style="color:var(--secre)">
            <i class="fa fa-file-signature fa-3x"></i><h2>SECRETARIA</h2>
            <div class="form-box">
                <input type="number" id="s-p" placeholder="Prontuário">
                <input type="password" id="s-s" placeholder="Senha">
                <button class="btn" style="background:var(--secre); color:white" onclick="app.login('s', 'Secretaria')">Acessar</button>
            </div>
        </div>
        <div class="login-col" style="color:var(--cad)">
            <i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <div class="form-box">
                <input type="text" id="c-n" placeholder="Nome">
                <input type="number" id="c-p" placeholder="Prontuário">
                <select id="c-c"><option>Professor</option><option>Secretaria</option><option>Gestão</option></select>
                <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button>
            </div>
        </div>
        <div class="login-col" style="color:var(--nti)">
            <i class="fa fa-microchip fa-3x"></i><h2>PORTAL NTI</h2>
            <div class="form-box">
                <input type="number" id="n-p" placeholder="ID NTI">
                <input type="password" id="n-s" placeholder="Senha Master">
                <button class="btn btn-red" onclick="app.login('n', 'TI')">Admin</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <nav>
            <div style="font-family:'Orbitron'; font-weight:bold; color:var(--prof)">NTI_CONTROL v2.0</div>
            <div id="user-tag" style="font-size:12px; opacity:0.7"></div>
            <button class="btn btn-red" style="width:auto; padding:5px 15px" onclick="location.reload()">LOGOUT</button>
        </nav>

        <div class="main-container">
            <div class="card">
                <h3>Ações do Setor</h3>
                <div id="prof-actions" class="hidden">
                    <label>Novo Agendamento:</label>
                    <select id="res-item">
                        <option>LABORATÓRIO INFO</option>
                        <option>CARRINHO CHROME 01</option>
                        <option>TV 4K - SALA 05</option>
                        <option>PROJETOR MÓVEL</option>
                    </select>
                    <input type="datetime-local" id="res-data">
                    <button class="btn btn-blue" onclick="app.reservar()">RESERVAR AGORA</button>
                </div>

                <div id="nti-actions" class="hidden">
                    <button class="btn btn-red" onclick="app.toggleLock()">BLOQUEAR SISTEMA</button>
                    <hr style="margin:15px 0; opacity:0.1">
                    <label>Reset de Senha:</label>
                    <input type="number" id="reset-p" placeholder="Prontuário">
                    <button class="btn btn-blue" onclick="app.resetSenha()">RESETAR</button>
                </div>
            </div>

            <div class="card">
                <h3 id="main-title">Cronograma de Uso</h3>
                <div id="content-list"></div>
                <div id="nti-charts" class="hidden">
                    <canvas id="usageChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Suporte NTI</h3>
                <div id="ticket-area">
                    <select id="ch-urg">
                        <option value="Baixa">🟢 Urgência Baixa</option>
                        <option value="Média">🟡 Urgência Média</option>
                        <option value="Alta">🔴 Urgência Alta</option>
                    </select>
                    <textarea id="ch-txt" rows="3" placeholder="Qual o problema?"></textarea>
                    <button class="btn btn-red" onclick="app.abrirChamado()">ABRIR CHAMADO</button>
                </div>
                <hr style="margin:20px 0; opacity:0.1">
                <h4>Avisos Gerais</h4>
                <div id="mural-avisos" style="font-size:12px; color:var(--gestao)"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        
        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            // Master Login
            if(cargo === 'TI' && p === '46690' && s === 'nti2026') {
                this.user = {nome: 'Kelvin Master', cargo: 'TI', pront: '46690'};
                return this.init();
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) {
                this.user = snap.val();
                this.init();
            } else { alert("Acesso negado."); }
        },

        init() {
            // Checar Bloqueio NTI
            db.ref('sistema_bloqueado').on('value', snap => {
                if(snap.val() === true && this.user.cargo !== 'TI') {
                    document.body.innerHTML = document.getElementById('maintenance-screen').innerHTML;
                    document.body.style.display = 'flex';
                }
            });

            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('user-tag').innerText = `${this.user.nome} (${this.user.cargo})`;

            if(this.user.cargo === 'Professor') document.getElementById('prof-actions').classList.remove('hidden');
            if(this.user.cargo === 'TI') {
                document.getElementById('nti-actions').classList.remove('hidden');
                document.getElementById('nti-charts').classList.remove('hidden');
                this.loadCharts();
            }
            this.sync();
        },

        sync() {
            // Sincroniza Reservas (Cronograma)
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('content-list');
                box.innerHTML = "";
                snap.forEach(res => {
                    const r = res.val();
                    box.innerHTML += `
                        <div class="reserva-item">
                            <div>
                                <b>${r.item}</b><br>
                                <small>${new Date(r.data).toLocaleString()} | Prof. ${r.user}</small>
                            </div>
                            ${this.user.cargo === 'TI' || this.user.nome === r.user ? 
                            `<button class="btn btn-red" style="width:auto; padding:5px" onclick="app.darBaixa('${res.key}')">BAIXA</button>` : ''}
                        </div>`;
                });
            });

            // Sincroniza Avisos
            db.ref('avisos').on('value', snap => {
                const mural = document.getElementById('mural-avisos');
                mural.innerHTML = "";
                snap.forEach(av => { mural.innerHTML += `<p>• ${av.val().txt}</p>`; });
            });
        },

        async reservar() {
            const item = document.getElementById('res-item').value;
            const data = document.getElementById('res-data').value;
            if(!data) return alert("Escolha data e hora!");

            // Lógica Simples de Conflito
            const snap = await db.ref('reservas').once('value');
            let conflito = false;
            snap.forEach(r => { if(r.val().item === item && r.val().data === data) conflito = true; });

            if(conflito) return alert("ERRO: Este item já está reservado neste horário!");

            await db.ref('reservas').push({item, data, user: this.user.nome});
            alert("Reservado com sucesso!");
        },

        async abrirChamado() {
            const txt = document.getElementById('ch-txt').value;
            const urg = document.getElementById('ch-urg').value;
            if(!txt) return;
            await db.ref('chamados').push({user: this.user.nome, msg: txt, urgencia: urg, data: Date.now()});
            alert("Chamado aberto! O NTI foi notificado.");
            document.getElementById('ch-txt').value = "";
        },

        // FUNÇÕES EXCLUSIVAS NTI
        async toggleLock() {
            const snap = await db.ref('sistema_bloqueado').once('value');
            const status = snap.val() || false;
            await db.ref('sistema_bloqueado').set(!status);
            alert("Status do sistema alterado!");
        },

        async resetSenha() {
            const p = document.getElementById('reset-p').value;
            const uSnap = await db.ref('usuarios/'+p).once('value');
            if(uSnap.exists()) {
                const c = uSnap.val().cargo;
                let s = c==='Gestão'?'gestao2026':(c==='Secretaria'?'secretaria2026':'pmspmudar123');
                await db.ref('usuarios/'+p).update({pass: s});
                alert("Senha resetada para: " + s);
            }
        },

        async confirmarCad() {
            const n = document.getElementById('c-n').value;
            const p = document.getElementById('c-p').value;
            const c = document.getElementById('c-c').value;
            let s = c==='Gestão'?'gestao2026':(c==='Secretaria'?'secretaria2026':'pmspmudar123');
            await db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("Cadastrado com sucesso!");
        },

        darBaixa(id) { if(confirm("Deseja finalizar este uso e liberar o equipamento?")) db.ref('reservas/'+id).remove(); },

        loadCharts() {
            const ctx = document.getElementById('usageChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Info', 'Chrome', 'TV 01', 'TV 02'],
                    datasets: [{
                        label: 'Uso Mensal',
                        data: [15, 25, 10, 5],
                        backgroundColor: '#00adef'
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }
    };
</script>
</body>
</html>
