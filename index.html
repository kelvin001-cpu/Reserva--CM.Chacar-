<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        /* Estilo das Colunas de Login */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .sector-column:hover { background: rgba(255,255,255,0.05); }

        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        
        /* Layout Dinâmico */
        .grid-layout { display: grid; gap: 20px; grid-template-columns: 320px 1fr 320px; }
        
        .panel { background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Cronograma Estilizado */
        .reserva-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--prof); position: relative; }
        .reserva-item.em-uso { border-left-color: var(--cad); background: rgba(46, 204, 113, 0.1); }
        .reserva-item b { color: var(--gestao); display: block; font-size: 16px; }
        .reserva-item span { font-size: 12px; opacity: 0.8; }
        .badge-status { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; color: white; }

        #chat-box { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
        .msg-in { align-self: flex-start; background: #333; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        #nti-dashboard { margin-top: 20px; padding-top: 15px; border-top: 2px dashed var(--nti); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column" style="border-top: 5px solid var(--prof)"><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof)" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column" style="border-top: 5px solid var(--gestao)"><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao); color: black" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column" style="border-top: 5px solid var(--secre)"><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre)" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column" style="border-top: 5px solid var(--cad)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><button class="btn" style="background:var(--cad)" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column" style="border-top: 5px solid var(--nti)"><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti)" onclick="app.login('n','NTI')">Painel NTI</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner"><h1>PROGRAMA CONECT</h1><p id="welcome-text"></p></div>

        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-plus-circle"></i> Solicitações</h3>
                
                <h4>Reservar</h4>
                <select id="res-eq">
                    <option>CARRINHO CHROMEBOOK</option>
                    <option>SALA DE INFORMÁTICA</option>
                    <option>TV TOUCH 1</option>
                    <option>TV TOUCH 2</option>
                </select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Confirmar Reserva</button>

                <hr style="opacity:0.1; margin: 20px 0">

                <h4>Suporte Técnico</h4>
                <input type="text" id="chamado-desc" placeholder="Descreva o problema...">
                <button class="btn" style="background:var(--nti)" onclick="app.abrirChamado()">Abrir Chamado NTI</button>

                <div id="nti-only" class="hidden">
                    <div id="nti-dashboard">
                        <h3 style="color:var(--nti)">Monitoramento Master</h3>
                        <canvas id="chartStatus" style="max-height: 120px;"></canvas>
                        <button class="btn" style="background:red; margin-top:10px" onclick="app.setLock(true)">TRAVAR SISTEMA</button>
                        <button class="btn" style="background:green; margin-top:5px" onclick="app.setLock(false)">LIBERAR</button>
                    </div>
                </div>

                <button class="btn" style="background:#444; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-calendar-alt"></i> Cronograma de Uso</h3>
                <div id="cronograma-lista" style="max-height: 600px; overflow-y:auto">
                    </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input type="text" id="chat-in" placeholder="Digite...">
                    <button class="btn" style="width:60px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Dados inválidos!");
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            let pass = (c==="Secretaria") ? "secretaria2026" : (c==="Gestão") ? "pmspgestores2026" : "pmspmudar123";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass });
            alert("Cadastro realizado!");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('welcome-text').innerText = `Bem-vindo, ${this.user.nome} (${this.user.cargo})`;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-only').classList.remove('hidden');
                this.initChart();
            }
            this.sync();
        },

        sync() {
            // Sincroniza Cronograma
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('cronograma-lista'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    const key = r.key;
                    const dataFormatada = new Date(d.dt).toLocaleString('pt-BR');
                    const emUso = d.status === 'retirado';

                    box.innerHTML += `
                        <div class="reserva-item ${emUso ? 'em-uso' : ''}">
                            <span class="badge-status" style="background:${emUso ? 'var(--cad)' : 'var(--prof)'}">
                                ${emUso ? 'Em Uso' : 'Agendado'}
                            </span>
                            <b>${d.eq}</b>
                            <span>Local: ${d.sl} | Horário: ${dataFormatada}</span>
                            <span style="display:block; margin-top:5px; color:var(--prof)">Responsável: ${d.u}</span>
                            ${!emUso ? `<button class="btn" style="background:var(--cad); padding:5px; font-size:10px; margin-top:10px" onclick="app.darBaixa('${key}')">PEGAR EQUIPAMENTO</button>` : `<button class="btn" style="background:var(--nti); padding:5px; font-size:10px; margin-top:10px" onclick="app.finalizar('${key}')">DEVOLVER / FINALIZAR</button>`}
                        </div>`;
                });
            });

            // Sincroniza Chat
            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}</b>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        reservar() {
            const eq=document.getElementById('res-eq').value, sl=document.getElementById('res-sl').value, dt=document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome, status: 'agendado'});
        },

        darBaixa(key) { db.ref('reservas/'+key).update({status: 'retirado'}); },
        
        finalizar(key) { 
            if(confirm("Deseja finalizar este uso e liberar o equipamento?")) db.ref('reservas/'+key).remove(); 
        },

        abrirChamado() {
            const t = document.getElementById('chamado-desc').value;
            if(t) { db.ref('chamados').push({u: this.user.nome, t: t}); alert("NTI notificado!"); document.getElementById('chamado-desc').value = ""; }
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) { db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in').value = ""; }
        },

        initChart() {
            new Chart(document.getElementById('chartStatus'), { type: 'line', data: { labels: ['08h','10h','12h','14h'], datasets: [{ label: 'Latência NTI', data: [12, 19, 3, 5], borderColor: '#eb4d4b' }] }});
        },

        setLock(v) { db.ref('lock').set(v); }
    };
</script>
</body>
</html>
