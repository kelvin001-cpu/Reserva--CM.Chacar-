<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* --- DESIGN ORIGINAL PRESERVADO --- */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .sector-column:hover { background: rgba(255,255,255,0.05); }

        #main-system { display: none; padding: 60px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { background: rgba(22, 27, 34, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        /* Mapeamento Cinema */
        .mapeamento-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .pc-box { font-size: 9px; padding: 8px 2px; border-radius: 5px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .status-ok { background: rgba(46, 204, 113, 0.2); border-color: var(--cad); color: #2ecc71; }
        .status-manutencao { background: rgba(235, 77, 75, 0.2); border-color: var(--nti); color: #eb4d4b; }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: rgba(0,0,0,0.3); color: white; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        #logs-view { height: 150px; overflow-y: auto; background: #000; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 5px; color: #0f0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column">
            <i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i>
            <h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário">
            <input type="password" id="p-s" placeholder="Senha">
            <button class="btn" style="background:var(--prof)" onclick="app.login('p')">Acessar</button>
        </div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)">
            <h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <input type="password" id="c-s" placeholder="Criar Senha">
            <select id="c-atua">
                <option value="Unidade Atual">Atua apenas nesta unidade</option>
                <option value="Múltiplas">Atua em mais de uma unidade</option>
            </select>
            <button class="btn" style="background:var(--cad)" onclick="app.cadastrar()">Criar Conta @edu</button>
        </div>
        <div class="sector-column">
            <i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i>
            <h2>NTI MASTER</h2>
            <input type="number" id="n-p" placeholder="ID NTI">
            <input type="password" id="n-s" placeholder="Senha">
            <button class="btn" style="background:var(--nti)" onclick="app.login('n')">Login Master</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <center>
                        <img id="user-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; border-radius:50%; border:3px solid var(--prof)">
                        <p id="alert-foto" style="font-size:10px; color:var(--gestao)">⚠️ ATENÇÃO: É obrigatório foto de perfil para identificação!</p>
                        <h3 id="display-nome">---</h3>
                        <small id="display-email"></small>
                    </center>
                </div>

                <div class="panel">
                    <h3>Nova Reserva</h3>
                    <select id="res-equip" onchange="app.toggleMapa(this.value)">
                        <option value="Chromebook">Kit Chromebook</option>
                        <option value="Sala Info">Sala de Informática (Dell)</option>
                    </select>
                    <input type="datetime-local" id="res-data">
                    <button class="btn" style="background:var(--prof)" onclick="app.fazerReserva()">Agendar Horário</button>
                </div>

                <div id="panel-nti" class="panel hidden" style="border: 1px solid var(--nti)">
                    <h3 style="color:var(--nti)">Monitoramento NTI</h3>
                    <div id="logs-view"></div>
                    <button class="btn" style="background:#444" onclick="app.diagnosticoRemoto()">Diagnosticar Rede/IP</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3>Mapeamento de Estações</h3>
                    <div id="mapa-cinema" class="mapeamento-container">
                        </div>
                </div>

                <div class="panel">
                    <h3>Cronograma Geral</h3>
                    <div id="lista-reservas"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3>Gráficos de Uso</h3>
                    <canvas id="chartUso"></canvas>
                    <canvas id="chartStatus" style="margin-top:20px"></canvas>
                </div>
                <button class="btn" style="background:var(--nti)" onclick="location.reload()">Sair do Sistema</button>
            </div>
        </div>
    </div>

<script>
    // Configuração Firebase (Use a sua)
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        userIP: "0.0.0.0",
        // Dados dos Patrimônios Dell que você enviou
        dellData: [
            "231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442",
            "231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372",
            "231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459",
            "231.427","231.364","231.470"
        ],

        async getIP() {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            this.userIP = data.ip;
        },

        cadastrar() {
            const n = document.getElementById('c-n').value;
            const p = document.getElementById('c-p').value;
            const s = document.getElementById('c-s').value;
            const atua = document.getElementById('c-atua').value;
            
            if(!n || !p || !s) return alert("Preencha tudo!");
            
            // Geração automática do e-mail @edu
            const primeiroNome = n.split(' ')[0].toLowerCase();
            const emailEdu = `${primeiroNome}.${p}@edu.santanadeparnaiba.sp.gov.br`;

            db.ref('usuarios/' + p).set({
                nome: n, prontuario: p, senha: s, email: emailEdu, unidade: atua, cargo: 'Professor'
            }).then(() => alert("Conta Criada! E-mail: " + emailEdu));
        },

        login(tipo) {
            const p = document.getElementById(tipo+'-p').value;
            const s = document.getElementById(tipo+'-s').value;

            if(tipo === 'n' && p === '46690' && s === 'nti2026') {
                this.user = {nome: "Kelvin NTI", cargo: "NTI", prontuario: "46690"};
                return this.iniciarSistema();
            }

            db.ref('usuarios/' + p).once('value', (snap) => {
                if(snap.exists() && snap.val().senha === s) {
                    this.user = snap.val();
                    this.iniciarSistema();
                } else {
                    alert("Dados incorretos!");
                }
            });
        },

        iniciarSistema() {
            this.getIP();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('display-nome').innerText = this.user.nome;
            document.getElementById('display-email').innerText = this.user.email || "nti.master@edu";

            if(this.user.cargo === 'NTI') {
                document.getElementById('panel-nti').classList.remove('hidden');
                this.carregarLogs();
            }

            this.registrarLog("Fez login no sistema");
            this.renderizarMapa();
            this.ouvirDados();
            this.iniciarGraficos();
        },

        registrarLog(acao) {
            db.ref('logs_navegacao').push({
                usuario: this.user.nome,
                acao: acao,
                ip: this.userIP,
                data: new Date().toLocaleString()
            });
        },

        renderizarMapa() {
            const container = document.getElementById('mapa-cinema');
            container.innerHTML = "";
            
            db.ref('status_maquinas').on('value', snap => {
                const statusData = snap.val() || {};
                this.dellData.forEach((pat, index) => {
                    const status = statusData[pat] || 'ok';
                    const div = document.createElement('div');
                    div.className = `pc-box ${status === 'ok' ? 'status-ok' : 'status-manutencao'}`;
                    div.innerHTML = `<b>PC ${index+1}</b><br>${pat}`;
                    
                    // Apenas NTI ou Gestão podem mudar status de manutenção
                    div.onclick = () => {
                        if(this.user.cargo === 'NTI') {
                            const novoStatus = status === 'ok' ? 'manutencao' : 'ok';
                            db.ref('status_maquinas/' + pat).set(novoStatus);
                            this.registrarLog(`Alterou status do PC ${pat} para ${novoStatus}`);
                        }
                    };
                    container.appendChild(div);
                });
            });
        },

        async fazerReserva() {
            const eq = document.getElementById('res-equip').value;
            const dt = document.getElementById('res-data').value;
            
            if(!dt) return alert("Selecione data e hora!");

            // Validação de Conflito
            const snap = await db.ref('reservas').once('value');
            let conflito = false;
            snap.forEach(r => {
                if(r.val().equipamento === eq && r.val().data === dt) conflito = true;
            });

            if(conflito) {
                alert("ERRO: Este equipamento já está reservado neste horário!");
                this.registrarLog(`Tentativa frustrada de reserva: ${eq} (Horário Ocupado)`);
            } else {
                db.ref('reservas').push({
                    usuario: this.user.nome, equipamento: eq, data: dt
                });
                this.registrarLog(`Reservou ${eq} para ${dt}`);
                alert("Reserva confirmada!");
            }
        },

        carregarLogs() {
            db.ref('logs_navegacao').limitToLast(20).on('value', snap => {
                const view = document.getElementById('logs-view');
                view.innerHTML = "";
                snap.forEach(l => {
                    view.innerHTML += `> ${l.val().usuario} [${l.val().ip}]: ${l.val().acao}<br>`;
                });
                view.scrollTop = view.scrollHeight;
            });
        },

        diagnosticoRemoto() {
            alert(`Iniciando varredura no IP ${this.userIP}... Nenhum vírus detectado no terminal atual.`);
            this.registrarLog("Executou Diagnóstico Remoto");
        },

        ouvirDados() {
            db.ref('reservas').on('value', snap => {
                const lista = document.getElementById('lista-reservas');
                lista.innerHTML = "";
                snap.forEach(r => {
                    lista.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px">
                        <b>${r.val().equipamento}</b> - ${r.val().usuario}<br><small>${r.val().data}</small>
                    </div>`;
                });
            });
        },

        iniciarGraficos() {
            new Chart(document.getElementById('chartUso'), {
                type: 'bar',
                data: {
                    labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex'],
                    datasets: [{ label: 'Reservas', data: [5, 8, 3, 10, 6], backgroundColor: '#00adef' }]
                }
            });
        }
    };
</script>
</body>
</html>
