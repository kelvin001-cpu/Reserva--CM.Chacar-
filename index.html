<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI MASTER - EMEF CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg: #0a0b10; --card: #161b22;
        }

        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* AVISO GLOBAL FIXO */
        #aviso-global { display: none; background: var(--nti); color: white; text-align: center; padding: 10px; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 10000; font-family: 'Orbitron'; }

        /* MODELO DE 5 COLUNAS (LOGIN) */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.05); text-align: center; 
        }
        .sector-column:hover { flex: 1.5; background: rgba(255,255,255,0.03); }

        /* Ajuste para Celular nas Colunas */
        @media (max-width: 768px) {
            .login-container { height: auto; }
            .sector-column { min-width: 100%; height: 100vh; border-bottom: 2px solid rgba(255,255,255,0.1); }
        }

        .col-prof { color: var(--prof); border-top: 8px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 8px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 8px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 8px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 8px solid var(--nti); }

        /* PAINEL INTERNO */
        #main-system { display: none; padding: 20px; padding-top: 70px; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        @media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } }

        .panel { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); height: fit-content; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }

        /* CHAT COM IDENTIFICAÇÃO */
        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #222; font-size: 13px; }
        .msg b { display: block; font-size: 11px; margin-bottom: 2px; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="aviso-global"></div>
    <div id="lock-overlay">
        <i class="fa fa-lock fa-4x" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family:'Orbitron'">SISTEMA OFFLINE</h1>
        <p>Manutenção pelo NTI.</p>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-chalkboard-user fa-3x"></i><h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao"><i class="fa fa-users-viewfinder fa-3x"></i><h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2>
            <input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button>
        </div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2>
            <input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-plus"></i> Reservas</h3>
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV</option></select>
                <input type="text" id="res-sl" placeholder="Qual Sala?">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>

                <div id="nti-panel" class="hidden" style="margin-top:30px; border-top: 1px solid #333; padding-top:20px">
                    <h3 style="color:var(--nti)">Controle NTI</h3>
                    <div style="display:flex; gap:5px; margin-bottom:10px">
                        <button class="btn" style="background:var(--nti); color:white" onclick="app.setLock(true)">TRAVAR</button>
                        <button class="btn" style="background:var(--cad); color:white" onclick="app.setLock(false)">LIBERAR</button>
                    </div>
                    <input type="text" id="nti-aviso" placeholder="Aviso Global">
                    <button class="btn" style="background:var(--prof); color:white; margin-bottom:10px" onclick="app.setAviso()">Postar Aviso</button>
                    <input type="number" id="reset-p" placeholder="Reset Prontuário">
                    <button class="btn" style="background:var(--gestao)" onclick="app.resetSenha()">Resetar Senha</button>
                    <button class="btn" style="background:#444; color:white; margin-top:5px" onclick="app.deletar()">Excluir User</button>
                </div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-calendar-days"></i> Cronograma</h3>
                <div id="lista-res" style="max-height: 250px; overflow-y:auto; margin-bottom:20px"></div>
                <canvas id="meuGrafico" height="150"></canvas>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:8px">></button>
                </div>
                <h3 style="margin-top:20px">Online</h3>
                <div id="monitor-online" style="font-size:12px"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) { this.user = snap.val(); this.start(); }
            else { alert("Erro de acesso!"); }
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
            this.sync();
            this.initChart();
        },

        sync() {
            // Monitor de Trava
            db.ref('lock').on('value', s => { 
                document.getElementById('lock-overlay').style.display = (s.val() && this.user.cargo !== 'NTI') ? 'flex' : 'none';
            });

            // Chat Geral com Nome e Cargo
            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const cor = d.c === 'NTI' ? 'var(--nti)' : 'var(--prof)';
                    box.innerHTML += `<div class="msg"><b style="color:${cor}">${d.n} (${d.c})</b>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Cronograma
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:5px">
                        <b>${d.eq}</b> (${d.sl}) - <small>${d.u}</small>
                        ${this.user.cargo !== 'Professor' ? `<i class="fa fa-trash" style="float:right; color:var(--nti); cursor:pointer" onclick="db.ref('reservas/${r.key}').remove()"></i>` : ''}
                    </div>`;
                });
            });

            // Aviso
            db.ref('aviso').on('value', s => {
                const el = document.getElementById('aviso-global');
                if(s.val()) { el.style.display='block'; el.innerText = s.val(); } else { el.style.display='none'; }
            });

            // Online
            const onRef = db.ref('online/'+this.user.pront); onRef.set({n: this.user.nome}); onRef.onDisconnect().remove();
            db.ref('online').on('value', snap => {
                const box = document.getElementById('monitor-online'); box.innerHTML = "";
                snap.forEach(u => { box.innerHTML += `<div>● ${u.val().n}</div>`; });
            });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },

        sendChat() {
            const t = document.getElementById('chat-in').value; if(!t) return;
            db.ref('chat').push({n: this.user.nome, c: this.user.cargo, t: t});
            document.getElementById('chat-in').value = "";
        },

        // FUNÇÕES NTI
        setLock(v) { db.ref('lock').set(v); },
        setAviso() { db.ref('aviso').set(document.getElementById('nti-aviso').value); },
        async resetSenha() {
            const p = document.getElementById('reset-p').value;
            const u = await db.ref('usuarios/'+p).once('value');
            if(u.exists()) {
                const nova = u.val().cargo === 'Gestão' ? 'gestao2026' : 'pmspmudar123';
                db.ref('usuarios/'+p).update({pass: nova});
                alert("Resetada para: " + nova);
            }
        },
        deletar() { if(confirm("Apagar usuário?")) db.ref('usuarios/'+document.getElementById('reset-p').value).remove(); },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            const s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
            db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("Sucesso!");
        },

        initChart() {
            new Chart(document.getElementById('meuGrafico'), {
                type: 'bar', data: { labels: ['INFO', 'CHROME', 'TV'], datasets: [{ label: 'Uso', data: [5, 10, 3], backgroundColor: '#00adef' }] }
            });
        }
    };
</script>
</body>
</html>
