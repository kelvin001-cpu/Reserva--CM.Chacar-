<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner {
            width: 100%; text-align: center; padding: 20px 0;
            background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%);
        }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        #alert-ribbon { background: var(--nti); color: white; padding: 10px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        .pass-info { font-size: 10px; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 5px; margin: 5px 0; border: 1px dashed var(--cad); }

        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        
        /* Grid adaptável: 3 colunas para NTI, 2 colunas para Usuários */
        .grid-layout { display: grid; gap: 20px; }
        .grid-nti { grid-template-columns: 300px 1fr 300px; }
        .grid-user { grid-template-columns: 350px 1fr; }

        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }

        /* Estilo Agenda / Cronograma */
        .agenda-item { background: rgba(255,255,255,0.05); padding: 15px; border-left: 4px solid var(--prof); border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .agenda-item:hover { background: rgba(255,255,255,0.1); }
        .agenda-time { color: var(--gestao); font-weight: bold; font-size: 14px; }

        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; word-wrap: break-word; }
        .msg-in { align-self: flex-start; background: #333; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO: <span id="alert-text">...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-lock fa-5x" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family:'Orbitron'; color:var(--nti)">ACESSO RESTRITO</h1>
        <p>O sistema está em manutenção técnica.</p>
    </div>

    <div class="login-container" id="login-screen">
        <div class="conect-banner" style="position: absolute; top: 0;">
            <h1>PROGRAMA CONECT</h1>
            <p>Construindo uma geração de vencedores</p>
        </div>
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c" onchange="app.updatePassHint()"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><div class="pass-info">Senha: <b id="hint-pass">pmspmudar123</b></div><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner">
            <h1>PROGRAMA CONECT</h1>
            <p id="user-welcome"></p>
        </div>

        <div id="system-grid" class="grid-layout">
            
            <div class="panel">
                <h3><i class="fa fa-calendar-check"></i> Reservar</h3>
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV TOUCH</option><option>TV 1</option><option>TV 2</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                <hr style="opacity:0.1">
                <h4>Chamado NTI</h4>
                <input type="text" id="chamado-desc" placeholder="Problema técnico?">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Ticket</button>
                
                <div id="nti-controls" class="hidden" style="margin-top:20px; border-top:2px solid var(--nti); padding-top:10px">
                    <h4 style="color:var(--nti)">NTI MASTER</h4>
                    <input type="text" id="nti-aviso" placeholder="Aviso global">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.postAviso()">Postar</button>
                    <button class="btn" style="background:red; color:white" onclick="app.setLock(true)">TRAVAR</button>
                    <button class="btn" style="background:green; color:white" onclick="app.setLock(false)">LIBERAR</button>
                </div>
                <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-clock"></i> Cronograma de Uso</h3>
                <div id="lista-res-agenda" style="max-height: 600px; overflow-y:auto"></div>
            </div>

            <div id="nti-dashboards" class="panel hidden">
                <h3><i class="fa fa-chart-line"></i> Status Sistema</h3>
                <canvas id="chartStatus" style="max-height: 150px"></canvas>
                <canvas id="chartChamados" style="max-height: 150px; margin-top:20px"></canvas>
                <h4 style="margin-top:20px">Chat Geral</h4>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input type="text" id="chat-in" placeholder="...">
                    <button onclick="app.sendChat()" style="background:var(--prof); border:none; border-radius:5px; color:white; padding:10px"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="user-chat-area" class="panel hidden">
                <h3><i class="fa fa-comments"></i> Chat</h3>
                <div id="chat-box-user" style="height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; margin-bottom:10px"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in-user" placeholder="Mensagem...">
                    <button onclick="app.sendChatUser()" style="background:var(--prof); border:none; border-radius:5px; color:white; padding:10px"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        
        updatePassHint() {
            const c = document.getElementById('c-c').value;
            const h = document.getElementById('hint-pass');
            if(c === "Secretaria") h.innerText = "secretaria2026";
            else if(c === "Gestão") h.innerText = "pmspgestores2026";
            else h.innerText = "pmspmudar123";
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else { alert("Dados incorretos!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            let pass = (c==="Secretaria") ? "secretaria2026" : (c==="Gestão") ? "pmspgestores2026" : "pmspmudar123";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass });
            alert("Cadastrado com sucesso!");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-welcome').innerText = `Bem-vindo, ${this.user.nome} (${this.user.cargo})`;
            
            const grid = document.getElementById('system-grid');
            if(this.user.cargo === 'NTI') {
                grid.classList.add('grid-nti');
                document.getElementById('nti-controls').classList.remove('hidden');
                document.getElementById('nti-dashboards').classList.remove('hidden');
                this.initCharts();
            } else {
                grid.classList.add('grid-user');
                document.getElementById('user-chat-area').classList.remove('hidden');
            }
            this.sync();
        },

        sync() {
            db.ref('lock').on('value', s => {
                if(this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display = s.val() ? 'flex' : 'none';
            });
            db.ref('aviso').on('value', s => {
                const r = document.getElementById('alert-ribbon');
                if(s.val()) { r.style.display='block'; document.getElementById('alert-text').innerText=s.val(); }
                else r.style.display='none';
            });
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res-agenda'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    const dt = new Date(d.dt);
                    box.innerHTML += `
                        <div class="agenda-item">
                            <div class="agenda-time"><i class="fa fa-clock"></i> ${dt.toLocaleDateString()} - ${dt.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                            <div style="font-weight:600; color:var(--prof)">${d.eq}</div>
                            <div style="font-size:12px; opacity:0.8">Responsável: ${d.u} | Sala: ${d.sl}</div>
                        </div>`;
                });
            });
            const handleChat = (snap, boxId) => {
                const box = document.getElementById(boxId); if(!box) return;
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            };
            db.ref('chat').limitToLast(20).on('value', s => {
                handleChat(s, 'chat-box');
                handleChat(s, 'chat-box-user');
            });
        },

        initCharts() {
            new Chart(document.getElementById('chartStatus'), { type: 'doughnut', data: { labels: ['Sistema OK'], datasets: [{ data: [100], backgroundColor: ['#2ecc71'] }] }});
            new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Chamados'], datasets: [{ label: 'Abertos', data: [3], backgroundColor: '#eb4d4b' }] }});
        },

        reservar() {
            const eq=document.getElementById('res-eq').value, sl=document.getElementById('res-sl').value, dt=document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },
        abrirChamado() {
            const t = document.getElementById('chamado-desc').value;
            if(t) db.ref('chamados').push({u: this.user.nome, t: t});
            document.getElementById('chamado-desc').value = "";
        },
        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) { db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in').value = ""; }
        },
        sendChatUser() {
            const t = document.getElementById('chat-in-user').value;
            if(t) { db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in-user').value = ""; }
        },
        postAviso() { db.ref('aviso').set(document.getElementById('nti-aviso').value); },
        setLock(v) { db.ref('lock').set(v); }
    };
</script>
</body>
</html>
