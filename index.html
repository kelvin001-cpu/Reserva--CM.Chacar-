<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* MANTENDO SEU DESIGN 100% */
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; animation: fadeInDown 1.5s; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); margin-bottom: 5px; }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; animation: fadeIn 1s; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }

        /* ESTILO DO MAPEAMENTO CINEMA */
        .cinema-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .pc-slot { font-size: 9px; padding: 5px; border-radius: 4px; border: 1px solid #444; text-align: center; cursor: pointer; background: rgba(0,0,0,0.3); }
        .pc-on { border-color: var(--cad); color: var(--cad); }
        .pc-off { border-color: var(--nti); color: var(--nti); background: rgba(235, 77, 75, 0.1); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; }
        .hidden { display: none !important; }

        #nt-monitor { height: 150px; overflow-y: auto; background: #000; font-family: monospace; font-size: 10px; color: #0f0; padding: 10px; border: 1px solid var(--nti); }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>

        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)">
            <h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-atua">
                <option value="Atua nesta unidade">Atua nesta unidade</option>
                <option value="Trabalha em mais de um colégio">Trabalha em mais de um colégio</option>
            </select>
            <input type="password" id="c-s" placeholder="Crie sua Senha">
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta @edu</button>
        </div>

        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <center>
                        <div style="width:70px; height:70px; border-radius:50%; background:#333; border:2px solid var(--prof); display:flex; align-items:center; justify-content:center; cursor:pointer" onclick="alert('Escolha sua foto para identificação!')">
                            <i class="fa fa-camera"></i>
                        </div>
                        <h4 id="display-nome">---</h4>
                        <small id="display-email" style="color:var(--prof)"></small>
                        <p style="font-size:9px; color:var(--gestao); margin-top:10px">⚠️ OBRIGATÓRIO FOTO DE PERFIL!</p>
                    </center>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-check"></i> Reservar</h3>
                    <select id="res-equip" onchange="app.renderMapa(this.value)">
                        <option value="TV">TVs / Kit Multimídia</option>
                        <option value="Dell">Sala de Informática (Dell)</option>
                        <option value="Chrome">Chromebooks</option>
                    </select>
                    <input type="datetime-local" id="res-data">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                    
                    <div id="cinema-area" class="hidden">
                        <h5 style="margin-top:15px; font-size:10px">MAPEAMENTO DE ESTAÇÕES</h5>
                        <div class="cinema-grid" id="grid-mapa"></div>
                    </div>
                </div>

                <div id="nti-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)">NTI TRACKER & DIAGNOSTICO</h3>
                    <div id="nt-monitor"></div>
                    <button class="btn" style="background:var(--nti); font-size:10px" onclick="app.deepScan()">Remoção de Vírus Remota</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3>Cronograma de Uso</h3>
                    <div id="lista-res"></div>
                </div>
                <div class="panel" id="nti-graphics" class="hidden">
                    <h3>Telemetria de Sistema</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                        <canvas id="chart1"></canvas>
                        <canvas id="chart2"></canvas>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3>Mural NTI</h3>
                    <div id="chat-box" style="height:200px; overflow-y:auto"></div>
                </div>
                <button class="btn" style="background:#cc4444" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, userIP: "0.0.0.0",
        // Patrimônios fornecidos
        dellPats: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],
        
        async getIP() { try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); this.userIP = d.ip; } catch(e){} },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, s = document.getElementById('c-s').value, a = document.getElementById('c-atua').value;
            if(!n || !p || !s) return alert("Preencha tudo!");
            const email = n.split(' ')[0].toLowerCase() + "." + p + "@edu.santanadeparnaiba.sp.gov.br";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, pass: s, email: email, atua: a, cargo: 'Professor' })
            .then(() => alert("Cadastrado! Seu e-mail é: " + email));
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user = {nome: 'Kelvin Admin', cargo: 'NTI', email: 'NTI Master'}; return this.start(); }
            
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) { this.user = snap.val(); this.start(); }
            else alert("Dados incorretos!");
        },

        async start() {
            await this.getIP();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('display-nome').innerText = this.user.nome;
            document.getElementById('display-email').innerText = this.user.email;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-panel').classList.remove('hidden');
                this.runNTIMonitor();
                this.initCharts();
            }
            this.syncReservas();
            this.track("Entrou no sistema");
        },

        track(acao) { db.ref('logs_atividades').push({ u: this.user.nome, acao, ip: this.userIP, time: new Date().toLocaleString() }); },

        runNTIMonitor() {
            db.ref('logs_atividades').limitToLast(15).on('value', s => {
                const mon = document.getElementById('nt-monitor'); mon.innerHTML = "";
                s.forEach(l => { mon.innerHTML += `> [${l.val().ip}] ${l.val().u}: ${l.val().acao}<br>`; });
                mon.scrollTop = mon.scrollHeight;
            });
        },

        async reservar() {
            const eq = document.getElementById('res-equip').value, dt = document.getElementById('res-data').value;
            if(!dt) return alert("Selecione a data!");

            // TRAVA DE DUPLICIDADE
            const snap = await db.ref('reservas').once('value');
            let conflito = false;
            snap.forEach(r => { if(r.val().eq === eq && r.val().dt === dt) conflito = true; });

            if(conflito) {
                alert("ERRO: Este equipamento já está reservado para este horário!");
                this.track("Falha na reserva (Conflito)");
            } else {
                db.ref('reservas').push({ eq, dt, u: this.user.nome, ip: this.userIP });
                this.track("Reservou " + eq);
                alert("Reservado com sucesso!");
            }
        },

        renderMapa(v) {
            const area = document.getElementById('cinema-area');
            const grid = document.getElementById('grid-mapa');
            area.classList.remove('hidden');
            grid.innerHTML = "";

            if(v === 'Dell') {
                this.dellPats.forEach((p, i) => {
                    grid.innerHTML += `<div class="pc-slot pc-on" onclick="app.togglePC('${p}')">#${i+1}<br>${p}</div>`;
                });
            } else if(v === 'Chrome') {
                for(let i=1; i<=30; i++) {
                    grid.innerHTML += `<div class="pc-slot pc-on">CH-${i}</div>`;
                }
            } else { area.classList.add('hidden'); }
        },

        syncReservas() {
            db.ref('reservas').on('value', s => {
                const lista = document.getElementById('lista-res'); lista.innerHTML = "";
                s.forEach(r => {
                    lista.innerHTML += `<div class="panel" style="background:rgba(255,255,255,0.05); margin-bottom:5px; font-size:12px">
                        <b>${r.val().eq}</b> - ${r.val().u} <br> <small>${new Date(r.val().dt).toLocaleString()}</small>
                    </div>`;
                });
            });
        },

        deepScan() {
            alert("Iniciando varredura remota no IP: " + this.userIP + "...");
            setTimeout(() => alert("Diagnóstico concluído: 0 ameaças encontradas."), 2000);
            this.track("Executou Deep Scan");
        },

        initCharts() {
            new Chart(document.getElementById('chart1'), { type: 'bar', data: { labels: ['Uso','Livre'], datasets: [{ label: 'Hardware', data: [12, 19], backgroundColor: ['#00adef', '#2ecc71'] }] } });
            new Chart(document.getElementById('chart2'), { type: 'line', data: { labels: ['Seg','Ter','Qua'], datasets: [{ label: 'Acessos', data: [5, 10, 8], borderColor: '#f1c40f' }] } });
        }
    };
</script>
</body>
</html>
