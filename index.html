<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner {
            width: 100%; text-align: center; padding: 20px 0;
            background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%);
        }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        #alert-ribbon { background: var(--nti); color: white; padding: 10px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
        
        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; }

        /* Estilo Chat */
        #chat-box, #chat-nti-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .msg { padding: 8px; border-radius: 8px; font-size: 12px; max-width: 85%; }
        .msg-in { background: #333; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chart-card { background: rgba(255,255,255,0.03); padding: 5px; border-radius: 8px; }

        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .bg-ativo { background: var(--cad); }
        .bg-manutencao { background: var(--nti); }
        
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO NTI: <span id="alert-text">...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--nti); margin-bottom:20px"></i>
        <h1>SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-2x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-2x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-2x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column col-cad"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button></div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-2x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel Master</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-check"></i> Reservar</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar Reserva</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-wrench"></i> Suporte NTI</h3>
                    <select id="chamado-grau"><option value="Baixa">Baixa</option><option value="Média">Média</option><option value="Alta">Alta</option></select>
                    <input type="text" id="chamado-desc" placeholder="Descreva o problema">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Ticket</button>
                    
                    <div id="active-ticket-area" class="hidden" style="margin-top:15px; border-top:1px solid #444; padding-top:10px">
                        <h4 style="color:var(--prof)">Chat Suporte NTI</h4>
                        <div id="chat-nti-box"></div>
                        <div style="display:flex; gap:5px">
                            <input type="text" id="chat-nti-in" placeholder="Falar com técnico...">
                            <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChatNTI()"><i class="fa fa-paper-plane"></i></button>
                        </div>
                        <button id="btn-finalizar" class="btn hidden" style="background:var(--cad); margin-top:10px" onclick="app.finalizarChamado()">Resolver Chamado</button>
                    </div>
                </div>

                <div id="nti-master-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)">NTI MASTER DASHBOARD</h3>
                    <h4>Reset de Senha</h4>
                    <input type="number" id="reset-pront" placeholder="Prontuário">
                    <button class="btn" style="background:#555" onclick="app.resetSenha()">Resetar para Padrão</button>
                    
                    <h4 style="margin-top:15px">Controle Global</h4>
                    <button class="btn" style="background:red" onclick="app.setLock(true)">TRAVAR SISTEMA</button>
                    <button class="btn" style="background:green" onclick="app.setLock(false)">LIBERAR</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3><i class="fa fa-chart-line"></i> Monitoramento em Tempo Real</h3>
                    <div class="charts-grid">
                        <div class="chart-card"><canvas id="chartUsers"></canvas></div>
                        <div class="chart-card"><canvas id="chartChamados"></canvas></div>
                        <div class="chart-card"><canvas id="chartEquip"></canvas></div>
                        <div class="chart-card"><canvas id="chartManutencao"></canvas></div>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-microchip"></i> Gestão de Equipamentos</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px"></div>
                </div>
                
                <div class="panel">
                    <h3><i class="fa fa-clock"></i> Cronograma de Uso</h3>
                    <div id="lista-res" style="max-height:150px; overflow-y:auto"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px">
                        <input type="text" id="chat-in" placeholder="Mensagem...">
                        <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-star"></i> Avaliações de Suporte</h3>
                    <div id="lista-avaliacoes" style="font-size:11px; max-height:200px; overflow-y:auto"></div>
                </div>
                
                <button class="btn" style="background:#444" onclick="location.reload()">Sair do Sistema</button>
            </div>
        </div>
    </div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        currentTicket: null,
        charts: {},

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val();
                this.start();
                this.logAtividade(`Login realizado`);
            } else { alert("Dados incorretos!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo");
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Cadastrado! Senha: " + pass));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') document.getElementById('nti-master-panel').classList.remove('hidden');
            
            this.initCharts();
            this.syncData();
            this.carregarEquipamentos();
        },

        syncData() {
            // Monitor de Travamento
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display='flex'; });

            // Sincronizar Chat Geral
            db.ref('chat').limitToLast(20).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    let side = d.n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Monitorar Reservas
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    let d = r.val();
                    box.innerHTML += `<div style="font-size:11px; padding:5px; border-bottom:1px solid #333"><b>${d.eq}</b> - ${d.u} (Sala ${d.sl})</div>`;
                });
            });

            // Monitorar Chamados (Lógica de Chat NTI)
            db.ref('chamados').on('value', snap => {
                let abertos = 0;
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto') {
                        abertos++;
                        if(d.pront === this.user.pront || this.user.cargo === 'NTI') {
                            this.currentTicket = c.key;
                            this.abrirInterfaceChamado(d);
                        }
                    }
                });
                this.updateChart('chamados', [abertos]);
            });

            // Monitorar Avaliações
            db.ref('avaliacoes').limitToLast(5).on('value', snap => {
                const box = document.getElementById('lista-avaliacoes'); box.innerHTML = "";
                snap.forEach(a => {
                    let d = a.val();
                    box.innerHTML += `<div style="padding:5px; margin-bottom:5px; background:rgba(255,255,255,0.05)">⭐ ${d.nota} - ${d.txt} <br><small>Por: ${d.autor}</small></div>`;
                });
            });
        },

        // --- SISTEMA DE CHAMADOS & CHAT NTI ---
        abrirChamado() {
            const desc = document.getElementById('chamado-desc').value;
            const grau = document.getElementById('chamado-grau').value;
            if(!desc) return;
            const newKey = db.ref('chamados').push().key;
            db.ref('chamados/'+newKey).set({
                u: this.user.nome, pront: this.user.pront, t: desc, grau: grau, status: 'aberto', data: Date.now()
            });
            this.logAtividade(`Abriu chamado: ${desc}`);
            document.getElementById('chamado-desc').value = "";
        },

        abrirInterfaceChamado(dados) {
            document.getElementById('active-ticket-area').classList.remove('hidden');
            if(this.user.cargo === 'NTI') document.getElementById('btn-finalizar').classList.remove('hidden');
            
            db.ref('chat_nti/'+this.currentTicket).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    let side = d.n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChatNTI() {
            const t = document.getElementById('chat-nti-in').value; if(!t) return;
            db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: t });
            document.getElementById('chat-nti-in').value = "";
        },

        finalizarChamado() {
            if(!confirm("Deseja finalizar este atendimento?")) return;
            
            // Professor avalia NTI
            let nota = prompt("Avalie o suporte de 1 a 5:");
            let coment = prompt("Comentário adicional:");
            
            db.ref('avaliacoes').push({ nota: nota, txt: coment, autor: 'Professor', chamado: this.currentTicket });
            db.ref('chamados/'+this.currentTicket+'/status').set('resolvido');
            document.getElementById('active-ticket-area').classList.add('hidden');
            this.currentTicket = null;
        },

        // --- GESTÃO DE EQUIPAMENTOS ---
        async carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Kit Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            
            sel.innerHTML = ""; lista.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let btnAcao = this.user.cargo === 'NTI' ? `<button onclick="app.toggleManutencao('${e}', '${d.status}')" style="font-size:9px">Manut.</button>` : '';
                    
                    let card = document.getElementById('card-'+e.replace(' ',''));
                    if(!card) {
                        lista.innerHTML += `<div id="card-${e.replace(' ','')}" style="padding:10px; border:1px solid #444; border-radius:8px">
                            ${e} <span class="status-badge ${d.status === 'ativo' ? 'bg-ativo' : 'bg-manutencao'}">${d.status}</span>
                            ${btnAcao}
                        </div>`;
                    }
                });
            });
        },

        toggleManutencao(id, status) {
            let novo = status === 'ativo' ? 'manutencao' : 'ativo';
            db.ref('equipamentos/'+id+'/status').set(novo);
            if(novo === 'ativo') {
                db.ref('chat').push({ n: 'SISTEMA NTI', t: `✅ Equipamento ${id} foi REPARADO e está disponível!` });
            }
        },

        // --- UTILITÁRIOS ---
        resetSenha() {
            let p = document.getElementById('reset-pront').value;
            if(!p) return;
            db.ref('usuarios/'+p+'/pass').set('pmspmudar123');
            alert("Senha resetada para: pmspmudar123");
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(!sl || !dt) return;
            db.ref('reservas').push({ eq, sl, dt, u: this.user.nome });
            this.logAtividade(`Reservou ${eq}`);
        },

        sendChat() {
            const t = document.getElementById('chat-in').value; if(!t) return;
            db.ref('chat').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        setLock(v) { db.ref('lock').set(v); },

        logAtividade(acao) {
            db.ref('logs').push({ u: this.user.nome, acao: acao, time: Date.now() });
        },

        // --- GRÁFICOS ---
        initCharts() {
            this.charts.users = new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h','20h'], datasets: [{ label: 'Acessos', data: [12, 45, 30, 10], borderColor: '#a55eea' }] }, options: { plugins: { title: { display: true, text: 'Tráfego Usuários' } } } });
            this.charts.chamados = new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Tickets'], datasets: [{ label: 'Abertos', data: [0], backgroundColor: '#eb4d4b' }] } });
            this.charts.equip = new Chart(document.getElementById('chartEquip'), { type: 'doughnut', data: { labels: ['Em Uso', 'Livre'], datasets: [{ data: [40, 60], backgroundColor: ['#f1c40f', '#2ecc71'] }] } });
            this.charts.manut = new Chart(document.getElementById('chartManutencao'), { type: 'pie', data: { labels: ['OK', 'Reparo'], datasets: [{ data: [90, 10], backgroundColor: ['#2ecc71', '#eb4d4b'] }] } });
        },

        updateChart(id, data) {
            if(this.charts[id]) {
                this.charts[id].data.datasets[0].data = data;
                this.charts[id].update();
            }
        }
    };
</script>
</body>
</html>
