<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --prof: #00adef; --nti: #eb4d4b; --bg: #0b0e14; --panel: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 320px 1fr 340px; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        h3 { font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        
        /* Cinema Grid */
        .cinema-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; background: #000; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .seat { font-size: 9px; padding: 5px; text-align: center; border-radius: 3px; cursor: pointer; border: 1px solid #444; }
        .seat.ok { background: #2ecc71; color: #000; }
        .seat.manutencao { background: #e74c3c; color: #fff; pointer-events: none; opacity: 0.6; }
        .seat.selected { border: 2px solid var(--prof); transform: scale(1.1); }

        /* NTI Monitor */
        #nti-log-view { height: 150px; background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; overflow-y: auto; border: 1px solid #333; }
        input, select { width: 100%; background: #0d1117; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; margin: 5px 0; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        
        /* Modal de Foto/Senha */
        #modal-security { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; visibility: hidden; }
        #modal-security.active { visibility: visible; }
    </style>
</head>
<body>

<div id="modal-security">
    <div class="panel" style="width: 400px; text-align: center;">
        <h2 style="color:var(--prof)">AÇÃO NECESSÁRIA</h2>
        <p>Para continuar, você deve atualizar sua foto de perfil e criar uma senha pessoal.</p>
        <input type="file" id="up-foto" accept="image/*">
        <input type="password" id="new-pass" placeholder="Nova Senha">
        <button class="btn" style="background:var(--prof)" onclick="app.updateSecurity()">SALVAR E ACESSAR</button>
    </div>
</div>

<div class="dashboard">
    <div class="col">
        <div class="panel">
            <h3><i class="fa fa-plus-circle"></i> Nova Reserva</h3>
            <select id="res-eq" onchange="app.buildMap(this.value)">
                <option value="">Selecione...</option>
                <option value="Sala Info">Sala de Informática (Dell)</option>
                <option value="Chromebooks">Chromebooks</option>
                <option value="TV 01">TV 01</option>
            </select>
            <input type="text" id="res-sala" placeholder="Sala de Aula (Ex: Sala 05)">
            <input type="datetime-local" id="res-data">
            
            <div id="map-area" style="display:none">
                <p style="font-size: 10px; color: #aaa;">Clique para escolher a máquina:</p>
                <div id="grid-cinema" class="cinema-grid"></div>
            </div>
            
            <button class="btn" style="background:var(--prof); color:#fff" onclick="app.confirmarReserva()">AGENDAR</button>
        </div>
        
        <div class="panel">
            <h3><i class="fa fa-headset"></i> Suporte NTI</h3>
            <input type="text" id="ticket-msg" placeholder="Descreva o problema...">
            <button class="btn" style="background:var(--nti); color:#fff" onclick="app.abrirChamado()">ABRIR TICKET</button>
        </div>
    </div>

    <div class="col">
        <div class="panel">
            <h3><i class="fa fa-microchip"></i> Telemetria de Sistema</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <canvas id="c1"></canvas><canvas id="c2"></canvas>
                <canvas id="c3"></canvas><canvas id="c4"></canvas>
            </div>
        </div>
        <div class="panel">
            <h3><i class="fa fa-list"></i> Cronograma de Uso</h3>
            <div id="lista-res" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="col">
        <div class="panel" style="border-color: var(--nti)">
            <h3 style="color:var(--nti)"><i class="fa fa-shield-alt"></i> NTI MASTER DASHBOARD</h3>
            <div id="nti-log-view">> Sistema pronto...</div>
            <input type="text" id="search-p" placeholder="Pesquisar Prontuário..." onkeyup="app.searchLogs(this.value)">
            <div style="display:flex; gap:5px">
                <button class="btn" style="background:#444" onclick="app.remote()">ACESSO REMOTO</button>
                <button class="btn" style="background:var(--nti)" onclick="app.virusScan()">VIRUS SCAN</button>
            </div>
        </div>

        <div class="panel">
            <h3><i class="fa fa-comments"></i> Mural de Avisos</h3>
            <div id="mural" style="height: 150px; overflow-y: auto; font-size: 11px;"></div>
            <input type="text" id="msg-mural" placeholder="Escrever no mural...">
        </div>
        
        <button class="btn" style="background: #e74c3c; color: white;" onclick="location.reload()">DESCONECTAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: { nome: "Kelvin", pront: "46690", cargo: "NTI", pass: "pmspmudar123" }, // Simulação de login
        selectedPat: null,
        patsDell: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],

        init() {
            this.checkSecurity();
            this.sync();
            this.initCharts();
            this.logAtividade("Acessou o Dashboard");
        },

        checkSecurity() {
            if(this.user.pass === "pmspmudar123") {
                document.getElementById('modal-security').classList.add('active');
            }
        },

        buildMap(tipo) {
            const area = document.getElementById('map-area');
            const grid = document.getElementById('grid-cinema');
            grid.innerHTML = "";
            if(!tipo) return area.style.display = "none";
            area.style.display = "block";

            const lista = (tipo === "Sala Info") ? this.patsDell : Array.from({length:39}, (_, i) => "259."+(939+i));
            
            lista.forEach(p => {
                db.ref('status_equip/'+p).on('value', s => {
                    const status = s.val() || 'ok';
                    const div = document.createElement('div');
                    div.className = `seat ${status}`;
                    div.innerText = p.split('.')[1] || p;
                    div.onclick = () => {
                        if(this.user.cargo === 'NTI') {
                            const n = confirm("Alternar Manutenção para " + p + "?");
                            if(n) db.ref('status_equip/'+p).set(status === 'ok' ? 'manutencao' : 'ok');
                        } else {
                            document.querySelectorAll('.seat').forEach(x => x.classList.remove('selected'));
                            div.classList.add('selected');
                            this.selectedPat = p;
                        }
                    };
                    grid.appendChild(div);
                });
            });
        },

        async confirmarReserva() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-data').value;
            if(!dt || !eq) return alert("Preencha data e equipamento!");

            // TRAVA DE CONFLITO
            const snap = await db.ref('reservas').once('value');
            let existe = false;
            snap.forEach(r => {
                if(r.val().dt === dt && r.val().eq === eq) existe = true;
            });

            if(existe) return alert("ERRO: Já existe uma reserva para este item neste horário!");

            db.ref('reservas').push({
                u: this.user.nome, pront: this.user.pront, 
                eq: eq, pat: this.selectedPat || "Geral",
                dt: dt, sala: document.getElementById('res-sala').value
            });
            this.logAtividade(`Reservou ${eq} para ${dt}`);
            alert("Reservado com sucesso!");
        },

        logAtividade(acao) {
            const log = {
                pront: this.user.pront, u: this.user.nome,
                acao: acao, ip: "10.15.20." + Math.floor(Math.random()*255),
                time: new Date().toLocaleString()
            };
            db.ref('logs_navegacao').push(log);
            const view = document.getElementById('nti-log-view');
            view.innerHTML += `<div>> [${log.pront}] ${log.acao}</div>`;
            view.scrollTop = view.scrollHeight;
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('lista-res'); l.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    l.innerHTML += `<div style="background:#252d38; padding:8px; border-radius:5px; margin-bottom:5px; font-size:11px; border-left:4px solid var(--prof)">
                        <b>${d.eq}</b> - ${d.u}<br>${new Date(d.dt).toLocaleString()} | Sala ${d.sala}
                    </div>`;
                });
            });
        },

        initCharts() {
            const ctx = { type: 'line', data: { labels: ['A','B','C'], datasets: [{data:[10,20,15], borderColor: '#00adef'}] }, options: {plugins:{legend:{display:false}}} };
            new Chart(document.getElementById('c1'), ctx);
            new Chart(document.getElementById('c2'), {...ctx, type: 'bar'});
            new Chart(document.getElementById('c3'), {...ctx, type: 'doughnut'});
            new Chart(document.getElementById('c4'), {...ctx, type: 'pie'});
        }
    };

    app.init();
</script>
</body>
</html>
