<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00adef; --accent: #00ff9d; --danger: #ff4757;
            --glass: rgba(15, 23, 42, 0.85); --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: #000 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* LOGIN SCREEN */
        #auth-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .grid-login { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 90%; max-width: 850px; }
        .login-box { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }

        /* NOVO MENU EM FILEIRA (HORIZONTAL) */
        nav { 
            height: 80px; background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--border); 
            padding: 0 40px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); 
        }
        .nav-group { display: flex; align-items: center; gap: 15px; }
        
        .prof-profile { display: flex; align-items: center; gap: 12px; background: rgba(0, 173, 239, 0.1); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--primary); }

        /* ÁREA PRINCIPAL */
        main { flex: 1; padding: 30px; overflow-y: auto; background: rgba(0,0,0,0.3); }
        .view { display: none; } 
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        /* BOTÕES EM LINHA */
        .btn { 
            padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--accent); color: #000; }
        .btn-red { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* TABELAS E CARDS */
        .card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid-equip { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .equip-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        
        table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 15px; overflow: hidden; }
        th { background: rgba(255,255,255,0.05); padding: 12px; text-align: left; color: var(--primary); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; }

        #lock-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 10px solid var(--danger); }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="lock-screen">
    <h1 style="color: var(--danger); font-size: 40px;">SISTEMA BLOQUEADO</h1>
    <p id="lock-msg" style="font-size: 20px;"></p>
    <h2 style="color: var(--primary)">NTI - SUPORTE</h2>
</div>

<div id="auth-screen">
    <h1 style="color: var(--primary); margin-bottom: 30px;">NTI | PORTAL DE ACESSO</h1>
    <div class="grid-login">
        <div class="login-box"><h3>PROFESSOR</h3><input type="number" id="p-pront" placeholder="Prontuário"><input type="password" id="p-pass" placeholder="Senha"><button class="btn btn-blue" onclick="app.login('Professor')">ACESSAR</button></div>
        <div class="login-box"><h3>SECRETARIA</h3><input type="number" id="s-pront" placeholder="Prontuário"><input type="password" id="s-pass" placeholder="Senha"><button class="btn btn-blue" onclick="app.login('Secretaria')">ACESSAR</button></div>
        <div class="login-box"><h3>GESTÃO</h3><input type="number" id="g-pront" placeholder="Prontuário"><input type="password" id="g-pass" placeholder="Senha"><button class="btn btn-blue" onclick="app.login('Gestão')">ACESSAR</button></div>
        <div class="login-box" style="border-color: var(--accent)"><h3>NTI MASTER</h3><input type="number" id="t-pront" placeholder="ID"><input type="password" id="t-pass" placeholder="Senha"><button class="btn btn-green" onclick="app.login('TI')">TERMINAL</button></div>
    </div>
</div>

<nav id="sidebar" class="hidden">
    <div class="nav-group">
        <div class="prof-profile">
            <i class="fa fa-circle-user fa-lg" style="color: var(--primary)"></i>
            <span id="u-nome" style="font-weight: 600; font-size: 14px;"></span>
            <small id="u-cargo" style="color: var(--primary); font-weight: bold; font-size: 10px;"></small>
        </div>
        <button class="btn btn-outline" onclick="app.view('v-reserva')"><i class="fa fa-calendar-check"></i> Reservas</button>
        <button class="btn btn-red" onclick="app.view('v-chamado')"><i class="fa fa-headset"></i> Suporte</button>
        <div id="ti-menu" class="hidden">
            <button class="btn btn-green" onclick="app.view('v-ti')"><i class="fa fa-shield-halved"></i> Master</button>
        </div>
    </div>
    <button class="btn btn-outline" style="border-color: rgba(255,255,255,0.2); color: #ccc;" onclick="location.reload()">Sair</button>
</nav>

<main id="main-content" class="hidden">
    <div id="v-reserva" class="view active">
        <h2>Equipamentos</h2>
        <div class="grid-equip" id="equip-list"></div>
        <h2 style="margin-top: 30px;">Uso em Tempo Real</h2>
        <table>
            <thead><tr><th>EQUIPAMENTO</th><th>RESPONSÁVEL</th><th>LOCAL</th><th>AÇÃO</th></tr></thead>
            <tbody id="uso-list"></tbody>
        </table>
    </div>

    <div id="v-chamado" class="view">
        <h2>Abrir Chamado</h2>
        <div class="card" style="max-width: 500px;">
            <input type="text" id="ch-local" placeholder="Localização">
            <textarea id="ch-problema" rows="4" placeholder="Descrição do problema"></textarea>
            <button class="btn btn-red" onclick="app.enviarChamado()">Enviar Chamado</button>
        </div>
    </div>

    <div id="v-ti" class="view">
        <h2 style="color: var(--accent)">Painel Master</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <h3>Cadastrar Usuário</h3>
                <input id="c-nome" placeholder="Nome"><input id="c-pront" placeholder="Prontuário">
                <select id="c-cargo"><option>Professor</option><option>Secretaria</option><option>Gestão</option></select>
                <button class="btn btn-blue" onclick="app.confirmarCad()">Confirmar</button>
            </div>
            <div class="card" style="border-color: var(--danger)">
                <h3>Trava de Segurança</h3>
                <input id="aviso-tit" placeholder="Título"><textarea id="aviso-txt" placeholder="Mensagem"></textarea>
                <button class="btn btn-red" onclick="app.postAviso('critico')">Bloquear</button>
                <button class="btn btn-outline" style="margin-top:5px" onclick="app.limparAviso()">Liberar</button>
            </div>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        itens: ['CROMES 01', 'CROMES 02', 'CROMES 03', 'CROMES 04', 'TV 01', 'TV 02', 'TV 03'],

        async login(tipo) {
            let p = document.getElementById(tipo==='Professor'?'p-pront':tipo==='Secretaria'?'s-pront':tipo==='Gestão'?'g-pront':'t-pront').value;
            let s = document.getElementById(tipo==='Professor'?'p-pass':tipo==='Secretaria'?'s-pass':tipo==='Gestão'?'g-pass':'t-pass').value;
            if(tipo==='TI' && p==='46690' && s==='nti2026') { this.user = {nome:'Kelvin Master', cargo:'TI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass == s && snap.val().cargo === tipo) { this.user = snap.val(); this.start(); }
            else alert("Erro no acesso!");
        },

        start() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('u-nome').innerText = this.user.nome;
            document.getElementById('u-cargo').innerText = " | " + this.user.cargo;
            if(this.user.cargo === 'TI') document.getElementById('ti-menu').classList.remove('hidden');
            this.sync(); this.watchAvisos();
        },

        sync() {
            db.ref('reservas').on('value', snap => {
                const l = document.getElementById('uso-list'), g = document.getElementById('equip-list');
                l.innerHTML = ""; g.innerHTML = ""; let u = {};
                snap.forEach(r => { const d = r.val(); u[d.item] = d; l.innerHTML += `<tr><td>${d.item}</td><td>${d.user}</td><td>${d.local}</td><td><button onclick="db.ref('reservas/${r.key}').remove()">Finalizar</button></td></tr>`; });
                this.itens.forEach(i => { g.innerHTML += `<div class="equip-card"><b>${i}</b><br><small>${u[i]?'EM USO':'LIVRE'}</small>${!u[i]?`<button class="btn btn-blue" style="margin-top:5px; font-size:10px" onclick="app.reservar('${i}')">RESERVAR</button>`:''}</div>`; });
            });
        },

        watchAvisos() {
            db.ref('sistema/aviso').on('value', snap => {
                const a = snap.val();
                if(a && a.gravidade === 'critico' && this.user?.cargo !== 'TI') {
                    document.getElementById('lock-screen').style.display = 'flex';
                    document.getElementById('lock-msg').innerText = a.texto;
                } else document.getElementById('lock-screen').style.display = 'none';
            });
        },
        async enviarChamado() {
            await db.ref('chamados').push({ autor: this.user.nome, local: document.getElementById('ch-local').value, problema: document.getElementById('ch-problema').value });
            alert("Enviado!"); app.view('v-reserva');
        },
        async postAviso(g) { await db.ref('sistema/aviso').set({ texto: document.getElementById('aviso-txt').value, gravidade: g }); },
        limparAviso() { db.ref('sistema/aviso').remove(); },
        async reservar(i) { const l = prompt("Local:"); if(l) await db.ref('reservas').push({ item:i, user:this.user.nome, local:l }); },
        async confirmarCad() {
            const p = document.getElementById('c-pront').value, c = document.getElementById('c-cargo').value;
            await db.ref('usuarios/'+p).set({ nome: document.getElementById('c-nome').value, pront: p, cargo: c, pass: 'pmsp2026' });
            alert("OK!");
        },
        view(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    };
</script>
</body>
</html>
