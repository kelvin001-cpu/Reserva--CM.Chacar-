<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner {
            width: 100%; text-align: center; padding: 20px 0;
            background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%);
        }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }
        .conect-banner p { margin: 5px 0; font-weight: 300; letter-spacing: 1px; opacity: 0.9; }

        #alert-ribbon { background: var(--nti); color: white; padding: 10px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sector-column:hover { flex: 1.4; background: rgba(255,255,255,0.05); }

        /* Estilo da Senha Padrão no Cadastro */
        .default-pass-info { font-size: 11px; background: rgba(46, 204, 113, 0.2); color: #2ecc71; padding: 5px; border-radius: 5px; margin-top: 5px; width: 100%; box-sizing: border-box; border: 1px dashed #2ecc71; }

        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }

        /* DESIGN BOLHAS DE CHAT CORRIGIDO */
        #chat-box { 
            height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); 
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg-in { align-self: flex-start; background: #333; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .msg-out { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .msg b { display: block; font-size: 10px; margin-bottom: 3px; color: var(--prof); text-transform: uppercase; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO NTI: <span id="alert-text">Carregando...</span></div>

    <div class="login-container" id="login-screen">
        <div class="conect-banner" style="position: absolute; top: 0;">
            <h1>PROGRAMA CONECT</h1>
            <p>Construindo uma geração de vencedores</p>
        </div>
        
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select>
            <div class="default-pass-info">🔑 Senha Padrão: <b>conect2026</b></div>
            <button class="btn" style="background:var(--cad); color:white; margin-top:10px" onclick="app.confirmarCad()">Criar Conta</button>
        </div>

        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner">
            <h1>PROGRAMA CONECT</h1>
            <p>Construindo uma geração de vencedores</p>
        </div>
        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-tools"></i> Painel</h3>
                <div id="user-info" style="margin-bottom:15px; font-size:12px; border-bottom:1px solid #333; padding-bottom:10px"></div>
                <input type="text" id="chamado-desc" placeholder="Qual o problema NTI?">
                <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Chamado</button>
                <hr style="opacity:0.1; margin: 20px 0;">
                <h4>Reserva</h4>
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV TOUCH</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Reservar</button>
                <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-tachometer-alt"></i> Monitoramento</h3>
                <div class="charts-grid">
                    <div class="chart-card"><canvas id="chartStatus"></canvas></div>
                    <div class="chart-card"><canvas id="chartChamados"></canvas></div>
                </div>
                <h4 style="margin-top:20px">Próximas Reservas</h4>
                <div id="lista-res" style="max-height: 250px; overflow-y:auto"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:8px; color:white"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        charts: {},

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else { alert("Dados incorretos!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value;
            const p = document.getElementById('c-p').value;
            const c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: 'conect2026' });
            alert("Cadastrado! Senha: conect2026");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-info').innerHTML = `<b>${this.user.nome}</b> [${this.user.cargo}]`;
            this.sync();
            this.initCharts();
        },

        sync() {
            db.ref('aviso').on('value', s => {
                if(s.val()){ document.getElementById('alert-ribbon').style.display='block'; document.getElementById('alert-text').innerText=s.val(); }
            });
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:5px; font-size:12px"><b>${d.eq}</b> - ${d.sl}<br>${new Date(d.dt).toLocaleString()}</div>`;
                });
            });
            db.ref('chat').limitToLast(30).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}</b>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        initCharts() {
            this.charts.status = new Chart(document.getElementById('chartStatus'), { type: 'doughnut', data: { labels: ['OK'], datasets: [{ data: [100], backgroundColor: ['#2ecc71'] }] }});
            this.charts.chamados = new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Chamados'], datasets: [{ data: [5], backgroundColor: '#eb4d4b' }] }});
        },

        abrirChamado() { const t = document.getElementById('chamado-desc').value; if(t) db.ref('chamados').push({u: this.user.nome, t: t}); },
        reservar() { const eq=document.getElementById('res-eq').value, sl=document.getElementById('res-sl').value, dt=document.getElementById('res-dt').value; if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome}); },
        sendChat() { const t = document.getElementById('chat-in').value; if(t) db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in').value = ""; }
    };
</script>
</body>
</html>
