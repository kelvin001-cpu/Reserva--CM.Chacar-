<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA (V2 ATUALIZADA)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* MANTIDO SEU DESIGN PADRÃO */
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; animation: fadeInDown 1.5s; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); margin-bottom: 5px; }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        #alert-ribbon { background: var(--nti); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .sector-column:hover { background: rgba(255,255,255,0.03); transform: scale(1.02); }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; animation: fadeIn 1s; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; transition: 0.3s;
        }
        .panel:hover { border-color: var(--prof); box-shadow: 0 0 15px rgba(0,173,239,0.1); }
        
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; 
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; transition: 0.3s;
        }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Estilo do Mapeamento (Novo) */
        .pc-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
        .pc-unit { padding: 5px; background: #2ecc71; border-radius: 4px; font-size: 9px; cursor: pointer; text-align: center; font-weight: bold; }
        .pc-unit.manutencao { background: #eb4d4b; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }

        /* Estilo da Foto de Perfil */
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--prof); margin-bottom: 10px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO: <span id="alert-text">Carregando informações...</span></div>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron">SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>

        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)">
            <h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome Completo">
            <input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-mult"><option value="Sim">Atua nesta unidade</option><option value="Mais">Trabalha em + de um colégio</option></select>
            <select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button>
        </div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <img id="my-profile-pic" class="profile-img" src="https://via.placeholder.com/50">
                    <h3 id="welcome-user">Bem-vindo</h3>
                    <p id="user-edu-mail" style="font-size: 10px; color: var(--prof)"></p>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Nova Reserva</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Número da Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                </div>

                <div id="nti-master-panel" class="panel hidden" style="border: 2px solid var(--nti)">
                    <h3 style="color:var(--nti)"><i class="fa fa-shield-halved"></i> NTI DASHBOARD</h3>
                    <input type="text" id="search-log" placeholder="Pesquisar Prontuário">
                    <button class="btn" style="background:#444" onclick="app.verHistorico()">Histórico Navegação</button>
                    <div id="log-output" style="font-size:9px; max-height:100px; overflow-y:auto; margin-top:5px"></div>
                    <button class="btn" style="background:var(--nti)" onclick="app.remote()">Controle Remoto (Veyon)</button>
                    <button class="btn" style="background:red" onclick="app.setLock(true)">TRAVAR SISTEMA</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3><i class="fa fa-desktop"></i> Sala de Informática (Mapeamento)</h3>
                    <div class="pc-grid" id="pc-container"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-laptop"></i> Chromebooks</h3>
                    <div id="cb-list" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; max-height:150px; overflow-y:auto"></div>
                </div>

                <div id="nti-charts-area" class="panel hidden">
                    <h3><i class="fa fa-microchip"></i> Telemetria</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                        <canvas id="chartUsers" height="100"></canvas>
                        <canvas id="chartChamados" height="100"></canvas>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-list-ul"></i> Cronograma</h3>
                    <div id="lista-res" style="max-height:300px; overflow-y:auto"></div>
                </div>
                <button class="btn" style="background:#cc4444" onclick="location.reload()">Desconectar</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DADOS TÉCNICOS DOS PCS
    const pcsInfo = [
        {id:1, a:"230.999", n:"231.413"}, {id:2, a:"231.019", n:"231.453"}, {id:3, a:"231.069", n:"231.443"},
        {id:4, a:"231.250", n:"231.454"}, {id:5, a:"231.046", n:"231.414"}, {id:6, a:"231.141", n:"231.403"},
        {id:7, a:"231.066", n:"231.383"}, {id:8, a:"231.202", n:"231.274"}, {id:9, a:"231.117", n:"231.275"},
        {id:10, a:"231.119", n:"231.442"}, {id:11, a:"231.120", n:"231.551"}, {id:12, a:"231.068", n:"231.418"},
        {id:13, a:"231.067", n:"231.390"}, {id:14, a:"231.065", n:"231.514"}, {id:15, a:"231.168", n:"231.515"},
        {id:16, a:"231.090", n:"231.457"}, {id:17, a:"231.089", n:"231.365"}, {id:18, a:"231166", n:"231.484"},
        {id:19, a:"231165", n:"231.408"}, {id:20, a:"231071", n:"231.372"}, {id:21, a:"231164", n:"231.424"},
        {id:22, a:"231070", n:"231.438"}, {id:23, a:"231209", n:"231.348"}, {id:24, a:"231185", n:"231.363"},
        {id:25, a:"231214", n:"231.344"}, {id:26, a:"231251", n:"231437"}, {id:27, a:"231179", n:"231464"},
        {id:28, a:"231096", n:"231347"}, {id:29, a:"231137", n:"231521"}, {id:30, a:"231118", n:"231459"},
        {id:31, a:"231142", n:"231427"}, {id:32, a:"231138", n:"231364"}, {id:33, a:"231163", n:"231470"}
    ];

    const cbList = ["259.954","259.972","259.953","259.973","259.971","259.965","259.966","259.952","259.951","259.950","259.968","259.949","259.967","259.962","259.961","259.948","259.957","259.967","259.958","259.943","259.941","259.947","259.946","259.944","259.945","259.959","259.960","259.956","259.955","259.942","259.939","259.940","259.982","259.983","259.984","260.053","259.996","260.013","260.012"];

    const app = {
        user: null,
        
        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Kelvin', cargo:'NTI', pront:'46690', email:'kelvin.46690@edu.santanadeparnaiba.sp.gov.br'};
                return this.start();
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val();
                
                // TRAVA DE SENHA PADRÃO
                if(s==='pmspmudar123' || s==='secretaria2026' || s==='pmspgestores2026') {
                    let nova = prompt("Segurança: Crie uma nova senha agora:");
                    if(!nova || nova.length < 4) return alert("Senha inválida!");
                    db.ref('usuarios/'+p+'/pass').set(nova);
                    this.user.pass = nova;
                }
                this.start();
            } else { alert("Erro de acesso."); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo.");
            let email = `${n.split(' ')[0].toLowerCase()}.${p}@edu.santanadeparnaiba.sp.gov.br`;
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass, email: email, foto: "" })
            .then(() => alert("Conta criada! Email: " + email));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('welcome-user').innerText = "Olá, " + this.user.nome;
            document.getElementById('user-edu-mail').innerText = this.user.email;
            
            if(!this.user.foto) alert("Por favor, atualize sua foto de perfil para identificação!");

            if(this.user.cargo === 'NTI' || this.user.cargo === 'Gestão') {
                document.getElementById('nti-charts-area').classList.remove('hidden');
                if(this.user.cargo === 'NTI') document.getElementById('nti-master-panel').classList.remove('hidden');
                this.initCharts();
            }
            this.sync();
            this.loadMapping();
            this.captureActivity("Login realizado");
        },

        async captureActivity(acao) {
            let ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(()=>"0.0.0.0");
            db.ref('logs').push({ u: this.user.nome, p: this.user.pront, acao, ip, time: new Date().toLocaleString() });
        },

        loadMapping() {
            const pcDiv = document.getElementById('pc-container');
            pcsInfo.forEach(pc => {
                db.ref('mapeamento/pc'+pc.id).on('value', s => {
                    let status = s.val() || 'ativo';
                    let div = document.getElementById('pc-btn-'+pc.id) || document.createElement('div');
                    div.id = 'pc-btn-'+pc.id;
                    div.className = `pc-unit ${status === 'manutencao' ? 'manutencao' : ''}`;
                    div.innerText = pc.id;
                    div.onclick = () => {
                        alert(`PC ${pc.id}\nAntigo: ${pc.a}\nNovo: ${pc.n}\nStatus: ${status}`);
                        if(this.user.cargo === 'NTI') {
                            let nStatus = status === 'ativo' ? 'manutencao' : 'ativo';
                            db.ref('mapeamento/pc'+pc.id).set(nStatus);
                        }
                    };
                    if(!document.getElementById('pc-btn-'+pc.id)) pcDiv.appendChild(div);
                });
            });

            const cbDiv = document.getElementById('cb-list');
            cbList.forEach(cb => {
                let d = document.createElement('div');
                d.style = "font-size:8px; background:rgba(255,255,255,0.1); padding:3px; border-radius:2px";
                d.innerText = "CB: " + cb;
                cbDiv.appendChild(d);
            });
        },

        reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            // CHECAR DUPLICIDADE
            db.ref('reservas').orderByChild('dt').equalTo(dt).once('value', s => {
                let conf = false;
                s.forEach(r => { if(r.val().eq === eq) conf = true; });
                if(conf) return alert("Equipamento já reservado neste horário!");
                
                db.ref('reservas').push({ eq, sl: document.getElementById('res-sl').value, dt, u: this.user.nome });
                this.captureActivity(`Reservou ${eq}`);
            });
        },

        sync() {
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display='flex'; });
            db.ref('reservas').on('value', s => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                s.forEach(r => { list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; font-size:12px">${r.val().eq} - ${r.val().u} (Sala ${r.val().sl})</div>`; });
            });
            const eqs = ['TV 01', 'TV 02', 'Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq'); sel.innerHTML = "";
            eqs.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
        },

        verHistorico() {
            let p = document.getElementById('search-log').value;
            db.ref('logs').orderByChild('p').equalTo(p).once('value', s => {
                let out = document.getElementById('log-output'); out.innerHTML = "";
                s.forEach(l => { out.innerHTML += `${l.val().time}: ${l.val().acao} [IP: ${l.val().ip}]<br>`; });
            });
        },

        remote() { alert("Conectando via Veyon ao IP do usuário..."); },
        setLock(v) { db.ref('lock').set(v); },
        initCharts() {
            new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h'], datasets: [{ label: 'Acessos', data: [5, 20, 15], borderColor: '#00adef' }] } });
            new Chart(document.getElementById('chartChamados'), { type: 'bar', data: { labels: ['Aberto','Fixo'], datasets: [{ data: [2, 8], backgroundColor: ['#eb4d4b','#2ecc71'] }] } });
        }
    };
</script>
</body>
</html>
