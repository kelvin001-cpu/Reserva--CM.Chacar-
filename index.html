<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; animation: fadeInDown 1.5s; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); margin-bottom: 5px; }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        #alert-ribbon { background: var(--nti); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; }

        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        
        #main-system { display: none; padding: 80px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }
        
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 5px; text-transform: uppercase; }

        /* MAPEAMENTO */
        .cinema-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .seat { font-size: 9px; padding: 6px 0; text-align: center; border-radius: 4px; cursor: pointer; background: #2ecc71; color: #000; }
        .seat.selected { border: 2px solid white; box-shadow: 0 0 8px var(--prof); }

        /* MONITOR */
        #nti-monitor { height: 100px; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #333; margin-bottom: 10px; }

        .hidden { display: none !important; }
        #chat-box { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px; border-radius: 8px; font-size: 12px; max-width: 80%; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }
    </style>
</head>
<body>

    <div id="alert-ribbon">⚠️ AVISO: <span id="alert-text">Sincronizando...</span></div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main">PROGRAMA CONECT</div>
            <div class="slogan-sub">Construindo uma Geração de Vencedores</div>
        </div>
        <div class="sector-column"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome Completo"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Reservar</h3>
                    <select id="res-eq" onchange="app.gerarMapa(this.value)"></select>
                    <div id="area-mapa" style="display:none"><div id="grid-assentos" class="cinema-grid"></div></div>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-headset"></i> Suporte</h3>
                    <input type="text" id="chamado-desc" placeholder="Problema?">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Chamado</button>
                </div>
            </div>

            <div class="center-col">
                <div class="panel">
                    <h3><i class="fa fa-microchip"></i> Monitor NTI</h3>
                    <div id="nti-monitor">> Sistema Pronto.</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                        <canvas id="chartUsers" height="120"></canvas>
                        <canvas id="chartEquip" height="120"></canvas>
                    </div>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-list-ul"></i> Cronograma</h3>
                    <div id="lista-res" style="max-height:300px; overflow-y:auto"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Mural</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-in" placeholder="Texto...">
                        <button class="btn" style="width:50px; background:var(--prof); margin:0" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="panel">
                    <h3><i class="fa fa-box-open"></i> Status</h3>
                    <div id="lista-equipamentos"></div>
                </div>
                <button class="btn" style="background:#cc4444; color:white" onclick="location.reload()">Sair</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        selectedPat: null,
        patsDell: ["231.413","231.453","231.443","231.454","231.414","231.403","231.383","231.274","231.275","231.442","231.551","231.418","231.390","231.514","231.515","231.457","231.365","231.484","231.408","231.372","231.424","231.438","231.348","231.363","231.344","231.437","231.464","231.347","231.521","231.459","231.427","231.364","231.470"],

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            // Master Login
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user={nome:'Admin NTI', cargo:'NTI', pront:'46690'}; 
                return this.start(); 
            }

            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) {
                this.user = snap.val();
                this.start();
                this.logNTI("Entrou no sistema");
            } else { alert("Acesso Negado: Verifique prontuário e senha!"); }
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Conta criada! Senha: " + pass));
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            this.syncData();
            this.carregarEquips();
            this.initCharts();
        },

        logNTI(msg) {
            const m = document.getElementById('nti-monitor');
            m.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${this.user.nome}: ${msg}</div>`;
            m.scrollTop = m.scrollHeight;
        },

        gerarMapa(tipo) {
            const area = document.getElementById('area-mapa');
            const grid = document.getElementById('grid-assentos');
            grid.innerHTML = "";
            if(tipo !== "Sala Info" && tipo !== "Chromebooks") return area.style.display = "none";
            area.style.display = "block";
            const lista = tipo === "Sala Info" ? this.patsDell : Array.from({length:30}, (_,i)=>"CB-"+(i+1));
            lista.forEach(p => {
                const d = document.createElement('div'); d.className = 'seat'; d.innerText = p.slice(-3);
                d.onclick = () => { document.querySelectorAll('.seat').forEach(s=>s.classList.remove('selected')); d.classList.add('selected'); this.selectedPat = p; };
                grid.appendChild(d);
            });
        },

        async reservar() {
            const eq = document.getElementById('res-eq').value;
            const dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Selecione data/hora!");
            
            // Trava de Conflito
            const check = await db.ref('reservas').orderByChild('dt').equalTo(dt).once('value');
            let occupied = false;
            check.forEach(r => { if(r.val().eq === eq) occupied = true; });
            if(occupied) return alert("Equipamento já reservado neste horário!");

            db.ref('reservas').push({ eq, dt, sl: document.getElementById('res-sl').value, u: this.user.nome, pat: this.selectedPat || "Geral" });
            this.logNTI(`Reservou ${eq}`);
            alert("Sucesso!");
        },

        syncData() {
            db.ref('chat').on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div style="padding:8px; border-bottom:1px solid #333; font-size:12px"><b>${d.eq}</b> (${d.pat})<br>${d.u} - Sala ${d.sl}</div>`;
                });
            });
        },

        carregarEquips() {
            const eqs = ['Sala Info', 'Chromebooks', 'TV 01', 'TV 02', 'Kit Multimídia'];
            const sel = document.getElementById('res-eq');
            sel.innerHTML = "";
            eqs.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
            
            const lista = document.getElementById('lista-equipamentos');
            lista.innerHTML = "";
            eqs.forEach(e => {
                lista.innerHTML += `<div style="font-size:11px; margin-bottom:5px">● ${e} <span style="color:var(--cad)">ATIVO</span></div>`;
            });
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) db.ref('chat').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        initCharts() {
            new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h'], datasets: [{ label: 'Acessos', data: [5, 15, 8], borderColor: '#00adef' }] }, options: { plugins: { legend: { display: false } } } });
            new Chart(document.getElementById('chartEquip'), { type: 'doughnut', data: { labels: ['Uso','Livre'], datasets: [{ data: [30, 70], backgroundColor: ['#f1c40f','#2ecc71'] }] }, options: { plugins: { legend: { display: false } } } });
        }
    };
</script>
</body>
</html>
