<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.94);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: #0a0b10 url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        /* Indicadores Flutuantes (Novos) */
        .online-counter { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--cad); font-size: 11px; z-index: 10001; backdrop-filter: blur(5px); }
        #toast-container { position: fixed; top: 70px; right: 20px; z-index: 99999; }
        .toast { background: rgba(0,0,0,0.9); border-right: 5px solid var(--prof); padding: 15px; margin-bottom: 10px; border-radius: 5px; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #alert-ribbon { background: linear-gradient(90deg, var(--nti), #ff7675); color: white; padding: 12px; text-align: center; font-weight: bold; display: none; position: fixed; top: 0; width: 100%; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* Design de Colunas do Login (Seu estilo favorito) */
        .login-container { display: flex; width: 100%; min-height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); backdrop-filter: blur(8px); }
        .slogan-container { width: 100%; text-align: center; padding: 40px 0 10px 0; }
        .slogan-main { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--prof); text-shadow: 0 0 15px rgba(0,173,239,0.6); }
        .slogan-sub { font-weight: 300; letter-spacing: 2px; color: #ccc; font-style: italic; }

        .sector-column { 
            flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-right: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .sector-column:hover { background: rgba(255,255,255,0.03); transform: scale(1.02); }
        
        /* Layout do Sistema Interno */
        #main-system { display: none; padding: 100px 20px 20px 20px; background: var(--bg-overlay); min-height: 100vh; animation: fadeIn 1s; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; max-width: 1600px; margin: 0 auto; }
        
        .panel { 
            background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(20px); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; transition: 0.3s;
        }
        .panel:hover { border-color: var(--prof); }

        h3 { font-family: 'Orbitron'; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; 
            background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; 
        }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* Estilo dos Chats */
        #chat-box, #chat-nti-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 12px; max-width: 85%; animation: slideInRight 0.3s; }
        .msg-in { background: #3d3d3d; align-self: flex-start; }
        .msg-out { background: #005c4b; align-self: flex-end; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chart-card { background: rgba(0,0,0,0.3); padding: 5px; border-radius: 8px; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .fade-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    </style>
</head>
<body onmousemove="app.parallax(event)">

    <div class="online-counter"><i class="fa fa-circle" style="color:var(--cad); font-size:8px"></i> <span id="count-val">1</span> Online</div>
    <div id="toast-container"></div>
    <div id="alert-ribbon">⚠️ <span id="alert-text">Aviso do NTI</span></div>

    <div id="lock-overlay">
        <i class="fa fa-radiation fa-5x fa-spin" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family: Orbitron">SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="slogan-container">
            <div class="slogan-main animate__animated animate__fadeInDown">PROGRAMA CONECT</div>
            <div class="slogan-sub animate__animated animate__fadeInUp">Construindo uma Geração de Vencedores</div>
        </div>

        <div class="sector-column fade-up" style="animation-delay: 0.1s"><i class="fa fa-graduation-cap fa-3x" style="color:var(--prof)"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Acessar</button></div>
        <div class="sector-column fade-up" style="animation-delay: 0.2s"><i class="fa fa-user-tie fa-3x" style="color:var(--gestao)"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Acessar</button></div>
        <div class="sector-column fade-up" style="animation-delay: 0.3s"><i class="fa fa-building-columns fa-3x" style="color:var(--secre)"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Acessar</button></div>
        <div class="sector-column fade-up" style="animation-delay: 0.4s; background: rgba(46, 204, 113, 0.05)"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome Completo"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option value="Professor">Professor</option><option value="Gestão">Gestão</option><option value="Secretaria">Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar Conta</button></div>
        <div class="sector-column fade-up" style="animation-delay: 0.5s"><i class="fa fa-terminal fa-3x" style="color:var(--nti)"></i><h2>NTI MASTER</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Master Login</button></div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            
            <div class="left-col">
                <div class="panel">
                    <h3><i class="fa fa-calendar-plus"></i> Reservar</h3>
                    <select id="res-eq"></select>
                    <input type="text" id="res-sl" placeholder="Sala">
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Agendar</button>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-headset"></i> Suporte</h3>
                    <input type="text" id="chamado-desc" placeholder="Problema...">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Solicitar</button>
                    
                    <div id="active-ticket-area" class="hidden" style="margin-top:15px; border-top:1px solid #444; padding-top:10px">
                        <div id="chat-nti-box"></div>
                        <div style="display:flex; gap:5px; margin-top:5px">
                            <input type="text" id="chat-nti-in" placeholder="...">
                            <button class="btn" style="width:45px; background:var(--prof)" onclick="app.sendChatNTI()"><i class="fa fa-paper-plane"></i></button>
                        </div>
                        <button id="btn-finalizar" class="btn hidden" style="background:var(--cad); margin-top:5px; font-size:10px" onclick="app.finalizarChamado()">Encerrar</button>
                    </div>
                </div>

                <div id="nti-master-panel" class="panel hidden" style="border: 1px solid var(--nti)">
                    <h3 style="color:var(--nti)">NTI CONTROL</h3>
                    <button class="btn" style="background:red; margin-bottom:5px" onclick="app.setLock(true)">TRAVAR TUDO</button>
                    <button class="btn" style="background:green; margin-bottom:5px" onclick="app.setLock(false)">LIBERAR</button>
                    <button class="btn" style="background:orange; margin-bottom:5px" onclick="app.limparMural()">LIMPAR MURAL</button>
                    <input type="text" id="input-aviso" placeholder="Aviso Global">
                    <button class="btn" style="background:white; color:black" onclick="app.enviarAviso()">Postar Aviso</button>
                </div>
            </div>

            <div class="center-col">
                <div id="nti-charts-area" class="panel hidden">
                    <h3><i class="fa fa-chart-line"></i> Telemetria</h3>
                    <div class="charts-grid">
                        <div class="chart-card"><canvas id="chartUsers" height="100"></canvas></div>
                        <div class="chart-card"><canvas id="chartEquip" height="100"></canvas></div>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-box"></i> Equipamentos</h3>
                    <div id="lista-equipamentos" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px"></div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-clock"></i> Cronograma</h3>
                    <div id="lista-res" style="max-height:250px; overflow-y:auto"></div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel">
                    <h3><i class="fa fa-comments"></i> Mural Geral</h3>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="chat-in" placeholder="Mural...">
                        <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fa fa-star"></i> Avaliações</h3>
                    <div id="lista-avaliacoes" style="font-size:11px; max-height:150px; overflow-y:auto"></div>
                </div>
                
                <button class="btn" style="background:rgba(255,255,255,0.1); font-size:10px" onclick="app.logout()">Sair do Sistema</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        // Função de Sessão (Não desloga no F5)
        user: JSON.parse(localStorage.getItem('conect_user_v3')) || null,
        currentTicket: null,
        authGestao: ["44244", "35102", "39966", "46690"],
        authSecre: ["46684", "4236", "46690"],

        init() {
            if(this.user) this.start();
            this.syncOnline();
            this.listenLock();
        },

        parallax(e) {
            let x = (e.clientX / window.innerWidth) * 15;
            let y = (e.clientY / window.innerHeight) * 15;
            document.body.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;

            if(cargo==='NTI' && p==='46690' && s==='nti2026') { 
                this.user = {nome:'Kelvin (Admin)', cargo:'NTI', pront:'46690'};
            } else {
                if(cargo === 'Gestão' && !this.authGestao.includes(p)) return alert("ACESSO NEGADO.");
                if(cargo === 'Secretaria' && !this.authSecre.includes(p)) return alert("ACESSO NEGADO.");

                const snap = await db.ref('usuarios/'+p).once('value');
                if(snap.exists() && String(snap.val().pass) === String(s)) {
                    this.user = snap.val();
                } else { return alert("Dados inválidos!"); }
            }
            localStorage.setItem('conect_user_v3', JSON.stringify(this.user));
            this.start();
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo.");
            if(c === 'Gestão' && !this.authGestao.includes(p)) return alert("CADASTRO NEGADO.");
            
            let pass = c === "Secretaria" ? "secretaria2026" : (c === "Gestão" ? "pmspgestores2026" : "pmspmudar123");
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass }).then(() => alert("Criado! Senha: " + pass));
        },

        logout() { localStorage.removeItem('conect_user_v3'); location.reload(); },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-master-panel').classList.remove('hidden');
                document.getElementById('nti-charts-area').classList.remove('hidden');
                this.initCharts();
            } else if (this.user.cargo === 'Gestão') {
                document.getElementById('nti-charts-area').classList.remove('hidden');
                this.initCharts();
            }
            
            this.syncData();
            this.carregarEquipamentos();
            this.notify("Bem-vindo, " + this.user.nome);
        },

        syncOnline() {
            const ref = db.ref('online').push();
            ref.onDisconnect().remove(); ref.set(true);
            db.ref('online').on('value', s => document.getElementById('count-val').innerText = s.numChildren());
        },

        listenLock() {
            db.ref('lock').on('value', s => {
                if(s.val() && (!this.user || this.user.cargo !== 'NTI')) document.getElementById('lock-overlay').style.display='flex';
                else document.getElementById('lock-overlay').style.display='none';
            });
        },

        syncData() {
            // Mural Geral
            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b><br>${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Reservas
            db.ref('reservas').on('value', snap => {
                const list = document.getElementById('lista-res'); list.innerHTML = "";
                snap.forEach(r => {
                    let d = r.val();
                    list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; font-size:11px">
                        <b style="color:var(--prof)">${d.eq}</b> | Sala ${d.sl}<br>${d.u} - ${new Date(d.dt).toLocaleString()}
                        ${this.user.cargo === 'NTI' ? `<i class="fa fa-trash" style="float:right; color:red; cursor:pointer" onclick="app.cancelarReserva('${r.key}')"></i>` : ''}
                    </div>`;
                });
            });

            // Banner Alerta
            db.ref('aviso_global').on('value', s => {
                const rib = document.getElementById('alert-ribbon');
                if(s.val()) { rib.style.display='block'; document.getElementById('alert-text').innerText=s.val(); }
                else rib.style.display='none';
            });

            // Chamados Ativos
            db.ref('chamados').on('value', snap => {
                snap.forEach(c => {
                    let d = c.val();
                    if(d.status === 'aberto' && (d.pront === this.user.pront || this.user.cargo === 'NTI')) {
                        this.currentTicket = c.key;
                        document.getElementById('active-ticket-area').classList.remove('hidden');
                        document.getElementById('btn-finalizar').classList.remove('hidden');
                        this.syncChatNTI();
                    }
                });
            });

            // Feedback
            db.ref('avaliacoes').limitToLast(5).on('value', snap => {
                const box = document.getElementById('lista-avaliacoes'); box.innerHTML = "";
                snap.forEach(a => { box.innerHTML += `<div style="margin-bottom:8px; background:rgba(255,255,255,0.05); padding:5px; border-radius:5px">⭐ ${a.val().nota} - ${a.val().txt}</div>`; });
            });
        },

        carregarEquipamentos() {
            const eqs = ['TV 01', 'TV 02', 'Multimídia', 'Chromebooks', 'Sala Info'];
            const sel = document.getElementById('res-eq');
            const lista = document.getElementById('lista-equipamentos');
            sel.innerHTML = ""; lista.innerHTML = "";
            eqs.forEach(e => {
                sel.innerHTML += `<option value="${e}">${e}</option>`;
                db.ref('equipamentos/'+e.replace(/\s/g, '')).on('value', snap => {
                    let d = snap.val() || { status: 'ativo' };
                    let ok = d.status === 'ativo';
                    let id = 'card-'+e.replace(/\s/g, '');
                    let html = `<div id="${id}" style="padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid ${ok?'var(--cad)':'var(--nti)'}">
                        <b style="font-size:12px">${e}</b><br><small style="color:${ok?'var(--cad)':'var(--nti)'}">${d.status.toUpperCase()}</small>
                        ${this.user.cargo==='NTI'?`<button class="btn" style="height:20px; padding:0; font-size:8px; margin-top:5px" onclick="app.toggleEquip('${e}')">Alterar</button>`:''}
                    </div>`;
                    let exist = document.getElementById(id); if(exist) exist.outerHTML=html; else lista.innerHTML+=html;
                });
            });
        },

        reservar() {
            const dt = document.getElementById('res-dt').value;
            if(!dt) return alert("Data obrigatória.");
            db.ref('reservas').push({ eq: document.getElementById('res-eq').value, sl: document.getElementById('res-sl').value, dt: dt, u: this.user.nome });
            this.notify("Reserva Realizada!");
        },

        abrirChamado() {
            db.ref('chamados').push({ u: this.user.nome, pront: this.user.pront, t: document.getElementById('chamado-desc').value, status: 'aberto' });
            this.notify("NTI Notificado!");
        },

        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) db.ref('chat').push({ n: this.user.nome, t: t });
            document.getElementById('chat-in').value = "";
        },

        syncChatNTI() {
            db.ref('chat_nti/'+this.currentTicket).on('value', snap => {
                const box = document.getElementById('chat-nti-box'); box.innerHTML = "";
                snap.forEach(m => {
                    let side = m.val().n === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().n}:</b> ${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        sendChatNTI() {
            const t = document.getElementById('chat-nti-in').value;
            if(t) db.ref('chat_nti/'+this.currentTicket).push({ n: this.user.nome, t: t });
            document.getElementById('chat-nti-in').value = "";
        },

        finalizarChamado() {
            let n = prompt("Nota de 1 a 5:", "5");
            db.ref('avaliacoes').push({ nota: n, txt: prompt("Comentário:"), autor: this.user.nome });
            db.ref('chamados/'+this.currentTicket+'/status').set('resolvido');
            location.reload();
        },

        notify(txt) {
            const toast = document.createElement('div'); toast.className = 'toast animate__animated animate__fadeInRight';
            toast.innerText = txt; document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        },

        // NTI MASTER ACTIONS
        setLock(v) { db.ref('lock').set(v); },
        enviarAviso() { db.ref('aviso_global').set(document.getElementById('input-aviso').value); },
        limparMural() { if(confirm("Apagar mural?")) db.ref('chat').remove(); },
        cancelarReserva(k) { db.ref('reservas/'+k).remove(); },
        toggleEquip(e) {
            const id = e.replace(/\s/g, '');
            db.ref('equipamentos/'+id).once('value', s => {
                let cur = s.val() ? s.val().status : 'ativo';
                db.ref('equipamentos/'+id).set({ status: cur==='ativo'?'manutencao':'ativo' });
            });
        },

        initCharts() {
            new Chart(document.getElementById('chartUsers'), { type: 'line', data: { labels: ['08h','12h','16h','20h'], datasets: [{ label: 'Acessos', data: [5, 20, 15, 10], borderColor: '#00adef' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } } });
            new Chart(document.getElementById('chartEquip'), { type: 'doughnut', data: { labels: ['Uso','Livre'], datasets: [{ data: [30, 70], backgroundColor: ['#f1c40f','#2ecc71'] }] }, options: { plugins: { legend: { display: false } } } });
        }
    };

    app.init();
</script>
</body>
</html>
