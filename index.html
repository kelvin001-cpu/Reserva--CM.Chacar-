<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | PORTAL DE ACESSO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --nti: #eb4d4b;
            --dark: #0a0a0c;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif; background: var(--dark);
            overflow: hidden;
        }

        /* DIVISÃO DA TELA EM 4 COLUNAS TOTAIS */
        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .sector-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* EFEITO DE FOCO NA COLUNA */
        .sector-column:hover {
            flex: 1.5;
            background: rgba(255,255,255,0.02);
        }

        /* ICONES E TEXTOS */
        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px currentColor;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* FORMULÁRIO INTERNO */
        .login-form {
            width: 100%;
            max-width: 240px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .sector-column:hover .login-form { opacity: 1; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-access {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* CUSTOMIZAÇÃO POR SETOR */
        .col-prof { color: var(--prof); border-top: 5px solid var(--prof); }
        .col-prof .btn-access { background: var(--prof); color: white; }
        
        .col-gestao { color: var(--gestao); border-top: 5px solid var(--gestao); }
        .col-gestao .btn-access { background: var(--gestao); color: black; }

        .col-secre { color: var(--secre); border-top: 5px solid var(--secre); }
        .col-secre .btn-access { background: var(--secre); color: white; }

        .col-nti { color: var(--nti); border-top: 5px solid var(--nti); }
        .col-nti .btn-access { background: var(--nti); color: white; }

        /* FUNDO COM NOME DO SETOR EM MARCA D'ÁGUA */
        .watermark {
            position: absolute;
            bottom: -20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            opacity: 0.03;
            pointer-events: none;
            white-space: nowrap;
        }

        #app-screen {
            display: none;
            position: fixed; inset: 0;
            background: var(--dark);
            z-index: 100;
            padding: 50px;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        
        <div class="sector-column col-prof">
            <div class="icon-box"><i class="fa fa-graduation-cap"></i></div>
            <h2>PROFESSORES</h2>
            <div class="login-form">
                <input type="number" id="p-pront" placeholder="PRONTUÁRIO">
                <input type="password" id="p-pass" placeholder="SENHA">
                <button class="btn-access" onclick="app.login('p', 'Professor')">Entrar</button>
            </div>
            <div class="watermark">TEACHER</div>
        </div>

        <div class="sector-column col-gestao">
            <div class="icon-box"><i class="fa fa-briefcase"></i></div>
            <h2>GESTÃO</h2>
            <div class="login-form">
                <input type="number" id="g-pront" placeholder="PRONTUÁRIO">
                <input type="password" id="g-pass" placeholder="SENHA">
                <button class="btn-access" onclick="app.login('g', 'Gestão')">Entrar</button>
            </div>
            <div class="watermark">ADMIN</div>
        </div>

        <div class="sector-column col-secre">
            <div class="icon-box"><i class="fa fa-folder-open"></i></div>
            <h2>SECRETARIA</h2>
            <div class="login-form">
                <input type="number" id="s-pront" placeholder="PRONTUÁRIO">
                <input type="password" id="s-pass" placeholder="SENHA">
                <button class="btn-access" onclick="app.login('s', 'Secretaria')">Entrar</button>
            </div>
            <div class="watermark">OFFICE</div>
        </div>

        <div class="sector-column col-nti">
            <div class="icon-box"><i class="fa fa-microchip"></i></div>
            <h2>PORTAL NTI</h2>
            <div class="login-form">
                <input type="number" id="n-pront" placeholder="ID MASTER">
                <input type="password" id="n-pass" placeholder="SENHA">
                <button class="btn-access" onclick="app.login('n', 'TI')">Configurar</button>
            </div>
            <div class="watermark">SYSTEM</div>
        </div>

    </div>

    <div id="app-screen">
        <h1 id="user-welcome" style="color: var(--prof); font-family: 'Orbitron';"></h1>
        <p id="user-info" style="color: white; opacity: 0.7;"></p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
        <button onclick="location.reload()" style="background:none; border: 1px solid white; color:white; padding: 10px 30px; border-radius: 5px; cursor: pointer;">Sair do Portal</button>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        async login(pre, cargo) {
            const p = document.getElementById(pre + '-pront').value;
            const s = document.getElementById(pre + '-pass').value;

            // Login Master Kelvin
            if(cargo === 'TI' && p === '46690' && s === 'nti2026') {
                return this.showPortal('Kelvin Master', 'Administrador NTI');
            }

            const snap = await db.ref('usuarios/' + p).once('value');
            if(snap.exists() && snap.val().pass == s) {
                const u = snap.val();
                if(u.cargo === cargo || cargo === 'Professor') {
                    this.showPortal(u.nome, cargo);
                } else {
                    alert("Acesso negado para este setor.");
                }
            } else {
                alert("Credenciais incorretas.");
            }
        },

        showPortal(nome, cargo) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-welcome').innerText = "PORTAL: " + cargo.toUpperCase();
            document.getElementById('user-info').innerText = "Usuário conectado: " + nome;
        }
    };
</script>
</body>
</html>
