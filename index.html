<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        /* Login Original */
        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; position: fixed; z-index: 1000; top: 0; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .sector-column:hover { flex: 1.4; background: rgba(255,255,255,0.05); }

        /* Sistema Principal */
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }

        /* Dashboard NTI */
        .nti-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .chart-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }

        /* Chat Estilo WhatsApp */
        .chat-container { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; }
        .msg-in { align-self: flex-start; background: #333; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        /* Avaliação Estrelas */
        .rating { color: #f1c40f; font-size: 24px; text-align: center; margin: 10px 0; }
        .rating i { cursor: pointer; margin: 0 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column" style="border-top:5px solid var(--prof)"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column" style="border-top:5px solid var(--gestao)"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column" style="border-top:5px solid var(--secre)"><i class="fa fa-building fa-3x"></i><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column" style="border-top:5px solid var(--cad)"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Confirmar</button></div>
        <div class="sector-column" style="border-top:5px solid var(--nti)"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Acessar</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner"><h1>PROGRAMA CONECT <span id="cargo-tag" style="font-size:12px; opacity:0.6"></span></h1></div>

        <div class="grid-layout">
            <div class="panel">
                <h3 id="user-name">Usuário</h3>
                <div id="menu-comum">
                    <h4>Reservas</h4>
                    <select id="res-eq"><option>CHROMEBOOKS</option><option>KIT MULTIMÍDIA</option><option>TV 01</option></select>
                    <input type="datetime-local" id="res-dt">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Reservar</button>
                    <hr style="opacity:0.1; margin:15px 0">
                    <h4>Suporte NTI</h4>
                    <input type="text" id="ch-desc" placeholder="Qual o problema?">
                    <button class="btn" style="background:var(--nti); color:white" onclick="app.abrirChamado()">Abrir Chamado</button>
                </div>

                <div id="nti-menu" class="hidden">
                    <h4 style="color:var(--nti)">Master Admin</h4>
                    <input type="number" id="reset-id" placeholder="Prontuário p/ Reset">
                    <button class="btn" style="background:#444" onclick="app.resetSenha()">Resetar Senha</button>
                    <button class="btn" style="background:red; color:white" onclick="app.toggleLock()">Bloquear Sistema</button>
                </div>
                <button class="btn" style="background:transparent; border:1px solid #444; color:#666; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3>Monitoramento em Tempo Real</h3>
                <div class="nti-dash">
                    <div class="chart-box"><canvas id="chartUsers"></canvas></div>
                    <div class="chart-box"><canvas id="chartTraffic"></canvas></div>
                    <div class="chart-box"><canvas id="chartReparo"></canvas></div>
                    <div class="chart-box"><canvas id="chartGeral"></canvas></div>
                </div>
                <h4 style="margin-top:20px">Cronograma de Uso</h4>
                <div id="cronograma" style="font-size:11px; max-height:150px; overflow-y:auto"></div>
            </div>

            <div class="panel">
                <h4>Chat de Chamado NTI</h4>
                <div id="chat-privado" class="chat-container"><p style="text-align:center; opacity:0.3; font-size:10px">Sem chamados ativos</p></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-privada" placeholder="Falar com NTI...">
                    <button class="btn" style="width:50px; background:var(--nti); margin:0" onclick="app.enviarPrivado()"><i class="fa fa-paper-plane"></i></button>
                </div>

                <h4 style="margin-top:20px">Chat Geral</h4>
                <div id="chat-geral" class="chat-container"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="msg-geral" placeholder="Mensagem...">
                    <button class="btn" style="width:50px; background:var(--prof); margin:0" onclick="app.enviarGeral()"><i class="fa fa-paper-plane"></i></button>
                </div>
                <div id="nti-baixa" class="hidden">
                    <button class="btn" style="background:var(--cad); color:white" onclick="app.darBaixa()">Dar Baixa no Chamado</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-eval" class="panel" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:300px; display:none; z-index:9999; text-align:center">
        <h3 id="eval-title">Avalie o Suporte</h3>
        <div class="rating">
            <i class="fa fa-star" onclick="app.setStar(1)"></i><i class="fa fa-star" onclick="app.setStar(2)"></i><i class="fa fa-star" onclick="app.setStar(3)"></i><i class="fa fa-star" onclick="app.setStar(4)"></i><i class="fa fa-star" onclick="app.setStar(5)"></i>
        </div>
        <button class="btn" style="background:var(--cad)" onclick="app.confirmarEval()">Enviar Nota</button>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, ticketAtivo: null, stars: 0,

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value, s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === s) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado!");
        },

        start() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-name').innerText = "Olá, " + this.user.nome;
            document.getElementById('cargo-tag').innerText = "| Setor: " + this.user.cargo;
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-menu').classList.remove('hidden');
                document.getElementById('nti-baixa').classList.remove('hidden');
            }
            this.sync();
            this.initCharts();
        },

        sync() {
            // Chat Geral
            db.ref('chat_geral').limitToLast(20).on('value', s => {
                const box = document.getElementById('chat-geral'); box.innerHTML = "";
                s.forEach(m => {
                    const side = m.val().u === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().u}:</b> ${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Cronograma
            db.ref('reservas').on('value', s => {
                const list = document.getElementById('cronograma'); list.innerHTML = "";
                s.forEach(r => list.innerHTML += `● ${r.val().dt} - ${r.val().eq} (${r.val().u})<br>`);
            });
        },

        abrirChamado() {
            const t = document.getElementById('ch-desc').value;
            if(t) {
                const id = "CH-" + Date.now();
                this.ticketAtivo = id;
                db.ref('chamados/'+id).set({u: this.user.nome, t: t, status: 'aberto'});
                this.escutarChatPrivado(id);
                alert("Chamado aberto! Use o chat exclusivo acima.");
            }
        },

        escutarChatPrivado(id) {
            db.ref('chat_privado/'+id).on('value', s => {
                const box = document.getElementById('chat-privado'); box.innerHTML = "";
                s.forEach(m => {
                    const side = m.val().u === this.user.nome ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${m.val().u}:</b> ${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        enviarPrivado() {
            const t = document.getElementById('msg-privada').value;
            if(t && this.ticketAtivo) {
                db.ref('chat_privado/'+this.ticketAtivo).push({u: this.user.nome, t: t});
                document.getElementById('msg-privada').value = "";
            }
        },

        darBaixa() {
            if(this.ticketAtivo) {
                db.ref('chamados/'+this.ticketAtivo).update({status: 'fechado'});
                document.getElementById('modal-eval').style.display = 'block';
            } else { alert("Nenhum chamado selecionado para baixar."); }
        },

        setStar(n) { this.stars = n; alert("Você deu " + n + " estrelas!"); },
        confirmarEval() { document.getElementById('modal-eval').style.display = 'none'; alert("Avaliação registrada!"); },

        initCharts() {
            const ctx = (id) => document.getElementById(id).getContext('2d');
            const data = { labels: ['','','',''], datasets: [{ data: [10, 50, 20, 80], borderColor: '#00adef', borderWidth: 2 }] };
            new Chart(ctx('chartUsers'), { type: 'line', data: data, options: { plugins: { title: { display: true, text: 'Usuários' } } } });
            new Chart(ctx('chartTraffic'), { type: 'line', data: data, options: { plugins: { title: { display: true, text: 'Tráfego Rede' } } } });
        }
    };
</script>
</body>
</html>
