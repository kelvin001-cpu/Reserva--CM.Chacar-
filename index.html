<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover; overflow-x: hidden;
        }

        .conect-banner { width: 100%; text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.8rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #main-system { display: none; padding: 20px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; color: white; }

        /* Estilo Cronograma */
        .cronograma-lista { max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .reserva-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--prof); position: relative; }
        .reserva-card.retirado { border-left-color: var(--cad); background: rgba(46, 204, 113, 0.1); }
        .reserva-card b { color: var(--gestao); font-size: 14px; }
        .reserva-card span { display: block; font-size: 11px; opacity: 0.8; margin-top: 4px; }
        .status-badge { position: absolute; top: 10px; right: 10px; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; padding: 8px; border-radius: 10px; font-size: 12px; }
        .msg-in { align-self: flex-start; background: #333; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h1 style="font-family:'Orbitron'; color:var(--nti)">SISTEMA BLOQUEADO PELO NTI</h1>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column"><h2>PROFESSOR</h2><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof)" onclick="app.login('p')">Entrar</button></div>
        <div class="sector-column"><h2>GESTÃO</h2><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g')">Entrar</button></div>
        <div class="sector-column"><h2>SECRETARIA</h2><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre)" onclick="app.login('s')">Entrar</button></div>
        <div class="sector-column"><h2>CADASTRO</h2><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><button class="btn" style="background:var(--cad)" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column"><h2>NTI</h2><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti)" onclick="app.login('n','NTI')">Painel</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner"><h1>PROGRAMA CONECT</h1></div>
        
        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-edit"></i> Reservar</h3>
                <select id="res-eq">
                    <option>CARRINHO CHROMEBOOK</option>
                    <option>SALA DE INFORMÁTICA</option>
                    <option>TV TOUCH 1</option>
                    <option>TV TOUCH 2</option>
                </select>
                <input type="text" id="res-sl" placeholder="Sala Destino">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Confirmar Reserva</button>
                
                <h3 style="margin-top:20px"><i class="fa fa-headset"></i> Suporte</h3>
                <input type="text" id="ch-t" placeholder="Qual o problema?">
                <button class="btn" style="background:var(--nti)" onclick="app.chamado()">Enviar Chamado</button>

                <div id="nti-panel" class="hidden">
                    <hr style="border:1px dashed #444; margin:20px 0">
                    <h3 style="color:var(--nti)">Master NTI</h3>
                    <canvas id="chartStatus" style="max-height: 100px"></canvas>
                    <button class="btn" style="background:red" onclick="app.lock(true)">TRAVAR</button>
                    <button class="btn" style="background:green; margin-top:5px" onclick="app.lock(false)">LIBERAR</button>
                </div>
                <button class="btn" style="background:#444; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-calendar-day"></i> Cronograma de Equipamentos</h3>
                <div id="cronograma" class="cronograma-lista"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button class="btn" style="width:50px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                </div>
                <h4 style="margin-top:20px">Chamados NTI</h4>
                <div id="chamados-list" style="font-size:10px; opacity:0.7"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,

        async login(pre, type) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(type==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Erro!");
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return;
            let pass = (c==="Secretaria") ? "secretaria2026" : (c==="Gestão") ? "pmspgestores2026" : "pmspmudar123";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass });
            alert("Cadastrado!");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') {
                document.getElementById('nti-panel').classList.remove('hidden');
                this.initChart();
            }
            this.sync();
        },

        sync() {
            db.ref('lock').on('value', s => { 
                if(this.user.cargo !== 'NTI') document.getElementById('lock-overlay').style.display = s.val() ? 'flex' : 'none';
            });

            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('cronograma'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val(), k = r.key;
                    const isRetirado = d.st === 'retirado';
                    box.innerHTML += `
                        <div class="reserva-card ${isRetirado ? 'retirado' : ''}">
                            <div class="status-badge" style="background:${isRetirado?'var(--cad)':'var(--prof)'}">${isRetirado?'EM USO':'AGENDADO'}</div>
                            <b>${d.eq}</b><br>
                            <span>Local: ${d.sl} | Data: ${new Date(d.dt).toLocaleString()}</span>
                            <span>Por: ${d.u}</span>
                            <div style="margin-top:10px">
                                ${!isRetirado ? `<button onclick="app.baixa('${k}','retirado')" style="background:var(--cad); border:none; color:white; padding:4px 8px; border-radius:5px; font-size:10px; cursor:pointer">DAR BAIXA (RETIRAR)</button>` : 
                                `<button onclick="app.finalizar('${k}')" style="background:var(--nti); border:none; color:white; padding:4px 8px; border-radius:5px; font-size:10px; cursor:pointer">DEVOLVER / FINALIZAR</button>`}
                            </div>
                        </div>`;
                });
            });

            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b> ${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            db.ref('chamados').limitToLast(5).on('value', snap => {
                const box = document.getElementById('chamados-list'); box.innerHTML = "";
                snap.forEach(c => { box.innerHTML += `<div>• ${c.val().u}: ${c.val().t}</div>`; });
            });
        },

        reservar() {
            const eq=document.getElementById('res-eq').value, sl=document.getElementById('res-sl').value, dt=document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome, st: 'pendente'});
        },

        baixa(k, s) { db.ref('reservas/'+k).update({st: s}); },
        finalizar(k) { if(confirm("Liberar equipamento?")) db.ref('reservas/'+k).remove(); },
        chamado() { const t=document.getElementById('ch-t').value; if(t){ db.ref('chamados').push({u:this.user.nome, t:t}); document.getElementById('ch-t').value=""; alert("Enviado!"); } },
        sendChat() { const t=document.getElementById('chat-in').value; if(t){ db.ref('chat').push({n:this.user.nome, t:t}); document.getElementById('chat-in').value=""; } },
        lock(v) { db.ref('lock').set(v); },
        initChart() { new Chart(document.getElementById('chartStatus'), { type: 'line', data: { labels: ['08h','12h','16h'], datasets: [{ label: 'Tráfego', data: [5, 15, 10], borderColor: '#eb4d4b' }] }}); }
    };
</script>
</body>
</html>
