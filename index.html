<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa Conect - NTI CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.92);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .conect-banner { width: 100%; text-align: center; padding: 15px 0; background: linear-gradient(180deg, rgba(0,173,239,0.3) 0%, transparent 100%); }
        .conect-banner h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.6rem; color: var(--prof); text-shadow: 0 0 10px var(--prof); }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); align-content: center; }
        .sector-column { flex: 1; min-width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #main-system { display: none; padding: 15px; background: var(--bg-overlay); min-height: 100vh; }
        
        /* Layout dinâmico */
        .grid-layout { display: grid; gap: 15px; grid-template-columns: 280px 1fr; }
        .grid-nti { grid-template-columns: 280px 1fr 300px; }

        .panel { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(10px); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Ajustes do Calendário */
        #calendar { background: white; color: #333; padding: 10px; border-radius: 8px; height: 600px; }
        .fc-toolbar-title { font-size: 1.2rem !important; text-transform: capitalize; }
        .fc-event { cursor: pointer; border: none !important; }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: rgba(0,0,0,0.5); color: white; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; margin-top: 5px; color: white; }

        #chat-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; font-size: 12px; }
        .msg { max-width: 85%; padding: 6px 10px; border-radius: 8px; }
        .msg-in { align-self: flex-start; background: #444; }
        .msg-out { align-self: flex-end; background: #005c4b; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-container" id="login-screen">
        <div class="sector-column"><i class="fa fa-graduation-cap fa-2x"></i><h3>PROF</h3><input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof)" onclick="app.login('p','Professor')">Entrar</button></div>
        <div class="sector-column"><i class="fa fa-user-tie fa-2x"></i><h3>GESTÃO</h3><input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao); color:black" onclick="app.login('g','Gestão')">Entrar</button></div>
        <div class="sector-column"><i class="fa fa-building-columns fa-2x"></i><h3>SEC</h3><input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre)" onclick="app.login('s','Secretaria')">Entrar</button></div>
        <div class="sector-column" style="background: rgba(46, 204, 113, 0.05);"><h3>CADASTRO</h3><input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário"><select id="c-c" onchange="app.updatePassHint()"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select><div style="font-size:9px; margin:5px">Senha: <b id="hint-pass">pmspmudar123</b></div><button class="btn" style="background:var(--cad)" onclick="app.confirmarCad()">Criar</button></div>
        <div class="sector-column"><i class="fa fa-terminal fa-2x"></i><h3>NTI</h3><input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti)" onclick="app.login('n','NTI')">Acesso</button></div>
    </div>

    <div id="main-system">
        <div class="conect-banner"><h1>PROGRAMA CONECT</h1><small id="user-info"></small></div>

        <div id="layout" class="grid-layout">
            <div class="panel">
                <h4><i class="fa fa-plus"></i> Nova Reserva</h4>
                <select id="res-eq"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV TOUCH</option><option>TV 1</option></select>
                <input type="text" id="res-sl" placeholder="Sala">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof)" onclick="app.reservar()">Reservar</button>
                
                <hr style="opacity:0.1; margin:15px 0">
                
                <h4>Chat Geral</h4>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px; margin-top:5px">
                    <input type="text" id="chat-in" placeholder="...">
                    <button class="btn" style="margin:0; width:45px; background:var(--prof)" onclick="app.sendChat()"><i class="fa fa-paper-plane"></i></button>
                </div>
                
                <button class="btn" style="background:#444; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <div id="calendar"></div>
            </div>

            <div id="nti-monitor" class="panel hidden">
                <h4 style="color:var(--nti)">NTI MONITOR</h4>
                <canvas id="chartStatus"></canvas>
                <canvas id="chartUsers" style="margin-top:15px"></canvas>
                <hr style="opacity:0.1">
                <input type="text" id="nti-aviso" placeholder="Aviso Global">
                <button class="btn" style="background:var(--nti)" onclick="app.postAviso()">Postar Aviso</button>
                <button class="btn" style="background:#000" onclick="app.setLock()">Travar Sistema</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null, calendar: null,

        updatePassHint() {
            const c = document.getElementById('c-c').value;
            document.getElementById('hint-pass').innerText = (c==="Secretaria") ? "secretaria2026" : (c==="Gestão") ? "pmspgestores2026" : "pmspmudar123";
        },

        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { this.user = snap.val(); this.start(); }
            else alert("Acesso negado!");
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            if(!n || !p) return alert("Preencha tudo!");
            let pass = (c==="Secretaria") ? "secretaria2026" : (c==="Gestão") ? "pmspgestores2026" : "pmspmudar123";
            db.ref('usuarios/'+p).set({ nome: n, pront: p, cargo: c, pass: pass });
            alert("Cadastrado!");
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            document.getElementById('user-info').innerText = `${this.user.nome} (${this.user.cargo})`;
            
            if(this.user.cargo === 'NTI') {
                document.getElementById('layout').classList.add('grid-nti');
                document.getElementById('nti-monitor').classList.remove('hidden');
                this.initNtiCharts();
            }
            this.initCalendar();
            this.sync();
        },

        initCalendar() {
            const calEl = document.getElementById('calendar');
            this.calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: [],
                eventClick: (info) => alert(`Reserva: ${info.event.title}\n${info.event.extendedProps.desc}`)
            });
            this.calendar.render();
        },

        sync() {
            // Sincronizar Reservas para o Calendário
            db.ref('reservas').on('value', snap => {
                const events = [];
                snap.forEach(r => {
                    const d = r.val();
                    events.push({
                        title: `${d.eq} - ${d.sl}`,
                        start: d.dt,
                        backgroundColor: d.eq.includes('SALA') ? '#00adef' : '#2ecc71',
                        extendedProps: { desc: `Responsável: ${d.u}` }
                    });
                });
                this.calendar.removeAllEvents();
                this.calendar.addEventSource(events);
            });

            // Chat
            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = (d.n === this.user.nome) ? 'msg-out' : 'msg-in';
                    box.innerHTML += `<div class="msg ${side}"><b>${d.n}:</b><br>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        },

        initNtiCharts() {
            new Chart(document.getElementById('chartStatus'), { type: 'line', data: { labels: ['08h','12h','16h'], datasets: [{ label: 'Latência', data: [10, 15, 12], borderColor: '#eb4d4b' }] }});
            new Chart(document.getElementById('chartUsers'), { type: 'doughnut', data: { labels: ['Prof','Gestão'], datasets: [{ data: [70, 30], backgroundColor: ['#00adef','#f1c40f'] }] }});
        },

        reservar() {
            const eq=document.getElementById('res-eq').value, sl=document.getElementById('res-sl').value, dt=document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },
        sendChat() {
            const t = document.getElementById('chat-in').value;
            if(t) { db.ref('chat').push({n: this.user.nome, t: t}); document.getElementById('chat-in').value = ""; }
        },
        postAviso() { db.ref('aviso').set(document.getElementById('nti-aviso').value); }
    };
</script>
</body>
</html>
