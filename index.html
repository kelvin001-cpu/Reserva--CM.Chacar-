<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTI MASTER - EMEF CHÁCARA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --bg-overlay: rgba(10, 11, 16, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            background: url('https://get.wallhere.com/photo/space-planet-Earth-NASA-blue-marble-atmosphere-outer-space-astronomical-object-82285.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .login-container { display: flex; width: 100%; height: 100vh; flex-wrap: wrap; background: var(--bg-overlay); }
        .sector-column { 
            flex: 1; min-width: 200px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .sector-column:hover { flex: 1.4; background: rgba(255,255,255,0.05); }

        .col-prof { color: var(--prof); border-top: 8px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 8px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 8px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 8px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 8px solid var(--nti); }

        #main-system { display: none; padding: 20px; padding-top: 70px; background: var(--bg-overlay); min-height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        
        /* GRID DE GRÁFICOS */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .chart-container { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }

        .panel { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }

        /* MODAL SENHA */
        #pass-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; }
        
        #chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        #lock-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <i class="fa fa-user-slash fa-4x" style="color:var(--nti); margin-bottom:20px"></i>
        <h1 style="font-family:'Orbitron'">SISTEMA EM MANUTENÇÃO</h1>
    </div>

    <div id="pass-modal">
        <div class="panel" style="width: 350px; text-align: center; border: 2px solid var(--gestao);">
            <h2 style="color:var(--gestao)">Nova Senha</h2>
            <p>Você está usando uma senha padrão. Crie uma senha pessoal:</p>
            <input type="password" id="new-pass" placeholder="Nova Senha">
            <input type="password" id="new-pass-conf" placeholder="Confirmar Senha">
            <button class="btn" style="background:var(--cad); color:white" onclick="app.salvarNovaSenha()">Salvar e Entrar</button>
        </div>
    </div>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof"><i class="fa fa-graduation-cap fa-3x"></i><h2>PROFESSOR</h2>
            <input type="number" id="p-p" placeholder="Prontuário"><input type="password" id="p-s" placeholder="Senha"><button class="btn" style="background:var(--prof); color:white" onclick="app.login('p','Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao"><i class="fa fa-user-tie fa-3x"></i><h2>GESTÃO</h2>
            <input type="number" id="g-p" placeholder="Prontuário"><input type="password" id="g-s" placeholder="Senha"><button class="btn" style="background:var(--gestao)" onclick="app.login('g','Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre"><i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2>
            <input type="number" id="s-p" placeholder="Prontuário"><input type="password" id="s-s" placeholder="Senha"><button class="btn" style="background:var(--secre); color:white" onclick="app.login('s','Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad"><i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-n" placeholder="Nome"><input type="number" id="c-p" placeholder="Prontuário">
            <select id="c-c"><option>Professor</option><option>Gestão</option><option>Secretaria</option></select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Criar</button>
        </div>
        <div class="sector-column col-nti"><i class="fa fa-terminal fa-3x"></i><h2>NTI</h2>
            <input type="number" id="n-p" placeholder="ID"><input type="password" id="n-s" placeholder="Senha"><button class="btn" style="background:var(--nti); color:white" onclick="app.login('n','NTI')">Painel</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <h3><i class="fa fa-calendar-plus"></i> Reservar</h3>
                <select id="res-eq">
                    <option>SALA INFO</option>
                    <option>CHROMEBOOKS</option>
                    <option>TV 1</option>
                    <option>TV 2</option>
                    <option>TV TOUCH</option>
                </select>
                <input type="text" id="res-sl" placeholder="Sala Destino">
                <input type="datetime-local" id="res-dt">
                <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">Confirmar</button>

                <div id="nti-panel" class="hidden" style="margin-top:30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top:20px">
                    <h3 style="color:var(--nti)">Admin NTI</h3>
                    <div style="display:flex; gap:5px; margin-bottom:10px">
                        <button class="btn" style="background:var(--nti); color:white" onclick="app.setLock(true)">TRAVAR</button>
                        <button class="btn" style="background:var(--cad); color:white" onclick="app.setLock(false)">LIBERAR</button>
                    </div>
                    <input type="number" id="reset-p" placeholder="Prontuário">
                    <button class="btn" style="background:var(--gestao)" onclick="app.resetSenha()">Resetar Senha</button>
                </div>
                <button class="btn" style="background:#444; color:white; margin-top:20px" onclick="location.reload()">Sair</button>
            </div>

            <div class="panel">
                <h3><i class="fa fa-chart-line"></i> Painel de Monitoramento</h3>
                <div class="charts-grid">
                    <div class="chart-container"><canvas id="chartNTI"></canvas></div>
                    <div class="chart-container"><canvas id="chartInfo"></canvas></div>
                    <div class="chart-container"><canvas id="chartChrome"></canvas></div>
                    <div class="chart-container"><canvas id="chartTV"></canvas></div>
                </div>
                <hr style="opacity:0.1; margin:20px 0">
                <div id="lista-res" style="max-height: 150px; overflow-y:auto"></div>
            </div>

            <div class="panel">
                <h3><i class="fa fa-comments"></i> Chat Geral</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Mensagem...">
                    <button onclick="app.sendChat()" style="width:50px; background:var(--prof); border:none; border-radius:8px; cursor:pointer; color:white">></button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        async login(pre, cargo) {
            const p = document.getElementById(pre+'-p').value;
            const s = document.getElementById(pre+'-s').value;
            
            if(cargo==='NTI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'NTI', pront:'46690'}; return this.start(); }
            
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && String(snap.val().pass) === String(s)) { 
                this.user = snap.val(); 
                const padroes = ['pmspmudar123', 'gestao2026', 'secretaria2026'];
                if(padroes.includes(s)) {
                    document.getElementById('pass-modal').style.display = 'flex';
                } else {
                    this.start(); 
                }
            } else { alert("Dados incorretos!"); }
        },

        async salvarNovaSenha() {
            const n1 = document.getElementById('new-pass').value;
            const n2 = document.getElementById('new-pass-conf').value;
            if(n1 !== n2 || n1.length < 4) return alert("Senhas não batem ou muito curta!");
            await db.ref('usuarios/'+this.user.pront).update({pass: n1});
            document.getElementById('pass-modal').style.display = 'none';
            this.start();
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'NTI') document.getElementById('nti-panel').classList.remove('hidden');
            this.sync();
            this.initCharts();
        },

        sync() {
            db.ref('lock').on('value', s => { 
                document.getElementById('lock-overlay').style.display = (s.val() && this.user.cargo !== 'NTI') ? 'flex' : 'none';
            });

            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const color = d.c === 'NTI' ? 'var(--nti)' : (d.c === 'Gestão' ? 'var(--gestao)' : 'var(--prof)');
                    box.innerHTML += `<div class="msg"><b style="color:${color}">${d.n}</b>${d.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('lista-res'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; margin-bottom:5px; font-size:11px">
                        <b>${d.eq}</b> - ${d.sl} | ${d.u}
                    </div>`;
                });
            });
        },

        sendChat() {
            const t = document.getElementById('chat-in').value; if(!t) return;
            db.ref('chat').push({n: this.user.nome, c: this.user.cargo, t: t});
            document.getElementById('chat-in').value = "";
        },

        reservar() {
            const eq = document.getElementById('res-eq').value, sl = document.getElementById('res-sl').value, dt = document.getElementById('res-dt').value;
            if(sl && dt) db.ref('reservas').push({eq, sl, dt, u: this.user.nome});
        },

        setLock(v) { db.ref('lock').set(v); },

        initCharts() {
            const ctx1 = document.getElementById('chartNTI').getContext('2d');
            new Chart(ctx1, { type: 'line', data: { labels: ['S','T','Q','Q','S'], datasets: [{ label: 'Chamados NTI', data: [2,5,3,8,4], borderColor: '#eb4d4b', tension: 0.4 }] } });

            const ctx2 = document.getElementById('chartInfo').getContext('2d');
            new Chart(ctx2, { type: 'bar', data: { labels: ['S','T','Q','Q','S'], datasets: [{ label: 'Sala Info', data: [8,10,7,9,12], backgroundColor: '#00adef' }] } });

            const ctx3 = document.getElementById('chartChrome').getContext('2d');
            new Chart(ctx3, { type: 'line', data: { labels: ['S','T','Q','Q','S'], datasets: [{ label: 'Chromebooks', data: [15,20,12,25,18], borderColor: '#2ecc71', tension: 0.4 }] } });

            const ctx4 = document.getElementById('chartTV').getContext('2d');
            new Chart(ctx4, { type: 'pie', data: { labels: ['TV 1', 'TV 2', 'TV Touch'], datasets: [{ data: [30, 20, 50], backgroundColor: ['#a55eea', '#f1c40f', '#00adef'] }] } });
        },

        confirmarCad() {
            const n = document.getElementById('c-n').value, p = document.getElementById('c-p').value, c = document.getElementById('c-c').value;
            const s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
            db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("Cadastrado!");
        },

        async resetSenha() {
            const p = document.getElementById('reset-p').value;
            const u = await db.ref('usuarios/'+p).once('value');
            if(u.exists()) {
                const cargo = u.val().cargo;
                const nova = cargo === 'Gestão' ? 'gestao2026' : (cargo === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
                db.ref('usuarios/'+p).update({pass: nova});
                alert("Senha resetada!");
            }
        }
    };
</script>
</body>
</html>
