<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA NTI | EMEF CHÁCARA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --prof: #00adef; --gestao: #f1c40f; --secre: #a55eea; --cad: #2ecc71; --nti: #eb4d4b;
            --dark: #0a0a0c; --card: #161b22;
        }

        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }
        
        /* AVISO GLOBAL NO TOPO */
        #aviso-global { display: none; background: var(--nti); color: white; text-align: center; padding: 10px; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 10000; font-family: 'Orbitron'; }

        /* SEU DESIGN DE COLUNAS FAVORITO */
        .login-container { display: flex; width: 100%; height: 100vh; }
        .sector-column { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; border-right: 1px solid rgba(255,255,255,0.05); }
        .sector-column:hover { flex: 2; background: rgba(255,255,255,0.03); }
        .col-prof { color: var(--prof); border-top: 6px solid var(--prof); }
        .col-gestao { color: var(--gestao); border-top: 6px solid var(--gestao); }
        .col-secre { color: var(--secre); border-top: 6px solid var(--secre); }
        .col-cad { color: var(--cad); border-top: 6px solid var(--cad); }
        .col-nti { color: var(--nti); border-top: 6px solid var(--nti); }

        /* PAINEL INTERNO */
        #main-system { display: none; padding: 20px; padding-top: 60px; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }

        /* CHAT GERAL */
        #chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .msg b { color: var(--prof); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="aviso-global"></div>

    <div class="login-container" id="login-screen">
        <div class="sector-column col-prof">
            <i class="fa fa-chalkboard-user fa-3x"></i><h2>PROFESSORES</h2>
            <input type="number" id="p-pront" placeholder="PRONTUÁRIO">
            <input type="password" id="p-pass" placeholder="SENHA">
            <button class="btn" style="background:var(--prof); color:white" onclick="app.login('p', 'Professor')">Entrar</button>
        </div>
        <div class="sector-column col-gestao">
            <i class="fa fa-users-viewfinder fa-3x"></i><h2>GESTÃO</h2>
            <input type="number" id="g-pront" placeholder="PRONTUÁRIO">
            <input type="password" id="g-pass" placeholder="SENHA">
            <button class="btn" style="background:var(--gestao)" onclick="app.login('g', 'Gestão')">Entrar</button>
        </div>
        <div class="sector-column col-secre">
            <i class="fa fa-building-columns fa-3x"></i><h2>SECRETARIA</h2>
            <input type="number" id="s-pront" placeholder="PRONTUÁRIO">
            <input type="password" id="s-pass" placeholder="SENHA">
            <button class="btn" style="background:var(--secre); color:white" onclick="app.login('s', 'Secretaria')">Entrar</button>
        </div>
        <div class="sector-column col-cad">
            <i class="fa fa-user-plus fa-3x"></i><h2>CADASTRO</h2>
            <input type="text" id="c-nome" placeholder="NOME">
            <input type="number" id="c-pront" placeholder="PRONTUÁRIO">
            <select id="c-cargo">
                <option value="Professor">Professor</option>
                <option value="Secretaria">Secretaria</option>
                <option value="Gestão">Gestão</option>
            </select>
            <button class="btn" style="background:var(--cad); color:white" onclick="app.confirmarCad()">Cadastrar</button>
        </div>
        <div class="sector-column col-nti">
            <i class="fa fa-terminal fa-3x"></i><h2>PORTAL NTI</h2>
            <input type="number" id="n-pront" placeholder="ID MASTER">
            <input type="password" id="n-pass" placeholder="SENHA">
            <button class="btn" style="background:var(--nti); color:white" onclick="app.login('n', 'TI')">Configurar</button>
        </div>
    </div>

    <div id="main-system">
        <div class="grid-layout">
            <div class="panel">
                <h3>Ações</h3>
                <div id="area-reserva">
                    <select id="res-item"><option>SALA INFO</option><option>CHROMEBOOKS</option><option>TV 01</option></select>
                    <input type="text" id="res-sala" placeholder="SALA ONDE VAI USAR">
                    <input type="datetime-local" id="res-data">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.reservar()">RESERVAR</button>
                </div>

                <div id="nti-admin" class="hidden" style="margin-top:20px; border-top:1px solid #333; padding-top:20px">
                    <h3 style="color:var(--nti)">Admin NTI</h3>
                    <button class="btn" style="background:var(--nti); color:white; margin-bottom:5px" onclick="app.travar()">TRAVAR SITE</button>
                    <input type="text" id="nti-msg" placeholder="Aviso Global">
                    <button class="btn" style="background:var(--prof); color:white" onclick="app.setAviso()">POSTAR AVISO</button>
                    <div id="user-list-admin" style="font-size:11px; margin-top:10px"></div>
                </div>
            </div>

            <div class="panel">
                <h3>Cronograma & Dashboard</h3>
                <div id="cronograma" style="max-height: 200px; overflow-y:auto; margin-bottom:20px"></div>
                <canvas id="meuGrafico" height="150"></canvas>
            </div>

            <div class="panel">
                <h3>Chat & Status</h3>
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px">
                    <input type="text" id="chat-in" placeholder="Conversar...">
                    <button onclick="app.sendChat()" style="width:40px; background:var(--prof); border:none; border-radius:5px">></button>
                </div>
                <hr style="opacity:0.1; margin:15px 0">
                <div id="monitor-lista" style="font-size:11px"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://escala-chacara-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        user: null,
        async login(pre, cargo) {
            const p = document.getElementById(pre+'-pront').value;
            const s = document.getElementById(pre+'-pass').value;
            if(cargo==='TI' && p==='46690' && s==='nti2026') { this.user={nome:'Kelvin', cargo:'TI', pront:'46690'}; return this.start(); }
            const snap = await db.ref('usuarios/'+p).once('value');
            if(snap.exists() && snap.val().pass === s) { this.user = snap.val(); this.start(); }
            else { alert("Erro!"); }
        },

        start() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-system').style.display = 'block';
            if(this.user.cargo === 'TI') document.getElementById('nti-admin').classList.remove('hidden');
            
            // Trava do Site
            db.ref('lock').on('value', s => { if(s.val() && this.user.cargo !== 'TI') location.reload(); });
            
            this.sync();
            this.initChart();
        },

        sync() {
            // Cronograma
            db.ref('reservas').on('value', snap => {
                const box = document.getElementById('cronograma'); box.innerHTML = "";
                snap.forEach(r => {
                    const d = r.val();
                    box.innerHTML += `<div style="padding:5px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:5px">
                        <b>${d.item}</b> (${d.sala}) - <small>${d.user}</small>
                        ${this.user.cargo !== 'Professor' ? `<button onclick="db.ref('reservas/${r.key}').remove()" style="color:red; background:none; border:none; float:right">X</button>` : ''}
                    </div>`;
                });
            });

            // Chat
            db.ref('chat').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => { box.innerHTML += `<div class="msg"><b>${m.val().u}:</b> ${m.val().t}</div>`; });
                box.scrollTop = box.scrollHeight;
            });

            // Aviso
            db.ref('aviso').on('value', s => {
                const el = document.getElementById('aviso-global');
                if(s.val()) { el.style.display='block'; el.innerText = s.val(); } else { el.style.display='none'; }
            });

            // Admin Users
            if(this.user.cargo === 'TI') {
                db.ref('usuarios').on('value', snap => {
                    const box = document.getElementById('user-list-admin'); box.innerHTML = "<b>USUÁRIOS:</b><br>";
                    snap.forEach(u => { box.innerHTML += `${u.val().nome} <span onclick="db.ref('usuarios/${u.key}').remove()" style="color:red; cursor:pointer">[DEL]</span><br>`; });
                });
            }
        },

        async reservar() {
            const item = document.getElementById('res-item').value, sala = document.getElementById('res-sala').value, data = document.getElementById('res-data').value;
            if(!sala || !data) return;
            await db.ref('reservas').push({item, sala, data, user: this.user.nome});
        },

        sendChat() {
            const t = document.getElementById('chat-in').value; if(!t) return;
            db.ref('chat').push({u: this.user.nome, t: t});
            document.getElementById('chat-in').value = "";
        },

        setAviso() { db.ref('aviso').set(document.getElementById('nti-msg').value); },
        travar() { db.ref('lock').set(true); },
        
        async confirmarCad() {
            const n = document.getElementById('c-nome').value, p = document.getElementById('c-pront').value, c = document.getElementById('c-cargo').value;
            let s = c === 'Gestão' ? 'gestao2026' : (c === 'Secretaria' ? 'secretaria2026' : 'pmspmudar123');
            await db.ref('usuarios/'+p).set({nome:n, pront:p, cargo:c, pass:s});
            alert("OK!");
        },

        initChart() {
            new Chart(document.getElementById('meuGrafico'), {
                type: 'bar',
                data: { labels: ['INFO', 'CHROME', 'TV'], datasets: [{ label: 'Uso', data: [5, 10, 3], backgroundColor: '#00adef' }] }
            });
        }
    };
</script>
</body>
</html>
